# ============================================================================
#  Dune Mist  ·  shared Home Assistant theme  (mobile + NSPanel Pro)
#  Refreshed "Light Mist" palette — muted slate-grey surfaces, white text,
#  slate / sage / gold accents. Installed under the key "Dark Dune" so every
#  existing `theme: Dark Dune` view picks it up with no edits.
# ============================================================================

Dune Mist:
  # ---- core brand tokens (referenced directly by your cards) ----------------
  background-color: "#4f545b"            # primary surface — your custom token
  background-color-2: "#5b616a"          # raised rows / pills / selected / search
  background-color-3: "#676d77"          # one step lighter — cards inside expanders
  accent-color: "#8EB1BF"                # slate — active accent everywhere

  # semantic accents (use these instead of hard-coded hexes in card_mod)
  slate-color: "#8EB1BF"
  slate-bright: "#B6D2DC"
  sage-color: "#8BA680"
  gold-color: "#E2C168"
  amber-color: "#E0A75E"

  # ---- backgrounds ----------------------------------------------------------
  primary-background-color: "#41454b"    # app background (behind cards, dialogs)
  secondary-background-color: "#3a3e44"  # sidebar, menu surfaces, table stripes
  divider-color: "rgba(255,255,255,0.10)"

  # ---- cards: the key fix — ha-card defaults to the surface token -----------
  card-background-color: "#4f545b"
  ha-card-background: "#4f545b"
  ha-card-border-radius: "20px"
  ha-card-border-width: "0px"
  ha-card-border-color: "rgba(255,255,255,0.07)"
  ha-card-box-shadow: "0 2px 6px rgba(0,0,0,0.28)"

  # ---- text -----------------------------------------------------------------
  primary-text-color: "#ffffff"
  secondary-text-color: "#c3c7cc"        # ~4:1 on the surface — readable
  text-primary-color: "#16202a"          # text that sits ON an accent fill (dark)
  disabled-text-color: "rgba(255,255,255,0.45)"
  app-header-text-color: "#ffffff"

  # ---- primary / interactive ------------------------------------------------
  primary-color: "#8EB1BF"               # links, active states, slider/switch on
  light-primary-color: "#B6D2DC"
  dark-primary-color: "#6E97A6"

  # ---- semantic states ------------------------------------------------------
  error-color: "#E0695B"
  warning-color: "#E0A75E"
  success-color: "#8BA680"
  info-color: "#8EB1BF"
  state-icon-color: "#c3c7cc"            # idle entity icon
  state-icon-active-color: "#B6D2DC"     # on / active entity icon (slate glow)
  state-icon-unavailable-color: "rgba(255,255,255,0.35)"
  paper-item-icon-color: "#c3c7cc"
  paper-item-icon-active-color: "#B6D2DC"

  # domain state colors (entity icon tints across the UI)
  state-light-active-color: "#E2C168"    # lights = warm gold when on
  state-switch-active-color: "#8EB1BF"
  state-fan-active-color: "#8EB1BF"
  state-climate-cool-color: "#8EB1BF"
  state-climate-heat-color: "#E0A75E"
  state-climate-auto-color: "#8BA680"
  state-media_player-active-color: "#B6D2DC"
  state-binary_sensor-active-color: "#E0A75E"
  state-cover-active-color: "#8EB1BF"

  # ---- app header + sidebar (kiosk hides these on mobile, NSPanel needs them)
  app-header-background-color: "#3a3e44"
  sidebar-background-color: "#3a3e44"
  sidebar-icon-color: "#c3c7cc"
  sidebar-text-color: "#e7e9ec"
  sidebar-selected-icon-color: "#B6D2DC"
  sidebar-selected-text-color: "#ffffff"
  sidebar-selected-background-color: "rgba(142,177,191,0.16)"

  # ---- switches -------------------------------------------------------------
  switch-checked-color: "#8EB1BF"
  switch-checked-button-color: "#ffffff"
  switch-checked-track-color: "rgba(142,177,191,0.55)"
  switch-unchecked-button-color: "#d0d3d7"
  switch-unchecked-track-color: "rgba(255,255,255,0.28)"

  # ---- sliders (legacy paper + modern ha-control-slider) --------------------
  paper-slider-knob-color: "#ffffff"
  paper-slider-knob-start-color: "#ffffff"
  paper-slider-pin-color: "#8EB1BF"
  paper-slider-active-color: "#8EB1BF"
  paper-slider-secondary-color: "rgba(142,177,191,0.40)"
  paper-slider-container-color: "rgba(255,255,255,0.14)"
  ha-slider-color: "#8EB1BF"

  # ---- toggles / checkboxes / radios ---------------------------------------
  paper-toggle-button-checked-bar-color: "#8EB1BF"
  paper-toggle-button-checked-button-color: "#ffffff"

  # ---- inputs, dropdowns, dialogs (MDC — drives Settings + every menu) ------
  mdc-theme-primary: "#8EB1BF"
  mdc-theme-secondary: "#8EB1BF"
  mdc-theme-surface: "#4f545b"
  mdc-theme-on-surface: "#ffffff"
  mdc-theme-on-primary: "#16202a"
  mdc-theme-on-secondary: "#16202a"
  mdc-theme-text-primary-on-background: "#ffffff"
  mdc-text-field-fill-color: "#5b616a"
  mdc-text-field-ink-color: "#ffffff"
  mdc-text-field-label-ink-color: "#c3c7cc"
  mdc-text-field-idle-line-color: "rgba(255,255,255,0.30)"
  mdc-text-field-hover-line-color: "rgba(255,255,255,0.55)"
  mdc-select-fill-color: "#5b616a"
  mdc-select-ink-color: "#ffffff"
  mdc-select-label-ink-color: "#c3c7cc"
  mdc-select-idle-line-color: "rgba(255,255,255,0.30)"
  mdc-dialog-scrim-color: "rgba(0,0,0,0.6)"
  mdc-dialog-heading-ink-color: "#ffffff"
  mdc-dialog-content-ink-color: "#c3c7cc"
  ha-dialog-surface-background: "#41454b"

  # ---- modern HA form / dialog / menu tokens (Material 3 · HA · Web-Awesome) -
  # The mdc-* block above only covers LEGACY MDC components. Newer HA dialogs,
  # selects, dropdown menus and the whole Settings UI use Material 3 (md-sys /
  # md-filled), the ha-color-* layer and Web-Awesome tokens. Left undefined they
  # fall back to Material's LIGHT defaults (white surface) while the text stays
  # light -> illegible light-on-white. Map them all to the dark palette.

  # Material 3 system colors
  md-sys-color-surface: "var(--card-background-color)"
  md-sys-color-surface-dim: "var(--secondary-background-color)"
  md-sys-color-surface-bright: "var(--background-color-2)"
  md-sys-color-surface-container-lowest: "var(--secondary-background-color)"
  md-sys-color-surface-container-low: "var(--primary-background-color)"
  md-sys-color-surface-container: "var(--background-color-2)"
  md-sys-color-surface-container-high: "var(--card-background-color)"
  md-sys-color-surface-container-highest: "var(--background-color-3)"
  md-sys-color-surface-variant: "var(--background-color-2)"
  md-sys-color-on-surface: "var(--primary-text-color)"
  md-sys-color-on-surface-variant: "var(--secondary-text-color)"
  md-sys-color-background: "var(--primary-background-color)"
  md-sys-color-on-background: "var(--primary-text-color)"
  md-sys-color-primary: "var(--primary-color)"
  md-sys-color-on-primary: "var(--text-primary-color)"
  md-sys-color-primary-container: "rgba(142,177,191,0.22)"
  md-sys-color-on-primary-container: "var(--primary-text-color)"
  md-sys-color-secondary: "var(--slate-bright)"
  md-sys-color-on-secondary: "var(--text-primary-color)"
  md-sys-color-secondary-container: "rgba(142,177,191,0.22)"
  md-sys-color-on-secondary-container: "var(--primary-text-color)"
  md-sys-color-outline: "rgba(255,255,255,0.30)"
  md-sys-color-outline-variant: "rgba(255,255,255,0.14)"
  md-sys-color-error: "var(--error-color)"
  md-sys-color-on-error: "var(--text-primary-color)"
  md-sys-color-error-container: "#5a2b28"
  md-sys-color-on-error-container: "#ffd9d5"
  md-sys-color-inverse-surface: "#e7e9ec"
  md-sys-color-inverse-on-surface: "var(--text-primary-color)"
  md-sys-color-inverse-primary: "#2c4d59"

  # Material 3 filled text-field / select (fill + ink)
  md-filled-field-container-color: "var(--background-color-2)"
  md-filled-field-content-color: "var(--primary-text-color)"
  md-filled-field-label-text-color: "var(--secondary-text-color)"
  md-filled-field-supporting-text-color: "var(--secondary-text-color)"
  md-filled-field-active-indicator-color: "var(--primary-color)"
  md-filled-field-hover-state-layer-color: "rgba(255,255,255,0.06)"
  md-filled-text-field-container-color: "var(--background-color-2)"
  md-filled-text-field-input-text-color: "var(--primary-text-color)"
  md-filled-text-field-label-text-color: "var(--secondary-text-color)"
  md-filled-select-text-field-container-color: "var(--background-color-2)"
  md-filled-select-text-field-input-text-color: "var(--primary-text-color)"

  # Material 3 menu (dropdown popup + items)
  md-menu-container-color: "var(--card-background-color)"
  md-menu-item-label-text-color: "var(--primary-text-color)"
  md-menu-item-supporting-text-color: "var(--secondary-text-color)"
  md-menu-item-selected-container-color: "rgba(142,177,191,0.30)"
  md-menu-item-selected-label-text-color: "var(--primary-text-color)"

  # HA color tokens (transitional design-system layer)
  ha-color-fill-neutral-quiet-resting: "var(--background-color-2)"
  ha-color-fill-neutral-quiet-hover: "var(--background-color)"
  ha-color-on-fill-neutral-quiet: "var(--primary-text-color)"
  ha-color-fill-neutral-loud-resting: "var(--primary-color)"
  ha-color-on-fill-neutral-loud: "var(--text-primary-color)"
  ha-color-fill-primary-quiet-resting: "rgba(142,177,191,0.18)"
  ha-color-fill-primary-quiet-hover: "rgba(142,177,191,0.28)"
  ha-color-on-fill-primary-quiet: "var(--primary-text-color)"
  ha-color-text-field-fill: "var(--background-color-2)"
  ha-color-text-field-text: "var(--primary-text-color)"
  ha-color-text-field-label: "var(--secondary-text-color)"

  # Web-Awesome tokens (ha-dropdown / ha-picker-field on 2025.x)
  wa-color-surface-default: "var(--background-color-2)"
  wa-color-surface-lowered: "var(--background-color)"
  wa-color-surface-raised: "var(--card-background-color)"
  wa-color-text-normal: "var(--primary-text-color)"
  wa-color-text-quiet: "var(--secondary-text-color)"
  wa-color-fill-neutral-quiet: "var(--background-color-2)"
  wa-color-fill-neutral-loud: "var(--primary-color)"

  # Vaadin / Material combo-box overlay (entity & target pickers)
  material-background-color: "var(--card-background-color)"
  material-secondary-background-color: "var(--background-color-2)"
  material-primary-text-color: "var(--primary-text-color)"
  material-secondary-text-color: "var(--secondary-text-color)"
  material-disabled-text-color: "var(--disabled-text-color)"
  material-primary-color: "var(--primary-color)"
  material-divider-color: "rgba(255,255,255,0.12)"

  # ---- menus / list popups --------------------------------------------------
  mdc-menu-surface-background: "#3a3e44"            # dropdown / overflow menu bg
  ha-control-button-background-color: "rgba(255,255,255,0.06)"

  # ---- chips (mushroom + native) -------------------------------------------
  chip-background-color: "#4f545b"
  mush-chip-background: "#4f545b"
  ha-chip-background-color: "rgba(255,255,255,0.06)"

  # ---- code editor (YAML/template editors in Settings) ----------------------
  code-editor-background-color: "#33373d"
  codemirror-meta: "#c3c7cc"
  codemirror-property: "#B6D2DC"
  codemirror-atom: "#E2C168"
  codemirror-string: "#8BA680"
  codemirror-keyword: "#E0A75E"
  codemirror-number: "#E2C168"

  # ---- misc -----------------------------------------------------------------
  label-badge-background-color: "#4f545b"
  label-badge-text-color: "#ffffff"
  table-row-background-color: "#4f545b"
  table-row-alternative-background-color: "#494d54"
  scrollbar-thumb-color: "rgba(255,255,255,0.25)"
  more-info-header-background: "#3a3e44"