# Dark Dune
# An earth-toned dark theme for Home Assistant.
# Slate (#8EB1BF) and sage (#8BA680) accents on a four-tone neutral
# depth ladder: page → bg-2 → card → chip, getting lighter as surfaces rise.
#
# Originally derived from Wall Panel Dark, which was built on Noctis
# (aFFekopp) with structural ideas from Bubble (Clooos).

Dark Dune:
  # ---------------------------------------------------------------
  # Fonts
  # ---------------------------------------------------------------
  primary-font-family: "sans-serif"
  paper-font-common-base_-_font-family: "var(--primary-font-family)"
  paper-font-common-code_-_font-family: "var(--primary-font-family)"
  paper-font-body1_-_font-family: "var(--primary-font-family)"
  paper-font-subhead_-_font-family: "var(--primary-font-family)"
  paper-font-headline_-_font-family: "var(--primary-font-family)"
  paper-font-caption_-_font-family: "var(--primary-font-family)"
  paper-font-title_-_font-family: "var(--primary-font-family)"
  ha-card-header-font-family: "var(--primary-font-family)"

  # ---------------------------------------------------------------
  # Text
  # ---------------------------------------------------------------
  text-color: "#ffffff"
  primary-text-color: "var(--text-color)"
  text-primary-color: "var(--text-color)"
  sidebar-text-color: "var(--text-color)"
  pbs-button-color: "var(--text-color)"
  pbs-button-rgb-color: "var(--text-color)"
  pbs-button-rgb-state-color: "var(--text-color)"
  pbs-button-rgb-default-color: "var(--text-color)"
  rgb-state-default-color: "var(--text-color)"
  pbs-button-rgb-fallback: "var(--text-color)"
  # Use alpha so secondary text inherits whatever surface it sits on,
  # rather than staying a fixed mid-grey that disappears on dark cards.
  secondary-text-color: "#62656b"
  disabled-text-color: "rgba(255, 255, 255, 0.38)"
  primary-color: "var(--accent-color)"

  # ---------------------------------------------------------------
  # Accent & status
  # ---------------------------------------------------------------
  accent-color: "#8EB1BF"
  accent-color-2: "#8BA680"
  accent-color-3: "#F6CE46"
  alert-color: "#FF8C00"
  warning-color: "#EA4D3D"
  accent-medium-color: "var(--accent-color)"
  bubble-accent-color: "var(--accent-color)"

  # ---------------------------------------------------------------
  # Backgrounds (page surfaces)
  # ---------------------------------------------------------------
  background-color: "#4A4D52"
  primary-background-color: "var(--background-color)"
  background-color-2: "#626569"
  secondary-background-color: "var(--background-color-2)"
  app-header-background-color: "var(--background-color)"
  lovelace-background: "black"
  markdown-code-background-color: "var(--background-color)"

  # ---------------------------------------------------------------
  # Cards
  # ---------------------------------------------------------------
  ha-card-background: "#919598"
  card-background-color: "var(--ha-card-background)"
  ha-card-background-2: "#B9BAB6"
  card-background-color-2: "var(--ha-card-background-2)"
  chip-background: "var(--ha-card-background-2)"
  bubble-button-background-color: "var(--ha-card-background)"
  ha-card-box-shadow: "none"
  ha-card-border-radius: "28px"
  ha-card-border-style: "solid"
  ha-card-border-width: "0px"
  ha-card-border-color: "transparent"
  border-color: "transparent"
  border-style: "none"
  grid-card-gap: "18px"
  horizontal-stack-card-margin: "0 10px"
  # Tinted with the slate accent instead of indigo so it fits the palette.
  ha-card-background-active: "rgba(142, 177, 191, 0.4) radial-gradient(at bottom, rgba(142, 177, 191, 0.5) 0%, rgba(142, 177, 191, 0) 70%)"
  control-button-border-radius: "50px"
  control-button-background-color: "var(--ha-card-background)"

  # ---------------------------------------------------------------
  # Form fields & dropdowns — NEW HA frontend
  # ---------------------------------------------------------------
  # Targets the new Material 3 / web-awesome based ha-select, ha-text-field,
  # ha-picker-field, and ha-dropdown components used in profile, automation
  # editor, entity edit dialogs, etc. We blanket-set tokens across the
  # three naming conventions HA is currently mid-migration through (md-*,
  # ha-color-*, wa-color-*) so the fix lands regardless of which one a
  # given dialog ends up reading from.

  # The actual variable HA's profile / settings forms use today.
  # If you see white-on-white anywhere, this is the first one to set.
  ha-color-form-background: "var(--background-color-2)"
  ha-color-form-text: "var(--text-color)"
  ha-color-form-label: "var(--secondary-text-color)"
  ha-color-form-border: "rgba(255, 255, 255, 0.18)"
  ha-color-form-border-hover: "rgba(255, 255, 255, 0.30)"
  ha-color-form-border-focus: "var(--accent-color)"
  ha-color-form-placeholder: "var(--secondary-text-color)"
  ha-color-form-disabled-background: "var(--background-color)"
  ha-color-form-disabled-text: "var(--disabled-text-color)"

  # Material 3 system tokens (the most common path for new HA forms)
  md-sys-color-surface: "var(--ha-card-background)"
  md-sys-color-surface-container-lowest: "var(--background-color)"
  md-sys-color-surface-container-low: "var(--background-color-2)"
  md-sys-color-surface-container: "var(--background-color-2)"
  md-sys-color-surface-container-high: "var(--ha-card-background)"
  md-sys-color-surface-container-highest: "var(--ha-card-background-2)"
  md-sys-color-on-surface: "var(--text-color)"
  md-sys-color-on-surface-variant: "var(--secondary-text-color)"
  md-sys-color-outline: "rgba(255, 255, 255, 0.30)"
  md-sys-color-outline-variant: "rgba(255, 255, 255, 0.18)"
  md-sys-color-primary: "var(--accent-color)"
  md-sys-color-on-primary: "var(--text-color)"
  md-sys-color-secondary: "var(--accent-color-2)"
  md-sys-color-on-secondary: "var(--text-color)"
  # Material 3 filled-field tokens (the actual select / text field fill)
  md-filled-field-container-color: "var(--background-color-2)"
  md-filled-field-content-color: "var(--text-color)"
  md-filled-field-label-text-color: "var(--secondary-text-color)"
  md-filled-field-supporting-text-color: "var(--secondary-text-color)"
  md-filled-field-active-indicator-color: "var(--accent-color)"
  md-filled-field-hover-state-layer-color: "rgba(255, 255, 255, 0.06)"
  md-filled-text-field-container-color: "var(--background-color-2)"
  md-filled-text-field-input-text-color: "var(--text-color)"
  md-filled-text-field-label-text-color: "var(--secondary-text-color)"
  md-filled-select-text-field-container-color: "var(--background-color-2)"
  md-filled-select-text-field-input-text-color: "var(--text-color)"
  # Material 3 menu (dropdown popup)
  md-menu-container-color: "var(--ha-card-background)"
  md-menu-item-label-text-color: "var(--text-color)"
  md-menu-item-selected-container-color: "rgba(142, 177, 191, 0.30)"
  md-menu-item-selected-label-text-color: "var(--text-color)"

  # HA color tokens (transitional layer)
  ha-color-fill-neutral-quiet-resting: "var(--background-color-2)"
  ha-color-fill-neutral-quiet-hover: "var(--background-color)"
  ha-color-on-fill-neutral-quiet: "var(--text-color)"
  ha-color-fill-neutral-loud-resting: "var(--accent-color)"
  ha-color-on-fill-neutral-loud: "var(--text-color)"
  ha-color-fill-primary-quiet-resting: "rgba(142, 177, 191, 0.18)"
  ha-color-fill-primary-quiet-hover: "rgba(142, 177, 191, 0.28)"
  ha-color-on-fill-primary-quiet: "var(--text-color)"
  ha-color-text-field-fill: "var(--background-color-2)"
  ha-color-text-field-text: "var(--text-color)"
  ha-color-text-field-label: "var(--secondary-text-color)"

  # Web-awesome tokens (used by ha-dropdown / ha-picker-field)
  wa-color-surface-default: "var(--background-color-2)"
  wa-color-surface-lowered: "var(--background-color)"
  wa-color-surface-raised: "var(--ha-card-background)"
  wa-color-text-normal: "var(--text-color)"
  wa-color-text-quiet: "var(--secondary-text-color)"
  wa-color-fill-neutral-quiet: "var(--background-color-2)"
  wa-color-fill-neutral-loud: "var(--accent-color)"

  # ---------------------------------------------------------------
  # Inputs (legacy MDC components — older HA dialogs)
  # ---------------------------------------------------------------
  mdc-text-field-fill-color: "var(--background-color-2)"
  mdc-text-field-ink-color: "var(--text-color)"
  mdc-text-field-label-ink-color: "var(--secondary-text-color)"
  mdc-select-fill-color: "var(--background-color-2)"
  mdc-select-ink-color: "var(--text-color)"
  input-fill-color: "var(--background-color-2)"
  input-ink-color: "var(--text-color)"
  input-label-ink-color: "var(--secondary-text-color)"
  input-disabled-fill-color: "var(--background-color)"
  input-disabled-ink-color: "var(--disabled-text-color)"
  input-disabled-label-ink-color: "var(--disabled-text-color)"
  input-idle-line-color: "var(--background-color)"
  input-dropdown-icon-color: "var(--secondary-text-color)"
  input-hover-line-color: "var(--accent-color)"
  code-editor-background-color: "#222c40"
  codemirror-property: "var(--accent-color)"

  # ---------------------------------------------------------------
  # Icons
  # ---------------------------------------------------------------
  paper-item-icon-color: "var(--text-color)"
  paper-item-icon-active-color: "var(--accent-color)"

  # ---------------------------------------------------------------
  # Sidebar
  # ---------------------------------------------------------------
  sidebar-background-color: "var(--background-color)"
  sidebar-icon-color: "#98a7b9"
  sidebar-selected-icon-color: "var(--accent-color)"
  sidebar-selected-text-color: "var(--text-color)"
  paper-listbox-background-color: "var(--sidebar-background-color)"
  divider-color: "rgba(255, 255, 255, 0.18)"
  light-primary-color: "var(--ha-card-background)"

  # ---------------------------------------------------------------
  # Sliders
  # ---------------------------------------------------------------
  paper-slider-knob-color: "var(--accent-color)"
  paper-slider-pin-color: "var(--background-color-2)"
  paper-slider-active-color: "var(--accent-color)"
  paper-slider-container-color: "var(--background-color-2)"

  # ---------------------------------------------------------------
  # Toggle / Switch / Radio
  # ---------------------------------------------------------------
  paper-toggle-button-checked-bar-color: "var(--accent-color)"
  mdc-theme-primary: "var(--accent-color)"
  switch-unchecked-color: "#70889e"
  switch-checked-button-color: "var(--accent-color)"
  switch-unchecked-track-color: "var(--background-color-2)"
  switch-checked-track-color: "var(--background-color-2)"
  paper-radio-button-checked-color: "var(--accent-color)"

  # ---------------------------------------------------------------
  # Popups & dialogs
  # ---------------------------------------------------------------
  more-info-header-background: "var(--background-color-2)"
  paper-dialog-background-color: "var(--background-color-2)"
  popup-background-color: "var(--ha-card-background-2)"
  dialog-backdrop-filter: "blur(2em) brightness(0.75)"

  # ---------------------------------------------------------------
  # Tables
  # ---------------------------------------------------------------
  table-row-background-color: "var(--background-color)"
  table-row-alternative-background-color: "var(--ha-card-background)"

  # ---------------------------------------------------------------
  # Badges
  # ---------------------------------------------------------------
  label-badge-background-color: "var(--background-color)"
  label-badge-text-color: "var(--text-primary-color)"
  label-badge-red: "rgba(73, 85, 108, 1)"
  label-badge-blue: "rgba(26, 137, 245, 1)"
  label-badge-green: "rgba(0, 202, 139, 1)"
  label-badge-yellow: "rgba(222, 176, 107, 1)"
  ha-label-badge-size: "40px"
  ha-label-badge-font-size: "18px"
  mdc-icon-size: "26px"

  # ---------------------------------------------------------------
  # Custom Header
  # ---------------------------------------------------------------
  ch-background: "var(--background-color)"
  ch-active-tab-color: "var(--accent-color)"
  ch-notification-dot-color: "var(--accent-color)"
  ch-all-tabs-color: "var(--sidebar-icon-color)"
  ch-tab-indicator-color: "var(--accent-color)"

  # ---------------------------------------------------------------
  # Mini Mediaplayer
  # ---------------------------------------------------------------
  mini-media-player-base-color: "var(--text-color)"
  mini-media-player-accent-color: "var(--accent-color)"

  # ---------------------------------------------------------------
  # Alarm
  # ---------------------------------------------------------------
  alarm-color-armed: "rgba(247, 53, 67, 1)"

  # ---------------------------------------------------------------
  # Graph
  # ---------------------------------------------------------------
  graph-color-1: "var(--primary-text-color)"
