title: Music
icon: mdi:music
theme: Dune Mist
path: music
type: custom:grid-layout
cards:
  # Sticky bottom nav
  - !include [/config/dashboards/modules/mobile-bottom-nav.yaml, {active: more}]
  - type: custom:button-card
    styles:
      card:
        - border-radius: 15px
        - padding-bottom: 90px
        - padding-left: 5px
        - padding-right: 5px
        - padding-top: 2px
        - height: auto
        - box-sizing: border-box
        - max-width: 100%
        - box-shadow: none
        - background: var(--primary-background-color)
      grid:
        - grid-template-areas: |
            "header"
            "music"
        - grid-template-columns: minmax(0, 1fr)
        - grid-template-rows: 60px auto
        - row-gap: 0px
        - align-items: start
        - column-gap: 2px
      custom_fields:
        music:
        - max-width: 99%
    custom_fields:
      header:
        card:
          type: custom:button-card
          icon: mdi:music
          name: Music
          show_state: false
          show_label: true
          tap_action: { action: none }
          label: |
            [[[
              var rooms = ['living_room','kitchen','office','gym','deck','pool','mud_room','media_room'];
              var n = 0;
              rooms.forEach(function(r){
                var s = states['media_player.' + r];
                if (s && s.state === 'playing') n++;
              });
              return n > 0 ? ('Playing in ' + n + (n === 1 ? ' room' : ' rooms')) : 'Idle';
            ]]]
          styles:
            card:
              - background: transparent !important
              - --ha-card-background: transparent
              - box-shadow: none
              - transition: none
              - padding: 4px 2px 6px
            grid:
              - grid-template-areas: '"back i n" "back i l"'
              - grid-template-columns: 46px 54px 1fr
              - grid-template-rows: auto auto
              - align-items: center
              - column-gap: 8px
            img_cell:
              - grid-area: i
              - width: 48px
              - height: 48px
              - border-radius: 13px
              - background-color: "rgba(182,210,220,0.18)"
            icon:
              - width: 24px
              - color: var(--slate-bright)
            name:
              - grid-area: n
              - justify-self: start
              - font-size: 22px
              - font-weight: 700
              - color: var(--primary-text-color)
            label:
              - grid-area: l
              - justify-self: start
              - font-size: 12px
              - color: var(--secondary-text-color)
            custom_fields:
              back:
                - grid-area: back
          custom_fields:
            back:
              card:
                type: custom:button-card
                icon: mdi:chevron-left
                tap_action:
                  action: navigate
                  navigation_path: /mobile-dash/mobile-home
                styles:
                  card:
                    - background: var(--background-color-2) !important
                    - --ha-card-background: var(--background-color-2)
                    - box-shadow: none
                    - transition: none
                    - height: 40px
                    - width: 40px
                    - border-radius: 12px
                  icon:
                    - width: 22px
                    - color: var(--primary-text-color)
      music:
        card:
          type: custom:wall-panel-sonos-card
          max_volume: 40
          entities:
            - media_player.living_room
            - media_player.kitchen
            - media_player.office
            - media_player.gym
            - media_player.deck
            - media_player.pool
            - media_player.mud_room
            - media_player.media_room
