title: Shades
icon: mdi:roller-shade
theme: Dune Mist
path: shades-main
type: custom:grid-layout
cards:
  # Hamburger nav sheet (standalone pop-up; keep as its own top-level card)
  - !include [/config/dashboards/modules/mobile-nav-sheet.yaml, {current: shades}]
  - type: custom:button-card
    styles:
      card:
        - border-radius: 15px
        - padding-bottom: 24px
        - padding-left: 5px
        - padding-right: 10px
        - padding-top: 2px
#        - margin: -8px
        - height: auto
#        - width: 398px
        - background: var(--primary-background-color)
        - box-shadow: none
      grid:
        - grid-template-areas: |
            "header"
            "groups"
            "first"
            "bedroom"
            "office"
            "front_guest"
            "back_guest"
        - grid-template-columns: auto
        - grid-template-rows: 60px auto auto auto auto auto auto
        - row-gap: 0px
        - align-items: start
        - column-gap: 2px
    custom_fields:
      header:
        card:
          type: custom:button-card
          entity: sensor.shades_open_count
          icon: mdi:roller-shade
          name: Shades
          show_state: true
          show_label: true
          tap_action:
            action: none
          state_display: |
            [[[ var e = states['sensor.shades_open_count']; return (e ? e.state : '0') + ' open'; ]]]
          label: |
            [[[ var e = states['sensor.shades_open_count']; return ((e && e.attributes.total) || '0') + ' shades ·'; ]]]
          styles:
            card:
              - background: transparent !important
              - "--ha-card-background": transparent
              - box-shadow: none
              - transition: none
              - padding: 4px 2px 6px
            grid:
              - grid-template-areas: "\"b i n n closeall m\" \"b i l s closeall m\""
              - grid-template-columns: 40px 40px auto 1fr auto 40px
              - grid-template-rows: auto auto
              - align-items: center
              - column-gap: 8px
            img_cell:
              - grid-area: i
              - width: 40px
              - height: 40px
            icon:
              - width: 24px
              - color: var(--primary-text-color)
            name:
              - grid-area: "n"
              - justify-self: start
              - font-size: 22px
              - font-weight: 700
              - color: var(--primary-text-color)
            state:
              - grid-area: s
              - justify-self: start
              - font-size: 14px
              - font-weight: 700
              - color: var(--slate-bright)
            label:
              - grid-area: l
              - justify-self: start
              - font-size: 14px
              - color: var(--secondary-text-color)
            custom_fields:
              back:
                - grid-area: b
                - align-self: center
                - justify-self: start
              menu:
                - grid-area: m
                - align-self: center
                - justify-self: end
              closeall:
                - grid-area: closeall
                - justify-self: end
                - min-width: max-content
          custom_fields:
            back:
              card: !include /config/dashboards/modules/mobile-header-back.yaml
            menu:
              card: !include /config/dashboards/modules/mobile-header-hamburger.yaml
            closeall:
              card:
                type: custom:button-card
                icon: mdi:arrow-collapse-vertical
                name: Close All
                show_icon: true
                show_name: true
                tap_action:
                  action: perform-action
                  perform_action: cover.close_cover
                  target:
                    entity_id:
                      - cover.first_floor_all
                      - cover.bedroom_side_shades
                      - cover.bedroom_back
                      - cover.front_guest_bedroom_shades
                      - cover.back_guest_bedroom_shades
                      - cover.office_shades
                styles:
                  card:
                    - background: var(--card-background-color) !important
                    - "--ha-card-background": var(--card-background-color)
                    - box-shadow: none
                    - transition: none
                    - height: 40px
                    - border-radius: 999px
                    - padding: 0 14px
                  grid:
                    - grid-template-areas: "\"i n\""
                    - grid-template-columns: auto auto
                    - align-items: center
                    - column-gap: 6px
                  icon:
                    - width: 18px
                    - color: var(--slate-bright)
                  name:
                    - font-size: 14px
                    - font-weight: 600
                    - color: var(--primary-text-color)
      groups:
