# lovelace_gen
title: Lights
icon: mdi:lightbulb
theme: Dune Mist
path: lights-main
type: custom:grid-layout
cards:
  # Hamburger nav sheet (standalone pop-up; keep as its own top-level card)
  - !include [/config/dashboards/modules/mobile-nav-sheet.yaml, {current: lights}]
  - type: custom:button-card
    styles:
      card:
        - border-radius: 15px
        - padding-bottom: 24px
        - padding-left: 5px
        - padding-right: 10px
        - padding-top: 2px
#       - margin: -8px
        - height: auto
#        - width: 398px
        - box-shadow: none
        - background: var(--primary-background-color)
      grid:
        - grid-template-areas: |
            "header"
            "main"
        - grid-template-columns: auto
        - grid-template-rows: 60px auto
        - row-gap: 0px
        - align-items: start
        - column-gap: 2px
      custom_fields:
        first:
          - margin-top: 10px
    custom_fields:
      header:
        card:
          type: custom:button-card
          entity: sensor.lights_on_count
          icon: mdi:lightbulb
          name: Lights
          show_state: true
          show_label: true
          tap_action: { action: none }
          state_display: |
            [[[
              var e = states['sensor.lights_on_count'];
              if (!e || e.state === 'unknown' || e.state === 'unavailable') return '';
              return e.state === 'All Off' ? 'All Off' : e.state + ' on';
            ]]]
          label: "36 fixtures ·"
          styles:
            card:
              - background: transparent !important
              - box-shadow: none
              - transition: none
              - padding: 4px 2px 6px
            grid:
              - grid-template-areas: '"back i n n menu" "back i l s menu"'
              - grid-template-columns: 40px 40px auto 1fr 40px
              - grid-template-rows: auto auto
              - align-items: center
              - column-gap: 8px
            img_cell:
              - grid-area: i
              - width: 40px
              - height: 40px
            icon:
              - width: 24px
              - color: var(--primary-text-color)
            name:
              - grid-area: n
              - justify-self: start
              - font-size: 22px
              - font-weight: 700
              - color: var(--primary-text-color)
            state:
              - grid-area: s
              - justify-self: start
              - font-size: 14px
              - font-weight: 700
              - color: var(--gold-color)
            label:
              - grid-area: l
              - justify-self: start
              - font-size: 14px
              - color: var(--secondary-text-color)
            custom_fields:
              back:
                - grid-area: back
                - align-self: center
                - justify-self: start
              menu:
                - grid-area: menu
                - align-self: center
                - justify-self: end
          custom_fields:
            back:
              card: !include /config/dashboards/modules/mobile-header-back.yaml
            menu:
              card: !include /config/dashboards/modules/mobile-header-hamburger.yaml
      main:
        card:
          type: vertical-stack
          cards:
            - type: custom:bubble-card
              card_type: separator
              name: Scenes
              icon: mdi:lightbulb-auto
              rows: 0.75
              styles: |
                .bubble-name {
                  font-size: 20px !important;  /* title */
                  font-weight: bold !important;
                }
                .bubble-sub-button
                {
                  font-size: 20px !important;
                  font-weight: 700 !important;
                }
                .bubble-line {
                  background: var(--primary-text-color);
                  opacity: 0.1;
                }
                .card-content {
                  padding-top: 7px !important;
                }
            - !include
                - /config/dashboards/modules/dynamic-scenes.yaml
                - module_name: mobile_lights_scenes
                  dashboard: mobile
            - type: custom:bubble-card
              card_type: separator
              name: Individual Lights
              icon: mdi:lightbulb-auto
              rows: 0.75
              styles: |
                .bubble-name {
                  font-size: 20px !important;  /* title */
                  font-weight: bold !important;
                }
                .bubble-sub-button
                {
                  font-size: 20px !important;
                  font-weight: 700 !important;
                }
                .bubble-line {
                  background: var(--primary-text-color);
                  opacity: 0.1;
                }
                .card-content {
                  padding-top: 7px !important;
                }
            - type: custom:expander-card
              expanded: false
              title-card-clickable: true
              card_mod:
                style: |
                  ha-card {
                    background-color: var(--background-color-2) !important;
                    border-radius: 15px !important;
                    margin-top: 5px !important;
                    padding-top: 3px !important;
                    padding-bottom: 3px !important;
                    transition: none !important;
                  }
                  ha-card:hover {
                    background-color: var(--background-color-2) !important;
                  }
                  .title-card-button:hover, .header:hover {
                    background: transparent !important;
                  }
                  ha-card ha-ripple, ha-card mwc-ripple { display: none !important; }
              title-card:
                type: custom:bubble-card
                card_type: separator
                name: First Floor
                icon: mdi:home-floor-1
                rows: 0.75
                styles: |
                  .bubble-name {
