# lovelace_gen
title: Lights
icon: mdi:lightbulb
theme: Dune Mist
path: lights-main
type: custom:grid-layout
cards:
  # Sticky bottom nav
  - !include [/config/dashboards/modules/mobile-bottom-nav.yaml, {active: lights}]
  - type: custom:button-card
    styles:
      card:
        - border-radius: 15px
        - padding-bottom: 90px
        - padding-left: 5px
        - padding-right: 10px
        - padding-top: 2px
#       - margin: -8px
        - height: auto
#        - width: 398px
        - box-shadow: none
        - background: var(--primary-background-color)
      grid:
        - grid-template-areas: |
            "header"
            "main"
        - grid-template-columns: auto
        - grid-template-rows: 60px auto
        - row-gap: 0px
        - align-items: start
        - column-gap: 2px
      custom_fields:
        first:
          - margin-top: 10px
    custom_fields:
      header:
        card:
          type: custom:button-card
          entity: sensor.lights_on_count
          icon: mdi:lightbulb
          name: Lights
          show_state: true
          show_label: true
          tap_action: { action: none }
          state_display: |
            [[[
              var e = states['sensor.lights_on_count'];
              if (!e || e.state === 'unknown' || e.state === 'unavailable') return '';
              return e.state === 'All Off' ? 'All Off' : e.state + ' on';
            ]]]
          label: "36 fixtures ·"
          styles:
            card:
              - background: transparent !important
              - box-shadow: none
              - transition: none
              - padding: 4px 2px 6px
            grid:
              - grid-template-areas: '"i n n" "i l s"'
              - grid-template-columns: 54px auto 1fr
              - grid-template-rows: auto auto
              - align-items: center
              - column-gap: 8px
            img_cell:
              - grid-area: i
              - width: 48px
              - height: 48px
              - border-radius: 13px
              - background-color: "rgba(226,193,104,0.18)"
            icon:
              - width: 24px
              - color: var(--gold-color)
            name:
              - grid-area: n
              - justify-self: start
              - font-size: 22px
              - font-weight: 700
              - color: var(--primary-text-color)
            state:
              - grid-area: s
              - justify-self: start
              - font-size: 14px
              - font-weight: 700
              - color: var(--gold-color)
            label:
              - grid-area: l
              - justify-self: start
              - font-size: 14px
              - color: var(--secondary-text-color)
      main:
        card:
          type: custom:stack-in-card
          mode: vertical
          card_mod:
            style: |
              ha-card {
                background: transparent !important;
                border-radius: 20px;
                padding: 3px 12px 4px;
                box-shadow: none;
                }
          cards:
            - type: vertical-stack
              cards: 
              - type: custom:bubble-card
                card_type: separator
                name: Scenes
                icon: mdi:lightbulb-auto
                rows: 0.75
                styles: |
                  .bubble-name {
                    font-size: 20px !important;  /* title */
                    font-weight: bold !important;
                  }
                  .bubble-sub-button 
                  {
                    font-size: 20px !important;
                    font-weight: 700 !important;
                  }
                  .bubble-line {
                    background: var(--primary-text-color);
                    opacity: 0.1;
                  }
                  .card-content {
                    padding-top: 7px !important;
                  }
              - !include 
                  - /config/dashboards/modules/dynamic-scenes.yaml
                  - module_name: mobile_lights_scenes
                    dashboard: mobile
              - type: custom:bubble-card
                card_type: separator
                name: Individual Lights
                icon: mdi:lightbulb-auto
                rows: 0.75
                styles: |
                  .bubble-name {
                    font-size: 20px !important;  /* title */
                    font-weight: bold !important;
                  }
                  .bubble-sub-button 
                  {
                    font-size: 20px !important;
                    font-weight: 700 !important;
                  }
                  .bubble-line {
                    background: var(--primary-text-color);
                    opacity: 0.1;
                  }
                  .card-content {
                    padding-top: 7px !important;
                  }
              - type: custom:expander-card
                expanded: false
                title-card-clickable: true
                title-card:
                  type: custom:bubble-card
                  card_type: separator
                  name: First Floor
                  icon: mdi:home-floor-1
                  rows: 0.75
                  styles: |
                    .bubble-name {
                      font-size: 20px !important;  /* title */
                      font-weight: bold !important;
                    }
                    .bubble-sub-button 
                    {
                      font-size: 20px !important;
                      font-weight: 700 !important;
                    }
                    .bubble-line {
                      background: var(--primary-text-color);
                      opacity: 0.1;
                    }
                    .card-content {
                      padding-top: 7px !important;
                    }
                card_mod:
                  style: |
                    ha-card {
                      border-radius: 20px !important;
                      padding-top: 3px !important;
                      margin-left: 5px !important;
                      padding-bottom: 3px !important;
                      margin-top: 10px !important;
                      margin-bottom: 10px !important;
                      padding-left: 15px !important;
                      padding-right: 15px !important;
                      background-color: transparent !important;
                    }
                cards: 
                  - type: vertical-stack
                    cards: !include [/config/dashboards/modules/first-floor-lights-individual.yaml, {module_name: mobile_lights, dashboard: mobile}]
            - type: custom:expander-card
