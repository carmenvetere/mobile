title: Settings
icon: mdi:cog
theme: Dune Mist
path: settings
type: custom:grid-layout
cards:
# Sticky bottom nav
- !include [/config/dashboards/modules/mobile-bottom-nav.yaml, {active: more}]
- type: custom:button-card
  styles:
    card:
    - border-radius: 15px
    - padding-bottom: 90px
    - padding-left: 5px
    - padding-right: 10px
    - padding-top: 2px
    - height: auto
    - box-shadow: none
    - background: var(--primary-background-color)
    grid:
    - grid-template-areas: |
        "header"
        "main"
    - grid-template-columns: auto
    - grid-template-rows: 60px auto
    - row-gap: 0px
    - align-items: start
    - column-gap: 2px
  custom_fields:
    header:
      card:
        type: custom:button-card
        icon: mdi:cog
        name: Settings
        show_state: false
        show_label: true
        tap_action:
          action: none
        label: Modes · automations · maintenance
        styles:
          card:
          - background: transparent !important
          - --ha-card-background: transparent
          - box-shadow: none
          - transition: none
          - padding: 4px 2px 6px
          grid:
          - grid-template-areas: '"i n" "i l"'
          - grid-template-columns: 54px 1fr
          - grid-template-rows: auto auto
          - align-items: center
          - column-gap: 8px
          img_cell:
          - grid-area: i
          - width: 48px
          - height: 48px
          - border-radius: 13px
          - background-color: rgba(142,177,191,0.18)
          icon:
          - width: 24px
          - color: var(--slate-bright)
          name:
          - grid-area: n
          - justify-self: start
          - font-size: 22px
          - font-weight: 700
          - color: var(--primary-text-color)
          label:
          - grid-area: l
          - justify-self: start
          - font-size: 14px
          - color: var(--secondary-text-color)
    main:
      card:
        type: vertical-stack
        cards:
        - type: custom:bubble-card
          card_type: separator
          name: Quick Toggles
          icon: mdi:gesture-tap-button
          rows: 0.75
          styles: |
            .bubble-name { font-size: 14px !important; font-weight: 700 !important;
              text-transform: uppercase; letter-spacing: 0.06em;
              color: rgba(255,255,255,0.6) !important; }
            .bubble-line { background: var(--primary-text-color); opacity: 0.1; }
            .card-content { padding-top: 7px !important; }
        - type: vertical-stack
          card_mod:
            style: |
              :host { display: block; background: var(--card-background-color);
                border: 1px solid rgba(255,255,255,0.06); border-radius: 16px;
                overflow: hidden; padding: 0 12px; margin: 2px 2px 12px; }
          cards:
          - type: custom:button-card
            entity: input_boolean.guest_mode
            name: Overnight Guests
            show_state: true
            show_label: false
            show_icon: false
            tap_action:
              action: toggle
            state_display: |
              [[[ return (states['input_boolean.guest_mode'] || {}).state === 'on' ? 'On' : 'Off'; ]]]
            styles:
              card:
              - background: transparent !important
              - --ha-card-background: transparent
              - box-shadow: none
              - border-radius: 0
              - border-top: 1px solid rgba(255,255,255,0.06)
              - padding: 11px 2px
              - transition: none
              - cursor: pointer
              grid:
              - grid-template-areas: '"n st sw"'
              - grid-template-columns: 1fr auto auto
              - align-items: center
              - column-gap: 10px
              name:
              - grid-area: n
              - justify-self: start
              - font-size: 16px
              - font-weight: 600
              - color: var(--primary-text-color)
              - align-self: center
              - line-height: 22px
              state:
              - grid-area: st
              - justify-self: end
              - font-size: 14px
              - font-weight: 600
              - color: |
                  [[[ return (states['input_boolean.guest_mode'] || {}).state === 'on' ? 'var(--slate-bright)' : '#9aa0a8'; ]]]
              - align-self: center
              - line-height: 22px
              custom_fields:
                sw:
                - grid-area: sw
                - justify-self: end
                - align-self: center
            custom_fields:
              sw: |-
                [[[
                  var on = (states['input_boolean.guest_mode'] || {}).state === 'on';
                  return '<div style="width:38px;height:22px;border-radius:999px;background:'
                    + (on ? 'rgba(142,177,191,0.55)' : 'rgba(255,255,255,0.28)')
                    + ';position:relative;transition:background .2s ease;">'
                    + '<div style="position:absolute;top:2px;left:' + (on ? '18px' : '2px')
                    + ';width:18px;height:18px;border-radius:50%;background:#fff;'
                    + 'box-shadow:0 1px 2px rgba(0,0,0,0.4);transition:left .2s ease;"></div></div>';
                ]]]
          - type: custom:button-card
            entity: input_boolean.cleaners_mode
