      - justify-self: start
      - font-size: 16px
      - font-weight: 600
      - color: var(--primary-text-color)
      - align-self: center
      - line-height: 22px
      state:
      - grid-area: st
      - justify-self: end
      - font-size: 14px
      - font-weight: 600
      - color: |
          [[[ return (states['automation.12_00am_roborock_s8_vacuum_basement'] || {}).state === 'on' ? 'var(--slate-bright)' : 'var(--secondary-text-color)'; ]]]
      - align-self: center
      - line-height: 22px
      custom_fields:
        sw:
        - grid-area: sw
        - justify-self: end
        - align-self: center
    custom_fields:
      sw: |-
        [[[
          var on = (states['automation.12_00am_roborock_s8_vacuum_basement'] || {}).state === 'on';
          return '<div style="width:38px;height:22px;border-radius:999px;background:'
            + (on ? 'rgba(142,177,191,0.55)' : 'rgba(255,255,255,0.28)')
            + ';position:relative;transition:background .2s ease;">'
            + '<div style="position:absolute;top:2px;left:' + (on ? '18px' : '2px')
            + ';width:18px;height:18px;border-radius:50%;background:#fff;'
            + 'box-shadow:0 1px 2px rgba(0,0,0,0.4);transition:left .2s ease;"></div></div>';
        ]]]
