              - padding: 13px 4px
              - transition: none
              grid:
              - grid-template-areas: '"i n v"'
              - grid-template-columns: 44px 1fr auto
              - align-items: center
              - column-gap: 11px
              img_cell:
              - grid-area: i
              - width: 38px
              - height: 38px
              - border-radius: 11px
              - background-color: rgba(224,167,94,0.18)
              icon:
              - width: 20px
              - color: '#E0A75E'
              name:
              - grid-area: n
              - justify-self: start
              - font-size: 16px
              - font-weight: 600
              - color: var(--primary-text-color)
              state:
              - grid-area: v
              - justify-self: end
              - font-size: 16px
              - font-weight: 700
              - color: '#E0A75E'
