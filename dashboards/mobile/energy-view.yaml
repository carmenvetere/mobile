title: Energy
icon: mdi:lightning-bolt
theme: Dune Mist
path: energy
type: custom:grid-layout
cards:
  # Sticky bottom nav
  - !include [/config/dashboards/modules/mobile-bottom-nav.yaml, {active: more}]
  - type: custom:button-card
    styles:
      card:
        - border-radius: 15px
        - padding-bottom: 90px
        - padding-left: 5px
        - padding-right: 10px
        - padding-top: 2px
#        - margin: -8px
        - height: auto
#        - width: 398px
        - background: var(--primary-background-color)
        - box-shadow: none
      grid:
        - grid-template-areas: |
            "header"
            "power_flow"
            "solar_forecast"
        - grid-template-columns: auto
        - grid-template-rows: 60px auto auto
        - row-gap: 5px
        - align-items: start
        - column-gap: 2px
      custom_fields:
        power_flow:
        - max-width: 99%
    custom_fields:
      header:
        card:
          type: custom:button-card
          show_state: false
          show_name: false
          show_icon: false
          styles:
            card:
              - background-color: transparent
              - padding-bottom: 5px
              - padding-top: 0px
            grid:
              - grid-template-areas: |
                  "name gap"
              - grid-template-columns: 150px auto
              - grid-template-rows: 60px
              - column-gap: 0px
            main:
          custom_fields:
            name:
              card:
                type: custom:button-card
                show_state: false
                show_name: true
                show_icon: true
                show_label: false
                layout: icon_name
                icon: mdi:lightning-bolt
                name: Energy
                size: 60%
                icon_color: var(--primary-text-color)
                styles: 
                  name: 
                    - font-size: 22px
                    - font-weight: bold
                  card:
                    - align-items: start
                    - justify-content: flex-start 
                    - text-align: left
                    - padding-left: 8px
                    - background-color: transparent
      solar_forecast:
        card: 
          type: custom:stack-in-card
          mode: vertical
          card_mod:
            style: |
              ha-card {
                background-color: var(--background-color) !important;
                border-radius: 20px;
                padding: 10;
              }
          cards:
            - type: custom:bubble-card
              card_type: separator
              name: Today's Solar Forecast
              icon: mdi:flash
              rows: 0.75
              styles: |
                .bubble-name {
                font-size: 20px !important;  /* title */
                font-weight: bold !important;
                }
                .bubble-line {
                background: var(--primary-text-color);
                opacity: 0.1;
                }
                .card-content {
                padding-top: 10px !important;
                padding-left: 10px !important;
                }            
            - !include /config/dashboards/modules/solar-forecast-today.yaml
            - type: custom:bubble-card
              card_type: separator
              name: 7-Day Solar Forecast
              icon: mdi:flash
              rows: 0.75
              styles: |
                .bubble-name {
                font-size: 20px !important;  /* title */
                font-weight: bold !important;
                }
                .bubble-line {
                background: var(--primary-text-color);
                opacity: 0.1;
                }
                .card-content {
                padding-top: 10px !important;
                padding-left: 10px !important;
                }  
            - !include /config/dashboards/modules/7-day-solar-forecast.yaml
            - type: custom:bubble-card
              card_type: separator
              name: Last 24 Hours Power Flow
              icon: mdi:flash
              rows: 0.75
              styles: |
                .bubble-name {
                font-size: 20px !important;  /* title */
                font-weight: bold !important;
                }
                .bubble-line {
                background: var(--primary-text-color);
                opacity: 0.1;
                }
                .card-content {
                padding-top: 10px !important;
                padding-left: 10px !important;
                }  
            - !include /config/dashboards/modules/24-hour-power-flow.yaml
            - type: custom:bubble-card
              card_type: separator
              name: Last 7 Days Home Energy Usage
              icon: mdi:flash
              rows: 0.75
              styles: |
                .bubble-name {
                font-size: 20px !important;  /* title */
                font-weight: bold !important;
                }
                .bubble-line {
                background: var(--primary-text-color);
                opacity: 0.1;
                }
                .card-content {
                padding-top: 10px !important;
                padding-left: 10px !important;
                }  
            - !include /config/dashboards/modules/7-day-usage-history.yaml
      power_flow:
        card: 
          type: custom:stack-in-card
          mode: vertical
          card_mod:
            style: |
              ha-card {
                background-color: var(--background-color) !important;
                border-radius: 20px;
                padding: 10;
              }
          cards:
            - type: custom:bubble-card
              card_type: separator
              name: Live Power Flow
              icon: mdi:flash
              rows: 0.75
              styles: |
                .bubble-name {
                font-size: 20px !important;  /* title */
                font-weight: bold !important;
                }
                .bubble-line {
                background: var(--primary-text-color);
                opacity: 0.1;
                }
                .card-content {
                padding-top: 10px !important;
                padding-left: 10px !important;
                }
            - !include /config/dashboards/modules/power-flow-card.yaml
