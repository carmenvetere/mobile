title: Energy
icon: mdi:lightning-bolt
theme: Dune Mist
path: energy
type: custom:grid-layout
cards:
  # Hamburger nav sheet (standalone pop-up; keep as its own top-level card)
  - !include [/config/dashboards/modules/mobile-nav-sheet.yaml, {current: energy}]
  - type: custom:button-card
    styles:
      card:
        - border-radius: 15px
        - padding-bottom: 24px
        - padding-left: 5px
        - padding-right: 10px
        - padding-top: 2px
#        - margin: -8px
        - height: auto
#        - width: 398px
        - background: var(--primary-background-color)
        - box-shadow: none
        - max-width: 96%
      grid:
        - grid-template-areas: |
            "header"
            "power_flow"
            "solar_forecast"
        - grid-template-columns: auto
        - grid-template-rows: 60px auto auto
        - row-gap: 5px
        - align-items: start
        - column-gap: 2px
    custom_fields:
      header:
        card:
          type: custom:button-card
          entity: sensor.bayberry_charge
          icon: mdi:lightning-bolt
          name: Energy
          show_state: false
          show_label: true
          tap_action: { action: none }
          label: |
            [[[
              var b = states['sensor.bayberry_charge'];
              var og = states['switch.bayberry_off_grid_operation'];
              var grid = (og && og.state === 'on') ? 'Off-grid' : 'Grid-tied';
              return grid + ' · Battery ' + (b ? Math.round(b.state) : '?') + '%';
            ]]]
          styles:
            card:
              - background: transparent !important
              - box-shadow: none
              - transition: none
              - padding: 4px 2px 6px
            grid:
              - grid-template-areas: '"b i n m" "b i l m"'
              - grid-template-columns: 40px 40px 1fr 40px
              - grid-template-rows: auto auto
              - align-items: center
              - column-gap: 8px
            img_cell:
              - grid-area: i
              - width: 40px
              - height: 40px
            icon:
              - width: 24px
              - color: var(--primary-text-color)
            name:
              - grid-area: n
              - justify-self: start
              - font-size: 22px
              - font-weight: 700
              - color: var(--primary-text-color)
            label:
              - grid-area: l
              - justify-self: start
              - font-size: 14px
              - color: var(--secondary-text-color)
            custom_fields:
              back:
                - grid-area: b
                - align-self: center
                - justify-self: start
              menu:
                - grid-area: m
                - align-self: center
                - justify-self: end
          custom_fields:
            back:
              card: !include /config/dashboards/modules/mobile-header-back.yaml
            menu:
              card: !include /config/dashboards/modules/mobile-header-hamburger.yaml
      solar_forecast:
        card: 
          type: custom:stack-in-card
          mode: vertical
          card_mod:
            style: |
              ha-card {
                background-color: var(--background-color) !important;
                border-radius: 20px;
                max-width: 95% !important;
              }
          cards:
            - type: custom:bubble-card
              card_type: separator
              name: Today's Solar Forecast
              icon: mdi:flash
              rows: 0.75
              styles: |
                .bubble-name {
                font-size: 20px !important;  /* title */
                font-weight: bold !important;
                }
                .bubble-line {
                background: var(--primary-text-color);
                opacity: 0.1;
                }
                .card-content {
                padding-top: 10px !important;
                padding-left: 10px !important;
                }            
            - !include /config/dashboards/modules/solar-forecast-today.yaml
            - type: custom:bubble-card
              card_type: separator
              name: 7-Day Solar Forecast
              icon: mdi:flash
              rows: 0.75
              styles: |
                .bubble-name {
                font-size: 20px !important;  /* title */
                font-weight: bold !important;
                }
                .bubble-line {
                background: var(--primary-text-color);
                opacity: 0.1;
                }
                .card-content {
                padding-top: 10px !important;
                padding-left: 10px !important;
                }  
            - !include /config/dashboards/modules/7-day-solar-forecast.yaml
            # Wide chart: tablet/desktop only (R10-b)
            - type: conditional
              conditions:
                - condition: screen
                  media_query: "(min-width: 768px)"
              card:
                type: vertical-stack
                cards:
                  - type: custom:bubble-card
                    card_type: separator
                    name: 12 Month Solar History
                    icon: mdi:flash
                    rows: 0.75
                    styles: |
                      .bubble-name {
                      font-size: 20px !important;  /* title */
                      font-weight: bold !important;
                      }
                      .bubble-line {
                      background: var(--primary-text-color);
                      opacity: 0.1;
                      }
                      .card-content {
                      padding-top: 10px !important;
                      padding-left: 10px !important;
                      }
                  - !include /config/dashboards/modules/12-month-solar-history.yaml
            # Wide chart: tablet/desktop only (R10-b)
            - type: conditional
              conditions:
                - condition: screen
                  media_query: "(min-width: 768px)"
              card:
                type: vertical-stack
                cards:
                  - type: custom:bubble-card
                    card_type: separator
                    name: Last 24 Hours Power Flow
                    icon: mdi:flash
                    rows: 0.75
                    styles: |
                      .bubble-name {
                      font-size: 20px !important;  /* title */
                      font-weight: bold !important;
                      }
                      .bubble-line {
                      background: var(--primary-text-color);
                      opacity: 0.1;
                      }
                      .card-content {
                      padding-top: 10px !important;
                      padding-left: 10px !important;
                      }
                  - !include /config/dashboards/modules/24-hour-power-flow.yaml
            - type: custom:bubble-card
              card_type: separator
              name: Last 7 Days Home Energy Usage
              icon: mdi:flash
              rows: 0.75
              styles: |
                .bubble-name {
                font-size: 20px !important;  /* title */
                font-weight: bold !important;
                }
                .bubble-line {
                background: var(--primary-text-color);
                opacity: 0.1;
                }
                .card-content {
                padding-top: 10px !important;
                padding-left: 10px !important;
                }  
            - !include /config/dashboards/modules/7-day-usage-history.yaml
      power_flow:
        card: 
          type: custom:stack-in-card
          mode: vertical
          card_mod:
            style: |
              ha-card {
                background-color: var(--background-color) !important;
                border-radius: 20px;
                max-width: 95% !important;
              }
          cards:
            - type: custom:bubble-card
              card_type: separator
              name: Live Power Flow
              icon: mdi:flash
              rows: 0.75
              styles: |
                .bubble-name {
                font-size: 20px !important;  /* title */
                font-weight: bold !important;
                }
                .bubble-line {
                background: var(--primary-text-color);
                opacity: 0.1;
                }
                .card-content {
                padding-top: 10px !important;
                padding-left: 10px !important;
                }
            - !include /config/dashboards/modules/power-flow-card.yaml
