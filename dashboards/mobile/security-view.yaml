title: Security
icon: mdi:cctv
theme: Dune Mist
path: security
type: custom:grid-layout
cards:
  # Sticky bottom nav
  - !include [/config/dashboards/modules/mobile-bottom-nav.yaml, {active: security}]
  - type: custom:button-card
    styles:
      card:
        - border-radius: 15px
        - padding-bottom: 90px
        - padding-left: 5px
        - padding-top: 2px
        - height: auto
        - background: var(--primary-background-color)
        - box-shadow: none
      grid:
        - grid-template-areas: |
            "header"
            "cameras"
            "recent"
        - grid-template-columns: auto
        - grid-template-rows: 60px auto auto
        - row-gap: 5px
        - align-items: start
        - column-gap: 2px
    custom_fields:
      header:
        card:
          type: custom:button-card
          entity: alarm_control_panel.alarmo
          icon: mdi:cctv
          name: Security
          show_state: true
          show_label: false
          tap_action: { action: more-info }
          state_display: |
            [[[
              var e = states['alarm_control_panel.alarmo'];
              var s = e ? e.state : 'unknown';
              var m = {disarmed:'Disarmed', armed_home:'Armed Home',
                armed_away:'Armed Away', armed_night:'Armed Night',
                arming:'Arming…', pending:'Pending', triggered:'Triggered'};
              return m[s] || s;
            ]]]
          styles:
            card:
              - background: transparent !important
              - box-shadow: none
              - transition: none
              - padding: 4px 2px 6px
            grid:
              - grid-template-areas: '"i n" "i s"'
              - grid-template-columns: 54px 1fr
              - grid-template-rows: auto auto
              - align-items: center
              - column-gap: 8px
            img_cell:
              - grid-area: i
              - width: 48px
              - height: 48px
              - border-radius: 13px
              - background-color: "rgba(142,177,191,0.18)"
            icon:
              - width: 24px
              - color: var(--slate-bright)
            name:
              - grid-area: n
              - justify-self: start
              - font-size: 22px
              - font-weight: 700
              - color: var(--primary-text-color)
            state:
              - grid-area: s
              - justify-self: start
              - font-size: 14px
              - font-weight: 700
              - color: var(--amber-color)
            custom_fields:
              back:
                - grid-area: back
          state:
            - value: disarmed
              styles:
                state:
                  - color: var(--sage-color)
            - value: triggered
              styles:
                state:
                  - color: var(--error-color)   
      cameras:
        card:
          type: vertical-stack
          cards:
          - type: custom:bubble-card
            card_type: separator
            name: Cameras
            icon: mdi:cctv
            rows: 0.75
            styles: &sep_section |
              .bubble-name { font-size: 13px !important; font-weight: 700 !important;
                text-transform: uppercase; letter-spacing: 0.06em;
                color: rgba(255,255,255,0.6) !important; }
              .bubble-line { background: var(--primary-text-color); opacity: 0.1; }
              .card-content { padding-top: 7px !important; }
          - type: grid
            columns: 2
            square: false
            cards:
              - type: picture-entity
                entity: camera.front_high_resolution_channel
                camera_image: camera.front_high_resolution_channel
                camera_view: auto
                fit_mode: cover
                show_state: false
                show_name: true
                name: Front
                tap_action: { action: more-info }
                card_mod: &cam_style
                  style: |
                    ha-card {
                      border-radius: 16px; overflow: hidden;
                      background: transparent !important;
                      --ha-card-background: transparent;
                      box-shadow: none !important;
                    }
                    ha-card::before {
                      content: "● LIVE";
                      position: absolute; top: 8px; left: 8px; z-index: 2;
                      font-size: 9px; font-weight: 700; color: #fff;
                      background: rgba(224,105,91,0.85);
                      padding: 2px 7px; border-radius: 999px; letter-spacing: 0.04em;
                    }
              - type: picture-entity
                entity: camera.blueberry_high_resolution_channel
                camera_image: camera.blueberry_high_resolution_channel
                camera_view: auto
                fit_mode: cover
                show_state: false
                show_name: true
                name: Front Right
                tap_action: { action: more-info }
                card_mod: *cam_style
              - type: picture-entity
                entity: camera.driveway_high_resolution_channel_2
                camera_image: camera.driveway_high_resolution_channel_2
                camera_view: auto
                fit_mode: cover
                show_state: false
                show_name: true
                name: Driveway
                tap_action: { action: more-info }
                card_mod: *cam_style
              - type: picture-entity
                entity: camera.pool_high_resolution_channel
                camera_image: camera.pool_high_resolution_channel
                camera_view: auto
                fit_mode: cover
                show_state: false
                show_name: true
                name: Pool
                tap_action: { action: more-info }
                card_mod: *cam_style
          - type: picture-entity
            entity: camera.kimberly_high_resolution_channel
            camera_image: camera.kimberly_high_resolution_channel
            camera_view: auto
            fit_mode: cover
            show_state: false
            show_name: true
            name: Kimberly Side
            tap_action: { action: more-info }
            card_mod: *cam_style
      recent:
        card:
          type: custom:stack-in-card
          mode: vertical
          card_mod:
            style: |
              ha-card {
                background: var(--ha-card-background);
                border-radius: 20px;
                padding: 10;
              }
          cards:
            - type: custom:bubble-card
              card_type: separator
              name: Recent Events
              icon: mdi:motion-sensor
              rows: 0.75
              styles: |
                .bubble-name {
                font-size: 20px !important;  /* title */
                font-weight: bold !important;
                }
                .bubble-line {
                background: var(--primary-text-color);
                opacity: 0.1;
                }
                .card-content {
                padding-top: 10px !important;
                padding-left: 10px !important;
                }
            - type: custom:llmvision-card
              entity: calendar.llm_vision_timeline_2
              number_of_hours: 168
              number_of_events: 5
              language: en
              card_mod:
                style: |
                  ha-card {
                    border-radius: 5px;
                    padding: 5px;
                    text-align: left;
                  }


