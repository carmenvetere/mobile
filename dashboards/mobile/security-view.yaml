title: Security
icon: mdi:cctv
theme: Dune Mist
path: security
type: custom:grid-layout
cards:
  # Sticky bottom nav
  - !include [/config/dashboards/modules/mobile-bottom-nav.yaml, {active: security}]
  - !include /config/dashboards/modules/mobile-more-sheet.yaml
  - type: custom:button-card
    styles:
      card:
        - border-radius: 15px
        - padding-bottom: 90px
        - padding-left: 5px
        - padding-top: 2px
        - height: auto
        - background: var(--primary-background-color)
        - box-shadow: none
      grid:
        - grid-template-areas: |
            "header"
            "alarm"
            "cameras"
            "recent"
        - grid-template-columns: auto
        - grid-template-rows: 60px auto auto auto
        - row-gap: 5px
        - align-items: start
        - column-gap: 2px
    custom_fields:
      header:
        card:
          type: custom:button-card
          entity: alarm_control_panel.alarmo
          icon: mdi:cctv
          name: Security
          show_state: true
          show_label: true
          tap_action: { action: none }
          state_display: |
            [[[
              var e = states['alarm_control_panel.alarmo'];
              var s = e ? e.state : 'unknown';
              var m = {disarmed:'Disarmed', armed_home:'Armed Home',
                armed_away:'Armed Away', armed_night:'Armed Night',
                arming:'Arming…', pending:'Pending', triggered:'Triggered'};
              return m[s] || s;
            ]]]
          label: |
            [[[
              var doors = [
                ['binary_sensor.front_door','Front Door'],
                ['binary_sensor.kitchen_french_doors','Kitchen French Doors'],
                ['binary_sensor.living_room_french_doors','Living Room French Doors'],
                ['binary_sensor.mudroom_entry_door','Mudroom Door'],
                ['binary_sensor.mudroom_garage_door','Garage Entry'],
                ['cover.garage_door_garage','Garage Door']
              ];
              var open = doors.filter(function(d){
                var e = states[d[0]];
                return e && (e.state === 'on' || e.state === 'open');
              }).map(function(d){ return d[1]; });
              return '· ' + (open.length ? open.join(', ') + ' open' : 'All Closed');
            ]]]
          styles:
            card:
              - background: transparent !important
              - box-shadow: none
              - transition: none
              - padding: 4px 2px 6px
            grid:
              - grid-template-areas: '"i n n" "i s l"'
              - grid-template-columns: 54px auto 1fr
              - grid-template-rows: auto auto
              - align-items: center
              - column-gap: 8px
            img_cell:
              - grid-area: i
              - width: 48px
              - height: 48px
              - border-radius: 13px
              - background-color: "rgba(142,177,191,0.18)"
            icon:
              - width: 24px
              - color: var(--slate-bright)
            name:
              - grid-area: n
              - justify-self: start
              - font-size: 22px
              - font-weight: 700
              - color: var(--primary-text-color)
            state:
              - grid-area: s
              - justify-self: start
              - font-size: 14px
              - font-weight: 700
              - color: var(--amber-color)
            label:
              - grid-area: l
              - justify-self: start
              - align-self: center
              - font-size: 14px
              - font-weight: 600
              - color: |
                  [[[
                    var ids = ['binary_sensor.front_door','binary_sensor.kitchen_french_doors',
                      'binary_sensor.living_room_french_doors','binary_sensor.mudroom_entry_door',
                      'binary_sensor.mudroom_garage_door','cover.garage_door_garage'];
                    var open = ids.some(function(id){ var e = states[id]; return e && (e.state === 'on' || e.state === 'open'); });
                    return open ? 'var(--amber-color)' : 'var(--secondary-text-color)';
                  ]]]
            custom_fields:
              back:
                - grid-area: back
          state:
            - value: disarmed
              styles:
                state:
                  - color: var(--sage-color)
            - value: triggered
              styles:
                state:
                  - color: var(--error-color)   
      alarm:
        card:
          type: custom:button-card
          show_icon: false
          show_name: false
          tap_action: { action: none }
          styles:
            card:
              - background: var(--background-color-2)
              - border-radius: 15px
              - padding: 4px
              - box-shadow: none
              - transition: none
              - margin-bottom: 4px
            grid:
              - grid-template-areas: '"away home disarm"'
              - grid-template-columns: 1fr 1fr 1fr
              - grid-template-rows: 1fr
              - column-gap: 4px
          custom_fields:
            away:
              card:
                type: custom:button-card
                name: Armed Away
                show_icon: false
                tap_action:
                  action: call-service
                  service: alarm_control_panel.alarm_arm_away
                  target:
                    entity_id: alarm_control_panel.alarmo
                styles:
                  card:
                    - background: |
                        [[[
                          var e = states['alarm_control_panel.alarmo'] || {};
                          var a = e.attributes || {};
                          if (e.state === 'armed_away') return 'var(--gold-color)';
                          if ((e.state === 'arming' || e.state === 'pending') &&
                              (a.arm_mode === 'armed_away' || a.next_state === 'armed_away')) return 'rgba(226,193,104,0.45)';
                          return 'transparent';
                        ]]]
                    - border-radius: 12px
                    - box-shadow: none
                    - transition: none
                    - padding: 13px 0
                    - cursor: pointer
                  grid:
                    - grid-template-areas: '"n"'
                    - grid-template-rows: 1fr
                    - align-items: center
                  name:
                    - font-size: 14px
                    - font-weight: 700
                    - color: var(--primary-text-color)
            home:
              card:
                type: custom:button-card
                name: Armed Home
                show_icon: false
                tap_action:
                  action: call-service
                  service: alarm_control_panel.alarm_arm_home
                  target:
                    entity_id: alarm_control_panel.alarmo
                styles:
                  card:
                    - background: |
                        [[[
                          var e = states['alarm_control_panel.alarmo'] || {};
                          var a = e.attributes || {};
                          if (e.state === 'armed_home') return 'var(--gold-color)';
                          if ((e.state === 'arming' || e.state === 'pending') &&
                              (a.arm_mode === 'armed_home' || a.next_state === 'armed_home')) return 'rgba(226,193,104,0.45)';
                          return 'transparent';
                        ]]]
                    - border-radius: 12px
                    - box-shadow: none
                    - transition: none
                    - padding: 13px 0
                    - cursor: pointer
                  grid:
                    - grid-template-areas: '"n"'
                    - grid-template-rows: 1fr
                    - align-items: center
                  name:
                    - font-size: 14px
                    - font-weight: 700
                    - color: var(--primary-text-color)
            disarm:
              card:
                type: custom:button-card
                name: Disarmed
                show_icon: false
                tap_action:
                  action: call-service
                  service: alarm_control_panel.alarm_disarm
                  target:
                    entity_id: alarm_control_panel.alarmo
                styles:
                  card:
                    - background: |
                        [[[
                          var e = states['alarm_control_panel.alarmo'] || {};
                          return e.state === 'disarmed' ? 'var(--sage-color)' : 'transparent';
                        ]]]
                    - border-radius: 12px
                    - box-shadow: none
                    - transition: none
                    - padding: 13px 0
                    - cursor: pointer
                  grid:
                    - grid-template-areas: '"n"'
                    - grid-template-rows: 1fr
                    - align-items: center
                  name:
                    - font-size: 14px
                    - font-weight: 700
                    - color: var(--primary-text-color)
      cameras:
        card:
          type: vertical-stack
          cards:
          - type: custom:bubble-card
            card_type: separator
            name: Cameras
            icon: mdi:cctv
            rows: 0.75
            styles: |
              .bubble-name {
              font-size: 20px !important;  /* title */
              font-weight: bold !important;
              }
              .bubble-line {
              background: var(--primary-text-color);
              opacity: 0.1;
              }
              .card-content {
              padding-top: 10px !important;
              padding-left: 10px !important;
              }
          - type: grid
            columns: 2
            square: false
            cards:
              - type: picture-entity
                entity: camera.front_high_resolution_channel
                camera_image: camera.front_high_resolution_channel
                camera_view: auto
                fit_mode: cover
                show_state: false
                show_name: false
                name: Front
                tap_action: { action: more-info }
                card_mod: &cam_style
                  style: |
                    ha-card {
                      border-radius: 16px; overflow: hidden;
                      background: transparent !important;
                      --ha-card-background: transparent;
                      box-shadow: none !important;
                    }
                    ha-card::before {
                      content: "● LIVE";
                      position: absolute; top: 8px; left: 8px; z-index: 2;
                      font-size: 9px; font-weight: 700; color: #fff;
                      background: rgba(224,105,91,0.85);
                      padding: 2px 7px; border-radius: 999px; letter-spacing: 0.04em;
                    }
              - type: picture-entity
                entity: camera.blueberry_high_resolution_channel
                camera_image: camera.blueberry_high_resolution_channel
                camera_view: auto
                fit_mode: cover
                show_state: false
                show_name: false
                name: Front Right
                tap_action: { action: more-info }
                card_mod: *cam_style
              - type: picture-entity
                entity: camera.driveway_high_resolution_channel_2
                camera_image: camera.driveway_high_resolution_channel_2
                camera_view: auto
                fit_mode: cover
                show_state: false
                show_name: false
                name: Driveway
                tap_action: { action: more-info }
                card_mod: *cam_style
              - type: picture-entity
                entity: camera.pool_high_resolution_channel
                camera_image: camera.pool_high_resolution_channel
                camera_view: auto
                fit_mode: cover
                show_state: false
                show_name: false
                name: Pool
                tap_action: { action: more-info }
                card_mod: *cam_style
          - type: picture-entity
            entity: camera.kimberly_high_resolution_channel
            camera_image: camera.kimberly_high_resolution_channel
            camera_view: auto
            fit_mode: cover
            show_state: false
            show_name: false
            name: Kimberly Side
            tap_action: { action: more-info }
            card_mod: *cam_style
      recent:
        card:
          type: custom:stack-in-card
          mode: vertical
          card_mod:
            style: |
              ha-card {
                background: var(--ha-card-background);
                border-radius: 20px;
                padding: 10;
              }
          cards:
            - type: custom:bubble-card
              card_type: separator
              name: Recent Events
              icon: mdi:motion-sensor
              rows: 0.75
              styles: |
                .bubble-name {
                font-size: 20px !important;  /* title */
                font-weight: bold !important;
                }
                .bubble-line {
                background: var(--primary-text-color);
                opacity: 0.1;
                }
                .card-content {
                padding-top: 10px !important;
                padding-left: 10px !important;
                }
            - type: custom:llmvision-card
              entity: calendar.llm_vision_timeline_2
              number_of_hours: 168
              number_of_events: 5
              language: en
              card_mod:
                style: |
                  ha-card {
                    border-radius: 5px;
                    padding: 5px;
                    text-align: left;
                  }


