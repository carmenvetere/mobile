                    ${(() => {
                      const s = hass.states['sensor.lights_on_count']?.state;
                      const c = (s && s !== 'All Off') ? '#E2C168' : 'var(--secondary-text-color)';
                      return `
                        .bubble-sub-button-1.bubble-sub-button-1,
                        .bubble-sub-button-1.bubble-sub-button-1 ha-icon,
