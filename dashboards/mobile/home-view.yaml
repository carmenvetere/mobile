# lovelace_gen
title: Home
icon: mdi:home
theme: Dune Mist
path: mobile-home
type: custom:grid-layout
cards:
  # Sticky bottom nav. active=home highlights the Home tab.
  - !include [/config/dashboards/modules/mobile-bottom-nav.yaml, {active: home}]
  - !include /config/dashboards/modules/mobile-more-sheet.yaml
  - type: custom:button-card
    styles:
      card:
        - border-radius: 0px
        - box-shadow: none
        - padding-bottom: 90px
        - padding-left: 5px
        - padding-right: 5px
        - padding-top: 2px
        - margin: 0
        - height: auto
#       - width: 398px
        - background: var(--primary-background-color)
      grid:
        - grid-template-areas: |
            "header"
            "menu"
        - grid-template-columns: auto
        - grid-template-rows: 60px auto
        - row-gap: 0px
        - align-items: start
        - column-gap: 2px
    custom_fields:
      header:
        card:
          type: custom:button-card
          # sensor.time re-renders the clock every minute (Time & Date
          # integration). Without it the time still shows but won't tick until
          # the card refreshes.
          entity: sensor.time
          tap_action:
            action: none
          show_icon: false
          show_name: true
          show_state: false
          show_label: false
          name: |
            [[[ return new Date().toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' }); ]]]
          custom_fields:
            # --- Notification center chip (only shows when count > 0) ---
            notif:
              card:
                type: custom:button-card
                entity: sensor.notification_center
                show_icon: true
                show_name: true
                show_state: false
                icon: |
                  [[[ var p = states['sensor.notification_center_priority'];
                      return (p && p.attributes.icon) || 'mdi:bell'; ]]]
                name: |
                  [[[ var c = states['sensor.notification_center']; return c ? c.state : ''; ]]]
                tap_action: { action: navigate, navigation_path: "#notifications" }
                styles:
                  card:
                    - display: |
                        [[[ var c = states['sensor.notification_center'];
                            return (c && parseInt(c.state) > 0) ? 'flex' : 'none'; ]]]
                    - background: |
                        [[[ var p = states['sensor.notification_center_priority'];
                            var c = (p && p.attributes.color) || '#7295B2';
                            var h = c.replace('#','');
                            var r = parseInt(h.substr(0,2),16), g = parseInt(h.substr(2,2),16), b = parseInt(h.substr(4,2),16);
                            return 'rgba(' + r + ',' + g + ',' + b + ',0.18)'; ]]]
                    - --ha-card-background: transparent
                    - box-shadow: none
                    - transition: none
                    - border-radius: 999px
                    - padding: 4px 9px
                  grid:
                    - grid-template-areas: '"i n"'
                    - grid-template-columns: auto auto
                    - align-items: center
                    - column-gap: 5px
                  icon:
                    - width: 30px
                    - height: 30px
                    - color: |
                        [[[ var p = states['sensor.notification_center_priority'];
                            return (p && p.attributes.color) || '#7295B2'; ]]]
                  name:
                    - font-size: 14px
                    - font-weight: 700
                    - color: |
                        [[[ var p = states['sensor.notification_center_priority'];
                            return (p && p.attributes.color) || '#7295B2'; ]]]
            # --- Alarm state -> Security view ---
            alarm:
              card:
                type: custom:button-card
                entity: alarm_control_panel.alarmo
                show_icon: true
                show_name: false
                show_state: false
                icon: |
                  [[[ var a = states['alarm_control_panel.alarmo'];
                      var s = a ? a.state : 'disarmed';
                      return s === 'disarmed' ? 'mdi:shield-off-outline'
                        : (s === 'triggered' ? 'mdi:shield-alert' : 'mdi:shield-lock'); ]]]
                tap_action: { action: navigate, navigation_path: /mobile-dash/security }
                styles:
                  card:
                    - background: transparent !important
                    - --ha-card-background: transparent
                    - box-shadow: none
                    - transition: none
                    - padding: 4px
                  icon:
                    - width: 26px
                    - height: 26px
                    - color: |
                        [[[ var a = states['alarm_control_panel.alarmo'];
                            var s = a ? a.state : 'disarmed';
                            return s === 'disarmed' ? '#9aa0a8'
                              : (s === 'triggered' ? '#E0695B' : '#E0A75E'); ]]]
            # --- Overnight Guests -> Settings (hidden when off) ---
            guests:
              card:
                type: custom:button-card
                entity: input_boolean.guest_mode
                show_icon: true
                show_name: false
                show_state: false
                icon: mdi:bed
                tap_action: { action: navigate, navigation_path: /mobile-dash/settings }
                styles:
                  card:
                    - background: transparent !important
                    - --ha-card-background: transparent
                    - box-shadow: none
                    - transition: none
                    - padding: 4px
                    - display: |
                        [[[ var g = states['input_boolean.guest_mode'];
                            return (g && g.state === 'on') ? 'flex' : 'none'; ]]]
                  icon:
                    - width: 26px
                    - height: 26px
                    - color: '#7295B2'
            # --- Dinner Party -> Settings (hidden when off) ---
            dinner:
              card:
                type: custom:button-card
                entity: input_boolean.dinner_party
                show_icon: true
                show_name: false
                show_state: false
                icon: mdi:party-popper
                tap_action: { action: navigate, navigation_path: /mobile-dash/settings }
                styles:
                  card:
                    - background: transparent !important
                    - --ha-card-background: transparent
                    - box-shadow: none
                    - transition: none
                    - padding: 4px
                    - display: |
                        [[[ var d = states['input_boolean.dinner_party'];
                            return (d && d.state === 'on') ? 'flex' : 'none'; ]]]
                  icon:
                    - width: 26px
                    - height: 26px
                    - color: '#E0A75E'
            # --- Temperature -> Weather (only this opens weather) ---
            temp:
              card:
                type: custom:button-card
                entity: sensor.bayberry_tempest_temperature
                show_icon: false
                show_name: false
                show_state: true
                tap_action: { action: navigate, navigation_path: /mobile-dash/weather }
                state_display: |
                  [[[ var t = states['sensor.bayberry_tempest_temperature'];
                      return (t && !isNaN(parseFloat(t.state))) ? Math.round(parseFloat(t.state)) + '°' : ''; ]]]
                styles:
                  card:
                    - background: transparent !important
                    - --ha-card-background: transparent
                    - box-shadow: none
                    - transition: none
                    - padding: 0 2px
                  state:
                    - font-size: 26px
                    - font-weight: 700
                    - color: var(--primary-text-color)
          styles:
            card:
              - background: transparent !important
              - --ha-card-background: transparent
              - box-shadow: none
              - transition: none
              - padding: 6px 6px 2px
            grid:
              - grid-template-areas: '"n guests dinner notif alarm temp"'
              - grid-template-columns: 1fr auto auto auto auto auto
              - grid-template-rows: auto
              - align-items: center
              - column-gap: 8px
            name:
              - grid-area: n
              - justify-self: start
              - align-items: center
              - font-size: 26px
              - font-weight: 700
              - color: var(--primary-text-color)
            custom_fields:
              notif:
                - grid-area: notif
                - align-self: center
              alarm:
                - grid-area: alarm
                - align-self: center
              guests:
                - grid-area: guests
                - align-self: center
              dinner:
                - grid-area: dinner
                - align-self: center
              temp:
                - grid-area: temp
                - align-self: center
                - justify-self: end
          # type: custom:button-card
          # show_state: false
          # show_name: false
          # show_icon: false
