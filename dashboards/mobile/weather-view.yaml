title: Weather
icon: mdi:weather-partly-cloudy
theme: Dune Mist
path: weather
type: custom:grid-layout
cards:
  # Sticky bottom nav
  - !include [/config/dashboards/modules/mobile-bottom-nav.yaml, {active: more}]
  - type: custom:button-card
    styles:
      card:
        - border-radius: 15px
        - padding-bottom: 90px
        - padding-left: 5px
        - padding-right: 10px
        - padding-top: 2px
#       - margin: -8px
        - height: auto
#       - width: 398px
        - box-shadow: none
        - background-color: var(--primary-background-color)
        - box-shadow: none
      grid:
        - grid-template-areas: |
            "header"
            "alerts"
            "7day"
            "weather"
        - grid-template-columns: auto
        - grid-template-rows: 60px auto auto
        - row-gap: 2px
        - align-items: start
        - column-gap: 2px
    custom_fields:
      header:
        card:
          type: custom:button-card
          entity: weather.bayberry
          icon: mdi:weather-partly-cloudy
          name: Weather
          show_state: true
          show_label: false
          tap_action: { action: none }
          state_display: |
            [[[
              var e = states['weather.bayberry'];
              var s = e ? e.state : '';
              var m = {
                'clear-night':'Clear Night',
                'cloudy':'Cloudy',
                'fog':'Fog',
                'hail':'Hail',
                'lightning':'Lightning',
                'lightning-rainy':'Lightning, Rainy',
                'partlycloudy':'Partly Cloudy',
                'pouring':'Pouring',
                'rainy':'Rainy',
                'snowy':'Snowy',
                'snowy-rainy':'Snowy, Rainy',
                'sunny':'Sunny',
                'windy':'Windy',
                'windy-variant':'Windy',
                'exceptional':'Exceptional'
              };
              return m[s] || (s ? s.replace(/-/g,' ').replace(/\b\w/g, function(c){ return c.toUpperCase(); }) : '');
            ]]]
          styles:
            card:
              - background: transparent !important
              - --ha-card-background: transparent
              - box-shadow: none
              - transition: none
              - padding: 4px 2px 6px
            grid:
              - grid-template-areas: '"i n" "i s"'
              - grid-template-columns: 54px 1fr
              - grid-template-rows: auto auto
              - align-items: center
              - column-gap: 8px
            img_cell:
              - grid-area: i
              - width: 48px
              - height: 48px
              - border-radius: 13px
              - background-color: "rgba(182,210,220,0.18)"
            icon:
              - width: 24px
              - color: var(--slate-bright)
            name:
              - grid-area: n
              - justify-self: start
              - font-size: 22px
              - font-weight: 700
              - color: var(--primary-text-color)
            state:
              - grid-area: s
              - justify-self: start
              - font-size: 14px
              - color: var(--secondary-text-color)
            custom_fields:
              back:
                - grid-area: back
      alerts:
        card:
          type: conditional
          conditions:
            - condition: numeric_state
              entity: sensor.nws_alerts_alerts
              above: 0
          card:
            type: custom:expander-card
            expanded: true
            title-card-clickable: true
            card_mod:
              style: |
                ha-card {
                  background: var(--background-color-2);
                  }
            title-card:
              type: custom:bubble-card
              card_type: separator
              name: Active Weather Alerts
              icon: mdi:alert
              rows: 0.75
              styles: |
                .bubble-name {
                font-size: 20px !important;  /* title */
                font-weight: bold !important;
                }
                .bubble-line {
                background: var(--primary-text-color);
                opacity: 0.1;
                }
                .card-content {
                padding-top: 10px !important;
                padding-left: 10px !important;
                }  
            cards:
              - type: markdown
                content: |                    
                  {% set alerts = state_attr('sensor.nws_alerts_alerts', 'Alerts') %}
                  {% if alerts and alerts|length > 0 %}
                    {% for alert in alerts %}
                  ### {{ alert.Event }}
                  
                  **{{ alert.Headline }}**
                  
                  {{ alert.Description }}
                  
                  {% if alert.Instruction %}
                  **Instructions:**
                  {{ alert.Instruction }}
                  {% endif %}
                  
                  *Expires: {{ alert.Expires | as_timestamp | timestamp_custom('%B %d, %Y at %I:%M %p') }}*
                  
                  ---
                    {% endfor %}
                  {% else %}
                  ✅ **No active weather alerts**
                  {% endif %}
                card_mod:
                  style: |
                    ha-card {
                      text-align: left !important;
                    }
                    ha-markdown {
                      text-align: left !important;
                    }
                    ha-markdown p, 
                    ha-markdown h3, 
                    ha-markdown h2, 
                    ha-markdown h1 {
                      text-align: left !important;
                    }
      7day:
        card:
          type: weather-forecast
          entity: weather.bayberry
          forecast_type: daily
          show_current: true
          show_forecast: true
          name: Bayberry
          card_mod:
            style: |
              ha-card {
                background: var(--card-background-color) !important;
                --ha-card-background: var(--card-background-color);
                border-radius: 18px !important;
                box-shadow: none !important;
                padding: 6px 10px 10px;
              }
      weather:
        card:
          type: custom:stack-in-card
          mode: vertical
          keep:
            background: true
            border_radius: true
          card_mod:
            style: |
              ha-card {
                background-color: var(--ha-card-background-2);
                border-radius: 20px;
                padding: 12px 12px 4px;
                }
          cards:
            - type: custom:bubble-card
              card_type: separator
              name: Live Weather
              icon: mdi:weather-partly-cloudy
              rows: 0.75
              styles: |
                .bubble-name {
                font-size: 20px !important;  /* title */
                font-weight: bold !important;
                }
                .bubble-line {
                background: var(--primary-text-color);
                opacity: 0.1;
                }
                .card-content {
                padding-top: 10px !important;
                padding-left: 10px !important;
                }
            - type: grid
              columns: 2
              square: false
              cards:
                - graph: line
                  type: sensor
                  entity: sensor.tempest_temperature_5min
                  detail: 2
                  name: Temperature
                  theme: Bubble
                  card_mod:
                    style: |
                      ha-card {
                        border-radius: 18px;
                      }
                - graph: line
                  type: sensor
                  entity: sensor.tempest_humidity_5min
                  detail: 1
                  name: Humidity
                  card_mod:
                    style: |
                      ha-card {
                        background: var(--ha-card-background);
                        border-radius: 18px;
                      }
                - graph: line
                  type: sensor
                  entity: sensor.tempest_wind_speed_average_5min
                  detail: 1
                  name: Average Wind Speed
                  card_mod:
                    style: |
                      ha-card {
                        background: var(--ha-card-background);
                        border-radius: 18px;
                      }
                - graph: line
                  type: sensor
                  entity: sensor.tempest_wind_gust_5min
                  detail: 1
                  name: Wind Gust
                  card_mod:
                    style: |
                      ha-card {
                        background: var(--ha-card-background);
                        border-radius: 18px;
                      }
                - graph: line
                  type: sensor
                  entity: sensor.bayberry_tempest_precipitation
                  detail: 1
                  name: Precipitation
                  card_mod:
                    style: |
                      ha-card {
                        background: var(--ha-card-background);
                        border-radius: 18px;
                      }
                - graph: line
                  type: sensor
                  entity: sensor.tempest_illuminance_5min
                  detail: 1
                  name: Illuminance
                  card_mod:
                    style: |
                      ha-card {
                        background: var(--ha-card-background);
                        border-radius: 18px;
                      }