# lovelace_gen
title: Climate
icon: mdi:fan
theme: Dune Mist
path: climate-main
type: custom:grid-layout
cards:
  # Sticky bottom nav
  - !include [/config/dashboards/modules/mobile-bottom-nav.yaml, {active: climate}]
  - type: custom:button-card
    styles:
      card:
        - border-radius: 15px
        - padding: 2px 10px 5px 5px
        - height: auto
        - box-sizing: border-box
        - max-width: 98%
        - box-shadow: none
        - background: var(--primary-background-color)
      grid:
        - grid-template-areas: |
            "header"
            "first"
            "basement"
            "office"
            "primbed"
        - grid-template-columns: minmax(0, 1fr)
        - grid-template-rows: 60px auto auto auto auto
        - row-gap: 10px
        - align-items: start
        - column-gap: 2px
    custom_fields:
      header:
        card:
          type: custom:button-card
          entity: sensor.climate_zones_avg_temp
          icon: mdi:fan
          name: Climate
          show_state: false
          show_label: true
          tap_action:
            action: none
          label: |
            [[[
              var t = entity ? Math.round(Number(entity.state)) : null;
              return '4 zones · avg ' + (t != null && !isNaN(t) ? t : '–') + '°';
            ]]]
          styles:
            card:
              - background: transparent !important
              - box-shadow: none
              - transition: none
              - padding: 4px 2px 6px
            grid:
              - grid-template-areas: "\"i n\" \"i l\""
              - grid-template-columns: 54px 1fr
              - grid-template-rows: auto auto
              - align-items: center
              - column-gap: 8px
            img_cell:
              - grid-area: i
              - width: 48px
              - height: 48px
              - border-radius: 13px
              - background-color: rgba(142,177,191,0.18)
            icon:
              - width: 24px
              - color: var(--slate-bright)
            name:
              - grid-area: "n"
              - justify-self: start
              - font-size: 22px
              - font-weight: 700
              - color: var(--primary-text-color)
            label:
              - grid-area: l
              - justify-self: start
              - font-size: 14px
              - color: var(--secondary-text-color)
      first:
        card:
          type: custom:expander-card
          expanded: true
          title-card-clickable: true
          card_mod:
            style: |
              ha-card {
                background: var(--background-color) !important;
                border: 1px solid rgba(255,255,255,0.06) !important;
                border-radius: 22px !important;
                padding: 8px 14px 10px !important;
                box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset !important;
                max-width: 100% !important;
                min-width: 0 !important;
                box-sizing: border-box !important;
                overflow: hidden !important;
              }
          title-card:
            type: custom:bubble-card
            card_type: separator
            name: First Floor
            icon: mdi:home-floor-1
            rows: 0.75
            sub_button:
              - entity: sensor.living_room_thermostat_current_temperature
                show_state: true
                show_icon: true
                show_background: false
              - entity: sensor.living_room_thermostat_current_humidity
                show_state: true
                show_background: false
                show_icon: true
              - entity: sensor.first_floor_co2_5min
                show_state: true
                show_background: false
                show_icon: true
              - entity: sensor.first_floor_pm2_5_5min
                show_state: true
                show_background: false
                show_icon: true
            styles: |
              ha-card {
                max-width: 100% !important;
                width: 100% !important;
                box-sizing: border-box !important;
                overflow: hidden !important;
              }
              .bubble-name {
                font-size: 16px !important;
                font-weight: 700 !important;
                letter-spacing: 0.1px !important;
                color: var(--primary-text-color) !important;
              }
              .bubble-sub-button {
                font-size: 16px !important;
                font-weight: 600 !important;
                color: var(--primary-text-color) !important;
                background: transparent !important;
                border: none !important;
              }
              .bubble-line {
                background: linear-gradient(to right, rgba(255,255,255,0.12), transparent 90%) !important;
                opacity: 1 !important;
                height: 1px !important;
              }
              .card-content {
                padding: 4px 6px 10px !important;
                max-width: 100% !important;
                box-sizing: border-box !important;
              }
              @media (max-width: 600px) {
                .bubble-sub-button-4 { display: none !important; }
              }
              @media (max-width: 500px) {
                .bubble-sub-button-2 { display: none !important; }
              }
              @media (max-width: 420px) {
                .bubble-sub-button-3 { display: none !important; }
              }
          cards:
            - type: vertical-stack
              cards:
                - !include
                    - /config/dashboards/modules/mobile-climate-row.yaml
                    - climate_entity: climate.living_room_thermostat
                      thermostat_name: Living Room Thermostat
                      rows: 2.5
                      module_name: mobile_climate
      basement:
        card:
          type: custom:expander-card
          expanded: true
          title-card-clickable: true
          card_mod:
