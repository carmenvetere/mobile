# lovelace_gen
title: Climate
icon: mdi:fan
theme: Wall Panel
path: climate-main
type: custom:grid-layout
cards:
  - type: custom:button-card
    styles:
      card:
        - border-radius: 15px
        - padding: 2px 10px 5px 5px
        - height: auto
        - box-sizing: border-box
        - max-width: 98%
        - box-shadow: none
        - background: "radial-gradient(120% 80% at 50% 0%, #23262c 0%, #0e1013 55%, #000 100%)"
      grid:
        - grid-template-areas: |
            "header"
            "chips"
            "first"
            "basement"
            "office"
            "primbed"
        - grid-template-columns: auto
        - grid-template-rows: 60px 60px auto auto auto auto
        - row-gap: 10px
        - align-items: start
        - column-gap: 2px
    custom_fields:
      header:
        card:
          type: custom:button-card
          show_state: false
          show_name: false
          show_icon: false
          styles:
            card:
              - background-color: transparent
              - padding-bottom: 5px
              - padding-top: 0px
            grid:
              - grid-template-areas: |
                  "name gap"
              - grid-template-columns: 160px auto
              - grid-template-rows: 60px
              - column-gap: 0px
          custom_fields:
            name:
              card:
                type: custom:button-card
                show_state: false
                show_name: true
                show_icon: true
                layout: icon_name
                icon: mdi:fan
                name: Climate
                size: 55%
                icon_color: "#f2f3f5"
                styles:
                  name:
                    - font-size: 26px
                    - font-weight: 700
                    - letter-spacing: "-0.3px"
                    - color: "#f2f3f5"
                  card:
                    - align-items: start
                    - justify-content: flex-start
                    - text-align: left
                    - padding-left: 8px
                    - background-color: transparent
      chips:
        card:
          type: custom:mushroom-chips-card
          card_mod:
            style: |
              ha-card {
                overflow: hidden !important;
                max-width: calc(100vw - 30px) !important;
                margin-right: 10px !important;
                box-sizing: border-box !important;
                --chip-background: rgba(255,255,255,0.14);
                --chip-font-size: 14px;
                --chip-font-weight: 600;
                --chip-border-radius: 999px;
                --chip-padding: 8px 14px;
                --chip-icon-size: 16px;
                --chip-box-shadow: none;
              }
              ha-card > * {
                display: flex !important;
                flex-wrap: nowrap !important;
                overflow-x: auto !important;
                overflow-y: hidden !important;
                gap: 8px !important;
              }
              ha-card > * > * {
                flex-shrink: 0 !important;
              }
              ha-card ::-webkit-scrollbar { height: 4px; }
              ha-card ::-webkit-scrollbar-track { background: transparent; }
              ha-card ::-webkit-scrollbar-thumb {
                background: rgba(255,255,255,0.3);
                border-radius: 2px;
              }
          chips:
            - type: template
              content: Back
              tap_action:
                action: navigate
                navigation_path: /mobile-dash/mobile-home
              icon: mdi:chevron-left
              card_mod: &chip_style
                style: |
                  :host {
                    zoom: 1.25 !important;
                    --chip-background: var(--background-color);
                    --chip-font-size: 16px;
                  }
                  ha-card {
                    box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
                  }
            - type: entity
              entity: sensor.bayberry_tempest_temperature
              tap_action:
                action: more-info
              icon: mdi:thermometer
              icon_color: "#5ec8ff"
              card_mod: *chip_style
            - type: entity
              entity: sensor.bayberry_tempest_humidity
              tap_action:
                action: more-info
              icon: mdi:water-percent
              icon_color: "#5ec8ff"
              card_mod: *chip_style
            - type: entity
              entity: sensor.first_floor_air_quality_pm2_5
              tap_action:
                action: more-info
              icon: mdi:leaf
              icon_color: "#4ade80"
              card_mod: *chip_style
            - type: conditional
              conditions:
                - condition: state
                  entity: switch.utility_room_ventilation_damper
                  state: 'on'
              chip:
                type: template
                content: Fresh Air
                entity: switch.utility_room_ventilation_damper
                tap_action:
                  action: more-info
                icon: mdi:tailwind
                icon_color: "#4ade80"
                card_mod: *chip_style
            - type: conditional
              conditions:
                - condition: numeric_state
                  entity: sensor.bedroom_co2_5min
                  above: 700
              chip:
                type: template
                content: Bedroom High CO2
                entity: sensor.bedroom_co2_5min
                tap_action:
                  action: more-info
                icon: mdi:cloud-alert
                icon_color: "#EF8C00"
                card_mod: *chip_style
            - type: conditional
              conditions:
                - condition: numeric_state
                  entity: sensor.first_floor_co2_5min
                  above: 700
              chip:
                type: template
                content: First Floor High CO2
                entity: sensor.bedroom_co2_5min
                tap_action:
                  action: more-info
                icon: mdi:cloud-alert
                icon_color: "#EF8C00"
                card_mod: *chip_style
            - type: conditional
              conditions:
                - condition: numeric_state
                  entity: sensor.bedroom_pm2_5_5min
                  above: 10
              chip:
                type: template
                content: Bedroom High CO2
                entity: sensor.bedroom_pm2_5_5min
                tap_action:
                  action: more-info
                icon: mdi:weather-dust
                icon_color: "#EF8C00"
                card_mod: *chip_style
            - type: conditional
              conditions:
                - condition: numeric_state
                  entity: sensor.first_floor_pm2_5_5min
                  above: 10
              chip:
                type: template
                content: First Floor High CO2
                entity: sensor.first_floor_pm2_5_5min
                tap_action:
                  action: more-info
                icon: mdi:weather-dust
                icon_color: "#EF8C00"
                card_mod: *chip_style
      first:
        card:
          type: custom:expander-card
          expanded: true
          title-card-clickable: true
          card_mod:
            style: |
              ha-card {
                background: rgba(255,255,255,0.055) !important;
                border: 1px solid rgba(255,255,255,0.06) !important;
                border-radius: 22px !important;
                padding: 8px 14px 10px !important;
                box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset !important;
              }
          title-card:
            type: custom:bubble-card
            card_type: separator
            name: First Floor
            icon: mdi:home-floor-1
            rows: 0.75
            sub_button:
              - entity: sensor.living_room_thermostat_current_temperature
                show_state: true
                show_icon: true
                show_background: false
              - entity: sensor.living_room_thermostat_current_humidity
                show_state: true
                show_background: false
                show_icon: true
              - entity: sensor.first_floor_co2_5min
                show_state: true
                show_background: false
                show_icon: true
              - entity: sensor.first_floor_pm2_5_5min
                show_state: true
                show_background: false
                show_icon: true
            styles: |
              ha-card {
                max-width: 100% !important;
                width: 100% !important;
                box-sizing: border-box !important;
                overflow: hidden !important;
              }
              .bubble-name {
                font-size: 16px !important;
                font-weight: 700 !important;
                letter-spacing: 0.1px !important;
                color: var(--primary-text-color) !important;
              }
              .bubble-sub-button {
                font-size: 16px !important;
                font-weight: 600 !important;
                color: var(--primary-text-color) !important;
                background: transparent !important;
                border: none !important;
              }
              .bubble-line {
                background: linear-gradient(to right, rgba(255,255,255,0.12), transparent 90%) !important;
                opacity: 1 !important;
                height: 1px !important;
              }
              .card-content {
                padding: 4px 6px 10px !important;
                max-width: 100% !important;
                box-sizing: border-box !important;
              }
              @media (max-width: 350px) {
                .bubble-sub-button-4 { display: none !important; }
              }
              @media (max-width: 300px) {
                .bubble-sub-button-2 { display: none !important; }
              }
              @media (max-width: 250px) {
                .bubble-sub-button-3 { display: none !important; }
              }
          cards:
            - type: vertical-stack
              cards:
                - !include
                    - /config/dashboards/modules/mobile-climate-row.yaml
                    - climate_entity: climate.living_room_thermostat
                      thermostat_name: Living Room Thermostat
                      rows: 2.406
