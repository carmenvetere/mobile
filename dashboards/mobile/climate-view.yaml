            icon: mdi:home-floor-b
            rows: 0.75
            sub_button:
              - entity: sensor.basement_thermostat_homekit_current_temperature
                show_state: true
                show_icon: true
                show_background: false
              - entity: sensor.basement_thermostat_homekit_current_humidity
                show_state: true
                show_background: false
                show_icon: true
            styles: |
              ha-card {
                max-width: 100% !important;
                width: 100% !important;
                box-sizing: border-box !important;
                overflow: hidden !important;
              }
              .bubble-name {
                font-size: 16px !important;
                font-weight: 700 !important;
                letter-spacing: 0.1px !important;
                color: var(--primary-text-color) !important;
              }
              .bubble-sub-button {
                font-size: 16px !important;
                font-weight: 600 !important;
                color: var(--primary-text-color) !important;
                background: transparent !important;
                border: none !important;
              }
              .bubble-line {
                background: linear-gradient(to right, rgba(255,255,255,0.12), transparent 90%) !important;
                opacity: 1 !important;
                height: 1px !important;
              }
              .card-content {
                padding: 4px 6px 10px !important;
                max-width: 100% !important;
                box-sizing: border-box !important;
              }
              @media (max-width: 600px) {
                .bubble-sub-button-4 { display: none !important; }
              }
              @media (max-width: 500px) {
                .bubble-sub-button-2 { display: none !important; }
              }
              @media (max-width: 420px) {
                .bubble-sub-button-3 { display: none !important; }
              }
          cards:
            - type: vertical-stack
              cards:
                - !include
                    - /config/dashboards/modules/mobile-climate-row.yaml
                    - climate_entity: climate.basement_thermostat
                      thermostat_name: Hallway Thermostat
                      module_name: mobile_climate
                - type: custom:button-card
                  entity: switch.basement_thermostat_family_room_priority
                  name: Media Room Priority
                  show_state: true
                  show_label: false
                  show_icon: true
                  icon: mdi:television
                  tap_action:
                    action: toggle
                  state_display: >
                    [[[ return
                    (states['switch.basement_thermostat_family_room_priority'] ||
                    {}).state === 'on' ? 'On' : 'Off'; ]]]
                  styles:
                    card:
                      - background: var(--background-color-2)
                      - border-radius: 15px
                      - border-top: 1px solid rgba(255,255,255,0.06)
                      - padding: 15px
                      - transition: none
                      - cursor: pointer
                    grid:
                      - grid-template-areas: "\"ic n st sw\""
                      - grid-template-columns: auto 1fr auto auto
                      - align-items: center
                      - column-gap: 10px
                    img_cell:
                      - grid-area: ic
                      - width: 22px
                      - height: 22px
                    icon:
                      - width: 18px
                      - color: >
                          [[[ return
                          (states['switch.basement_thermostat_family_room_priority']
                          || {}).state === 'on' ? 'var(--slate-bright)' : '#9aa0a8';
                          ]]]
                    name:
                      - grid-area: "n"
                      - justify-self: start
                      - font-size: 16px
                      - font-weight: 600
                      - color: var(--primary-text-color)
                    state:
                      - grid-area: st
                      - justify-self: end
                      - font-size: 14px
                      - font-weight: 600
                      - color: >
                          [[[ return
                          (states['switch.basement_thermostat_family_room_priority']
                          || {}).state === 'on' ? 'var(--slate-bright)' : '#9aa0a8';
                          ]]]
                    custom_fields:
                      sw:
                        - grid-area: sw
                        - justify-self: end
                  custom_fields:
                    sw: |
                      [[[
                        var on = (states['switch.basement_thermostat_family_room_priority'] || {}).state === 'on';
                        return '<div style="width:38px;height:22px;border-radius:999px;background:'
                          + (on ? 'rgba(142,177,191,0.55)' : 'rgba(255,255,255,0.28)')
                          + ';position:relative;transition:background .2s ease;">'
                          + '<div style="position:absolute;top:2px;left:' + (on ? '18px' : '2px')
                          + ';width:18px;height:18px;border-radius:50%;background:#fff;'
                          + 'box-shadow:0 1px 2px rgba(0,0,0,0.4);transition:left .2s ease;"></div></div>';
                      ]]]
            - type: custom:button-card
              entity: switch.utility_room_ventilation_damper
              name: Basement Fresh Air Damper
              show_state: true
              show_label: false
              show_icon: true
              icon: mdi:tailwind
              tap_action:
                action: toggle
              state_display: >
                [[[ return
                (states['switch.utility_room_ventilation_damper'] ||
                {}).state === 'on' ? 'On' : 'Off'; ]]]
              styles:
                card:
                  - background: var(--background-color-2)
                  - border-radius: 15px
                  - border-top: 1px solid rgba(255,255,255,0.06)
                  - padding: 15px
                  - transition: none
                  - cursor: pointer
                grid:
                  - grid-template-areas: "\"ic n st sw\""
                  - grid-template-columns: auto 1fr auto auto
                  - align-items: center
                  - column-gap: 10px
                img_cell:
                  - grid-area: ic
                  - width: 22px
                  - height: 22px
                icon:
                  - width: 18px
                  - color: >
                      [[[ return
                      (states['switch.utility_room_ventilation_damper']
                      || {}).state === 'on' ? 'var(--slate-bright)' : '#9aa0a8';
                      ]]]
