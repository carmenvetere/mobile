                  - grid-area: "n"
                  - justify-self: start
                  - font-size: 16px
                  - font-weight: 600
                  - color: var(--primary-text-color)
                state:
                  - grid-area: st
                  - justify-self: end
                  - font-size: 14px
                  - font-weight: 600
                  - color: >
                      [[[ return
                      (states['switch.utility_room_ventilation_damper']
                      || {}).state === 'on' ? 'var(--slate-bright)' : '#9aa0a8';
                      ]]]
                custom_fields:
                  sw:
                    - grid-area: sw
                    - justify-self: end
              custom_fields:
                sw: |
                  [[[
                    var on = (states['switch.utility_room_ventilation_damper'] || {}).state === 'on';
                    return '<div style="width:38px;height:22px;border-radius:999px;background:'
                      + (on ? 'rgba(142,177,191,0.55)' : 'rgba(255,255,255,0.28)')
                      + ';position:relative;transition:background .2s ease;">'
                      + '<div style="position:absolute;top:2px;left:' + (on ? '18px' : '2px')
                      + ';width:18px;height:18px;border-radius:50%;background:#fff;'
                      + 'box-shadow:0 1px 2px rgba(0,0,0,0.4);transition:left .2s ease;"></div></div>';
                  ]]]
      office:
        card:
          type: custom:expander-card
