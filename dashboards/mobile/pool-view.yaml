title: Pool
icon: mdi:pool
theme: Dune Mist
path: pool
type: custom:grid-layout
cards:
# Sticky bottom nav
- !include [/config/dashboards/modules/mobile-bottom-nav.yaml, {active: more}]
- !include /config/dashboards/modules/mobile-more-sheet.yaml
- type: custom:button-card
  styles:
    card:
    - border-radius: 15px
    - padding-bottom: 90px
    - padding-left: 5px
    - padding-right: 10px
    - padding-top: 2px
    - height: auto
    - box-shadow: none
    - background: var(--primary-background-color)
    grid:
    - grid-template-areas: |
        "header"
        "main"
    - grid-template-columns: auto
    - grid-template-rows: 60px auto
    - row-gap: 0px
    - align-items: start
    - column-gap: 2px
  custom_fields:
    header:
      card:
        type: custom:button-card
        icon: mdi:pool
        name: Pool
        show_state: false
        show_label: true
        tap_action:
          action: none
        label: |
          [[[
            var w = states['sensor.omnilogic_pool_watersensor'];
            var p = states['switch.omnilogic_pool_filter_pump'];
            var t = (w && w.state !== 'unknown' && w.state !== 'unavailable')
              ? Math.round(w.state) + '° · ' : '';
            return t + (p && p.state === 'on' ? 'Pump on' : 'Pump off');
          ]]]
        styles:
          card:
          - background: transparent !important
          - --ha-card-background: transparent
          - box-shadow: none
          - transition: none
          - padding: 4px 2px 6px
          grid:
          - grid-template-areas: '"i n" "i l"'
          - grid-template-columns: 54px 1fr
          - grid-template-rows: auto auto
          - align-items: center
          - column-gap: 8px
          img_cell:
          - grid-area: i
          - width: 48px
          - height: 48px
          - border-radius: 13px
          - background-color: rgba(142,177,191,0.18)
          icon:
          - width: 24px
          - color: var(--slate-bright)
          name:
          - grid-area: n
          - justify-self: start
          - font-size: 22px
          - font-weight: 700
          - color: var(--primary-text-color)
          label:
          - grid-area: l
          - justify-self: start
          - font-size: 14px
          - color: var(--secondary-text-color)
    main:
      card:
        type: vertical-stack
        cards:
        # ------------------------------------------------------- 2-up stats
        - type: grid
          columns: 2
          square: false
          cards:
          - type: custom:button-card
            entity: sensor.omnilogic_pool_watersensor
            name: Water
            icon: mdi:pool-thermometer
            show_state: true
            tap_action:
              action: more-info
            state_display: |
              [[[
                var e = states['sensor.omnilogic_pool_watersensor'];
                if (!e || e.state === 'unknown' || e.state === 'unavailable') return '—';
                return Math.round(e.state) + '°';
              ]]]
            styles:
              card:
              - padding: 14px
              - border-radius: 16px
              - background: var(--background-color-2) !important
              - --ha-card-background: var(--background-color-2)
              - box-shadow: none
              - transition: none
              grid:
              - grid-template-areas: '"i" "s" "n"'
              - grid-template-rows: auto auto auto
              - row-gap: 5px
              - justify-items: start
              img_cell:
              - width: 40px
              - height: 40px
              - border-radius: 11px
              - background-color: rgba(142,177,191,0.18)
              icon:
              - width: 20px
              - color: var(--slate-bright)
              state:
              - font-size: 22px
              - font-weight: 700
              - color: var(--primary-text-color)
              name:
              - font-size: 14px
              - color: var(--secondary-text-color)
          - type: custom:button-card
            entity: sensor.omnilogic_pool_chlorinator_average_salt_level
            name: Salt
            icon: mdi:shaker-outline
            show_state: true
            tap_action:
              action: more-info
            state_display: |
              [[[
                var e = states['sensor.omnilogic_pool_chlorinator_average_salt_level'];
                if (!e || e.state === 'unknown' || e.state === 'unavailable') return '—';
                return Math.round(e.state).toLocaleString() + ' ppm';
              ]]]
            styles:
              card:
              - padding: 14px
              - border-radius: 16px
              - background: var(--background-color-2) !important
              - --ha-card-background: var(--background-color-2)
              - box-shadow: none
              - transition: none
              grid:
              - grid-template-areas: '"i" "s" "n"'
              - grid-template-rows: auto auto auto
              - row-gap: 5px
              - justify-items: start
              img_cell:
              - width: 40px
              - height: 40px
              - border-radius: 11px
              - background-color: rgba(139,166,128,0.18)
              icon:
              - width: 20px
              - color: var(--sage-color)
              state:
              - font-size: 22px
              - font-weight: 700
              - color: var(--primary-text-color)
              name:
              - font-size: 14px
              - color: var(--secondary-text-color)
        # ------------------------------------------------------ filter pump
        - type: custom:bubble-card
          card_type: separator
          name: Filter Pump
          icon: mdi:pump
          rows: 0.75
          styles: |
            .bubble-name { font-size: 14px !important; font-weight: 700 !important;
              text-transform: uppercase; letter-spacing: 0.06em;
              color: rgba(255,255,255,0.6) !important; }
            .bubble-line { background: var(--primary-text-color); opacity: 0.1; }
            .card-content { padding-top: 7px !important; }
        - type: custom:bubble-card
          card_type: button
          entity: switch.omnilogic_pool_filter_pump
          show_state: true
          name: Filter Pump
          icon: mdi:pump
          styles: |-
            .bubble-sub-button { font-size: 14px !important; font-weight: 700 !important; }
            .bubble-name { font-size: 16px !important; }
          sub_button:
          - entity: number.omnilogic_pool_filter_pump_speed
            show_state: true
            show_attribute: true
          modules:
          - mobile_settings_module
        - type: custom:bubble-card
          card_type: button
          entity: number.omnilogic_pool_filter_pump_speed
          button_type: slider
          tap_action:
            action: none
          hold_action:
            action: none
          double_tap_action:
            action: none
          name: Pump Speed
          show_state: true
          show_attribute: true
          attribute: current_percent
          slider_live_update: true
          styles: |-
            .bubble-sub-button { font-size: 14px !important; font-weight: 700 !important; }
            .bubble-name { font-size: 16px !important; }
          sub_button:
          - entity: button.omnilogic_pool_filter_pump_low_speed
            name: Low
            show_state: false
            show_name: true
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.omnilogic_pool_filter_pump_low_speed
          - entity: button.omnilogic_pool_filter_pump_medium_speed
            name: Medium
            show_state: false
            show_name: true
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.omnilogic_pool_filter_pump_medium_speed
          - entity: button.omnilogic_pool_filter_pump_high_speed
            name: High
            show_state: false
            show_name: true
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.omnilogic_pool_filter_pump_high_speed
          modules:
          - mobile_settings_module
        # ----------------------------------------------------------- heater
        - type: custom:bubble-card
          card_type: separator
          name: Heater
          icon: mdi:water-boiler
          rows: 0.75
          styles: |
            .bubble-name { font-size: 14px !important; font-weight: 700 !important;
              text-transform: uppercase; letter-spacing: 0.06em;
              color: rgba(255,255,255,0.6) !important; }
            .bubble-line { background: var(--primary-text-color); opacity: 0.1; }
            .card-content { padding-top: 7px !important; }
        # Thermostat-styled row: setpoint slider with the climate-view heat
        # glow (amber ring while the heater is on), current setpoint of the
        # heater itself + on/off toggle as sub-buttons.
        - type: custom:bubble-card
          card_type: button
          button_type: slider
          entity: input_number.pool_heater_setpoint
          name: Pool Heater
          icon: mdi:water-boiler
          show_state: false
          card_layout: large
          slider_live_update: true
          tap_action:
            action: none
          hold_action:
            action: none
          double_tap_action:
            action: none
          styles: |-
            .bubble-name { font-size: 16px !important; }
            .bubble-range-value { font-size: 16px !important; font-weight: bold; }
            .bubble-sub-button { font-size: 14px !important; font-weight: bold; }
          sub_button:
          - entity: water_heater.omnilogic_pool_heater
            show_state: false
            show_attribute: true
            attribute: temperature
            show_icon: false
            show_background: false
          - entity: water_heater.omnilogic_pool_heater
            show_state: true
            show_icon: true
            icon: mdi:power
            tap_action:
              action: toggle
          modules:
          - mobile_settings_module
        # ----------------------------------------------- chlorinator & cover
        - type: custom:bubble-card
          card_type: separator
          name: Chlorinator
          icon: mdi:toggle-switch-variant
          rows: 0.75
          styles: |
            .bubble-name { font-size: 14px !important; font-weight: 700 !important;
              text-transform: uppercase; letter-spacing: 0.06em;
              color: rgba(255,255,255,0.6) !important; }
            .bubble-line { background: var(--primary-text-color); opacity: 0.1; }
            .card-content { padding-top: 7px !important; }
        - type: custom:bubble-card
          card_type: button
          entity: switch.omnilogic_pool_chlorinator
          show_state: true
          name: Chlorinator
          icon: mdi:toggle-switch-variant
          styles: |-
            .bubble-sub-button { font-size: 14px !important; font-weight: 700 !important; }
            .bubble-name { font-size: 16px !important; }
          sub_button:
          - entity: number.omnilogic_pool_chlorinator_timed_percent
            show_state: true
            show_attribute: true
            show_background: false
          modules:
          - mobile_settings_module
