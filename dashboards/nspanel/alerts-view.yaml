title: Alerts
path: alerts
icon: mdi:bell
background: '#16181a'
type: custom:grid-layout
layout:
  grid-template-columns: 480px
  margin: 0
  padding: 0
cards:
  - type: custom:button-card
    template: nspanel_screen
    styles:
      grid:
        - display: flex
        - flex-direction: column
        - height: 480px
        - width: 480px
        - align-items: stretch
      custom_fields:
        header:
          - flex: none
        body:
          - flex: '1'
          - min-height: 0
          - overflow-y: auto
    custom_fields:
      header:
        card:
          type: custom:button-card
          template: nspanel_header
          custom_fields:
            title: '<div style="font:800 24px Manrope;color:#e9e5dd;">Alerts</div>'
      body:
        card:
          type: vertical-stack
          cards:
            # Alert rows are state-driven (same rules as
            # sensor.notification_alert_counter), so they clear themselves
            # when the underlying condition resolves.
            - type: custom:button-card
              template: nspanel_base
              entity: binary_sensor.bayberry_grid_status
              visibility:
                - condition: state
                  entity: binary_sensor.bayberry_grid_status
                  state: 'off'
              tap_action:
                action: more-info
              variables: &alert_critical
                sev_color: '#c8805f'
                sev_bg: rgba(200,128,95,0.14)
              styles: &alert_row_styles
                card:
                  - margin: 2px 16px 10px
                  - padding: 15px
                  - background: '#2b2f34'
                  - border: 1px solid rgba(234,230,221,0.08)
                  - border-radius: 16px
                grid:
                  - display: flex
                custom_fields:
                  content:
                    - width: 100%
              custom_fields:
                content: |
                  [[[
                    if (!entity) return '';
                    const rel = (iso) => { const m = (Date.now() - new Date(iso).getTime()) / 60000;
                      if (m < 1) return 'now'; if (m < 60) return Math.floor(m) + ' min ago';
                      const h = m / 60; if (h < 24) return Math.floor(h) + (Math.floor(h) < 2 ? ' hr ago' : ' hrs ago');
                      return Math.floor(h / 24) + ' d ago'; };
                    return `<div style="display:flex;gap:12px;width:100%;">
                      <div style="width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex:none;background:${variables.sev_bg};">
                        <span class="ms" style="font-size:23px;color:${variables.sev_color};">bolt</span>
                      </div>
                      <div style="flex:1;min-width:0;text-align:left;">
                        <div style="display:flex;justify-content:space-between;gap:8px;align-items:baseline;">
                          <div style="font:700 17px Manrope;color:#e9e5dd;">Power Outage</div>
                          <div style="font:600 12px Manrope;color:#8b8980;white-space:nowrap;flex:none;">${rel(entity.last_changed)}</div>
                        </div>
                        <div style="font:600 14px Manrope;color:#a5a299;margin-top:3px;line-height:1.35;">Mains power lost · running on battery backup</div>
                      </div></div>`;
                  ]]]
            - type: custom:button-card
              template: nspanel_base
              entity: sensor.bayberry_charge
              visibility:
                - condition: state
                  entity: binary_sensor.bayberry_grid_status
                  state: 'off'
                - condition: numeric_state
                  entity: sensor.bayberry_charge
                  below: 25
              tap_action:
                action: more-info
              variables: *alert_critical
              styles: *alert_row_styles
              custom_fields:
                content: |
                  [[[
                    if (!entity) return '';
                    const rel = (iso) => { const m = (Date.now() - new Date(iso).getTime()) / 60000;
                      if (m < 1) return 'now'; if (m < 60) return Math.floor(m) + ' min ago';
                      const h = m / 60; if (h < 24) return Math.floor(h) + (Math.floor(h) < 2 ? ' hr ago' : ' hrs ago');
                      return Math.floor(h / 24) + ' d ago'; };
                    const pct = Math.round(parseFloat(entity.state));
                    return `<div style="display:flex;gap:12px;width:100%;">
                      <div style="width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex:none;background:${variables.sev_bg};">
                        <span class="ms" style="font-size:23px;color:${variables.sev_color};">battery_alert</span>
                      </div>
                      <div style="flex:1;min-width:0;text-align:left;">
                        <div style="display:flex;justify-content:space-between;gap:8px;align-items:baseline;">
                          <div style="font:700 17px Manrope;color:#e9e5dd;">Backup Battery Low</div>
                          <div style="font:600 12px Manrope;color:#8b8980;white-space:nowrap;flex:none;">${rel(entity.last_changed)}</div>
                        </div>
                        <div style="font:600 14px Manrope;color:#a5a299;margin-top:3px;line-height:1.35;">Powerwall at ${pct}% while off-grid</div>
                      </div></div>`;
                  ]]]
            - type: custom:button-card
              template: nspanel_base
              entity: binary_sensor.bayberry_storm_watch_active
              visibility:
                - condition: state
                  entity: binary_sensor.bayberry_storm_watch_active
                  state: 'on'
              tap_action:
                action: more-info
              variables: &alert_warning
                sev_color: '#cba14e'
                sev_bg: rgba(203,161,78,0.14)
              styles: *alert_row_styles
              custom_fields:
                content: |
                  [[[
                    if (!entity) return '';
                    const rel = (iso) => { const m = (Date.now() - new Date(iso).getTime()) / 60000;
                      if (m < 1) return 'now'; if (m < 60) return Math.floor(m) + ' min ago';
                      const h = m / 60; if (h < 24) return Math.floor(h) + (Math.floor(h) < 2 ? ' hr ago' : ' hrs ago');
                      return Math.floor(h / 24) + ' d ago'; };
                    return `<div style="display:flex;gap:12px;width:100%;">
                      <div style="width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex:none;background:${variables.sev_bg};">
                        <span class="ms" style="font-size:23px;color:${variables.sev_color};">thunderstorm</span>
                      </div>
                      <div style="flex:1;min-width:0;text-align:left;">
                        <div style="display:flex;justify-content:space-between;gap:8px;align-items:baseline;">
                          <div style="font:700 17px Manrope;color:#e9e5dd;">Storm Watch</div>
                          <div style="font:600 12px Manrope;color:#8b8980;white-space:nowrap;flex:none;">${rel(entity.last_changed)}</div>
                        </div>
                        <div style="font:600 14px Manrope;color:#a5a299;margin-top:3px;line-height:1.35;">Powerwall storm watch is active</div>
                      </div></div>`;
                  ]]]
            - type: custom:button-card
              template: nspanel_base
              entity: sensor.nws_alerts_alerts
              visibility:
                - condition: numeric_state
                  entity: sensor.nws_alerts_alerts
                  above: 0
              tap_action:
                action: more-info
              variables: *alert_warning
              styles: *alert_row_styles
              custom_fields:
                content: |
                  [[[
                    if (!entity) return '';
                    const rel = (iso) => { const m = (Date.now() - new Date(iso).getTime()) / 60000;
                      if (m < 1) return 'now'; if (m < 60) return Math.floor(m) + ' min ago';
                      const h = m / 60; if (h < 24) return Math.floor(h) + (Math.floor(h) < 2 ? ' hr ago' : ' hrs ago');
                      return Math.floor(h / 24) + ' d ago'; };
                    const n = parseInt(entity.state, 10) || 0;
                    return `<div style="display:flex;gap:12px;width:100%;">
                      <div style="width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex:none;background:${variables.sev_bg};">
                        <span class="ms" style="font-size:23px;color:${variables.sev_color};">warning</span>
                      </div>
                      <div style="flex:1;min-width:0;text-align:left;">
                        <div style="display:flex;justify-content:space-between;gap:8px;align-items:baseline;">
                          <div style="font:700 17px Manrope;color:#e9e5dd;">Weather Alert</div>
                          <div style="font:600 12px Manrope;color:#8b8980;white-space:nowrap;flex:none;">${rel(entity.last_changed)}</div>
                        </div>
                        <div style="font:600 14px Manrope;color:#a5a299;margin-top:3px;line-height:1.35;">${n} active National Weather Service alert${n === 1 ? '' : 's'}</div>
                      </div></div>`;
                  ]]]
            - type: custom:button-card
              template: nspanel_base
              entity: cover.garage_door_garage
              visibility:
                - condition: state
                  entity: cover.garage_door_garage
                  state: open
              tap_action:
                action: more-info
              variables: *alert_warning
              styles: *alert_row_styles
              custom_fields:
                content: |
                  [[[
                    if (!entity) return '';
                    const rel = (iso) => { const m = (Date.now() - new Date(iso).getTime()) / 60000;
                      if (m < 1) return 'now'; if (m < 60) return Math.floor(m) + ' min ago';
                      const h = m / 60; if (h < 24) return Math.floor(h) + (Math.floor(h) < 2 ? ' hr ago' : ' hrs ago');
                      return Math.floor(h / 24) + ' d ago'; };
                    const m = Math.max(0, Math.floor((Date.now() - new Date(entity.last_changed).getTime()) / 60000));
                    return `<div style="display:flex;gap:12px;width:100%;">
                      <div style="width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex:none;background:${variables.sev_bg};">
                        <span class="ms" style="font-size:23px;color:${variables.sev_color};">garage</span>
                      </div>
                      <div style="flex:1;min-width:0;text-align:left;">
                        <div style="display:flex;justify-content:space-between;gap:8px;align-items:baseline;">
                          <div style="font:700 17px Manrope;color:#e9e5dd;">Garage Door Open</div>
                          <div style="font:600 12px Manrope;color:#8b8980;white-space:nowrap;flex:none;">${rel(entity.last_changed)}</div>
                        </div>
                        <div style="font:600 14px Manrope;color:#a5a299;margin-top:3px;line-height:1.35;">Open for ${m} minute${m === 1 ? '' : 's'}</div>
                      </div></div>`;
                  ]]]
            - type: custom:button-card
              template: nspanel_base
              entity: binary_sensor.pool_cover_pump
              visibility:
                - condition: state
                  entity: sensor.bayberry_tempest_precipitation_type
                  state: rain
                - condition: state
                  entity: binary_sensor.pool_cover_pump
                  state: 'off'
              tap_action:
                action: more-info
              variables: *alert_warning
              styles: *alert_row_styles
              custom_fields:
                content: |
                  [[[
                    if (!entity) return '';
                    const rel = (iso) => { const m = (Date.now() - new Date(iso).getTime()) / 60000;
                      if (m < 1) return 'now'; if (m < 60) return Math.floor(m) + ' min ago';
                      const h = m / 60; if (h < 24) return Math.floor(h) + (Math.floor(h) < 2 ? ' hr ago' : ' hrs ago');
                      return Math.floor(h / 24) + ' d ago'; };
                    return `<div style="display:flex;gap:12px;width:100%;">
                      <div style="width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex:none;background:${variables.sev_bg};">
                        <span class="ms" style="font-size:23px;color:${variables.sev_color};">water_drop</span>
                      </div>
                      <div style="flex:1;min-width:0;text-align:left;">
                        <div style="display:flex;justify-content:space-between;gap:8px;align-items:baseline;">
                          <div style="font:700 17px Manrope;color:#e9e5dd;">Cover Pump Off in Rain</div>
                          <div style="font:600 12px Manrope;color:#8b8980;white-space:nowrap;flex:none;">${rel(entity.last_changed)}</div>
                        </div>
                        <div style="font:600 14px Manrope;color:#a5a299;margin-top:3px;line-height:1.35;">Rain detected and the pool cover pump is off</div>
                      </div></div>`;
                  ]]]
            - type: custom:button-card
              template: nspanel_base
              entity: input_boolean.low_pool_water_level
              visibility:
                - condition: state
                  entity: input_boolean.low_pool_water_level
                  state: 'on'
              tap_action:
                action: more-info
              variables: *alert_warning
              styles: *alert_row_styles
              custom_fields:
                content: |
                  [[[
                    if (!entity) return '';
                    const rel = (iso) => { const m = (Date.now() - new Date(iso).getTime()) / 60000;
                      if (m < 1) return 'now'; if (m < 60) return Math.floor(m) + ' min ago';
                      const h = m / 60; if (h < 24) return Math.floor(h) + (Math.floor(h) < 2 ? ' hr ago' : ' hrs ago');
                      return Math.floor(h / 24) + ' d ago'; };
                    return `<div style="display:flex;gap:12px;width:100%;">
                      <div style="width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex:none;background:${variables.sev_bg};">
                        <span class="ms" style="font-size:23px;color:${variables.sev_color};">pool</span>
                      </div>
                      <div style="flex:1;min-width:0;text-align:left;">
                        <div style="display:flex;justify-content:space-between;gap:8px;align-items:baseline;">
                          <div style="font:700 17px Manrope;color:#e9e5dd;">Low Pool Water</div>
                          <div style="font:600 12px Manrope;color:#8b8980;white-space:nowrap;flex:none;">${rel(entity.last_changed)}</div>
                        </div>
                        <div style="font:600 14px Manrope;color:#a5a299;margin-top:3px;line-height:1.35;">Pool water level is low</div>
                      </div></div>`;
                  ]]]
            - type: custom:button-card
              template: nspanel_base
              entity: sensor.roborock_s8_vacuum_error
              visibility:
                - condition: state
                  entity: sensor.roborock_s8_vacuum_error
                  state_not:
                    - none
                    - unknown
                    - unavailable
                    - ''
              tap_action:
                action: more-info
              variables: *alert_warning
              styles: *alert_row_styles
              custom_fields:
                content: |
                  [[[
                    if (!entity) return '';
                    const rel = (iso) => { const m = (Date.now() - new Date(iso).getTime()) / 60000;
                      if (m < 1) return 'now'; if (m < 60) return Math.floor(m) + ' min ago';
                      const h = m / 60; if (h < 24) return Math.floor(h) + (Math.floor(h) < 2 ? ' hr ago' : ' hrs ago');
                      return Math.floor(h / 24) + ' d ago'; };
                    return `<div style="display:flex;gap:12px;width:100%;">
                      <div style="width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex:none;background:${variables.sev_bg};">
                        <span class="ms" style="font-size:23px;color:${variables.sev_color};">cleaning_services</span>
                      </div>
                      <div style="flex:1;min-width:0;text-align:left;">
                        <div style="display:flex;justify-content:space-between;gap:8px;align-items:baseline;">
                          <div style="font:700 17px Manrope;color:#e9e5dd;">Vacuum Error</div>
                          <div style="font:600 12px Manrope;color:#8b8980;white-space:nowrap;flex:none;">${rel(entity.last_changed)}</div>
                        </div>
                        <div class="ell" style="font:600 14px Manrope;color:#a5a299;margin-top:3px;line-height:1.35;">${entity.state}</div>
                      </div></div>`;
                  ]]]
            - type: custom:button-card
              template: nspanel_base
              entity: binary_sensor.washer_recently_completed
              visibility:
                - condition: state
                  entity: binary_sensor.washer_recently_completed
                  state: 'on'
              tap_action:
                action: more-info
              variables: &alert_info
                sev_color: '#7295b2'
                sev_bg: rgba(114,149,178,0.14)
              styles: *alert_row_styles
              custom_fields:
                content: |
                  [[[
                    if (!entity) return '';
                    const rel = (iso) => { const m = (Date.now() - new Date(iso).getTime()) / 60000;
                      if (m < 1) return 'now'; if (m < 60) return Math.floor(m) + ' min ago';
                      const h = m / 60; if (h < 24) return Math.floor(h) + (Math.floor(h) < 2 ? ' hr ago' : ' hrs ago');
                      return Math.floor(h / 24) + ' d ago'; };
                    return `<div style="display:flex;gap:12px;width:100%;">
                      <div style="width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex:none;background:${variables.sev_bg};">
                        <span class="ms" style="font-size:23px;color:${variables.sev_color};">local_laundry_service</span>
                      </div>
                      <div style="flex:1;min-width:0;text-align:left;">
                        <div style="display:flex;justify-content:space-between;gap:8px;align-items:baseline;">
                          <div style="font:700 17px Manrope;color:#e9e5dd;">Washer Done</div>
                          <div style="font:600 12px Manrope;color:#8b8980;white-space:nowrap;flex:none;">${rel(entity.last_changed)}</div>
                        </div>
                        <div style="font:600 14px Manrope;color:#a5a299;margin-top:3px;line-height:1.35;">Washer cycle recently completed</div>
                      </div></div>`;
                  ]]]
            - type: custom:button-card
              template: nspanel_base
              entity: binary_sensor.dryer_recently_completed
              visibility:
                - condition: state
                  entity: binary_sensor.dryer_recently_completed
                  state: 'on'
              tap_action:
                action: more-info
              variables: *alert_info
              styles: *alert_row_styles
              custom_fields:
                content: |
                  [[[
                    if (!entity) return '';
                    const rel = (iso) => { const m = (Date.now() - new Date(iso).getTime()) / 60000;
                      if (m < 1) return 'now'; if (m < 60) return Math.floor(m) + ' min ago';
                      const h = m / 60; if (h < 24) return Math.floor(h) + (Math.floor(h) < 2 ? ' hr ago' : ' hrs ago');
                      return Math.floor(h / 24) + ' d ago'; };
                    return `<div style="display:flex;gap:12px;width:100%;">
                      <div style="width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex:none;background:${variables.sev_bg};">
                        <span class="ms" style="font-size:23px;color:${variables.sev_color};">local_laundry_service</span>
                      </div>
                      <div style="flex:1;min-width:0;text-align:left;">
                        <div style="display:flex;justify-content:space-between;gap:8px;align-items:baseline;">
                          <div style="font:700 17px Manrope;color:#e9e5dd;">Dryer Done</div>
                          <div style="font:600 12px Manrope;color:#8b8980;white-space:nowrap;flex:none;">${rel(entity.last_changed)}</div>
                        </div>
                        <div style="font:600 14px Manrope;color:#a5a299;margin-top:3px;line-height:1.35;">Dryer cycle recently completed</div>
                      </div></div>`;
                  ]]]
            # ── Empty state ─────────────────────────────────────────
            - type: custom:button-card
              template: nspanel_base
              entity: sensor.notification_alert_counter
              visibility:
                - condition: numeric_state
                  entity: sensor.notification_alert_counter
                  below: 1
              styles:
                card:
                  - padding: 74px 0
                grid:
                  - display: flex
                  - flex-direction: column
                  - align-items: center
                  - justify-content: center
                  - gap: 11px
              custom_fields:
                glyph: '<span class="ms" style="font-size:56px;color:#7295b2;font-variation-settings:''FILL'' 1,''wght'' 400;">check_circle</span>'
                title: '<div style="font:800 20px Manrope;color:#e9e5dd;">All clear</div>'
                sub: '<div style="font:600 14px Manrope;color:#9a988f;">No active alerts</div>'
