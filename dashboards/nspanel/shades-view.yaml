title: Shades
path: shades
icon: mdi:roller-shade
background: '#16181a'
type: custom:grid-layout
layout:
  grid-template-columns: 480px
  margin: 0
  padding: 0
cards:
  - type: custom:button-card
    template: nspanel_screen
    styles:
      grid:
        - grid-template-areas: '"header" "body"'
        - grid-template-columns: 1fr
        - grid-template-rows: auto minmax(0,1fr)
      custom_fields:
        body:
          - min-height: 0
          - height: 100%
          - overflow-y: auto
    custom_fields:
      header:
        card:
          type: custom:button-card
          template: nspanel_header
          custom_fields:
            title: '<div style="font:800 24px Manrope;color:#e9e5dd;">Shades</div>'
      body:
        card:
          type: custom:button-card
          template: nspanel_base
          styles:
            card:
              - padding: 2px 16px 18px
            grid:
              - grid-template-areas: '"master" "g1" "g2" "g3" "g4" "g5"'
              - grid-template-columns: 1fr
              - grid-template-rows: auto auto auto auto auto auto
          custom_fields:
            # ── All Shades master card ──────────────────────────────
            master:
              card:
                type: custom:button-card
                template: nspanel_base
                entity: cover.first_floor_all
                triggers_update: &shade_groups
                  - cover.bedroom_side_shades
                  - cover.bedroom_back
                  - cover.front_guest_bedroom_shades
                  - cover.back_guest_bedroom_shades
                styles:
                  card:
                    - padding: 15px 16px
                    - background: '#2b2f34'
                    - border: 1px solid rgba(234,230,221,0.08)
                    - border-radius: 18px
                    - margin-bottom: 13px
                  grid:
                    - display: flex
                    - align-items: center
                    - gap: 13px
                  custom_fields:
                    info:
                      - flex: '1'
                      - min-width: 0
                custom_fields:
                  info: |
                    [[[
                      const g = ['cover.first_floor_all','cover.bedroom_side_shades','cover.bedroom_back',
                                 'cover.front_guest_bedroom_shades','cover.back_guest_bedroom_shades'];
                      const open = g.filter(id => {
                        const s = states[id]; if (!s) return false;
                        const p = s.attributes.current_position;
                        return p !== undefined ? p > 0 : s.state === 'open';
                      }).length;
                      return `<div style="display:flex;align-items:center;gap:13px;width:100%;">
                        <div style="width:44px;height:44px;border-radius:13px;background:rgba(234,230,221,.06);display:flex;align-items:center;justify-content:center;flex:none;">
                          <span class="ms" style="font-size:24px;color:#b4afa4;">blinds</span>
                        </div>
                        <div style="flex:1;min-width:0;text-align:left;">
                          <div style="font:700 18px Manrope;color:#e9e5dd;">All Shades</div>
                          <div style="font:600 13px Manrope;color:#9a988f;margin-top:2px;">${open} of ${g.length} open</div>
                        </div></div>`;
                    ]]]
                  openbtn:
                    card:
                      type: custom:button-card
                      template: nspanel_btn
                      tap_action:
                        action: perform-action
                        perform_action: cover.open_cover
                        target:
                          entity_id:
                            - cover.first_floor_all
                            - cover.bedroom_side_shades
                            - cover.bedroom_back
                            - cover.front_guest_bedroom_shades
                            - cover.back_guest_bedroom_shades
                      styles:
                        card:
                          - padding: 10px 15px
                          - border-radius: 12px
                          - background: rgba(114,149,178,0.16)
                          - border: 1px solid rgba(114,149,178,0.4)
                          - flex: none
                      custom_fields:
                        label: '<span style="font:700 14px Manrope;color:#a9c4dd;">Open</span>'
                  closebtn:
                    card:
                      type: custom:button-card
                      template: nspanel_btn
                      tap_action:
                        action: perform-action
                        perform_action: cover.close_cover
                        target:
                          entity_id:
                            - cover.first_floor_all
                            - cover.bedroom_side_shades
                            - cover.bedroom_back
                            - cover.front_guest_bedroom_shades
                            - cover.back_guest_bedroom_shades
                      styles:
                        card:
                          - padding: 10px 15px
                          - border-radius: 12px
                          - background: rgba(234,230,221,0.06)
                          - border: 1px solid rgba(234,230,221,0.1)
                          - flex: none
                      custom_fields:
                        label: '<span style="font:700 14px Manrope;color:#b4afa4;">Close</span>'
            # ── Per-group cards ─────────────────────────────────────
            g1:
              card:
                type: custom:button-card
                template: nspanel_base
                entity: cover.first_floor_all
                variables: { shade_name: First Floor }
                styles: &shade_card_styles
                  card:
                    - padding: 16px
                    - background: '#2b2f34'
                    - border: 1px solid rgba(234,230,221,0.08)
                    - border-radius: 18px
                    - margin-bottom: 11px
                  grid:
                    - grid-template-areas: '"head" "controls"'
                    - grid-template-columns: 1fr
                    - grid-template-rows: auto auto
                custom_fields:
                  head: &shade_card_head |
                    [[[
                      const p = entity.attributes.current_position;
                      const label = p === undefined ? entity.state : (p === 0 ? 'Closed' : (p === 100 ? 'Open' : p + '% open'));
                      return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;width:100%;">
                        <div style="font:700 18px Manrope;color:#e9e5dd;">${variables.shade_name}</div>
                        <div style="font:600 14px Manrope;color:#9a988f;">${label}</div>
                      </div>`;
                    ]]]
                  controls:
                    card:
                      type: custom:button-card
                      template: nspanel_base
                      styles: &shade_controls_styles
                        grid:
                          - display: flex
                          - align-items: center
                          - gap: 12px
                        custom_fields:
                          slider:
                            - flex: '1'
                            - min-width: 0
                      custom_fields:
                        down:
                          card:
                            type: custom:button-card
                            template: nspanel_btn
                            tap_action:
                              action: perform-action
                              perform_action: cover.close_cover
                              target:
                                entity_id: cover.first_floor_all
                            styles: &shade_arrow_styles
                              card:
                                - width: 44px
                                - height: 44px
                                - border-radius: 12px
                                - background: '#353a40'
                                - flex: none
                              grid:
                                - display: flex
                                - align-items: center
                                - justify-content: center
                                - height: 100%
                            custom_fields:
                              glyph: '<span class="ms ms-out" style="font-size:25px;color:#b4afa4;">keyboard_arrow_down</span>'
                        slider:
                          card:
                            type: custom:bubble-card
                            card_type: button
                            button_type: slider
                            entity: cover.first_floor_all
                            show_icon: false
                            show_name: false
                            show_state: false
                            slider_live_update: true
                            tap_action:
                              action: none
                            hold_action:
                              action: none
                            double_tap_action:
                              action: none
                            styles: &shade_slider_css |
                              ha-card { background: transparent !important; border: none !important; box-shadow: none !important;
                                height: 28px !important; overflow: visible !important; position: relative; }
                              ha-card::before { content: ''; position: absolute; left: 0; right: 0; top: 50%;
                                transform: translateY(-50%); height: 8px; border-radius: 999px; background: rgba(234,230,221,.09); }
                              .bubble-button-background { display: none !important; }
                              .bubble-button-card-container { background: transparent !important; height: 28px !important; }
                              .bubble-range-fill { position: absolute !important; left: 0 !important; top: 50% !important;
                                transform: translateY(-50%) !important; height: 8px !important; border-radius: 999px !important;
                                background: rgb(114,149,178) !important; overflow: visible !important; }
                              .bubble-range-fill::after { content: ''; position: absolute; right: -9px; top: 50%;
                                transform: translateY(-50%); width: 18px; height: 18px; border-radius: 50%;
                                background: rgb(233,229,221); box-shadow: 0 2px 6px rgba(0,0,0,.45); }
                              .bubble-icon-container, .bubble-name-container, .bubble-name, .bubble-state { display: none !important; }
                        up:
                          card:
                            type: custom:button-card
                            template: nspanel_btn
                            tap_action:
                              action: perform-action
                              perform_action: cover.open_cover
                              target:
                                entity_id: cover.first_floor_all
                            styles: *shade_arrow_styles
                            custom_fields:
                              glyph: '<span class="ms ms-out" style="font-size:25px;color:#b4afa4;">keyboard_arrow_up</span>'
            g2:
              card:
                type: custom:button-card
