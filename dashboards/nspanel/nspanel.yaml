title: NSPanel
kiosk_mode:
  non_admin_settings:
    hide_header: true
    hide_sidebar: true
    hide_search: true
    hide_assistant: true
  mobile_settings:
    hide_header: true
    hide_search: true
    hide_sidebar: false
    hide_overflow: true
button_card_templates:
  # Shared base: fonts, icon classes, pulse animation, scrollbar hiding.
  # Design tokens (NSPanel Pro 86, 480x480):
  #   bg #202327 · surface #2b2f34 · raised #353a40 · pillOff #363b41
  #   border rgba(234,230,221,.08) · neutralTint rgba(234,230,221,.06)
  #   text #e9e5dd · text2 #9a988f · iconNeutral #b4afa4 · dim #8b8980
  #   accent #7295b2 · accentLight #a9c4dd · accentTint rgba(114,149,178,.16)
  #   onAccent #f4f2ec · alert #c8805f · warning #cba14e
  nspanel_base:
    show_icon: false
    show_name: false
    show_state: false
    show_label: false
    tap_action:
      action: none
    styles:
      card:
        - box-shadow: none
        - border: none
        - border-radius: 0
        - margin: 0
        - padding: 0
        - background: transparent
        - overflow: visible
    extra_styles: |
      @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-25..0&display=block');
      @keyframes nsPulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
      ha-card { font-family: Manrope, system-ui, sans-serif; }
      ::-webkit-scrollbar { width: 0; height: 0; display: none; }
      * { scrollbar-width: none; box-sizing: border-box; }
      .ms { font-family: 'Material Symbols Rounded'; line-height: 1; -webkit-font-smoothing: antialiased; user-select: none; font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24; }
      .ms-out { font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24 !important; }
      .ms-bold { font-variation-settings: 'FILL' 1, 'wght' 600, 'GRAD' 0, 'opsz' 24 !important; }
      .pulse { animation: nsPulse 1.8s ease-in-out infinite; }
      .ell { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  # Tappable element: press feedback scale on :active
  nspanel_btn:
    template: nspanel_base
    styles:
      card:
        - cursor: pointer
    extra_styles: |
      @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-25..0&display=block');
      @keyframes nsPulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
      ha-card { font-family: Manrope, system-ui, sans-serif; transition: transform .08s; }
      ha-card:active { transform: scale(.96); }
      ::-webkit-scrollbar { width: 0; height: 0; display: none; }
      * { scrollbar-width: none; box-sizing: border-box; }
      .ms { font-family: 'Material Symbols Rounded'; line-height: 1; -webkit-font-smoothing: antialiased; user-select: none; font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24; }
      .ms-out { font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24 !important; }
      .ms-bold { font-variation-settings: 'FILL' 1, 'wght' 600, 'GRAD' 0, 'opsz' 24 !important; }
      .pulse { animation: nsPulse 1.8s ease-in-out infinite; }
      .ell { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  # The 480x480 screen root
  nspanel_screen:
    template: nspanel_base
    styles:
      card:
        - width: 480px
        - height: 480px
        - background: '#202327'
        - overflow: hidden
      grid:
        - height: 480px
  # 42x42 back button (top-left of every detail screen)
  nspanel_back:
    template: nspanel_btn
    tap_action:
      action: navigate
      navigation_path: /nspanel-dash/home
    styles:
      card:
        - width: 42px
        - height: 42px
        - border-radius: 12px
        - background: '#2b2f34'
        - border: 1px solid rgba(234,230,221,0.08)
        - flex: none
      grid:
        - display: flex
        - align-items: center
        - justify-content: center
        - height: 100%
    custom_fields:
      glyph: '<span class="ms ms-out" style="font-size:22px;color:#b4afa4;">arrow_back</span>'
  # Detail screen header row (back + title); title set per view
  nspanel_header:
    template: nspanel_base
    styles:
      card:
        - padding: 17px 18px 13px
      grid:
        - display: flex
        - align-items: center
        - gap: 13px
    custom_fields:
      back:
        card:
          type: custom:button-card
          template: nspanel_back
  # Home screen tile (2x3 grid)
  nspanel_tile:
    template: nspanel_btn
    styles:
      card:
        - background: '#2b2f34'
        - border: 1px solid rgba(234,230,221,0.08)
        - border-radius: 18px
        - padding: 13px 17px
        - height: 100%
        - width: 100%
        - overflow: hidden
      grid:
        - display: flex
        - align-items: center
        - justify-content: flex-start
        - height: 100%
      custom_fields:
        content:
          - width: 100%
          - min-width: 0
views:
  - !include home-view.yaml
  - !include scenes-view.yaml
  - !include music-view.yaml
  - !include shades-view.yaml
  - !include security-view.yaml
  - !include sprinklers-view.yaml
  - !include alerts-view.yaml
  - !include pool-view.yaml
  - !include settings-view.yaml
