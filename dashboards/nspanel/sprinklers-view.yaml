title: Sprinklers
path: sprinklers
icon: mdi:sprinkler-variant
background: '#16181a'
type: custom:grid-layout
layout:
  grid-template-columns: 480px
  margin: 0
  padding: 0
cards:
  - type: custom:button-card
    template: nspanel_screen
    styles:
      grid:
        - grid-template-areas: '"header" "body"'
        - grid-template-columns: 1fr
        - justify-items: stretch
        - align-items: stretch
        - grid-template-rows: auto minmax(0,1fr)
      custom_fields:
        body:
          - min-height: 0
          - height: 100%
          - overflow-y: auto
    custom_fields:
      header:
        card:
          type: custom:button-card
          template: nspanel_header
          custom_fields:
            title: '<div style="font:800 24px Manrope;color:#e9e5dd;">Sprinklers</div>'
      body:
        card:
          type: custom:button-card
          template: nspanel_base
          styles:
            card:
              - padding: 2px 16px 18px
            grid:
              - grid-template-areas: '"running" "idle" "zoneslabel" "z1" "z2" "z3" "z4" "z5" "z6" "z7"'
              - grid-template-columns: 1fr
              - justify-items: stretch
              - align-items: stretch
          custom_fields:
            # ── Watering now (any Rachio zone on) ───────────────────
            running:
              card:
                type: custom:button-card
                template: nspanel_base
                entity: switch.pool_180s
                triggers_update: &zone_list
                  - switch.front_180s
                  - switch.front_and_side_90s
                  - switch.pool_90s
                  - switch.pool_shrubs
                  - switch.firepit_shrubs
                  - switch.retaining_wall_drip
                styles:
                  card:
                    - display: &any_zone_on |
                        [[[
                          const z = ['switch.front_180s','switch.front_and_side_90s','switch.pool_180s',
                                     'switch.pool_90s','switch.pool_shrubs','switch.firepit_shrubs','switch.retaining_wall_drip'];
                          return z.some(id => states[id] && states[id].state === 'on') ? 'block' : 'none';
                        ]]]
                    - padding: 18px
                    - background: rgba(114,149,178,.10)
                    - border: 1px solid rgba(114,149,178,.3)
                    - border-radius: 18px
                    - margin-bottom: 14px
                  grid:
                    - grid-template-areas: '"info" "stop"'
                    - grid-template-columns: 1fr
                    - justify-items: stretch
                    - align-items: stretch
                custom_fields:
                  info: |
                    [[[
                      const zones = [['switch.front_180s','Front 180s'],['switch.front_and_side_90s','Front & Side 90s'],
                        ['switch.pool_180s','Pool 180s'],['switch.pool_90s','Pool 90s'],['switch.pool_shrubs','Pool Shrubs'],
                        ['switch.firepit_shrubs','Firepit Shrubs'],['switch.retaining_wall_drip','Retaining Wall Drip']];
                      const on = zones.filter(z => states[z[0]] && states[z[0]].state === 'on');
                      const first = on.length ? on[0][1] : '';
                      return `<div style="display:flex;align-items:center;gap:12px;width:100%;">
                        <div style="width:44px;height:44px;border-radius:13px;background:rgba(114,149,178,.2);display:flex;align-items:center;justify-content:center;flex:none;">
                          <span class="ms pulse" style="font-size:24px;color:#7295b2;animation-duration:1.6s;">water_drop</span>
                        </div>
                        <div style="flex:1;min-width:0;text-align:left;">
                          <div style="font:700 18px Manrope;color:#9cbdd9;">Watering now</div>
                          <div class="ell" style="font:600 14px Manrope;color:#9a988f;margin-top:2px;">${first}</div>
                        </div>
                        <div style="text-align:right;flex:none;">
                          <div style="font:800 24px Manrope;color:#e9e5dd;font-variant-numeric:tabular-nums;">${on.length}</div>
                          <div style="font:600 12px Manrope;color:#9a988f;">zone${on.length === 1 ? '' : 's'} on</div>
                        </div>
                      </div>`;
                    ]]]
                  stop:
                    card:
                      type: custom:button-card
                      template: nspanel_btn
                      tap_action:
                        action: perform-action
                        perform_action: switch.turn_off
                        target:
                          entity_id: &all_zones
                            - switch.front_180s
                            - switch.front_and_side_90s
                            - switch.pool_180s
                            - switch.pool_90s
                            - switch.pool_shrubs
                            - switch.firepit_shrubs
                            - switch.retaining_wall_drip
                      styles:
                        card:
                          - margin-top: 16px
                          - height: 52px
                          - border-radius: 14px
                          - background: '#7295b2'
                        grid:
                          - display: flex
                          - align-items: center
                          - justify-content: center
                          - gap: 8px
                          - height: 100%
                      custom_fields:
                        glyph: '<span class="ms ms-bold" style="font-size:23px;color:#f4f2ec;">stop</span>'
                        label: '<span style="font:800 17px Manrope;color:#f4f2ec;">Stop watering</span>'
            # ── Idle card ───────────────────────────────────────────
            idle:
              card:
                type: custom:button-card
                template: nspanel_base
                entity: switch.pool_180s
                triggers_update: *zone_list
                styles:
                  card:
                    - display: |
                        [[[
                          const z = ['switch.front_180s','switch.front_and_side_90s','switch.pool_180s',
                                     'switch.pool_90s','switch.pool_shrubs','switch.firepit_shrubs','switch.retaining_wall_drip'];
                          return z.some(id => states[id] && states[id].state === 'on') ? 'none' : 'block';
                        ]]]
                    - padding: 18px
                    - background: '#2b2f34'
                    - border: 1px solid rgba(234,230,221,0.08)
                    - border-radius: 18px
                    - margin-bottom: 14px
                  grid:
                    - display: flex
                    - align-items: center
                    - gap: 12px
                  custom_fields:
                    info:
                      - flex: '1'
                      - min-width: 0
                custom_fields:
                  info: |
                    [[[
                      return `<div style="display:flex;align-items:center;gap:12px;width:100%;">
                        <div style="width:44px;height:44px;border-radius:13px;background:rgba(234,230,221,.06);display:flex;align-items:center;justify-content:center;flex:none;">
                          <span class="ms" style="font-size:24px;color:#8b8980;">pause_circle</span>
                        </div>
                        <div style="flex:1;min-width:0;text-align:left;">
                          <div style="font:700 18px Manrope;color:#e9e5dd;">Not watering</div>
                          <div style="font:600 14px Manrope;color:#9a988f;margin-top:2px;">All zones idle</div>
                        </div></div>`;
                    ]]]
                  runbtn:
                    card:
                      type: custom:button-card
                      template: nspanel_btn
                      tap_action:
                        action: perform-action
                        perform_action: rachio.start_multiple_zone_schedule
                        target:
                          entity_id: *all_zones
                        data:
                          duration: 5
                      styles:
                        card:
                          - padding: 12px 17px
                          - border-radius: 12px
                          - background: rgba(114,149,178,0.16)
                          - border: 1px solid rgba(114,149,178,0.4)
                          - flex: none
                      custom_fields:
                        label: '<span style="font:700 15px Manrope;color:#a9c4dd;">Run 5 min</span>'
            zoneslabel:
              card:
                type: custom:button-card
                template: nspanel_base
                styles:
                  card:
                    - margin: 6px 2px 10px
                  grid:
                    - display: flex
                    - justify-content: flex-start
                custom_fields:
                  label: '<div style="font:700 13px Manrope;color:#8b8980;letter-spacing:.4px;text-transform:uppercase;">Zones</div>'
            z1:
              card:
                type: custom:button-card
                template: nspanel_base
                entity: switch.front_180s
                variables: { zone_name: Front 180s }
                styles: &zone_row_styles
                  card:
                    - padding: 14px
                    - background: '#2b2f34'
                    - border: 1px solid rgba(234,230,221,0.08)
                    - border-radius: 14px
                    - margin-bottom: 9px
                  grid:
                    - display: flex
                  custom_fields:
                    content:
                      - width: 100%
                custom_fields:
                  content: &zone_row_content |
                    [[[
                      const on = entity && entity.state === 'on';
                      const c = on ? '#7295b2' : '#8b8980';
                      const bg = on ? 'rgba(114,149,178,0.14)' : 'rgba(234,230,221,0.06)';
                      return `<div style="display:flex;align-items:center;gap:12px;width:100%;">
                        <span class="ms" style="font-size:21px;color:${c};">water_drop</span>
                        <div style="flex:1;font:700 16px Manrope;color:#e9e5dd;text-align:left;">${variables.zone_name}</div>
                        <div style="font:700 12px Manrope;letter-spacing:.3px;color:${c};background:${bg};padding:6px 12px;border-radius:999px;">${on ? 'Running' : 'Idle'}</div>
                      </div>`;
                    ]]]
            z2:
              card:
                type: custom:button-card
                template: nspanel_base
                entity: switch.front_and_side_90s
                variables: { zone_name: Front & Side 90s }
                styles: *zone_row_styles
                custom_fields:
                  content: *zone_row_content
            z3:
              card:
                type: custom:button-card
                template: nspanel_base
                entity: switch.pool_180s
                variables: { zone_name: Pool 180s }
                styles: *zone_row_styles
                custom_fields:
                  content: *zone_row_content
            z4:
              card:
                type: custom:button-card
                template: nspanel_base
                entity: switch.pool_90s
                variables: { zone_name: Pool 90s }
                styles: *zone_row_styles
                custom_fields:
                  content: *zone_row_content
            z5:
              card:
                type: custom:button-card
                template: nspanel_base
                entity: switch.pool_shrubs
                variables: { zone_name: Pool Shrubs }
                styles: *zone_row_styles
                custom_fields:
                  content: *zone_row_content
            z6:
              card:
                type: custom:button-card
                template: nspanel_base
                entity: switch.firepit_shrubs
                variables: { zone_name: Firepit Shrubs }
                styles: *zone_row_styles
                custom_fields:
                  content: *zone_row_content
            z7:
              card:
                type: custom:button-card
                template: nspanel_base
                entity: switch.retaining_wall_drip
                variables: { zone_name: Retaining Wall Drip }
                styles: *zone_row_styles
                custom_fields:
                  content: *zone_row_content
