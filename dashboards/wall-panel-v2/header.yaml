card:
  type: custom:button-card
  styles:
    card:
      - border-radius: 0px
      - padding-bottom: 8px
      - padding-left: 0px
      - margin: 0px
      - padding-top: 0px
      - height: 75px
      - width: 1024px
      - background-color: black
    grid:
      - grid-template-areas: |
          "time alarm notifications riv bmw vent cleaner dinner guest temp"
      - grid-template-columns: 200px 250px 63px 88px 88px 50px 50px 50px 50px 137px
      - grid-template-rows: 75px
      - align-items: center
      - justify-items: start
      - column-gap: 5px
    custom_fields:
      time:
        - margin-left: 10px
  custom_fields:
    time:
      card:
        type: custom:button-card
        entity: sensor.time
        show_icon: false
        show_label: false
        show_name: false
        show_state: true
        tap_action:
          action: navigate
          navigation_path: /living-room-wall-panel-dash/home-view
        state_display: |
          [[[
            var timeString = states['sensor.time'].state;
            return new Date('1970-01-01T' + timeString + ':00').toLocaleTimeString([], {hour: 'numeric', minute:'2-digit'});
          ]]]       
        styles:
          card:
            - border-radius: 0px
            - align-self: center
            - justify-self: start
            - background: transparent
          state:
            - font-size: 28px
            - font-weight: bold
            - padding-left: 5px
    alarm:
      card:
        type: custom:button-card
        entity: alarm_control_panel.alarmo
        layout: icon_state
        show_icon: true
        show_label: false
        show_name: false
        show_state: true
        state_display: |
          [[[
            var state = states['alarm_control_panel.alarmo'].state;
            if (state === 'armed_away') return 'Armed';
            if (state === 'armed_home') return 'Armed';
            if (state === 'armed_vacation') return 'Armed';
            if (state === 'armed_night') return 'Armed';
            if (state === 'disarmed') return 'Disarmed';
            if (state === 'pending') return 'Enter Code';
            if (state === 'arming') return 'Arming';
            if (state === 'triggered') return 'ALARM!';
            return state.charAt(0).toUpperCase() + state.slice(1);
          ]]]
        styles:
          icon:
            - width: 38px
            - height: 38px
            - color: |
                [[[
                  var state = states['alarm_control_panel.alarmo'].state;
                  if (state === 'triggered') return 'red';
                  if (state === 'armed_away' || state === 'armed_home' || state === 'armed_vacation') return 'orange';
                  if (state === 'pending' || state === 'arming') return 'orange';
                  if (state === 'disarmed') return 'var(--primary-text-color)';
                  return 'var(--primary-text-color)';
                ]]]
          state:
            - font-size: 27px
            - font-weight: bold
            - justify-self: start
          grid:
            - column-gap: 5px
            - grid-template-columns: 50px auto
          img_cell:
            - align-self: center
            - justify-content: start
          card:
            - border-radius: 0px
            - align-self: center
            - justify-self: start
            - background: transparent
        tap_action:
          action: navigate
          navigation_path: /living-room-wall-panel-dash/security-view
    notifications:
      card:
        type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.notification_alert_counter
            above: 0
        card:
          type: custom:button-card
          entity: sensor.notification_alert_counter
          icon: >
            [[[
              const priority = states['sensor.notification_icon_priority'].state;
              if (priority === 'critical') return 'mdi:alert';
              if (priority === 'warning') return 'mdi:bell-alert';
              return 'mdi:bell';
            ]]]
          layout: icon_state
          show_icon: true
          show_label: false
          show_name: false
          show_state: true
          tap_action:
            action: navigate
            navigation_path: /mudroom-wall-panel-dash/notifications-view
          styles:
            state:
              - font-size: 24px
              - font-weight: bold
              - justify-self: start
            grid:
              - column-gap: 2px
              - grid-template-columns: 50px auto
            img_cell:
              - align-self: center
              - justify-content: end
            icon:
              - width: 38px
              - height: 38px
              - padding-left: 3px
              - color: >
                  [[[
                    const priority = states['sensor.notification_icon_priority'].state;
                    if (priority === 'critical') return '#EA4D3D';  // Red - power outage, alarm triggered
                    if (priority === 'warning') return '#FF8C00';   // Orange - weather alerts, storm watch
                    return 'var(--primary-text-color)';             // Default when no high-priority notifications
                  ]]]
            card:
              - border-radius: 5px
              - padding: 2px
              - align-self: center
              - justify-self: center
              - background: transparent
    vent: 
      card:
        type: conditional
        conditions:
          - entity: switch.utility_room_ventilation_damper
            state: 'on'
        card: 
          type: custom:button-card
          entity: switch.utility_room_ventilation_damper
          icon: mdi:tailwind
          show_icon: true
          show_label: false
          show_name: false
          show_state: false
          tap_action:
            action: toggle
          styles:
            icon:
              - width: 38px
              - height: 38px
              - color: var(--accent-color)
            img_cell:
              - align-self: center
              - justify-content: center
            card:
              - border-radius: 5px
              - align-self: center
              - justify-self: center
              - background: transparent 
    dinner: 
      card:
        type: conditional
        conditions:
          - entity: input_boolean.dinner_party
            state: 'on'
        card: 
          type: custom:button-card
          entity: input_boolean.dinner_party
          icon: mdi:glass-cocktail
          show_icon: true
          show_label: false
          show_name: false
          show_state: false
          tap_action:
            action: toggle
          styles:
            icon:
              - width: 38px
              - height: 38px
              - color: var(--primary-text-color)
            img_cell:
              - align-self: center
              - justify-content: center
            card:
              - border-radius: 5px
              - align-self: center
              - justify-self: center
              - background: transparent 
    guest: 
      card:
        type: conditional
        conditions:
          - entity: input_boolean.guest_mode
            state: 'on'  
        card: 
          type: custom:button-card
          entity: input_boolean.guest_mode
          icon: mdi:bed
          show_icon: true
          show_label: false
          show_name: false
          show_state: false
          tap_action:
            action: toggle
          styles:
            icon:
              - width: 38px
              - height: 38px
              - color: var(--primary-text-color)
            img_cell:
              - align-self: center
              - justify-content: center
            card:
              - border-radius: 5px
              - align-self: center
              - justify-self: center
              - background-color: black
    cleaner: 
      card:
        type: conditional
        conditions:
          - entity: input_boolean.cleaners_mode
            state: 'on'  
        card: 
          type: custom:button-card
          entity: input_boolean.cleaners_mode
          icon: mdi:spray-bottle
          show_icon: true
          show_label: false
          show_name: false
          show_state: false
          tap_action:
            action: toggle
          styles:
            icon:
              - width: 38px
              - height: 38px
              - color: var(--primary-text-color)
            img_cell:
              - align-self: center
              - justify-content: center
            card:
              - border-radius: 5px
              - align-self: center
              - justify-self: center
              - background: transparent
    riv:
      card:
        type: conditional
        conditions:
          - condition: state
            entity: binary_sensor.r1t_charging_status
            state: 'on'
        card:
          type: custom:mushroom-chips-card
          chips:
            type: template
            icon: mdi:ev-plug-type2
            entity: sensor.r1t_charging_time_remaining
            icon_color: var(--accent-color-2)
            content: >
              {{ (now() + timedelta(minutes=states('sensor.r1t_charging_time_remaining')|int(0))).strftime('%-I:%M %p') }}
            tap_action:
              action: more-info
              entity: sensor.r1t_battery_state_of_charge
            card_mod:
              style: |
                :host {
                  zoom: 1.25 !important;
                  --chip-background: transparent;
                }
    bmw:
      card:
        type: conditional
        conditions:
          - condition: state
            entity: sensor.wall_charger_charging_status
            state: 'charging'
        card:
          type: custom:mushroom-chips-card
          chips:
            type: template
            icon: mdi:ev-plug-type2
            icon_color: var(--accent-color)
            content: "Charging"
            card_mod:
              style: |
                :host {
                  zoom: 1.25 !important;
                  --chip-background: transparent;
                }
    temp:
      card:
        type: custom:button-card
        entity: sensor.bayberry_tempest_temperature
        show_icon: true
        layout: icon_state
        show_state: true
        show_label: false
        show_name: false
        state_display: |
          [[[
            var temp = states['sensor.bayberry_tempest_temperature'].state;
            return Math.round(temp) + '°F';
          ]]]
        tap_action:
          action: navigate
          navigation_path: /mudroom-wall-panel-dash/weather-view
        styles:
          state:
            - font-size: 27px
            - font-weight: bold
            - justify-self: start
          icon:
            - width: 38px
            - height: 38px
          grid:
            - column-gap: 5px
            - grid-template-columns: 50px auto
          img_cell:
            - align-self: center
            - justify-content: end
          card:
            - border-radius: 0px
            - align-self: center
            - justify-self: end
            - background: transparent