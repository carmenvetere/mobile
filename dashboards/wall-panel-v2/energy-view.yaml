# lovelace_gen
title: Energy
path: energy-view
theme: Wall Panel
type: custom:grid-layout
cards:
  - type: custom:button-card
    styles:
      card:
        - border-radius: 0px
        - padding-bottom: 5px
        - padding-left: 0px
        - padding-top: 0px
        - margin-left: -4px
        - margin-top: -4px        
        - width: 2048px
        - height: 1536px
        - background: radial-gradient(circle,rgba(85, 89, 92, 1) 0%, rgba(0, 0, 0, 1) 85%);
      grid:
        - grid-template-areas: |
            "header header"
            "main1 main2"
            "nav nav"
        - grid-template-columns: 1019px 1019px
        - grid-template-rows: 150px 1206px 150px
        - align-items: start
        - column-gap: 10px
        - row-gap: 15px
      custom_fields:
        main1:
          - margin-left: 50px
        main2:
          - margin-right: 50px
          - height: 100%
    custom_fields:
      header: !include header.yaml
      main1: 
        card: 
          type: vertical-stack 
          cards: 
            - type: custom:bubble-card
              visibility:
                  - condition: state
                    entity: binary_sensor.bayberry_grid_status
                    state: "off"
              card_type: button
              button_type: state
              sub_button:
                main:
                  - entity: sensor.powerwall_discharge_time
                    show_state: true
                    show_icon: false
                bottom: []
              slider_fill_orientation: left
              slider_value_position: right
              entity: sensor.powerwall_discharge_time
              name: "Powerwall Remaining:"
              show_state: false
              modules:
                - wall_panel_scenes
            - type: custom:button-card
              styles:
                card:
                - height: 230px
                - width: 900px
                - margin-top: 0px
                - padding-top: 0px
                - background: transparent 
                grid:
                - grid-template-areas: |
                    "button1 button2"
                - grid-template-columns: 445px 445px
                - grid-template-rows: 230px
                - align-items: start
                - column-gap: 10px
              custom_fields: 
                button1: 
                  card: 
                    type: custom:bubble-card
                    card_type: button
                    button_type: name
                    tap_action:
                      action: navigate
                      navigation_path: '#powerwall-reserve'
                    sub_button:
                      main:
                        - entity: sensor.bayberry_charge
                          show_state: true
                          show_icon: false
                      bottom: []
                    slider_fill_orientation: left
                    slider_value_position: right
                    entity: sensor.bayberry_charge
                    show_state: false
                    modules:
                      - wall_panel_energy_gauge
                    show_name: false
                    scrolling_effect: false
                button2:
                  card:
                    type: custom:bubble-card
                    card_type: button
                    button_type: state
                    icon: mdi:transmission-tower-import
                    sub_button:
                      main:
                        - entity: sensor.net_grid_export_ytd
                          show_state: true
                          show_icon: false
                      bottom: []
                    slider_fill_orientation: left
                    slider_value_position: right
                    entity: sensor.net_grid_export_ytd
                    show_state: false
                    modules:
                      - wall_panel_energy_gauge
                    show_name: false
                    scrolling_effect: false                  
            - type: custom:bubble-card
              card_type: button
              button_type: state
              sub_button:
                main:
                  - entity: sensor.bayberry_home_usage
                    show_state: true
                    show_icon: false
                bottom: []
              slider_fill_orientation: left
              slider_value_position: right
              entity: sensor.bayberry_home_usage
              name: Today's Energy Used
              show_state: false
              modules:
                - wall_panel_scenes
            - type: custom:bubble-card
              card_type: button
              button_type: state
              sub_button:
                main:
                  - entity: sensor.solcast_pv_forecast_forecast_today
                    show_state: true
                    show_icon: false
                bottom: []
              slider_fill_orientation: left
              slider_value_position: right
              entity: sensor.solcast_pv_forecast_forecast_today
              name: Today's Solar Forecast
              show_state: false
              modules:
                - wall_panel_scenes
            - type: custom:bubble-card
              card_type: button
              button_type: state
              sub_button:
                main:
                  - entity: number.bayberry_backup_reserve
                    show_state: true
                    show_icon: false
                bottom: []
              slider_fill_orientation: left
              slider_value_position: right
              entity: number.bayberry_backup_reserve
              name: Powerwall Backup Reserve
              show_state: false
              tap_action:
                action: navigate
                navigation_path: '#powerwall-reserve'
              modules:
                - wall_panel_scenes
      main2: 
        card:
          type: custom:stack-in-card
          mode: vertical
          card_mod:
            style: |
              ha-card {
                background: var(--background-color) !important;
                border-radius: 20px;
                padding: 3px 12px 4px;
                height: 100% !important;
                }
          cards:
            - type: vertical-stack
              cards:
                - type: custom:bubble-card
                  card_type: separator
                  name: Live Power Flow
                  icon: mdi:lightning-bolt
                  styles: |
                    .bubble-name {
                    font-size: 48px !important;  /* title */
                    font-weight: bold !important;
                    }
                    .bubble-line {
                    background: var(--primary-text-color);
                    opacity: 0.1;
                    }
                    .card-content {
                    padding-top: 25px !important;
                    padding-left: 10px !important;
                    margin-right: 50px !important;
                    }  
                - type: custom:power-flow-card-plus
                  clickable_entities: false
                  card_mod:
                    style: |
                      ha-card {
                        font-size: 44px !important;
                        background: transparent !important;
                        zoom: 1.8 !important;
                      }
                      ha-card .card-header {
                        text-align: left !important;
                        font-size: 48px !important;
                        font-weight: bold !important;
                      }
                      ha-card * {
                        font-size: 36px !important;
                        font-weight: bold !important;
                      }
                      ha-card .card-content {
                        padding-top: 125px !important;
                      }
                      ha-card .value,
                      ha-card [class*="value"],
                      ha-card .power-value {
                        font-size: 36px !important;
                        font-weight: bold !important;
                      }

                      ha-card .label,
                      ha-card [class*="label"],
                      ha-card .entity-name {
                        font-size: 36px !important;
                        font-weight: bold !important;
                        color: var(--primary-text-color) !important;
                      }

                      ha-card .individual *,
                      ha-card [class*="individual"] * {
                        font-size: 36px !important;
                      }

                      ha-card .secondary,
                      ha-card [class*="secondary"] {
                        font-size: 36px !important;
                        opacity: 0.8;
                      }
                  entities:
                    battery:
                      entity: sensor.bayberry_battery_power
                      state_of_charge: sensor.bayberry_charge
                      color:
                        consumption: '#8ba680'
                        production: '#8ba680'
                      color_icon: true
                      show_state_of_charge: false
                    grid:
                      entity: sensor.bayberry_site_power
                      color_icon: false
                      color:
                        consumption: var(--primary-text-color)
                        production: var(--primary-text-color)
                        color_value: true
                      power_outage:
                        icon_alert: mdi:flash-alert
                      use_metadata: false
                      invert_state: false
                      color_value: false
                    solar:
                      entity: sensor.bayberry_solar_power
                      color_icon: false
                      color: "#dd8e02"
                    home:
                      entity: sensor.bayberry_load_power
                      subtract_individual: true
                    individual:
                      - entity: sensor.wall_charger_power
                        display_zero: false
                        name: Car Charging
                        icon: mdi:car-electric
                        color: '#E74C3C'
                      - entity: sensor.well_pump_power
                        name: Well Pump
                        color: '#3ea4f0'
                        color_value: false
                        display_zero: false
                        icon: mdi:sprinkler-variant
                      - entity: sensor.omnilogic_pool_filter_pump_power
                        name: Pool Filter
                        color: '#5cb5e1'
                        color_value: false
                        display_zero: false
                        icon: mdi:pool
                  display_zero_lines:
                    mode: show
                    transparency: 50
                    grey_color:
                      - 189
                      - 189
                      - 189
      nav: !include footer-menu.yaml
#Powerwall Reserve Pop-Up
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: "#powerwall-reserve"
        button_type: name
        sub_button:
          main: []
          bottom: []
        name: Powerwall Backup Reserve
        icon: mdi:battery-50
        rows: 2
        scrolling_effect: false
        styles: |
          .bubble-name {
            font-size: 48px !important;
            line-height: 1.1;
            margin-bottom: 30px !important;
            }

          .bubble-button-card-container {
            border-radius: 30px !important;
            background-color: transparent !important;
            min-height: 100px !important;
            }

          .bubble-button-background {
            background-color: transparent !important;
            }
            
          .bubble-icon-container {
            background-color: transparent !important;
            margin-bottom: 30px !important;
            }
            
          .bubble-icon {
            --mdc-icon-size: 36px !important;
            }
        card_layout: large
        width_desktop: 25%
        bg_opacity: "100"
        bg_color: var(-—background-color-2)
        modules:
        - pop-up-module
      - type: custom:bubble-card
        card_type: button
        button_type: slider
        sub_button:
          main: []
          bottom:
            - entity: number.bayberry_backup_reserve
              show_state: true
              show_background: false
              force_icon: false
              scrolling_effect: false
              show_icon: false
        entity: number.bayberry_backup_reserve
        slider_fill_orientation: bottom
        styles: |
          .bubble-button-card-container {
            border-radius: 30px !important;
            background-color: var(--background-color) !important;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.06)
              !important;
            min-height: 500px !important;
            max-width: 100px !important;
            margin: 0 auto !important;
            }
          .bubble-sub-button { 
            font-size: 22px !important;
            font-weight: bold; 
            margin-top: 27px;
            color: var(--text-color) !important;
            }
          .bubble-range-fill {
            background: var(--accent-color) !important;
            }
          .bubble-range-slider {
          background: var(--background-color) !important;
          }
        scrolling_effect: false
        show_icon: false
        show_name: false
        invert_slider_value: false
