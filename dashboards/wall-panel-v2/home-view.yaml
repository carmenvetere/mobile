# lovelace_gen
title: Home
path: home-view
theme: Wall Panel
type: custom:grid-layout
cards:
  - type: custom:button-card
    styles:
      card:
        - border-radius: 0px
        - padding-bottom: 5px
        - padding-left: 0px
        - padding-top: 0px
        - margin-left: -2px
        - margin-top: -2px
        - width: 1024px
        - height: 768px
        - background: radial-gradient(circle,rgba(85, 89, 92, 1) 0%, rgba(0, 0, 0, 1) 85%);
      grid:
        - grid-template-areas: |
            "header header"
            "main1 main2"
            "nav nav"
        - grid-template-columns: 510px 510px
        - grid-template-rows: 75px 603px 75px
        - align-items: start
        - column-gap: 5px
        - row-gap: 8px
      custom_fields:
        main1:
          - margin-left: 25px
          - margin-right: 25px
    custom_fields:
      header: !include header.yaml
      main2:
        card: 
          type: custom:stack-in-card
          mode: vertical
          keep:
            margin: false
            outer_padding: false
            inner_padding: false
            background: true
            box_shadow: true
            border_radius: true
          card_mod:
            style: |
              ha-card {
                background: var(--background-color) !important;
                }
          cards:
            # === Speaker selector dropdown ===
            - type: custom:bubble-card
              card_type: select
              entity: input_select.sonos_speaker_select
              sub_button:
                main: []
                bottom: []
              scrolling_effect: false
              show_state: true
              show_name: false
              show_icon: false
              card_mod:
                style: |
                  .bubble-select-container {
                    border-radius: 10px 10px 0px 0px !important;
                    font-size: 21px !important;
                    font-weight: 600 !important;
                    color: var(--primary-text-color) !important;
                    margin-left: 10px !important;
                    margin-right: 10px !important;
                    max-width: 96% !important;
                  }
                  .bubble-state {
                    font-size: 20px !important;
                    font-weight: bold !important;
                    line-height: 1.1 !important;
                    text-align: center !important;
                    }
                  .bubble-select-card-container {
                    border-radius: 8px 8px 0 0 !important;
                    background-color: var(--background-color) !important;
                    margin-left: 10px !important;
                    margin-right: 10px !important;
                    margin-bottom: 0px !important;
                    max-width: 96% !important;
                    }
              rows: 1.3
            # === Sonos card ===
            - type: custom:config-template-card
              variables:
                - >
                  states['input_select.sonos_speaker_select'].state === 'Living Room'
                    ? 'media_player.living_room'
                    : states['input_select.sonos_speaker_select'].state === 'Kitchen'
                      ? 'media_player.kitchen'
                      : 'media_player.deck'
                - new Date().getMonth() + 1
              entities:
                - input_select.sonos_speaker_select
                - media_player.living_room
                - media_player.kitchen
                - media_player.deck
              card:
                type: custom:sonos-card
                entityId: "${vars[0]}"
                sections:
                  - player
                  - volumes
                  - media browser
                  - groups
                  - grouping
                startSection: player
                player:
                  artworkAsBackground: false
                  artworkAsBackgroundBlur: 0
                  artworkBorderRadius: 10
                  artworkMinHeight: 3
                  controlsLargeIcons: true
                  hideControlRepeatButton: true
                  hideControlShuffleButton: true
                  hideEntityName: true
                  showVolumeUpAndDownButtons: true
                  volumeSliderHeight: 3
                mediaBrowser:
                  hideHeader: false
                  onlyFavorites: true
                  itemsPerRow: 1
                  favorites:
                    exclude: null
                    topItems: []
                    hideTitleForThumbnailIcons: false
                    sortByType: true
                    hideSonosFavorites: true
                    customFavorites:
                      all: !include /config/dashboards/modules/custom-favorites.yaml
                heightPercentage: 93
                footerHeight: 8
                sectionButtonIconSize: 5
                groups:
                  title: Speaker Groups
                  backgroundColor: "#C0C4C5"
                  compact: false
                  speakersFontSize: 1.5
                  titleFontSize: 1
                grouping:
                  skipApplyButton: true
                predefinedGroups:
                  - name: First Floor
                    media: ""
                    entities:
                      - player: media_player.living_room
                        volume: 12
                      - player: media_player.kitchen
                        volume: 12
                  - name: First Floor + Deck
                    media: ""
                    entities:
                      - player: media_player.living_room
                        volume: 12
                      - player: media_player.kitchen
                        volume: 12
                      - player: media_player.deck
                        volume: 25
                card_mod:
                  refresh_interval: 2
                  style:
                    .: |
                      :host {
                        --mdc-icon-color: var(--text-color) !important;
                        --secondary-text-color: var(--secondary-text-color) !important;
                        --paper-item-icon-color: var(--secondary-text-color) !important;
                        --mdc-theme-primary: var(--primary-text-color) !important;
                        --mdc-icon-button-ink-color: var(--secondary-text-color) !important;
                      }
                      ha-card {
                        margin-left: 5px !important;
                        margin-right: 5px !important;
                        margin-top: 0px !important;
                        max-width: 96% !important;
                        max-height: 96% !important;
                        background-color: var(--background-color) !important;
                        border-radius: 0 0 8px 8px !important;
                      }
                      ha-control-slider {
                        --control-slider-color: var(--primary-text-color) !important;
                      }
                    sonos-player$ sonos-player-header$: |
                      .song {
                        color: var(--primary-text-color) !important;
                        font-size: 24px !important;
                        font-weight: bold !important;
                      }
                      .artist-album {
                        color: var(--primary-text-color) !important;
                        font-size: 24px !important;
                        font-weight: 500 !important;
                      }
                    sonos-player$ sonos-player-header$ sonos-progress$: |
                      .progress {
                        color: var(--primary-text-color) !important;
                        font-size: 14px !important;
                        font-weight: bold !important;
                        --paper-progress-active-color: var(--primary-text-color) !important;
                      }
                      .progress-bar {
                        background-color: var(--primary-text-color) !important;
                      }
                    sonos-player$ sonos-player-controls$: |
                      ha-icon-button {
                        --mdc-icon-size: 40px !important;
                        width: 40px !important;
                        height: 40px !important;
                      }
                    sonos-player$ sonos-player-controls$ sonos-volume$: |
                      .volume-level {
                        font-size: 14px !important;
                        font-weight: bold !important;
                      }
                      .volume-slider {
                        --control-slider-thickness: 75px !important;
                      }
                    sonos-media-browser$: |
                      .header {
                        font-size: 18px !important;
                        font-weight: bold !important;
                        padding-top: 5px !important;
                        background-color: var(--background-color) !important;
                      }
                      .title {
                        font-size: 18px !important;
                        font-weight: bold !important;
                        padding-top: 5px !important;
                      }
                    sonos-media-browser$ sonos-favorites-icons$: |
                      .icons {
                        padding-top: 10px !important;
                      }
                      .thumbnail {
                        display: none !important;
                        height: 0 !important;
                        padding: 0 !important;
                        margin: 0 !important;
                      }
                      .title {
                        font-size: 18px !important;
                        height: 100% !important;
                        display: flex !important;
                        align-items: center !important;
                        justify-content: left !important;
                        padding-left: 15px !important;
                        padding-top: 5px !important;
                        background-color: var(--background-color-2) !important;
                      }
                      .button {
                        border-radius: 8px !important;
                        height: 75px !important;
                        margin: 5px !important;
                        max-width: 95% !important;
                        display: flex !important;
                        align-items: center !important;
                        justify-content: flex-start !important;
                        background-color: var(--background-color-2) !important;
                      }
                      ha-control-button {
                        height: 75px !important;
                        max-width: 95% !important;
                        margin-left: 6px !important;
                        background-image: none !important;
                      }
                    sonos-groups$ sonos-group$: |
                      mwc-list-item {
                        background: var(--background-color-2) !important;
                        height: 40px !important;
                      }
                      .row {
                        height: 100% !important;
                      }
                      .speakers {
                        font-size: 12px !important;
                        text-align: left !important;
                        margin-bottom: 5px !important;
                      }
                      .song-title {
                        font-size: 10px !important;
                      }
                    sonos-grouping$: |
                      .name {
                        font-size: 12px !important;
                        font-weight: bold !important;
                        text-align: left !important;
                        justify-content: flex-start !important;
                        margin-left: 5px !important;
                        margin-top: 5px !important;
                      }
                      .item {
                        justify-content: flex-start !important;
                      }
                      .name-and-volume {
                        align-items: flex-start !important;
                        background-color: var(--background-color-2) !important;
                        border-radius: 8px !important;
                        margin-right: 5px !important;
                        padding-left: 5px !important;
                        height: 40px !important;
                      }
                      .volume {
                        --control-slider-thickness: 10px !important;
                        --control-slider-background: var(--background-color) !important;
                        margin-left: 5px !important;
                        margin-right: 5px !important;
                      }
                    sonos-grouping$ sonos-grouping-button$: |
                      ha-control-button {
                        background: var(--background-color-2) !important;
                        height: 40px !important;
                        border-radius: 8px !important;
                        font-size: 10px !important;
                        font-weight: bold !important;
                      }
                    sonos-grouping$ sonos-grouping-button$ ha-control-button$: |
                      .button {
                        background: var(--primary-color) !important;
                        border-radius: 8px !important;
                      }
      main1: 
        card: !include 
            - /config/dashboards/modules/dynamic-scenes.yaml
            - module_name: wall_panel_scenes
              dashboard: basement_wall_panel
      nav: !include footer-menu.yaml
#Weather Pop-Up
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        theme: Wall Panel
        card_type: pop-up
        hash: "#weather"
        button_type: name
        sub_button:
          main: []
          bottom: []
        show_header: true
        name: Weather
        icon: mdi:weather-partly-cloudy
        scrolling_effect: false
        close_on_click: true
        background_update: true
        modules:
          - pop-up-module
          - wall_panel_separator
        styles: |-
          .bubble-background {
            background: transparent !important;
            }

          .bubble-icon-container {
            background: transparent !important;
            }

          .bubble-icon {
            --mdc-icon-size: 36px !important;
            }
      - show_current: true
        show_forecast: true
        type: weather-forecast
        name: ""
        entity: weather.bayberry
        forecast_type: hourly
        forecast_slots: 6
        card_mod:
          style: |
            ha-card {
              background: var(--background-color-2) !important;
              box-shadow: none !important;
              font-size: 20px !important;
            }
              }
            .name-state {
              justify-content: flex-start !important;
            }
            .state {
              text-align: left !important;
            }
            .temp-attribute .temp {
              font-size: 24px !important;
              }
            .forecast .temp {
              font-size: 24px !important;
              }
            .forecast .templow {
              font-size: 24px !important;
              }
            .forecast div {
              font-size: 20px !important;
              }
      - show_current: false
        show_forecast: true
        type: weather-forecast
        entity: weather.bayberry
        forecast_type: daily
        forecast_slots: 7
        card_mod:
          style: |
            ha-card {
              background: var(--background-color-2) !important;
              box-shadow: none !important;
              font-size: 20px !important;
            }
              }
            .name-state {
              justify-content: flex-start !important;
            }
            .state {
              text-align: left !important;
            }
            .temp-attribute .temp {
              font-size: 24px !important;
              }
            .forecast .temp {
              font-size: 24px !important;
              }
            .forecast .templow {
              font-size: 24px !important;
              }
            .forecast div {
              font-size: 20px !important;
              }
#Notifications Pop-Up
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        theme: Wall Panel
        card_type: pop-up
        hash: "#notifications"
        button_type: name
        sub_button:
          main: []
          bottom: []
        show_header: false
        scrolling_effect: false
        close_on_click: true
        background_update: true
        modules:
          - pop-up-module
          - wall_panel_separator
        styles: |-
          .bubble-background {
            background: transparent !important;
            }

          .bubble-icon-container {
            background: transparent !important;
            }

          .bubble-icon {
            --mdc-icon-size: 36px !important;
            }
      - type: custom:bubble-card
        card_type: separator
        name: Notifications
        icon: mdi:bell-alert
        styles: |
          .bubble-name {
            font-size: 24px !important;
              }
          .bubble-button-card-container {
            margin: 2px 10px 2px 10px !important;
            background-color: var(--ha-card-background-2) !important;
            }
      - type: vertical-stack
        cards: !include [/config/dashboards/modules/notifications.yaml, {module_name: wall_panel_notifications}]    