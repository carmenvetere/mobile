# lovelace_gen
title: Home
path: home-view
theme: Wall Panel
type: custom:grid-layout
cards:
  # ── Main layout ───────────────────────────────────────────────────────────
  - type: custom:button-card
    styles:
      card:
        - border-radius: 0px
        - padding-bottom: 5px
        - padding-left: 0px
        - padding-top: 0px
        - margin-left: -2px
        - margin-top: -2px
        - width: 1024px
        - height: 768px
        - background: radial-gradient(circle,rgba(85, 89, 92, 1) 0%, rgba(0, 0, 0, 1) 85%);
      grid:
        - grid-template-areas: |
            "header header"
            "main1 main2"
            "nav nav"
        - grid-template-columns: 510px 510px
        - grid-template-rows: 75px 603px 75px
        - align-items: start
        - column-gap: 5px
        - row-gap: 8px
      custom_fields:
        main1:
          - margin-left: 25px
          - margin-right: 25px
    custom_fields:
      header: !include header.yaml
      main2:
        card: 
          type: custom:wall-panel-sonos-card
          entities:
            - media_player.living_room
            - media_player.kitchen
            - media_player.office
            - media_player.gym
            - media_player.deck
            - media_player.pool
            - media_player.mud_room
            - media_player.media_room
          default_view: player
          layout: wall
      main1:
        card: !include
            - /config/dashboards/modules/dynamic-scenes.yaml
            - module_name: wall_panel_scenes
              dashboard: basement_wall_panel
      nav: !include footer-menu.yaml
  # Weather Pop-Up
  - !include /config/dashboards/modules/weather-pop-up.yaml
  #Notifications Pop-Up
  - !include /config/dashboards/modules/notifications-pop-up.yaml