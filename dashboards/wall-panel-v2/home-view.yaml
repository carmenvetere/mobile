# lovelace_gen
title: Home
path: home-view
theme: Wall Panel
type: custom:grid-layout
cards:
  # ── Main layout ───────────────────────────────────────────────────────────
  - type: custom:button-card
    styles:
      card:
        - border-radius: 0px
        - padding-bottom: 5px
        - padding-left: 0px
        - padding-top: 0px
        - margin-left: -2px
        - margin-top: -2px
        - width: 1024px
        - height: 768px
        - background: radial-gradient(circle,rgba(85, 89, 92, 1) 0%, rgba(0, 0, 0, 1) 85%);
      grid:
        - grid-template-areas: |
            "header header"
            "main1 main2"
            "nav nav"
        - grid-template-columns: 510px 510px
        - grid-template-rows: 75px 603px 75px
        - align-items: start
        - column-gap: 5px
        - row-gap: 8px
      custom_fields:
        main1:
          - margin-left: 25px
          - margin-right: 25px
    custom_fields:
      header: !include header.yaml
      main2:
        card: 
          type: custom:stack-in-card
          mode: vertical
          keep:
            margin: false
            outer_padding: false
            inner_padding: false
            background: true
            box_shadow: true
            border_radius: true
          card_mod:
            style: |
              ha-card {
                background: var(--background-color) !important;
                height: 603px !important;
                overflow: hidden !important;
                }
          cards:
            # === Speaker / group navigator button — tap to open popup ===
            - type: custom:button-card
              entity: input_select.sonos_speaker_select
              show_name: false
              show_icon: true
              icon: mdi:speaker-multiple
              show_label: true
              label: >
                [[[return entity?.state ?? 'No Speaker']]]
              triggers_update:
                - input_select.sonos_speaker_select
              tap_action:
                action: navigate
                navigation_path: '#sonos-grouping'
              custom_fields:
                chevron: "<ha-icon icon='mdi:chevron-right' style='--mdc-icon-size:22px;color:var(--secondary-text-color)'></ha-icon>"
              styles:
                card:
                  - border-radius: 20px 20px 0 0
                  - background-color: var(--background-color)
                  - margin-left: 10px
                  - margin-right: 10px
                  - max-width: 96%
                  - height: 55px
                  - padding: 0 15px
                label:
                  - font-size: 18px
                  - font-weight: '600'
                  - color: var(--primary-text-color)
                  - text-align: left
                  - flex: '1'
                icon:
                  - width: 26px
                  - color: var(--secondary-text-color)
                  - margin-right: 12px
                custom_fields:
                  chevron:
                    - justify-self: end
                    - align-self: center
            # === Sonos card — player section only ===
            - type: custom:config-template-card
              variables:
                - >
                  states['input_select.sonos_speaker_select'].state === 'Living Room' ? 'media_player.living_room' :
                  states['input_select.sonos_speaker_select'].state === 'Kitchen' ? 'media_player.kitchen' :
                  states['input_select.sonos_speaker_select'].state === 'Office' ? 'media_player.office' :
                  states['input_select.sonos_speaker_select'].state === 'Deck' ? 'media_player.deck' :
                  states['input_select.sonos_speaker_select'].state === 'Pool' ? 'media_player.pool' :
                  states['input_select.sonos_speaker_select'].state === 'Primary Bedroom' ? 'media_player.primary_bedroom' :
                  states['input_select.sonos_speaker_select'].state === 'Primary Bathroom' ? 'media_player.primary_bathroom' :
                  states['input_select.sonos_speaker_select'].state === 'Gym' ? 'media_player.gym' :
                  states['input_select.sonos_speaker_select'].state === 'Mud Room' ? 'media_player.mud_room' :
                  'media_player.media_room'
                - new Date().getMonth() + 1
              entities:
                - input_select.sonos_speaker_select
                - media_player.living_room
                - media_player.kitchen
                - media_player.office
                - media_player.deck
                - media_player.pool
                - media_player.primary_bedroom
                - media_player.primary_bathroom
                - media_player.gym
                - media_player.mud_room
                - media_player.media_room
              card:
                type: custom:sonos-card
                entityId: "${vars[0]}"
                sections:
                  - player
                startSection: player
                player:
                  artworkAsBackground: false
                  artworkAsBackgroundBlur: 0
                  artworkBorderRadius: 10
                  artworkMinHeight: 3
                  controlsLargeIcons: true
                  hideControlRepeatButton: true
                  hideControlShuffleButton: true
                  hideEntityName: true
                  showVolumeUpAndDownButtons: true
                  volumeSliderHeight: 3
                mediaBrowser:
                  hideHeader: false
                  onlyFavorites: true
                  itemsPerRow: 1
                  favorites:
                    exclude: null
                    topItems: []
                    hideTitleForThumbnailIcons: false
                    sortByType: true
                    hideSonosFavorites: true
                    customFavorites:
                      all: !include /config/dashboards/modules/custom-favorites.yaml
                heightPercentage: 93
                footerHeight: 8
                sectionButtonIconSize: 5
                groups:
                  title: Speaker Groups
                  backgroundColor: "#C0C4C5"
                  compact: false
                  speakersFontSize: 1.5
                  titleFontSize: 1
                grouping:
                  skipApplyButton: true
                predefinedGroups:
                  - name: First Floor
                    media: ""
                    entities:
                      - player: media_player.living_room
                        volume: 12
                      - player: media_player.kitchen
                        volume: 12
                  - name: First Floor + Deck
                    media: ""
                    entities:
                      - player: media_player.living_room
                        volume: 12
                      - player: media_player.kitchen
                        volume: 12
                      - player: media_player.deck
                        volume: 25
                card_mod:
                  refresh_interval: 2
                  style:
                    .: |
                      :host {
                        --mdc-icon-color: var(--text-color) !important;
                        --secondary-text-color: var(--secondary-text-color) !important;
                        --paper-item-icon-color: var(--secondary-text-color) !important;
                        --mdc-theme-primary: var(--primary-text-color) !important;
                        --mdc-icon-button-ink-color: var(--secondary-text-color) !important;
                      }
                      ha-card {
                        margin-left: 5px !important;
                        margin-right: 5px !important;
                        margin-top: 0px !important;
                        max-width: 96% !important;
                        max-height: 96% !important;
                        background-color: var(--background-color) !important;
                        border-radius: 0 0 8px 8px !important;
                      }
                      ha-control-slider {
                        --control-slider-color: var(--primary-text-color) !important;
                      }
                    sonos-player$ sonos-player-header$: |
                      .song {
                        color: var(--primary-text-color) !important;
                        font-size: 24px !important;
                        font-weight: bold !important;
                      }
                      .artist-album {
                        color: var(--primary-text-color) !important;
                        font-size: 24px !important;
                        font-weight: 500 !important;
                      }
                    sonos-player$ sonos-player-header$ sonos-progress$: |
                      .progress {
                        color: var(--primary-text-color) !important;
                        font-size: 14px !important;
                        font-weight: bold !important;
                        --paper-progress-active-color: var(--primary-text-color) !important;
                      }
                      .progress-bar {
                        background-color: var(--primary-text-color) !important;
                      }
                    sonos-player$ sonos-player-controls$: |
                      ha-icon-button {
                        --mdc-icon-size: 40px !important;
                        width: 40px !important;
                        height: 40px !important;
                      }
                    sonos-player$ sonos-player-controls$ sonos-volume$: |
                      .volume-level {
                        font-size: 14px !important;
                        font-weight: bold !important;
                      }
                      .volume-slider {
                        --control-slider-thickness: 75px !important;
                      }
                    sonos-media-browser$: |
                      .header {
                        font-size: 18px !important;
                        font-weight: bold !important;
                        padding-top: 5px !important;
                        background-color: var(--background-color) !important;
                      }
                      .title {
                        font-size: 18px !important;
                        font-weight: bold !important;
                        padding-top: 5px !important;
                      }
                    sonos-media-browser$ sonos-favorites-icons$: |
                      .icons {
                        padding-top: 10px !important;
                      }
                      .thumbnail {
                        display: none !important;
                        height: 0 !important;
                        padding: 0 !important;
                        margin: 0 !important;
                      }
                      .title {
                        font-size: 18px !important;
                        height: 100% !important;
                        display: flex !important;
                        align-items: center !important;
                        justify-content: left !important;
                        padding-left: 15px !important;
                        padding-top: 5px !important;
                        background-color: var(--background-color-2) !important;
                      }
                      .button {
                        border-radius: 8px !important;
                        height: 75px !important;
                        margin: 5px !important;
                        max-width: 95% !important;
                        display: flex !important;
                        align-items: center !important;
                        justify-content: flex-start !important;
                        background-color: var(--background-color-2) !important;
                      }
                      ha-control-button {
                        height: 75px !important;
                        max-width: 95% !important;
                        margin-left: 6px !important;
                        background-image: none !important;
                      }
                    sonos-groups$ sonos-group$: |
                      mwc-list-item {
                        background: var(--background-color-2) !important;
                        height: 40px !important;
                      }
                      .row {
                        height: 100% !important;
                      }
                      .speakers {
                        font-size: 12px !important;
                        text-align: left !important;
                        margin-bottom: 5px !important;
                      }
                      .song-title {
                        font-size: 10px !important;
                      }
                    sonos-grouping$: |
                      .name {
                        font-size: 12px !important;
                        font-weight: bold !important;
                        text-align: left !important;
                        justify-content: flex-start !important;
                        margin-left: 5px !important;
                        margin-top: 5px !important;
                      }
                      .item {
                        justify-content: flex-start !important;
                      }
                      .name-and-volume {
                        align-items: flex-start !important;
                        background-color: var(--background-color-2) !important;
                        border-radius: 8px !important;
                        margin-right: 5px !important;
                        padding-left: 5px !important;
                        height: 40px !important;
                      }
                      .volume {
                        --control-slider-thickness: 10px !important;
                        --control-slider-background: var(--background-color) !important;
                        margin-left: 5px !important;
                        margin-right: 5px !important;
                      }
                    sonos-grouping$ sonos-grouping-button$: |
                      ha-control-button {
                        background: var(--background-color-2) !important;
                        height: 40px !important;
                        border-radius: 8px !important;
                        font-size: 10px !important;
                        font-weight: bold !important;
                      }
                    sonos-grouping$ sonos-grouping-button$ ha-control-button$: |
                      .button {
                        background: var(--primary-color) !important;
                        border-radius: 8px !important;
                      }
      main1:
        card: !include
            - /config/dashboards/modules/dynamic-scenes.yaml
            - module_name: wall_panel_scenes
              dashboard: basement_wall_panel
      nav: !include footer-menu.yaml

# Sonos Grouping Pop-Up
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#sonos-grouping'
        open_timeout: 0
        card_mod:
          style: |
            ha-card {
              background-color: var(--background-color) !important;
              border-radius: 20px !important;
            }
        cards:
          # Header: shows current group name
          - type: custom:button-card
            entity: sensor.sonos_group_name
            name: Speakers
            show_name: true
            show_label: true
            show_icon: true
            icon: mdi:speaker-multiple
            label: "[[[return entity?.state ?? 'No Speakers']]]"
            tap_action:
              action: none
            triggers_update:
              - sensor.sonos_group_name
            styles:
              card:
                - background: transparent
                - box-shadow: none
                - height: 75px
                - padding: 8px 15px
              name:
                - font-size: 16px
                - color: var(--secondary-text-color)
                - text-transform: uppercase
                - letter-spacing: 2px
              label:
                - font-size: 32px
                - font-weight: bold
                - color: var(--primary-text-color)
              icon:
                - width: 32px
                - color: var(--secondary-text-color)

          # Row 1: First Floor + Outdoor
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                entity: input_boolean.sonos_group_select_living_room
                name: Living Room
                icon: mdi:sofa
                show_name: true
                show_icon: true
                show_label: true
                label: >
                  [[[
                    const active = states['input_select.sonos_speaker_select']?.state === 'Living Room';
                    const coord = states['input_select.sonos_group_coordinator']?.state === 'living_room';
                    const mp = states['media_player.living_room'];
                    const parts = [];
                    if (active) parts.push('▶ Listening');
                    else if (coord) parts.push('⭐ Main');
                    if (mp?.state === 'playing') {
                      parts.push(mp.attributes.media_artist || mp.attributes.media_title || 'Playing');
                    } else if (mp?.state && mp.state !== 'unavailable') {
                      parts.push(mp.state.charAt(0).toUpperCase() + mp.state.slice(1));
                    }
                    return parts.join('  ·  ') || ' ';
                  ]]]
                triggers_update:
                  - input_boolean.sonos_group_select_living_room
                  - input_select.sonos_group_coordinator
                  - input_select.sonos_speaker_select
                  - media_player.living_room
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  service_data:
                    entity_id: input_select.sonos_speaker_select
                    option: Living Room
                double_tap_action:
                  action: toggle
                hold_action:
                  action: call-service
                  service: script.sonos_set_main_speaker
                  service_data:
                    speaker: living_room
                state:
                  - value: "on"
                    color: var(--primary-color)
                    styles:
                      card:
                        - background: rgba(var(--rgb-primary-color), 0.2) !important
                        - border: 2px solid var(--primary-color) !important
                  - value: "off"
                    color: var(--secondary-text-color)
                styles:
                  card:
                    - height: 115px
                    - border-radius: 14px
                    - margin: 4px
                  name:
                    - font-size: 20px
                    - font-weight: bold
                  label:
                    - font-size: 14px
                    - color: var(--secondary-text-color)
                  icon:
                    - width: 36px

              - type: custom:button-card
                entity: input_boolean.sonos_group_select_kitchen
                name: Kitchen
                icon: mdi:countertop
                show_name: true
                show_icon: true
                show_label: true
                label: >
                  [[[
