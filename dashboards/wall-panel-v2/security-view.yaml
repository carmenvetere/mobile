                    icon:
                      - color: var(--accent-color-3)
                      - height: 38px
                      - width: 38px
                    card:
                      - background-color: transparent
                      - height: 115px
                      - width: 100px  
          - type: custom:button-card
            styles:
              card:
              - height: 118px
              - width: 450px
              - margin-top: 0px
              - padding-top: 0px
              - border-radius: 0px
              - background-color: transparent
              grid:
              - grid-template-areas: |
                  "button1 button2"
              - grid-template-columns: 223px 223px
              - grid-template-rows: 115px
              - align-items: start
              - column-gap: 5px
            custom_fields: 
              button1: 
                card: 
                  type: custom:button-card
                  name: Front Center
                  icon: mdi:cctv
                  layout: icon_name
                  entity: camera.front_high_resolution_channel
                  styles:
                    card: 
                      - width: 220px
                      - height: 115px
                      - background-color: var(--background-color)
                      - border-radius: 15px
                      - box-shadow: 0 6px 14px rgba(0, 0, 0, 0.55)
                    grid:
                      - column-gap: 0px
                    icon:
                      - width: 38px
                      - height: 38px
                      - color: var(--text-color)
                    name:
                      - font-size: 24px
                      - font-weight: bold
                      - white-space: normal !important
                      - text-align: left
              button2: 
                card: 
                  type: custom:button-card
                  name: Front Right
                  icon: mdi:cctv
                  layout: icon_name
                  entity: camera.blueberry_high_resolution_channel
                  styles:
                    card: 
                      - width: 220px
                      - height: 115px
                      - background-color: var(--background-color)
                      - border-radius: 15px
                      - box-shadow: 0 6px 14px rgba(0, 0, 0, 0.55)
                    grid:
                      - column-gap: 0px
                    icon:
                      - width: 38px
                      - height: 38px
                      - color: var(--text-color)
                    name:
                      - font-size: 24px
                      - font-weight: bold
                      - white-space: normal !important
                      - text-align: left
                      - margin-right: 8px
      main2: 
        card:
          type: custom:button-card
          show_name: false
          show_icon: false
          show_state: false
          styles:
            card:
              - border-radius: 10px
              - width: 485px
              - height: 603px
              - padding-top: 0px
              - background: var(--background-color)
            grid:
              - grid-template-areas: |
                  "space1"
                  "display"
                  "space2"
                  "keypad"
                  "space3"
                  "controls"
              - grid-template-columns: auto
              - grid-template-rows: 25px 50px 10px 350px 10px 100px
              - row-gap: 3px
              - align-items: center
              - justify-items: center
          custom_fields:
            # Code Display
            display:
              card:
                type: custom:button-card
                show_name: false
                show_icon: false
                show_state: true
                entity: input_text.alarm_code_input
                styles:
                  card:
                    - height: 50px
                    - width: 250px
                    - border-radius: 4px
                    - background-color: '#FFFFFF'
                    - border: 2px solid '#666666'
                  state:
                    - color: black
                    - font-size: 34px
                    - font-weight: bold
                    - letter-spacing: 6px  
            # Number Keypad
            keypad:
              card:
                type: custom:button-card
                show_name: false
                show_icon: false
                show_state: false
                styles:
                  card:
                    - height: 350px
                    - width: 250px
                    - background-color: transparent
                    - border-radius: 0px
                  grid:
                    - grid-template-areas: |
                        "n1 n2 n3"
                        "n4 n5 n6"
                        "n7 n8 n9"
                        "clear n0 enter"
                    - grid-template-columns: 80px 80px 80px
                    - grid-template-rows: 80px 80px 80px 80px
                    - align-items: center
                    - justify-items: center
                    - row-gap: 5px
                    - column-gap: 5px
