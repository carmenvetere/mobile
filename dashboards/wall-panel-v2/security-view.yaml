              - grid-template-areas: |
                  "space1"
                  "display"
                  "space2"
                  "keypad"
                  "space3"
                  "controls"
              - grid-template-columns: auto
              - grid-template-rows: 50px 100px 20px 700px 20px 200px
              - row-gap: 5px
              - align-items: center
              - justify-items: center
          custom_fields:
            # Code Display
            display:
              card:
                type: custom:button-card
                show_name: false
                show_icon: false
                show_state: true
                entity: input_text.alarm_code_input
                styles:
                  card:
                    - height: 100px
                    - width: 500px
                    - border-radius: 8px
                    - background-color: '#FFFFFF'
                    - border: 2px solid '#666666'
                  state:
                    - color: black
                    - font-size: 68px
                    - font-weight: bold
                    - letter-spacing: 12px  
            # Number Keypad
            keypad:
              card:
                type: custom:button-card
                show_name: false
                show_icon: false
                show_state: false
                styles:
                  card:
                    - height: 700px
                    - width: 500px
                    - background-color: transparent
                    - border-radius: 0px
                  grid:
                    - grid-template-areas: |
                        "n1 n2 n3"
                        "n4 n5 n6"
                        "n7 n8 n9"
                        "clear n0 enter"
