                  n1:
                    card:
                      type: custom:button-card
                      show_label: true
                      show_icon: false
                      show_state: false
                      label: '1'
                      tap_action:
                        action: perform-action
                        perform_action: input_text.set_value
                        target:
                          entity_id: input_text.alarm_code_input
                        data:
                          value: '[[[ return states["input_text.alarm_code_input"].state + "1" ]]]'
