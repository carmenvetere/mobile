# lovelace_gen
title: Security
path: security-view
theme: Wall Panel
type: custom:grid-layout
cards:
  - type: custom:button-card
    styles:
      card:
        - border-radius: 0px
        - padding-bottom: 5px
        - padding-left: 0px
        - padding-top: 0px
        - margin-left: -4px
        - margin-top: -4px        
        - width: 2048px
        - height: 1536px
        - background: radial-gradient(circle,rgba(85, 89, 92, 1) 0%, rgba(0, 0, 0, 1) 85%);
      grid:
        - grid-template-areas: |
            "header header"
            "main1 main2"
            "nav nav"
        - grid-template-columns: 1019px 1019px
        - grid-template-rows: 150px 1206px 150px
        - align-items: start
        - column-gap: 10px
        - row-gap: 15px
      custom_fields:
        main1:
          - margin-left: 50px
        main2:
          - margin-right: 50px
          - height: 100%
    custom_fields:
      header: !include header.yaml
      main1:
        card: 
          type: vertical-stack
          cards: 
          - type: custom:button-card
            visibility:
            - condition: state
              entity: binary_sensor.all_doors
              state: "on"
            styles:
              card:
                - height: 230px
                - width: 900px
                - background: var(--background-color)
                - border-radius: 30px
                - padding-left: 20px
                - padding-top: 0px
              grid:
                - grid-template-areas: |
                    "icon name"
                - grid-template-columns: 150px 700px
                - grid-template-rows: 230px
                - column-gap: 5px
                - row-gap: 5px
            custom_fields:
              name:
                card:
                  type: custom:button-card
                  name: Door Open
                  show_name: true
                  show_state: false
                  show_icon: false
                  styles:
                    card:
                      - height: 230px
                      - width: 700px
                      - background-color: transparent
                    name:
                      - font-size: 48px
                      - font-weight: bold
                      - color: var(--text-color)
                      - text-align: left
                      - justify-self: start
              icon:
                card:
                  type: custom:button-card
                  icon: mdi:lock-open-alert
                  styles:
                    icon:
                      - color: '#F6CE46'
                      - height: 75px
                      - width: 75px
                    card:
                      - background-color: transparent
                      - height: 230px
                      - width: 200px                
          - type: custom:button-card
            visibility:
            - condition: state
              entity: binary_sensor.all_doors
              state: "off"
