# lovelace_gen
title: Security
path: security-view
theme: Wall Panel
type: custom:grid-layout
cards:
  - type: custom:button-card
    styles:
      card:
        - border-radius: 0px
        - padding-bottom: 5px
        - padding-left: 0px
        - padding-top: 0px
        - margin-left: -2px
        - margin-top: -2px
        - width: 1024px
        - height: 768px
        - background: radial-gradient(circle,rgba(85, 89, 92, 1) 0%, rgba(0, 0, 0, 1) 85%);
      grid:
        - grid-template-areas: |
            "header header"
            "main1 main2"
            "nav nav"
        - grid-template-columns: 510px 510px
        - grid-template-rows: 75px 603px 75px
        - align-items: start
        - column-gap: 5px
        - row-gap: 8px
      custom_fields:
        main1:
          - margin-left: 25px
        main2:
          - margin-right: 25px
          - height: 100%
    custom_fields:
      header: !include header.yaml
      main1:
        card: 
          type: vertical-stack
          cards: 
          - type: custom:button-card
            visibility:
            - condition: state
              entity: binary_sensor.all_doors
              state: "on"
            styles:
              card:
                - height: 115px
                - width: 450px
                - background: var(--background-color)
                - border-radius: 15px
                - padding-left: 10px
                - padding-top: 0px
                - box-shadow: 0 6px 14px rgba(0, 0, 0, 0.55)
              grid:
                - grid-template-areas: |
                    "icon name"
                - grid-template-columns: 75px 350px
                - grid-template-rows: 115px
                - column-gap: 5px
                - row-gap: 5px
            custom_fields:
              name:
                card:
                  type: custom:button-card
                  name: Door Open
                  show_name: true
                  show_state: false
                  show_icon: false
                  styles:
                    card:
                      - height: 115px
                      - width: 350px
                      - background-color: transparent
                    name:
                      - font-size: 24px
                      - font-weight: bold
                      - color: var(--text-color)
                      - text-align: left
                      - justify-self: start
              icon:
                card:
                  type: custom:button-card
                  icon: mdi:lock-open-alert
                  styles:
                    icon:
                      - color: '#F6CE46'
                      - height: 38px
                      - width: 38px
                    card:
                      - background-color: transparent
                      - height: 115px
                      - width: 100px                
          - type: custom:button-card
            visibility:
            - condition: state
              entity: binary_sensor.all_doors
              state: "off"
            styles:
              card:
                - height: 115px
                - width: 450px
                - background: var(--background-color)
                - border-radius: 15px
                - padding-left: 10px
                - padding-top: 0px
                - box-shadow: 0 6px 14px rgba(0, 0, 0, 0.55)
              grid:
                - grid-template-areas: |
                    "icon name"
                - grid-template-columns: 75px 350px
                - grid-template-rows: 115px
                - column-gap: 5px
                - row-gap: 5px
            custom_fields:
              name:
                card:
                  type: custom:button-card
                  name: All Doors Closed
                  show_name: true
                  show_state: false
                  show_icon: false
                  styles:
                    card:
                      - height: 115px
                      - width: 350px
                      - background-color: transparent
                    name:
                      - font-size: 24px
                      - font-weight: bold
                      - color: var(--text-color)
                      - text-align: left
