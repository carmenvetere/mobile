# lovelace_gen
title: Weather
path: weather-view
theme: Wall Panel
type: custom:grid-layout
cards:
  - type: custom:button-card
    styles:
      card:
        - border-radius: 0px
        - padding-bottom: 5px
        - padding-left: 0px
        - padding-top: 0px
        - margin-left: -2px
        - margin-top: -2px
        - width: 1024px
        - height: 768px
        - background: radial-gradient(circle,rgba(85, 89, 92, 1) 0%, rgba(0, 0, 0, 1) 85%);
      grid:
        - grid-template-areas: |
            "header header"
            "main main"
            "nav nav"
        - grid-template-columns: 510px 510px
        - grid-template-rows: 75px 603px 75px
        - align-items: start
        - column-gap: 5px
        - row-gap: 8px
      custom_fields:
        main1:
          - margin-left: 5px
    custom_fields:
      header: !include header.yaml
      main: 
        card:
          type: vertical-stack
          cards: 
            - type: custom:bubble-card
              card_type: separator
              name: Current Weather & 5-Day Forecast
              icon: mdi:weather-partly-cloudy
              rows: 0.75
              styles: |
                .bubble-name {
                font-size: 21px !important;  /* title */
                font-weight: bold !important;
                }
                .bubble-line {
                background: transparent !important;
                opacity: 0.1;
                }
                .card-content {
                padding-top: 10px !important;
                padding-left: 5px !important;
                }
            - type: weather-forecast
              show_current: true
              show_forecast: true
              name: ""
              entity: weather.bayberry
              forecast_type: daily
              forecast_slots: 7
              tap_action:
                action: none
              card_mod:
                style: |
                  ha-card {
                    background: transparent !important;
                    box-shadow: none !important;
                    font-size: 24px !important;
                    margin-top: 10px !important;
                  }
                  .name-state {
                    justify-content: flex-start !important;
                  }
                  .state {
                    text-align: left !important;
                    align-items: center !important;
                    font-size: 24px !important;
                    font-weight: bold !important;
                  }
                  .temp-attribute .temp {
                    font-size: 24px !important;
                    font-weight: bold !important;
                    }
                  .forecast .temp {
                    font-size: 22px !important;
                    font-weight: bold !important;
                    }
                  .forecast .templow {
                    font-size: 22px !important;
                    font-weight: bold !important;
                    }
                  .forecast div {
                    font-size: 22px !important;
                    font-weight: bold !important;
                    }
                  .forecast-image-icon {
                    padding-top: 8px !important;
                    padding-bottom: 8px !important;
                    height: 50px !important;
                    width: 50px !important;
                    }
      nav: !include footer-menu.yaml
