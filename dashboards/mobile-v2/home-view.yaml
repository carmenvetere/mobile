# lovelace_gen
# ============================================================================
#  Mobile Dash v2  ·  Home  ·  Dune Mist
#  Status-first home: greeting header (with notification chip + weather temp),
#  2-up status tiles, 3-up scenes grid, wide menu nav list, notifications pop-up.
# ============================================================================
title: Home
icon: mdi:home
theme: Dune Mist
path: mobile-home
type: custom:grid-layout
cards:
  - type: vertical-stack
    # NOTE: a plain vertical-stack (not stack-in-card) is intentional here.
    # stack-in-card strips/neutralizes each child card's ha-card background to
    # merge them into one surface, which races with the per-tile backgrounds
    # below and makes them intermittently fail to paint. vertical-stack leaves
    # child backgrounds alone. Side padding is applied to the stack host.
    card_mod:
      style: |
        :host {
          display: block;
          padding: 4px 10px 8px;
        }
    cards:
      # ---------------------------------------------------------------- header
      - type: custom:button-card
        entity: sensor.bayberry_tempest_temperature
        tap_action:
          action: navigate
          navigation_path: /mobile-dash-v2/weather
        show_icon: false
        show_name: true
        show_state: true
        show_label: true
        name: |
          [[[
            var h = new Date().getHours();
            return h < 12 ? 'Good morning' : (h < 18 ? 'Good afternoon' : 'Good evening');
          ]]]
        label: |
          [[[
            var d = new Date();
            return d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' })
              + ', ' + d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
          ]]]
        state_display: |
          [[[ return Math.round(entity.state) + '°'; ]]]
        # Notification chip (left of the weather temp). Driven by the separate
        # Notification Center integration (sensor.notification_center*). It hides
        # itself when there are no active alerts OR the integration isn't
        # installed yet, so it degrades gracefully until those entities exist.
        custom_fields:
          notif:
            card:
              type: custom:button-card
              entity: sensor.notification_center
              show_icon: true
              show_name: true
              show_state: false
              icon: |
                [[[ var p = states['sensor.notification_center_priority'];
                    return (p && p.attributes.icon) || 'mdi:bell'; ]]]
              name: |
                [[[ var c = states['sensor.notification_center'];
                    return c ? c.state : ''; ]]]
              tap_action: { action: navigate, navigation_path: "#notifications" }
              styles:
                card:
                  - display: |
                      [[[ var c = states['sensor.notification_center'];
                          return (c && parseInt(c.state) > 0) ? 'flex' : 'none'; ]]]
                  - background: |
                      [[[ var p = states['sensor.notification_center_priority'];
                          var c = (p && p.attributes.color) || '#7295B2';
                          var h = c.replace('#','');
                          var r = parseInt(h.substr(0,2),16), g = parseInt(h.substr(2,2),16), b = parseInt(h.substr(4,2),16);
                          return 'rgba(' + r + ',' + g + ',' + b + ',0.18)'; ]]]
                  - --ha-card-background: transparent
                  - box-shadow: none
                  - transition: none
                  - border-radius: 999px
                  - padding: 5px 10px
                grid:
                  - grid-template-areas: '"i n"'
                  - grid-template-columns: auto auto
                  - align-items: center
                  - column-gap: 5px
                icon:
                  - width: 16px
                  - color: |
                      [[[ var p = states['sensor.notification_center_priority'];
                          return (p && p.attributes.color) || '#7295B2'; ]]]
                name:
                  - font-size: 13px
                  - font-weight: 700
                  - color: |
                      [[[ var p = states['sensor.notification_center_priority'];
                          return (p && p.attributes.color) || '#7295B2'; ]]]
        styles:
          card:
            - background: transparent !important
            - --ha-card-background: transparent
            - box-shadow: none
            - transition: none
            - padding: 6px 6px 2px
          grid:
            - grid-template-areas: '"n notif s" "l notif s"'
            - grid-template-columns: 1fr auto auto
            - grid-template-rows: auto auto
            - align-items: center
            - column-gap: 10px
          name:
            - justify-self: start
            - font-size: 25px
            - font-weight: 700
            - color: var(--primary-text-color)
          label:
            - justify-self: start
            - font-size: 13px
            - color: var(--secondary-text-color)
          state:
            - grid-area: s
            - align-self: center
            - font-size: 26px
            - font-weight: 300
            - color: var(--primary-text-color)
          custom_fields:
            notif:
              - grid-area: notif
              - align-self: center

      # -------------------------------------------------- status tiles (2-up)
      - type: grid
        columns: 2
        square: false
        cards:
          # Alarm
          - type: custom:button-card
            entity: alarm_control_panel.alarmo
            icon: mdi:shield-home
            name: Alarm
            show_state: true
            show_label: true
            tap_action: { action: more-info }
            state_display: |
              [[[
                var m = {disarmed:'Disarmed', armed_home:'Armed Home',
                  armed_away:'Armed Away', armed_night:'Armed Night',
                  arming:'Arming', pending:'Pending', triggered:'Triggered'};
                return m[entity.state] || entity.state;
              ]]]
            label: |
              [[[
                return entity.state === 'disarmed' ? 'All clear' : 'Protecting home';
              ]]]
            styles: &tile_styles
              card:
                - padding: 13px
                - border-radius: 16px
                - background: var(--background-color-2) !important
                - --ha-card-background: var(--background-color-2)
                - box-shadow: none
                - transition: none
              grid:
                - grid-template-areas: '"i n" "i s" "i l"'
                - grid-template-columns: 46px 1fr
                - grid-template-rows: min-content min-content min-content
                - align-items: center
                - column-gap: 12px
              name:
                - justify-self: start
                - font-size: 12px
                - font-weight: 600
                - color: var(--secondary-text-color)
              state:
                - justify-self: start
                - font-size: 17px
                - font-weight: 700
                - color: var(--primary-text-color)
              label:
                - justify-self: start
                - font-size: 12px
                - color: var(--secondary-text-color)
              img_cell:
                - align-self: center
                - width: 44px
                - height: 44px
                - border-radius: 12px
                - background-color: "rgba(224,167,94,0.18)"
              icon:
                - width: 22px
                - color: var(--amber-color)
          # Doors & Windows
          - type: custom:button-card
            entity: binary_sensor.all_doors_including_garage
            icon: mdi:door-closed
            name: Doors & Windows
            show_state: true
            show_label: true
            tap_action: { action: more-info }
            state_display: |
              [[[ return entity.state === 'on' ? 'Open' : 'All Closed'; ]]]
            label: |
              [[[
                var d = states['sensor.doors_secured'];
                if (d && !isNaN(parseInt(d.state))) return d.state + ' secured';
                return entity.state === 'on' ? 'Check doors' : 'All secured';
              ]]]
            styles:
              <<: *tile_styles
              img_cell:
                - align-self: center
                - width: 44px
                - height: 44px
                - border-radius: 12px
                - background-color: "rgba(139,166,128,0.18)"
              icon:
                - width: 22px
                - color: var(--sage-color)
          # Lights
          - type: custom:button-card
            entity: sensor.lights_on_count
            icon: mdi:lightbulb-group
            name: Lights
            show_state: true
            show_label: true
            tap_action:
              action: navigate
              navigation_path: /mobile-dash-v2/lights-main
            state_display: |
              [[[ return entity.state + ' on'; ]]]
            label: of 36 fixtures
            styles:
              <<: *tile_styles
              img_cell:
                - align-self: center
                - width: 44px
                - height: 44px
                - border-radius: 12px
                - background-color: "rgba(226,193,104,0.18)"
              icon:
                - width: 22px
                - color: var(--gold-color)
          # Climate
          - type: custom:button-card
            entity: climate.living_room_thermostat
            icon: mdi:thermostat
            name: Climate
            show_state: true
            show_label: true
            tap_action:
              action: navigate
              navigation_path: /mobile-dash-v2/climate-main
            state_display: |
              [[[
                var t = entity.attributes.current_temperature;
                return (t != null ? Math.round(t) + '°' : entity.state);
              ]]]
            label: 4 zones
            styles:
              <<: *tile_styles
              img_cell:
                - align-self: center
                - width: 44px
                - height: 44px
                - border-radius: 12px
                - background-color: "rgba(142,177,191,0.18)"
              icon:
                - width: 22px
                - color: var(--slate-bright)
          # Music
          - type: custom:button-card
            entity: media_player.living_room
            icon: mdi:music
            name: Music
            show_state: true
            show_label: true
            tap_action:
              action: navigate
              navigation_path: /mobile-dash-v2/music
            state_display: |
              [[[
                var m = {playing:'Playing', paused:'Paused', idle:'Idle',
                  off:'Off', standby:'Idle'};
                return m[entity.state] || entity.state;
              ]]]
            label: |
              [[[
                return entity.attributes.source || 'Living Room';
              ]]]
            styles:
              <<: *tile_styles
              img_cell:
                - align-self: center
                - width: 44px
                - height: 44px
                - border-radius: 12px
                - background-color: "rgba(182,210,220,0.18)"
              icon:
                - width: 22px
                - color: var(--slate-bright)
          # Energy
          - type: custom:button-card
            entity: sensor.bayberry_charge
            icon: mdi:home-battery
            name: Energy
            show_state: true
            show_label: true
            tap_action:
              action: navigate
              navigation_path: /mobile-dash-v2/energy
            state_display: |
              [[[ return 'Battery ' + Math.round(entity.state) + '%'; ]]]
            label: |
              [[[
                var s = states['sensor.bayberry_solar_generated'];
                return s ? '+' + Math.round(s.state) + ' kWh today' : 'Solar today';
              ]]]
            styles:
              <<: *tile_styles
              img_cell:
                - align-self: center
                - width: 44px
                - height: 44px
                - border-radius: 12px
                - background-color: "rgba(226,193,104,0.18)"
              icon:
                - width: 22px
                - color: var(--gold-color)

      # ----------------------------------------------------------- scenes (3-up)
      - type: custom:bubble-card
        card_type: separator
        name: Scenes
        icon: mdi:palette
        rows: 0.75
        styles: |
          .bubble-name { font-size: 13px !important; font-weight: 700 !important;
            text-transform: uppercase; letter-spacing: 0.06em;
            color: rgba(255,255,255,0.6) !important; }
          .bubble-line { background: var(--primary-text-color); opacity: 0.1; }
          .card-content { padding-top: 7px !important; }
      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:button-card
            entity: binary_sensor.scene_good_morning
            name: Morning
            icon: mdi:weather-sunset-up
            show_state: false
            tap_action:
              action: call-service
              service: scene.turn_on
              service_data: { entity_id: scene.good_morning_2 }
            styles: &scene_styles
              card:
                - padding: 14px 6px
                - border-radius: 16px
                - background: var(--background-color-2) !important
                - --ha-card-background: var(--background-color-2)
                - box-shadow: none
                - transition: none
              grid:
                - grid-template-areas: '"i" "n"'
                - grid-template-rows: auto auto
                - row-gap: 7px
              name:
                - font-size: 11px
                - font-weight: 600
                - color: var(--secondary-text-color)
              img_cell:
                - justify-self: center
                - width: 42px
                - height: 42px
                - border-radius: 12px
                - background-color: "rgba(255,255,255,0.06)"
              icon:
                - width: 22px
                - color: var(--secondary-text-color)
            state: &scene_on
              - value: "on"
                styles:
                  img_cell:
                    - background-color: "rgba(226,193,104,0.20)"
                  icon:
                    - color: var(--gold-color)
                  name:
                    - color: var(--primary-text-color)
          - type: custom:button-card
            entity: binary_sensor.scene_welcome
            name: Welcome
            icon: mdi:human-greeting
            show_state: false
            tap_action:
              action: call-service
              service: scene.turn_on
              service_data: { entity_id: scene.welcome }
            styles: *scene_styles
            state: *scene_on
          - type: custom:button-card
            entity: binary_sensor.scene_evening
            name: Evening
            icon: mdi:moon-waning-crescent
            show_state: false
            tap_action:
              action: call-service
              service: scene.turn_on
              service_data: { entity_id: scene.evening }
            styles: *scene_styles
            state: *scene_on
          - type: custom:button-card
            entity: binary_sensor.scene_entertaining
            name: Entertain
            icon: mdi:glass-cocktail
            show_state: false
            tap_action:
              action: call-service
              service: scene.turn_on
              service_data: { entity_id: scene.entertaining }
            styles: *scene_styles
            state: *scene_on
          - type: custom:button-card
            entity: binary_sensor.scene_outdoor_on
            name: Outdoor
            icon: mdi:coach-lamp
            show_state: false
            tap_action:
              action: call-service
              service: scene.turn_on
              service_data: { entity_id: scene.outdoor_on }
            styles: *scene_styles
            state: *scene_on
          - type: custom:button-card
            name: All Off
            icon: mdi:lightbulb-off
            show_state: false
            tap_action:
              action: call-service
              service: scene.turn_on
              service_data: { entity_id: scene.good_night }
            styles: *scene_styles

      # ------------------------------------------------------------- menu list
      - type: custom:bubble-card
        card_type: separator
        name: Menu
        icon: mdi:menu
        rows: 0.75
        styles: |
          .bubble-name { font-size: 13px !important; font-weight: 700 !important;
            text-transform: uppercase; letter-spacing: 0.06em;
            color: rgba(255,255,255,0.6) !important; }
          .bubble-line { background: var(--primary-text-color); opacity: 0.1; }
          .card-content { padding-top: 7px !important; }
      - type: custom:button-card
        name: Lights
        icon: mdi:lightbulb
        show_state: false
        show_label: true
        label: |
          [[[ var s=states['sensor.lights_on_count']; return s ? s.state+' on' : ''; ]]]
        tap_action: { action: navigate, navigation_path: /mobile-dash-v2/lights-main }
        custom_fields:
          chev: '<ha-icon icon="mdi:chevron-right" style="--mdc-icon-size:24px;color:var(--secondary-text-color);"></ha-icon>'
        styles: &menu_styles
          card:
            - padding: 12px 14px
            - border-radius: 14px
            - background: var(--background-color-2) !important
            - --ha-card-background: var(--background-color-2)
            - box-shadow: none
            - transition: none
            - margin-bottom: 7px
          grid:
            - grid-template-areas: '"i n l chev"'
            - grid-template-columns: 40px 1fr auto 24px
            - align-items: center
            - column-gap: 12px
          name:
            - justify-self: start
            - font-size: 15px
            - font-weight: 600
            - color: var(--primary-text-color)
          label:
            - justify-self: end
            - font-size: 12px
            - color: var(--secondary-text-color)
          img_cell:
            - width: 38px
            - height: 38px
            - border-radius: 11px
            - background-color: "rgba(142,177,191,0.16)"
          icon:
            - width: 20px
            - color: var(--slate-bright)
          custom_fields:
            chev:
              - justify-self: end
      - type: custom:button-card
        name: Climate
        icon: mdi:thermostat
        show_state: false
        show_label: true
        label: 4 zones
        tap_action: { action: navigate, navigation_path: /mobile-dash-v2/climate-main }
        custom_fields:
          chev: '<ha-icon icon="mdi:chevron-right" style="--mdc-icon-size:24px;color:var(--secondary-text-color);"></ha-icon>'
        styles: *menu_styles
      - type: custom:button-card
        name: Shades
        icon: mdi:roller-shade
        show_state: false
        show_label: true
        label: |
          [[[ var s=states['sensor.shades_open']; return (s && !isNaN(parseInt(s.state))) ? s.state+' open' : ''; ]]]
        tap_action: { action: navigate, navigation_path: /mobile-dash-v2/shades-main }
        custom_fields:
          chev: '<ha-icon icon="mdi:chevron-right" style="--mdc-icon-size:24px;color:var(--secondary-text-color);"></ha-icon>'
        styles: *menu_styles
      - type: custom:button-card
        name: Music
        icon: mdi:music
        show_state: false
        show_label: true
        label: |
          [[[
            var rooms=['living_room','kitchen','office','gym','deck','pool','mud_room','media_room'];
            var n=0; rooms.forEach(function(r){ var s=states['media_player.'+r]; if(s&&s.state==='playing')n++; });
            return n>0 ? (n + (n===1?' room':' rooms')) : '';
          ]]]
        tap_action: { action: navigate, navigation_path: /mobile-dash-v2/music }
        custom_fields:
          chev: '<ha-icon icon="mdi:chevron-right" style="--mdc-icon-size:24px;color:var(--secondary-text-color);"></ha-icon>'
        styles: *menu_styles
      - type: custom:button-card
        name: Security
        icon: mdi:cctv
        show_state: false
        show_label: true
        label: |
          [[[ var s=states['alarm_control_panel.alarmo']; if(!s)return ''; var m={disarmed:'Disarmed',armed_home:'Armed Home',armed_away:'Armed Away'}; return m[s.state]||s.state; ]]]
        tap_action: { action: navigate, navigation_path: /mobile-dash-v2/security }
        custom_fields:
          chev: '<ha-icon icon="mdi:chevron-right" style="--mdc-icon-size:24px;color:var(--secondary-text-color);"></ha-icon>'
        styles: *menu_styles
      - type: custom:button-card
        name: Energy
        icon: mdi:lightning-bolt
        show_state: false
        show_label: true
        label: |
          [[[ var s=states['sensor.bayberry_charge']; return s?Math.round(s.state)+'%':''; ]]]
        tap_action: { action: navigate, navigation_path: /mobile-dash-v2/energy }
        custom_fields:
          chev: '<ha-icon icon="mdi:chevron-right" style="--mdc-icon-size:24px;color:var(--secondary-text-color);"></ha-icon>'
        styles: *menu_styles
      - type: custom:button-card
        name: Pool
        icon: mdi:pool
        show_state: false
        show_label: true
        label: |
          [[[ var s=states['sensor.omnilogic_pool_watersensor']; return s?Math.round(s.state)+'°':''; ]]]
        tap_action: { action: navigate, navigation_path: /mobile-dash-v2/pool }
        custom_fields:
          chev: '<ha-icon icon="mdi:chevron-right" style="--mdc-icon-size:24px;color:var(--secondary-text-color);"></ha-icon>'
        styles: *menu_styles
      - type: custom:button-card
        name: Weather
        icon: mdi:weather-partly-cloudy
        show_state: false
        show_label: true
        label: |
          [[[ var s=states['sensor.bayberry_tempest_temperature']; return s?Math.round(s.state)+'°':''; ]]]
        tap_action: { action: navigate, navigation_path: /mobile-dash-v2/weather }
        custom_fields:
          chev: '<ha-icon icon="mdi:chevron-right" style="--mdc-icon-size:24px;color:var(--secondary-text-color);"></ha-icon>'
        styles: *menu_styles
      - type: custom:button-card
        name: Vacuum
        icon: mdi:robot-vacuum
        show_state: false
        show_label: true
        label: |
          [[[ var s=states['vacuum.roborock_s8']; return s?(s.state.charAt(0).toUpperCase()+s.state.slice(1)):''; ]]]
        tap_action: { action: navigate, navigation_path: /mobile-dash-v2/vacuum }
        custom_fields:
          chev: '<ha-icon icon="mdi:chevron-right" style="--mdc-icon-size:24px;color:var(--secondary-text-color);"></ha-icon>'
        styles: *menu_styles
      - type: custom:button-card
        name: Settings
        icon: mdi:cog
        show_state: false
        tap_action: { action: navigate, navigation_path: /mobile-dash-v2/settings }
        custom_fields:
          chev: '<ha-icon icon="mdi:chevron-right" style="--mdc-icon-size:24px;color:var(--secondary-text-color);"></ha-icon>'
        styles: *menu_styles

  # ------------------------------------------- notifications pop-up (#notifications)
  # Opened by the header notification chip. Renders the Notification Center card
  # from the separate `notification_center` integration (groups by priority,
  # gated dismiss/snooze, digest expansion). Do NOT rebuild the alert list here.
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        name: Notifications
        icon: mdi:bell-badge
        hash: "#notifications"
        theme: Dune Mist
        show_header: false
      # Gate the card so it is only instantiated once the Notification Center
      # integration is installed (sensor.notification_center has a numeric
      # state). Without this, HA tries to build custom:notification-center-card
      # before its resource exists and shows a "configuration error". When the
      # integration is absent the condition is false and nothing renders; the
      # header chip that opens this pop-up is hidden in that case too.
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.notification_center
            above: -1
        card:
          type: custom:notification-center-card
          title: Notifications
          show_header: true
