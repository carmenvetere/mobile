# lovelace_gen
# ============================================================================
#  Mobile Dash v2  ·  Lights  ·  Dune Mist
#  Per the handoff: collapsible room/floor sections (accordion), each a
#  separator header + full-row Bubble Sliders (drag to dim; icon tile lights
#  gold when on via the theme; % on the right). No mass "all on at full" —
#  each floor offers All Off only. Slider rows reuse the existing per-floor
#  light modules, so every entity maps to the same one as v1.
# ============================================================================
title: Lights
icon: mdi:lightbulb
theme: Dune Mist
path: lights-main
type: custom:grid-layout
cards:
  - type: vertical-stack
    card_mod:
      style: |
        :host { display: block; padding: 4px 10px 8px; }
    cards:
      # ---------------------------------------------------------- screen header
      - type: custom:button-card
        entity: sensor.lights_on_count
        icon: mdi:lightbulb-group
        name: Lights
        show_state: true
        show_label: true
        tap_action: { action: none }
        state_display: |
          [[[ return entity.state + ' on'; ]]]
        label: Tap a room to expand
        styles:
          card:
            - background: transparent !important
            - --ha-card-background: transparent
            - box-shadow: none
            - transition: none
            - padding: 4px 2px 6px
          grid:
            - grid-template-areas: '"back i n" "back i s" "back i l"'
            - grid-template-columns: 46px 54px 1fr
            - grid-template-rows: auto auto auto
            - align-items: center
            - column-gap: 8px
          img_cell:
            - grid-area: i
            - width: 48px
            - height: 48px
            - border-radius: 13px
            - background-color: "rgba(226,193,104,0.18)"
          icon:
            - width: 24px
            - color: var(--gold-color)
          name:
            - grid-area: n
            - justify-self: start
            - font-size: 22px
            - font-weight: 700
            - color: var(--primary-text-color)
          state:
            - grid-area: s
            - justify-self: start
            - font-size: 14px
            - font-weight: 700
            - color: var(--gold-color)
          label:
            - grid-area: l
            - justify-self: start
            - font-size: 12px
            - color: var(--secondary-text-color)
          custom_fields:
            back:
              - grid-area: back
        custom_fields:
          back:
            card:
              type: custom:button-card
              icon: mdi:chevron-left
              tap_action:
                action: navigate
                navigation_path: /mobile-dash-v2/mobile-home
              styles:
                card:
                  - background: var(--background-color-2) !important
                  - --ha-card-background: var(--background-color-2)
                  - box-shadow: none
                  - transition: none
                  - height: 40px
                  - width: 40px
                  - border-radius: 12px
                icon:
                  - width: 22px
                  - color: var(--primary-text-color)

      # --------------------------------------------------------- First Floor
      - type: custom:expander-card
        expanded: true
        title-card-clickable: true
        title-card:
          type: custom:bubble-card
          card_type: separator
          name: First Floor
          icon: mdi:home-floor-1
          rows: 0.75
          styles: &sep_style |
            .bubble-name { font-size: 17px !important; font-weight: 700 !important; }
            .bubble-line { background: var(--primary-text-color); opacity: 0.1; }
            .card-content { padding-top: 7px !important; }
        card_mod:
          style: &exp_mod |
            ha-card {
              background: transparent !important;
              --ha-card-background: transparent;
              box-shadow: none !important;
              border-radius: 18px !important;
              margin: 6px 2px 10px;
              padding: 2px 6px;
            }
        cards:
          - type: custom:button-card
            name: All Off
            icon: mdi:lightbulb-off-outline
            show_state: false
            tap_action:
              action: perform-action
              perform_action: homeassistant.turn_off
              target:
                entity_id:
                  - light.living_room_main_lights
                  - light.living_room_floor_lamps
                  - light.kitchen_main_lights
                  - light.kitchen_outer_wall
                  - light.kitchen_island_pendants
                  - light.kitchen_window_seat_sconce
                  - light.dining_room_main_lights
                  - light.dining_room_table_lamps
                  - light.dining_room_accent_lights
            styles: &alloff_style
              card:
                - padding: 8px 14px
                - border-radius: 12px
                - background: var(--background-color-2) !important
                - --ha-card-background: var(--background-color-2)
                - box-shadow: none
                - transition: none
                - margin: 2px 4px 8px
              grid:
                - grid-template-areas: '"i n"'
                - grid-template-columns: 32px 1fr
                - align-items: center
                - column-gap: 10px
              name:
                - justify-self: start
                - font-size: 13px
                - font-weight: 600
                - color: var(--secondary-text-color)
              img_cell:
                - width: 30px
                - height: 30px
                - border-radius: 9px
                - background-color: "rgba(255,255,255,0.06)"
              icon:
                - width: 18px
                - color: var(--secondary-text-color)
          - type: vertical-stack
            cards: !include [/config/dashboards/modules/first-floor-lights-individual.yaml, {module_name: mobile_lights, dashboard: mobile}]

      # -------------------------------------------------------- Second Floor
      - type: custom:expander-card
        expanded: false
        title-card-clickable: true
        title-card:
          type: custom:bubble-card
          card_type: separator
          name: Second Floor
          icon: mdi:home-floor-2
          rows: 0.75
          styles: *sep_style
        card_mod:
          style: *exp_mod
        cards:
          - type: custom:button-card
            name: All Off
            icon: mdi:lightbulb-off-outline
            show_state: false
            tap_action:
              action: perform-action
              perform_action: homeassistant.turn_off
              target:
                entity_id:
                  - light.upstairs_hallway_main_lights
                  - light.office_main_lights
                  - light.office_floor_lamp
                  - light.eve_light_strip_a5a4
                  - light.master_bedroom_main_lights
                  - light.master_bedroom_closet_light
                  - light.master_bedroom_sconces
                  - switch.bedroom_floor_lamp_switch
                  - light.master_bathroom_main_lights
                  - light.master_bathroom_vanity_lights
            styles: *alloff_style
          - type: vertical-stack
            cards: !include [/config/dashboards/modules/second-floor-lights-individual.yaml, {module_name: mobile_lights, dashboard: mobile}]

      # ------------------------------------------------------------ Basement
      - type: custom:expander-card
        expanded: false
        title-card-clickable: true
        title-card:
          type: custom:bubble-card
          card_type: separator
          name: Basement
          icon: mdi:home-floor-b
          rows: 0.75
          styles: *sep_style
        card_mod:
          style: *exp_mod
        cards:
          - type: custom:button-card
            name: All Off
            icon: mdi:lightbulb-off-outline
            show_state: false
            tap_action:
              action: perform-action
              perform_action: homeassistant.turn_off
              target:
                entity_id:
                  - light.gym_main_lights
                  - light.media_room_table_lamp
                  - light.laundry_room_main_lights
                  - light.basement_hallway_main_lights
                  - light.media_room_main_lights
                  - light.stairs_main_lights
                  - light.stairs_spot_lights
            styles: *alloff_style
          - type: vertical-stack
            cards: !include [/config/dashboards/modules/basement-lights-individual.yaml, {module_name: mobile_lights, dashboard: mobile}]

      # ------------------------------------------------------------- Outdoor
      - type: custom:expander-card
        expanded: false
        title-card-clickable: true
        title-card:
          type: custom:bubble-card
          card_type: separator
          name: Outdoor
          icon: mdi:outdoor-lamp
          rows: 0.75
          styles: *sep_style
        card_mod:
          style: *exp_mod
        cards:
          - type: custom:button-card
            name: All Off
            icon: mdi:lightbulb-off-outline
            show_state: false
            tap_action:
              action: perform-action
              perform_action: homeassistant.turn_off
              target:
                entity_id:
                  - light.front_porch_overhead_light
                  - switch.transformer_zone_1
                  - switch.transformer_zone_2
                  - light.patio_back_porch_lights
                  - switch.transformer_zone_3
                  - light.omnilogic_pool_color_lights
                  - light.driveway_sconces
                  - switch.driveway_zone_2_2
                  - switch.driveway_zone_1_2
                  - switch.driveway_zone_3_2
            styles: *alloff_style
          - type: vertical-stack
            cards: !include [/config/dashboards/modules/outdoor-lights-individual.yaml, {module_name: mobile_lights, dashboard: mobile}]
