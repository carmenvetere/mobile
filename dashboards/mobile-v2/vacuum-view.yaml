# lovelace_gen
# ============================================================================
#  Mobile Dash v2  ·  Vacuum  ·  Dune Mist
#  Per the handoff: header (Roborock S8 · state · battery) -> map + Start
#  (sage) / Dock buttons -> controls -> "Clean a room" grids (selected room
#  shows a check). Same vacuum, selects and per-room input_booleans as v1.
# ============================================================================
title: Vacuum
icon: mdi:robot-vacuum
theme: Dune Mist
path: vacuum
type: custom:grid-layout
cards:
  - type: vertical-stack
    card_mod:
      style: |
        :host { display: block; padding: 4px 10px 8px; }
    cards:
      # ---------------------------------------------------------- screen header
      - type: custom:button-card
        entity: vacuum.roborock_s8
        icon: mdi:robot-vacuum
        name: Vacuum
        show_state: false
        show_label: true
        tap_action: { action: more-info }
        label: |
          [[[
            var v = entity ? (entity.state.charAt(0).toUpperCase() + entity.state.slice(1)) : '';
            var b = states['sensor.roborock_s8_battery'];
            return 'Roborock S8 · ' + v + (b ? ' · ' + Math.round(b.state) + '%' : '');
          ]]]
        styles:
          card:
            - background: transparent !important
            - --ha-card-background: transparent
            - box-shadow: none
            - transition: none
            - padding: 4px 2px 6px
          grid:
            - grid-template-areas: '"back i n" "back i l"'
            - grid-template-columns: 46px 54px 1fr
            - grid-template-rows: auto auto
            - align-items: center
            - column-gap: 8px
          img_cell:
            - grid-area: i
            - width: 48px
            - height: 48px
            - border-radius: 13px
            - background-color: "rgba(142,177,191,0.18)"
          icon:
            - width: 24px
            - color: var(--slate-bright)
          name:
            - grid-area: n
            - justify-self: start
            - font-size: 22px
            - font-weight: 700
            - color: var(--primary-text-color)
          label:
            - grid-area: l
            - justify-self: start
            - font-size: 12px
            - color: var(--secondary-text-color)
          custom_fields:
            back:
              - grid-area: back
        custom_fields:
          back:
            card:
              type: custom:button-card
              icon: mdi:chevron-left
              tap_action:
                action: navigate
                navigation_path: /mobile-dash-v2/mobile-home
              styles:
                card:
                  - background: var(--background-color-2) !important
                  - --ha-card-background: var(--background-color-2)
                  - box-shadow: none
                  - transition: none
                  - height: 40px
                  - width: 40px
                  - border-radius: 12px
                icon:
                  - width: 22px
                  - color: var(--primary-text-color)

      # --------------------------------------------------------------- map
      - type: picture-entity
        entity: image.roborock_s8_basement
        show_state: false
        show_name: false
        camera_view: auto
        fit_mode: contain
        tap_action: { action: more-info }
        card_mod:
          style: |
            ha-card {
              background: var(--card-background-color) !important;
              --ha-card-background: var(--card-background-color);
              border-radius: 18px; overflow: hidden;
              box-shadow: none !important; padding: 6px;
            }

      # ------------------------------------------------------- start / dock
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:button-card
            name: Start
            icon: mdi:play
            show_state: false
            tap_action:
              action: perform-action
              perform_action: vacuum.start
              target: { entity_id: vacuum.roborock_s8 }
            styles:
              card:
                - padding: 14px
                - border-radius: 16px
                - background: var(--sage-color) !important
                - --ha-card-background: var(--sage-color)
                - box-shadow: none
                - transition: none
              grid:
                - grid-template-areas: '"i n"'
                - grid-template-columns: auto auto
                - justify-content: center
                - align-items: center
                - column-gap: 8px
              icon:
                - width: 20px
                - color: var(--text-primary-color)
              name:
                - font-size: 15px
                - font-weight: 700
                - color: var(--text-primary-color)
          - type: custom:button-card
            name: Dock
            icon: mdi:home-import-outline
            show_state: false
            tap_action:
              action: perform-action
              perform_action: vacuum.return_to_base
              target: { entity_id: vacuum.roborock_s8 }
            styles:
              card:
                - padding: 14px
                - border-radius: 16px
                - background: var(--background-color-2) !important
                - --ha-card-background: var(--background-color-2)
                - box-shadow: none
                - transition: none
              grid:
                - grid-template-areas: '"i n"'
                - grid-template-columns: auto auto
                - justify-content: center
                - align-items: center
                - column-gap: 8px
              icon:
                - width: 20px
                - color: var(--slate-bright)
              name:
                - font-size: 15px
                - font-weight: 700
                - color: var(--primary-text-color)

      # ----------------------------------------------------------- controls
      - type: custom:bubble-card
        card_type: separator
        name: Controls
        icon: mdi:tune
        rows: 0.75
        styles: &sep_section |
          .bubble-name { font-size: 13px !important; font-weight: 700 !important;
            text-transform: uppercase; letter-spacing: 0.06em;
            color: rgba(255,255,255,0.6) !important; }
          .bubble-line { background: var(--primary-text-color); opacity: 0.1; }
          .card-content { padding-top: 7px !important; }
      - type: custom:bubble-card
        name: Suction Level
        icon: mdi:fan
        card_type: button
        card_layout: large
        button_type: state
        entity: input_select.vacuum_suction_mode
        show_state: false
        sub_button:
          - entity: input_select.vacuum_suction_mode
            show_background: true
            show_attribute: false
            show_state: true
            show_icon: false
        styles: |
          .bubble-name { font-size: 16px !important; }
        modules:
          - Mobile Module Theme
      - type: custom:bubble-card
        name: Mop Intensity
        icon: mdi:water
        card_type: button
        card_layout: large
        button_type: state
        entity: select.roborock_s8_mop_intensity
        show_state: false
        sub_button:
          - entity: select.roborock_s8_mop_intensity
            show_background: true
            show_attribute: false
            show_state: true
            show_icon: false
        styles: |
          .bubble-name { font-size: 16px !important; }
        modules:
          - Mobile Module Theme
      - type: custom:bubble-card
        name: Mop Mode
        icon: mdi:heating-coil
        card_type: button
        card_layout: large
        button_type: state
        entity: select.roborock_s8_mop_mode
        show_state: false
        sub_button:
          - entity: select.roborock_s8_mop_mode
            show_background: true
            show_attribute: false
            show_state: true
            show_icon: false
        styles: |
          .bubble-name { font-size: 16px !important; }
        modules:
          - Mobile Module Theme

      # ------------------------------------------------------- clean a room
      - type: custom:bubble-card
        card_type: separator
        name: Clean a room · Basement
        icon: mdi:home-floor-b
        rows: 0.75
        styles: *sep_section
      - type: grid
        columns: 2
        square: false
        cards:
          - !include [/config/dashboards/mobile-v2/_room-toggle.yaml, {entity: input_boolean.vacuum_mudroom, name: Mudroom}]
          - !include [/config/dashboards/mobile-v2/_room-toggle.yaml, {entity: input_boolean.vacuum_basement_bathroom, name: Bathroom}]
          - !include [/config/dashboards/mobile-v2/_room-toggle.yaml, {entity: input_boolean.vacuum_gym, name: Gym}]
          - !include [/config/dashboards/mobile-v2/_room-toggle.yaml, {entity: input_boolean.vacuum_media_room, name: Media Room}]
          - !include [/config/dashboards/mobile-v2/_room-toggle.yaml, {entity: input_boolean.vacuum_basement_hallway, name: Hallway}]
      - type: custom:bubble-card
        card_type: separator
        name: First Floor
        icon: mdi:home-floor-1
        rows: 0.75
        styles: *sep_section
      - type: grid
        columns: 2
        square: false
        cards:
          - !include [/config/dashboards/mobile-v2/_room-toggle.yaml, {entity: input_boolean.vacuum_kitchen, name: Kitchen}]
          - !include [/config/dashboards/mobile-v2/_room-toggle.yaml, {entity: input_boolean.vacuum_living_room, name: Living Room}]
          - !include [/config/dashboards/mobile-v2/_room-toggle.yaml, {entity: input_boolean.vacuum_first_floor_bathroom, name: Bathroom}]
          - !include [/config/dashboards/mobile-v2/_room-toggle.yaml, {entity: input_boolean.vacuum_dining_room, name: Dining Room}]
          - !include [/config/dashboards/mobile-v2/_room-toggle.yaml, {entity: input_boolean.vacuum_entry, name: Entry}]
      - type: custom:bubble-card
        card_type: separator
        name: Second Floor
        icon: mdi:home-floor-2
        rows: 0.75
        styles: *sep_section
      - type: grid
        columns: 2
        square: false
        cards:
          - !include [/config/dashboards/mobile-v2/_room-toggle.yaml, {entity: input_boolean.vacuum_second_floor_hallway, name: Hallway}]
          - !include [/config/dashboards/mobile-v2/_room-toggle.yaml, {entity: input_boolean.vacuum_guest_bathroom, name: Guest Bathroom}]
          - !include [/config/dashboards/mobile-v2/_room-toggle.yaml, {entity: input_boolean.vacuum_office, name: Office}]
          - !include [/config/dashboards/mobile-v2/_room-toggle.yaml, {entity: input_boolean.vacuum_front_guest_bedroom, name: Front Guest Bedroom}]
          - !include [/config/dashboards/mobile-v2/_room-toggle.yaml, {entity: input_boolean.vacuum_back_guest_bedroom, name: Back Guest Bedroom}]
          - !include [/config/dashboards/mobile-v2/_room-toggle.yaml, {entity: input_boolean.vacuum_primary_bedroom, name: Primary Bedroom}]
          - !include [/config/dashboards/mobile-v2/_room-toggle.yaml, {entity: input_boolean.vacuum_primary_bathroom, name: Primary Bathroom}]
