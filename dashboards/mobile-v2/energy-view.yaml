# lovelace_gen
# ============================================================================
#  Mobile Dash v2  ·  Energy  ·  Dune Mist
#  Per the handoff: header (off-grid / battery) -> live Power-flow diagram +
#  device row -> 2-up Produced / Used today -> solar forecast + trend charts.
#  Power-flow, forecast and history charts reuse the existing modules, so
#  every energy/solar/powerwall entity maps to the same one as v1.
# ============================================================================
title: Energy
icon: mdi:lightning-bolt
theme: Dune Mist
path: energy
type: custom:grid-layout
cards:
  - type: vertical-stack
    card_mod:
      style: |
        :host { display: block; padding: 4px 10px 8px; }
    cards:
      # ---------------------------------------------------------- screen header
      - type: custom:button-card
        entity: sensor.bayberry_charge
        icon: mdi:lightning-bolt
        name: Energy
        show_state: false
        show_label: true
        tap_action: { action: none }
        label: |
          [[[
            var b = states['sensor.bayberry_charge'];
            var og = states['switch.bayberry_off_grid_operation'];
            var grid = (og && og.state === 'on') ? 'Off-grid' : 'Grid-tied';
            return grid + ' · Battery ' + (b ? Math.round(b.state) : '?') + '%';
          ]]]
        styles:
          card:
            - background: transparent !important
            - --ha-card-background: transparent
            - box-shadow: none
            - transition: none
            - padding: 4px 2px 6px
          grid:
            - grid-template-areas: '"back i n" "back i l"'
            - grid-template-columns: 46px 54px 1fr
            - grid-template-rows: auto auto
            - align-items: center
            - column-gap: 8px
          img_cell:
            - grid-area: i
            - width: 48px
            - height: 48px
            - border-radius: 13px
            - background-color: "rgba(226,193,104,0.18)"
          icon:
            - width: 24px
            - color: var(--gold-color)
          name:
            - grid-area: n
            - justify-self: start
            - font-size: 22px
            - font-weight: 700
            - color: var(--primary-text-color)
          label:
            - grid-area: l
            - justify-self: start
            - font-size: 12px
            - color: var(--secondary-text-color)
          custom_fields:
            back:
              - grid-area: back
        custom_fields:
          back:
            card:
              type: custom:button-card
              icon: mdi:chevron-left
              tap_action:
                action: navigate
                navigation_path: /mobile-dash-v2/mobile-home
              styles:
                card:
                  - background: var(--background-color-2) !important
                  - --ha-card-background: var(--background-color-2)
                  - box-shadow: none
                  - transition: none
                  - height: 40px
                  - width: 40px
                  - border-radius: 12px
                icon:
                  - width: 22px
                  - color: var(--primary-text-color)

      # --------------------------------------------------------- live power flow
      - type: custom:bubble-card
        card_type: separator
        name: Live power flow
        icon: mdi:transmission-tower
        rows: 0.75
        styles: &sep_section |
          .bubble-name { font-size: 13px !important; font-weight: 700 !important;
            text-transform: uppercase; letter-spacing: 0.06em;
            color: rgba(255,255,255,0.6) !important; }
          .bubble-line { background: var(--primary-text-color); opacity: 0.1; }
          .card-content { padding-top: 7px !important; }
      - !include /config/dashboards/modules/power-flow-card.yaml

      # -------------------------------------------------- produced / used today
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:button-card
            entity: sensor.bayberry_solar_generated
            name: Produced today
            icon: mdi:solar-power-variant
            show_state: true
            tap_action: { action: more-info }
            state_display: |
              [[[ return (Math.round(entity.state * 10) / 10) + ' kWh'; ]]]
            styles: &stat_styles
              card:
                - padding: 14px
                - border-radius: 16px
                - background: var(--background-color-2) !important
                - --ha-card-background: var(--background-color-2)
                - box-shadow: none
                - transition: none
              grid:
                - grid-template-areas: '"i" "s" "n"'
                - grid-template-rows: auto auto auto
                - row-gap: 5px
                - justify-items: start
              img_cell:
                - width: 40px
                - height: 40px
                - border-radius: 11px
                - background-color: "rgba(226,193,104,0.18)"
              icon:
                - width: 20px
                - color: var(--gold-color)
              state:
                - font-size: 22px
                - font-weight: 700
                - color: var(--primary-text-color)
              name:
                - font-size: 12px
                - color: var(--secondary-text-color)
          - type: custom:button-card
            entity: sensor.bayberry_home_usage
            name: Used today
            icon: mdi:home-lightning-bolt
            show_state: true
            tap_action: { action: more-info }
            state_display: |
              [[[ return (Math.round(entity.state * 10) / 10) + ' kWh'; ]]]
            styles:
              <<: *stat_styles
              img_cell:
                - width: 40px
                - height: 40px
                - border-radius: 11px
                - background-color: "rgba(142,177,191,0.18)"
              icon:
                - width: 20px
                - color: var(--slate-bright)

      # ------------------------------------------------- today's solar forecast
      - type: custom:bubble-card
        card_type: separator
        name: Today's solar forecast
        icon: mdi:weather-sunny
        rows: 0.75
        styles: *sep_section
      - !include /config/dashboards/modules/solar-forecast-today.yaml

      # ----------------------------------------------------- 7-day solar forecast
      - type: custom:bubble-card
        card_type: separator
        name: 7-day solar forecast
        icon: mdi:white-balance-sunny
        rows: 0.75
        styles: *sep_section
      - !include /config/dashboards/modules/7-day-solar-forecast.yaml

      # ------------------------------------------------------ last 24h power flow
      - type: custom:bubble-card
        card_type: separator
        name: Last 24 hours
        icon: mdi:chart-line
        rows: 0.75
        styles: *sep_section
      - !include /config/dashboards/modules/24-hour-power-flow.yaml

      # --------------------------------------------------- last 7 days home usage
      - type: custom:bubble-card
        card_type: separator
        name: Last 7 days usage
        icon: mdi:chart-bar
        rows: 0.75
        styles: *sep_section
      - !include /config/dashboards/modules/7-day-usage-history.yaml
