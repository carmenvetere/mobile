# lovelace_gen
# ============================================================================
#  Mobile Dash v2  ·  Pool  ·  Dune Mist
#  Per the handoff: header -> 2-up stats (Water / Salt; NO pH sensor exists,
#  so none is shown) -> Filter Pump (on/off + Low/Medium/High) -> Heater set
#  temp (slider + on/off) -> Chlorinator + Cover. Controls reuse the same
#  OmniLogic entities as v1.
# ============================================================================
title: Pool
icon: mdi:pool
theme: Dune Mist
path: pool
type: custom:grid-layout
cards:
  - type: vertical-stack
    card_mod:
      style: |
        :host { display: block; padding: 4px 10px 8px; }
    cards:
      # ---------------------------------------------------------- screen header
      - type: custom:button-card
        entity: switch.omnilogic_pool_filter_pump
        icon: mdi:pool
        name: Pool
        show_state: false
        show_label: true
        tap_action: { action: none }
        label: |
          [[[
            var w = states['sensor.omnilogic_pool_watersensor'];
            var p = entity && entity.state === 'on' ? 'Pump on' : 'Pump off';
            return (w ? Math.round(w.state) + '° · ' : '') + p;
          ]]]
        styles:
          card:
            - background: transparent !important
            - --ha-card-background: transparent
            - box-shadow: none
            - transition: none
            - padding: 4px 2px 6px
          grid:
            - grid-template-areas: '"back i n" "back i l"'
            - grid-template-columns: 46px 54px 1fr
            - grid-template-rows: auto auto
            - align-items: center
            - column-gap: 8px
          img_cell:
            - grid-area: i
            - width: 48px
            - height: 48px
            - border-radius: 13px
            - background-color: "rgba(142,177,191,0.18)"
          icon:
            - width: 24px
            - color: var(--slate-bright)
          name:
            - grid-area: n
            - justify-self: start
            - font-size: 22px
            - font-weight: 700
            - color: var(--primary-text-color)
          label:
            - grid-area: l
            - justify-self: start
            - font-size: 12px
            - color: var(--secondary-text-color)
          custom_fields:
            back:
              - grid-area: back
        custom_fields:
          back:
            card:
              type: custom:button-card
              icon: mdi:chevron-left
              tap_action:
                action: navigate
                navigation_path: /mobile-dash-v2/mobile-home
              styles:
                card:
                  - background: var(--background-color-2) !important
                  - --ha-card-background: var(--background-color-2)
                  - box-shadow: none
                  - transition: none
                  - height: 40px
                  - width: 40px
                  - border-radius: 12px
                icon:
                  - width: 22px
                  - color: var(--primary-text-color)

      # ----------------------------------------------------------- 2-up stats
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:button-card
            entity: sensor.omnilogic_pool_watersensor
            name: Water
            icon: mdi:pool-thermometer
            show_state: true
            tap_action: { action: more-info }
            state_display: |
              [[[ return Math.round(entity.state) + '°'; ]]]
            styles: &stat_styles
              card:
                - padding: 14px
                - border-radius: 16px
                - background: var(--background-color-2) !important
                - --ha-card-background: var(--background-color-2)
                - box-shadow: none
                - transition: none
              grid:
                - grid-template-areas: '"i" "s" "n"'
                - grid-template-rows: auto auto auto
                - row-gap: 5px
                - justify-items: start
              img_cell:
                - width: 40px
                - height: 40px
                - border-radius: 11px
                - background-color: "rgba(142,177,191,0.18)"
              icon:
                - width: 20px
                - color: var(--slate-bright)
              state:
                - font-size: 22px
                - font-weight: 700
                - color: var(--primary-text-color)
              name:
                - font-size: 12px
                - color: var(--secondary-text-color)
          - type: custom:button-card
            entity: sensor.omnilogic_pool_chlorinator_average_salt_level
            name: Salt
            icon: mdi:shaker-outline
            show_state: true
            tap_action: { action: more-info }
            state_display: |
              [[[ return Math.round(entity.state).toLocaleString() + ' ppm'; ]]]
            styles:
              <<: *stat_styles
              img_cell:
                - width: 40px
                - height: 40px
                - border-radius: 11px
                - background-color: "rgba(139,166,128,0.18)"
              icon:
                - width: 20px
                - color: var(--sage-color)

      # ----------------------------------------------------------- filter pump
      - type: custom:bubble-card
        card_type: separator
        name: Filter pump
        icon: mdi:pump
        rows: 0.75
        styles: &sep_section |
          .bubble-name { font-size: 13px !important; font-weight: 700 !important;
            text-transform: uppercase; letter-spacing: 0.06em;
            color: rgba(255,255,255,0.6) !important; }
          .bubble-line { background: var(--primary-text-color); opacity: 0.1; }
          .card-content { padding-top: 7px !important; }
      - type: custom:bubble-card
        card_type: button
        entity: switch.omnilogic_pool_filter_pump
        show_state: true
        name: Filter Pump
        icon: mdi:pump
        styles: |-
          .bubble-sub-button { font-size: 14px !important; font-weight: 700 !important; }
          .bubble-name { font-size: 16px !important; }
        sub_button:
          - entity: number.omnilogic_pool_filter_pump_speed
            show_state: true
            show_attribute: true
        modules:
          - Mobile Module Theme
      - type: custom:bubble-card
        card_type: button
        entity: number.omnilogic_pool_filter_pump_speed
        button_type: slider
        tap_action: { action: none }
        hold_action: { action: none }
        double_tap_action: { action: none }
        name: Pump Speed
        show_state: true
        show_attribute: true
        attribute: current_percent
        slider_live_update: true
        styles: |-
          .bubble-sub-button { font-size: 14px !important; font-weight: 700 !important; }
          .bubble-name { font-size: 16px !important; }
        sub_button:
          - entity: button.omnilogic_pool_filter_pump_low_speed
            name: Low
            show_state: false
            show_name: true
            tap_action:
              action: perform-action
              perform_action: button.press
              target: { entity_id: button.omnilogic_pool_filter_pump_low_speed }
          - entity: button.omnilogic_pool_filter_pump_medium_speed
            name: Medium
            show_state: false
            show_name: true
            tap_action:
              action: perform-action
              perform_action: button.press
              target: { entity_id: button.omnilogic_pool_filter_pump_medium_speed }
          - entity: button.omnilogic_pool_filter_pump_high_speed
            name: High
            show_state: false
            show_name: true
            tap_action:
              action: perform-action
              perform_action: button.press
              target: { entity_id: button.omnilogic_pool_filter_pump_high_speed }
        modules:
          - Mobile Module Theme

      # ---------------------------------------------------------------- heater
      - type: custom:bubble-card
        card_type: separator
        name: Heater
        icon: mdi:water-boiler
        rows: 0.75
        styles: *sep_section
      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: input_number.pool_heater_setpoint
        name: Pool Heater Set Temp
        icon: mdi:water-boiler
        show_state: false
        card_layout: large
        tap_action: { action: none }
        hold_action: { action: none }
        double_tap_action: { action: none }
        styles: |-
          .bubble-name { font-size: 16px !important; }
          .bubble-temperature-display { font-size: 16px !important; font-weight: bold; }
          .bubble-sub-button { font-size: 14px !important; font-weight: bold; }
        sub_button:
          - entity: water_heater.omnilogic_pool_heater
            show_state: false
            show_attribute: true
            attribute: temperature
            show_icon: false
            show_background: false
        modules:
          - Mobile Module Theme
      - type: custom:bubble-card
        card_type: button
        entity: water_heater.omnilogic_pool_heater
        name: Pool Heater On/Off
        icon: mdi:water-boiler
        show_state: true
        tap_action: { action: toggle }
        card_layout: large
        styles: |-
          .bubble-name { font-size: 16px !important; }
          .bubble-temperature-display { font-size: 16px !important; font-weight: bold; }
        modules:
          - Mobile Module Theme

      # ------------------------------------------------------- chlorinator + cover
      - type: custom:bubble-card
        card_type: separator
        name: Chlorinator & cover
        icon: mdi:toggle-switch-variant
        rows: 0.75
        styles: *sep_section
      - type: custom:bubble-card
        card_type: button
        entity: switch.omnilogic_pool_chlorinator
        show_state: true
        name: Chlorinator
        icon: mdi:toggle-switch-variant
        styles: |-
          .bubble-sub-button { font-size: 14px !important; font-weight: 700 !important; }
          .bubble-name { font-size: 16px !important; }
        sub_button:
          - entity: number.omnilogic_pool_chlorinator_timed_percent
            show_state: true
            show_attribute: true
            show_background: false
        modules:
          - Mobile Module Theme
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:button-card
            entity: binary_sensor.pool_cover
            name: Cover
            icon: mdi:garage-variant
            show_state: true
            tap_action: { action: more-info }
            state_display: |
              [[[ return entity.state === 'on' ? 'Open' : 'Closed'; ]]]
            styles:
              <<: *stat_styles
              img_cell:
                - width: 40px
                - height: 40px
                - border-radius: 11px
                - background-color: "rgba(224,167,94,0.18)"
              icon:
                - width: 20px
                - color: var(--amber-color)
          - type: custom:button-card
            entity: sensor.omnilogic_pool_chlorinator_average_salt_level
            name: Salt level
            icon: mdi:chart-line
            show_state: true
            tap_action: { action: more-info }
            state_display: |
              [[[ return Math.round(entity.state).toLocaleString() + ' ppm'; ]]]
            styles:
              <<: *stat_styles
              img_cell:
                - width: 40px
                - height: 40px
                - border-radius: 11px
                - background-color: "rgba(139,166,128,0.18)"
              icon:
                - width: 20px
                - color: var(--sage-color)
