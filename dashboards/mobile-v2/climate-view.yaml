# lovelace_gen
# ============================================================================
#  Mobile Dash v2  ·  Climate  ·  Dune Mist
#  Per the handoff: header -> 3-up summary (Outside / Humidity / Air Quality)
#  -> one zone card per thermostat (4), each tinted by mode (heat=amber,
#  cool=slate, auto=sage) with current temp, setpoint, Mode + Fan pills,
#  per-room sensor readings (temp/humidity/CO2/PM2.5) and Room-priority
#  toggles. Zone cards reuse the existing climate-row + priority-row modules,
#  so every entity maps to the same one as v1.
# ============================================================================
title: Climate
icon: mdi:fan
theme: Dune Mist
path: climate-main
type: custom:grid-layout
cards:
  - type: vertical-stack
    card_mod:
      style: |
        :host { display: block; padding: 4px 10px 8px; }
    cards:
      # ---------------------------------------------------------- screen header
      - type: custom:button-card
        icon: mdi:thermostat
        name: Climate
        show_state: false
        show_label: true
        tap_action: { action: none }
        label: Tap a zone to adjust
        styles:
          card:
            - background: transparent !important
            - --ha-card-background: transparent
            - box-shadow: none
            - transition: none
            - padding: 4px 2px 6px
          grid:
            - grid-template-areas: '"back i n" "back i l"'
            - grid-template-columns: 46px 54px 1fr
            - grid-template-rows: auto auto
            - align-items: center
            - column-gap: 8px
          img_cell:
            - grid-area: i
            - width: 48px
            - height: 48px
            - border-radius: 13px
            - background-color: "rgba(142,177,191,0.18)"
          icon:
            - width: 24px
            - color: var(--slate-bright)
          name:
            - grid-area: n
            - justify-self: start
            - font-size: 22px
            - font-weight: 700
            - color: var(--primary-text-color)
          label:
            - grid-area: l
            - justify-self: start
            - font-size: 12px
            - color: var(--secondary-text-color)
          custom_fields:
            back:
              - grid-area: back
        custom_fields:
          back:
            card:
              type: custom:button-card
              icon: mdi:chevron-left
              tap_action:
                action: navigate
                navigation_path: /mobile-dash-v2/mobile-home
              styles:
                card:
                  - background: var(--background-color-2) !important
                  - --ha-card-background: var(--background-color-2)
                  - box-shadow: none
                  - transition: none
                  - height: 40px
                  - width: 40px
                  - border-radius: 12px
                icon:
                  - width: 22px
                  - color: var(--primary-text-color)

      # ------------------------------------------------------- 3-up summary
      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:button-card
            entity: sensor.bayberry_tempest_temperature
            name: Outside
            icon: mdi:thermometer
            show_state: true
            tap_action:
              action: more-info
              entity: sensor.tempest_temperature_5min
            state_display: |
              [[[ return Math.round(entity.state) + '°'; ]]]
            styles: &stat_styles
              card:
                - padding: 13px 8px
                - border-radius: 16px
                - background: var(--background-color-2) !important
                - --ha-card-background: var(--background-color-2)
                - box-shadow: none
                - transition: none
              grid:
                - grid-template-areas: '"i" "s" "n"'
                - grid-template-rows: auto auto auto
                - row-gap: 5px
                - justify-items: center
              img_cell:
                - width: 40px
                - height: 40px
                - border-radius: 11px
                - background-color: "rgba(182,210,220,0.18)"
              icon:
                - width: 20px
                - color: var(--slate-bright)
              state:
                - font-size: 20px
                - font-weight: 700
                - color: var(--primary-text-color)
              name:
                - font-size: 11px
                - color: var(--secondary-text-color)
          - type: custom:button-card
            entity: sensor.bayberry_tempest_humidity
            name: Humidity
            icon: mdi:water-percent
            show_state: true
            tap_action:
              action: more-info
              entity: sensor.tempest_humidity_5min
            state_display: |
              [[[ return Math.round(entity.state) + '%'; ]]]
            styles:
              <<: *stat_styles
              img_cell:
                - width: 40px
                - height: 40px
                - border-radius: 11px
                - background-color: "rgba(142,177,191,0.18)"
              icon:
                - width: 20px
                - color: var(--slate-color)
          - type: custom:button-card
            entity: sensor.first_floor_air_quality_pm2_5
            name: Air Quality
            icon: mdi:leaf
            show_state: true
            tap_action: { action: more-info }
            state_display: |
              [[[
                var v = parseFloat(entity.state);
                if (isNaN(v)) return entity.state;
                return v < 12 ? 'Good' : (v < 35 ? 'Fair' : 'Poor');
              ]]]
            styles:
              <<: *stat_styles
              img_cell:
                - width: 40px
                - height: 40px
                - border-radius: 11px
                - background-color: "rgba(139,166,128,0.18)"
              icon:
                - width: 20px
                - color: var(--sage-color)

      # ----------------------------------------- air-quality / fresh-air alerts
      - type: custom:mushroom-chips-card
        alignment: start
        card_mod:
          style: |
            ha-card { background: transparent !important; box-shadow: none !important; }
        chips:
          - type: conditional
            conditions:
              - condition: state
                entity: switch.utility_room_ventilation_damper
                state: "on"
            chip:
              type: template
              content: Fresh Air
              entity: switch.utility_room_ventilation_damper
              tap_action: { action: more-info }
              icon: mdi:tailwind
              icon_color: green
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: sensor.bedroom_co2_5min
                above: 800
            chip:
              type: template
              content: Bedroom CO₂
              entity: sensor.bedroom_co2_5min
              tap_action: { action: more-info }
              icon: mdi:cloud-alert
              icon_color: orange
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: sensor.first_floor_co2_5min
                above: 800
            chip:
              type: template
              content: First Floor CO₂
              entity: sensor.first_floor_co2_5min
              tap_action: { action: more-info }
              icon: mdi:cloud-alert
              icon_color: orange
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: sensor.bedroom_pm2_5_5min
                above: 10
            chip:
              type: template
              content: Bedroom PM2.5
              entity: sensor.bedroom_pm2_5_5min
              tap_action: { action: more-info }
              icon: mdi:weather-dust
              icon_color: orange
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: sensor.first_floor_pm2_5_5min
                above: 10
            chip:
              type: template
              content: First Floor PM2.5
              entity: sensor.first_floor_pm2_5_5min
              tap_action: { action: more-info }
              icon: mdi:weather-dust
              icon_color: orange

      # --------------------------------------------------- zone: First Floor
      - type: custom:expander-card
        expanded: true
        title-card-clickable: true
        card_mod:
          style: &zone_card |
            ha-card {
              background: var(--card-background-color) !important;
              --ha-card-background: var(--card-background-color);
              border: 1px solid rgba(255,255,255,0.06) !important;
              border-radius: 20px !important;
              box-shadow: 0 2px 6px rgba(0,0,0,0.28) !important;
              padding: 8px 14px 10px !important;
              margin: 0 2px 10px !important;
              box-sizing: border-box !important;
              overflow: hidden !important;
            }
        title-card:
          type: custom:bubble-card
          card_type: separator
          name: First Floor
          icon: mdi:home-floor-1
          rows: 0.75
          sub_button:
            - entity: sensor.living_room_thermostat_current_temperature
              show_state: true
              show_icon: true
              show_background: false
            - entity: sensor.living_room_thermostat_current_humidity
              show_state: true
              show_background: false
              show_icon: true
            - entity: sensor.first_floor_co2_5min
              show_state: true
              show_background: false
              show_icon: true
            - entity: sensor.first_floor_pm2_5_5min
              show_state: true
              show_background: false
              show_icon: true
          styles: &zone_sep |
            ha-card { max-width: 100% !important; width: 100% !important;
              box-sizing: border-box !important; overflow: hidden !important; }
            .bubble-name { font-size: 16px !important; font-weight: 700 !important;
              color: var(--primary-text-color) !important; }
            .bubble-sub-button { font-size: 14px !important; font-weight: 600 !important;
              color: var(--primary-text-color) !important; background: transparent !important;
              border: none !important; }
            .bubble-line { background: linear-gradient(to right, rgba(255,255,255,0.12), transparent 90%) !important;
              opacity: 1 !important; height: 1px !important; }
            .card-content { padding: 4px 6px 10px !important; }
            @media (max-width: 600px) { .bubble-sub-button-4 { display: none !important; } }
            @media (max-width: 500px) { .bubble-sub-button-2 { display: none !important; } }
            @media (max-width: 420px) { .bubble-sub-button-3 { display: none !important; } }
        cards:
          - type: vertical-stack
            cards:
              - !include
                  - /config/dashboards/modules/mobile-climate-row.yaml
                  - climate_entity: climate.living_room_thermostat
                    thermostat_name: Living Room Thermostat
                    rows: 2.5
                    module_name: mobile_climate

      # ------------------------------------------------------ zone: Basement
      - type: custom:expander-card
        expanded: true
        title-card-clickable: true
        card_mod:
          style: *zone_card
        title-card:
          type: custom:bubble-card
          card_type: separator
          name: Basement
          icon: mdi:home-floor-b
          rows: 0.75
          sub_button:
            - entity: sensor.basement_thermostat_homekit_current_temperature
              show_state: true
              show_icon: true
              show_background: false
            - entity: sensor.basement_thermostat_homekit_current_humidity
              show_state: true
              show_background: false
              show_icon: true
          styles: *zone_sep
        cards:
          - type: vertical-stack
            cards:
              - !include
                  - /config/dashboards/modules/mobile-climate-row.yaml
                  - climate_entity: climate.basement_thermostat
                    thermostat_name: Hallway Thermostat
                    module_name: mobile_climate
              - !include
                  - /config/dashboards/modules/mobile-priority-row.yaml
                  - switch_entity: switch.basement_thermostat_family_room_priority
                    row_name: Media Room Priority
                    temp_sensor: sensor.family_room_air_sensor_01_temperature_sensor
                    humidity_sensor: sensor.family_room_air_sensor_01_humidity_sensor

      # --------------------------------------------- zone: Office & Bedrooms
      - type: custom:expander-card
        expanded: true
        title-card-clickable: true
        card_mod:
          style: *zone_card
        title-card:
          type: custom:bubble-card
          card_type: separator
          name: Office and Bedrooms
          icon: mdi:home-floor-2
          rows: 0.75
          sub_button:
            - entity: sensor.office_thermostat_homekit_current_temperature
              show_state: true
              show_icon: true
              show_background: false
          styles: *zone_sep
        cards:
          - type: vertical-stack
            cards:
              - !include
                  - /config/dashboards/modules/mobile-climate-row.yaml
                  - climate_entity: climate.office_thermostat
                    thermostat_name: Office Thermostat
                    module_name: mobile_climate
              - !include
                  - /config/dashboards/modules/mobile-priority-row.yaml
                  - switch_entity: switch.office_thermostat_front_guest_bedroom_priority
                    row_name: Front Guest Room Priority
                    temp_sensor: sensor.front_guest_bedroom_air_sensor_02_temperature_sensor
                    humidity_sensor: sensor.front_guest_bedroom_air_sensor_02_humidity_sensor
              - !include
                  - /config/dashboards/modules/mobile-priority-row.yaml
                  - switch_entity: switch.office_thermostat_guest_bedroom_priority
                    row_name: Back Guest Room Priority
                    temp_sensor: sensor.guest_bedroom_air_sensor_01_temperature_sensor
                    humidity_sensor: sensor.guest_bedroom_air_sensor_01_humidity_sensor
              - !include
                  - /config/dashboards/modules/mobile-priority-row.yaml
                  - switch_entity: switch.office_thermostat_office_priority
                    row_name: Office Priority
                    temp_sensor: sensor.office_thermostat_homekit_current_temperature
                    humidity_sensor: sensor.office_thermostat_homekit_current_humidity

      # ------------------------------------------------- zone: Primary Bed
      - type: custom:expander-card
        expanded: true
        title-card-clickable: true
        card_mod:
          style: *zone_card
        title-card:
          type: custom:bubble-card
          card_type: separator
          name: Primary Bed
          icon: mdi:bed
          rows: 0.75
          sub_button:
            - entity: sensor.bedroom_thermostat_current_temperature
              show_state: true
              show_icon: true
              show_background: false
            - entity: sensor.bedroom_thermostat_current_humidity
              show_state: true
              show_background: false
              show_icon: true
            - entity: sensor.bedroom_co2_5min
              show_state: true
              show_background: false
              show_icon: true
            - entity: sensor.bedroom_pm2_5_5min
              show_state: true
              show_background: false
              show_icon: true
          styles: *zone_sep
        cards:
          - type: vertical-stack
            cards:
              - !include
                  - /config/dashboards/modules/mobile-climate-row.yaml
                  - climate_entity: climate.master_bedroom_thermostat
                    thermostat_name: Bedroom Thermostat
                    module_name: mobile_climate
              - !include
                  - /config/dashboards/modules/mobile-priority-row.yaml
                  - switch_entity: switch.master_bedroom_thermostat_primary_bathroom_priority
                    row_name: Bathroom Priority
                    temp_sensor: sensor.primary_bathroom_air_sensor_01_temperature_sensor
                    humidity_sensor: sensor.primary_bathroom_air_sensor_01_humidity_sensor
