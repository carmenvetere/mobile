# lovelace_gen
# ============================================================================
#  Mobile Dash v2  ·  Shades  ·  Dune Mist
#  Per the handoff: header (+ Close All pill) -> Groups (All First Floor,
#  Primary Bedroom, Front Guest Room, Back Guest Room) -> By-room accordion.
#  Each shade row is a Bubble Cover with position fill, name, battery
#  sub-button and state. Group + per-room rows reuse the existing shade
#  modules, so every cover maps to the same entity as v1. Each guest room
#  keeps its own slider.
# ============================================================================
title: Shades
icon: mdi:roller-shade
theme: Dune Mist
path: shades-main
type: custom:grid-layout
cards:
  - type: vertical-stack
    card_mod:
      style: |
        :host { display: block; padding: 4px 10px 8px; }
    cards:
      # ---------------------------------------------------------- screen header
      - type: custom:button-card
        entity: sensor.shades_open_count
        icon: mdi:roller-shade
        name: Shades
        show_state: true
        show_label: true
        tap_action: { action: none }
        state_display: |
          [[[ return entity.state + ' open'; ]]]
        label: |
          [[[ return (entity.attributes.total || '0') + ' shades ·'; ]]]
        styles:
          card:
            - background: transparent !important
            - --ha-card-background: transparent
            - box-shadow: none
            - transition: none
            - padding: 4px 2px 6px
          grid:
            - grid-template-areas: '"back i n n closeall" "back i l s closeall"'
            - grid-template-columns: 46px 54px auto 1fr auto
            - grid-template-rows: auto auto
            - align-items: center
            - column-gap: 8px
          img_cell:
            - grid-area: i
            - width: 48px
            - height: 48px
            - border-radius: 13px
            - background-color: "rgba(142,177,191,0.18)"
          icon:
            - width: 24px
            - color: var(--slate-bright)
          name:
            - grid-area: n
            - justify-self: start
            - font-size: 22px
            - font-weight: 700
            - color: var(--primary-text-color)
          state:
            - grid-area: s
            - justify-self: start
            - font-size: 13px
            - font-weight: 700
            - color: var(--slate-bright)
          label:
            - grid-area: l
            - justify-self: start
            - font-size: 13px
            - color: var(--secondary-text-color)
          custom_fields:
            back:
              - grid-area: back
            closeall:
              - grid-area: closeall
              - justify-self: end
              - min-width: max-content
        custom_fields:
          back:
            card:
              type: custom:button-card
              icon: mdi:chevron-left
              tap_action:
                action: navigate
                navigation_path: /mobile-dash-v2/mobile-home
              styles:
                card:
                  - background: var(--background-color-2) !important
                  - --ha-card-background: var(--background-color-2)
                  - box-shadow: none
                  - transition: none
                  - height: 40px
                  - width: 40px
                  - border-radius: 12px
                icon:
                  - width: 22px
                  - color: var(--primary-text-color)
          closeall:
            card:
              type: custom:button-card
              icon: mdi:arrow-collapse-vertical
              name: Close All
              show_icon: true
              show_name: true
              tap_action:
                action: perform-action
                perform_action: cover.close_cover
                target:
                  entity_id:
                    - cover.first_floor_all
                    - cover.bedroom_side_shades
                    - cover.bedroom_back
                    - cover.front_guest_bedroom_shades
                    - cover.back_guest_bedroom_shades
              styles:
                card:
                  - background: var(--card-background-color) !important
                  - --ha-card-background: var(--card-background-color)
                  - box-shadow: none
                  - transition: none
                  - height: 40px
                  - border-radius: 999px
                  - padding: 0 14px
                grid:
                  - grid-template-areas: '"i n"'
                  - grid-template-columns: auto auto
                  - align-items: center
                  - column-gap: 6px
                icon:
                  - width: 18px
                  - color: var(--slate-bright)
                name:
                  - font-size: 13px
                  - font-weight: 600
                  - color: var(--primary-text-color)

      # ------------------------------------------------------------- Groups
      - type: custom:bubble-card
        card_type: separator
        name: Groups
        icon: mdi:roller-shade
        rows: 0.75
        styles: &sep_section |
          .bubble-name { font-size: 13px !important; font-weight: 700 !important;
            text-transform: uppercase; letter-spacing: 0.06em;
            color: rgba(255,255,255,0.6) !important; }
          .bubble-line { background: var(--primary-text-color); opacity: 0.1; }
          .card-content { padding-top: 7px !important; }
      - type: custom:bubble-card
        card_type: separator
        name: First Floor
        icon: mdi:sofa
        rows: 0.75
        styles: &sep_small |
          .bubble-name { font-size: 15px !important; font-weight: 700 !important; }
          .bubble-line { background: var(--primary-text-color); opacity: 0.1; }
          .card-content { padding-top: 7px !important; }
      - type: vertical-stack
        cards: !include /config/dashboards/modules/first-floor-shades-groups.yaml
      - type: custom:bubble-card
        card_type: separator
        name: Primary Bedroom
        icon: mdi:bed-king
        rows: 0.75
        styles: *sep_small
      - type: vertical-stack
        cards: !include /config/dashboards/modules/primary-bedroom-shades-groups.yaml
      - type: custom:bubble-card
        card_type: separator
        name: Front Guest Bedroom
        icon: mdi:bed-king
        rows: 0.75
        styles: *sep_small
      - type: vertical-stack
        cards: !include /config/dashboards/modules/front-guest-bedroom-shades-group.yaml
      - type: custom:bubble-card
        card_type: separator
        name: Back Guest Bedroom
        icon: mdi:bed-king
        rows: 0.75
        styles: *sep_small
      - type: vertical-stack
        cards: !include /config/dashboards/modules/back-guest-bedroom-shades-group.yaml

      # ------------------------------------------------------------ By room
      - type: custom:bubble-card
        card_type: separator
        name: By room
        icon: mdi:format-list-bulleted
        rows: 0.75
        styles: *sep_section
      - type: custom:expander-card
        expanded: false
        title-card-clickable: true
        card_mod:
          style: &room_exp |
            :host {
              display: block;
              background: var(--card-background-color);
              border: 1px solid rgba(255,255,255,0.06);
              border-radius: 18px;
              overflow: hidden;
              margin: 0 2px 9px;
            }
            ha-card { background: transparent !important; box-shadow: none !important; }
        title-card:
          type: custom:bubble-card
          card_type: separator
          name: First Floor
          icon: mdi:home-floor-1
          rows: 0.75
          styles: *sep_small
        cards:
          - type: vertical-stack
            cards: !include /config/dashboards/modules/first-floor-shades-individuals.yaml
      - type: custom:expander-card
        expanded: false
        title-card-clickable: true
        card_mod:
          style: *room_exp
        title-card:
          type: custom:bubble-card
          card_type: separator
          name: Primary Bedroom
          icon: mdi:bed-king
          rows: 0.75
          styles: *sep_small
        cards:
          - type: vertical-stack
            cards: !include /config/dashboards/modules/primary-bedroom-shades-individuals.yaml
      - type: custom:expander-card
        expanded: false
        title-card-clickable: true
        card_mod:
          style: *room_exp
        title-card:
          type: custom:bubble-card
          card_type: separator
          name: Front Guest Bedroom
          icon: mdi:bed-king
          rows: 0.75
          styles: *sep_small
        cards:
          - type: vertical-stack
            cards: !include /config/dashboards/modules/front-guest-bedroom-shades-individuals.yaml
      - type: custom:expander-card
        expanded: false
        title-card-clickable: true
        card_mod:
          style: *room_exp
        title-card:
          type: custom:bubble-card
          card_type: separator
          name: Back Guest Bedroom
          icon: mdi:bed-king
          rows: 0.75
          styles: *sep_small
        cards:
          - type: vertical-stack
            cards: !include /config/dashboards/modules/back-guest-bedroom-shades-individuals.yaml
