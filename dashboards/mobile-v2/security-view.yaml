# lovelace_gen
# ============================================================================
#  Mobile Dash v2  ·  Security  ·  Dune Mist
#  Per the handoff: header (arm state, amber) -> 3 mode buttons
#  (Home / Away / Disarm; selected = raised + accent icon) -> 2x2 camera grid
#  (live thumbnails, LIVE dot + name overlay) -> Recent events list.
#  Same entities as v1 (alarmo, the five cameras, the LLM-vision timeline).
# ============================================================================
title: Security
icon: mdi:cctv
theme: Dune Mist
path: security
type: custom:grid-layout
cards:
  - type: vertical-stack
    card_mod:
      style: |
        :host { display: block; padding: 4px 10px 8px; }
    cards:
      # ---------------------------------------------------------- screen header
      - type: custom:button-card
        entity: alarm_control_panel.alarmo
        icon: mdi:cctv
        name: Security
        show_state: true
        show_label: false
        tap_action: { action: more-info }
        state_display: |
          [[[
            var m = {disarmed:'Disarmed', armed_home:'Armed Home',
              armed_away:'Armed Away', armed_night:'Armed Night',
              arming:'Arming…', pending:'Pending', triggered:'Triggered'};
            return m[entity.state] || entity.state;
          ]]]
        styles:
          card:
            - background: transparent !important
            - --ha-card-background: transparent
            - box-shadow: none
            - transition: none
            - padding: 4px 2px 6px
          grid:
            - grid-template-areas: '"back i n" "back i s"'
            - grid-template-columns: 46px 54px 1fr
            - grid-template-rows: auto auto
            - align-items: center
            - column-gap: 8px
          img_cell:
            - grid-area: i
            - width: 48px
            - height: 48px
            - border-radius: 13px
            - background-color: "rgba(142,177,191,0.18)"
          icon:
            - width: 24px
            - color: var(--slate-bright)
          name:
            - grid-area: n
            - justify-self: start
            - font-size: 22px
            - font-weight: 700
            - color: var(--primary-text-color)
          state:
            - grid-area: s
            - justify-self: start
            - font-size: 13px
            - font-weight: 700
            - color: var(--amber-color)
          custom_fields:
            back:
              - grid-area: back
        state:
          - value: disarmed
            styles:
              state:
                - color: var(--sage-color)
          - value: triggered
            styles:
              state:
                - color: var(--error-color)
        custom_fields:
          back:
            card:
              type: custom:button-card
              icon: mdi:chevron-left
              tap_action:
                action: navigate
                navigation_path: /mobile-dash-v2/mobile-home
              styles:
                card:
                  - background: var(--background-color-2) !important
                  - --ha-card-background: var(--background-color-2)
                  - box-shadow: none
                  - transition: none
                  - height: 40px
                  - width: 40px
                  - border-radius: 12px
                icon:
                  - width: 22px
                  - color: var(--primary-text-color)

      # ------------------------------------------------------- arm-mode buttons
      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:button-card
            entity: alarm_control_panel.alarmo
            name: Home
            icon: mdi:shield-home
            show_state: false
            tap_action:
              action: perform-action
              perform_action: alarm_control_panel.alarm_arm_home
              target: { entity_id: alarm_control_panel.alarmo }
            styles: &mode_btn
              card:
                - padding: 14px 6px
                - border-radius: 16px
                - background: var(--background-color-2) !important
                - --ha-card-background: var(--background-color-2)
                - box-shadow: none
                - transition: none
                - border: 1px solid transparent
              grid:
                - grid-template-areas: '"i" "n"'
                - grid-template-rows: auto auto
                - row-gap: 6px
                - justify-items: center
              img_cell:
                - width: 40px
                - height: 40px
                - border-radius: 11px
                - background-color: "rgba(255,255,255,0.06)"
              icon:
                - width: 22px
                - color: var(--secondary-text-color)
              name:
                - font-size: 13px
                - font-weight: 600
                - color: var(--secondary-text-color)
            state:
              - value: armed_home
                styles:
                  card:
                    - border: 1px solid var(--amber-color)
                  img_cell:
                    - background-color: "rgba(224,167,94,0.20)"
                  icon:
                    - color: var(--amber-color)
                  name:
                    - color: var(--primary-text-color)
          - type: custom:button-card
            entity: alarm_control_panel.alarmo
            name: Away
            icon: mdi:shield-lock
            show_state: false
            tap_action:
              action: perform-action
              perform_action: alarm_control_panel.alarm_arm_away
              target: { entity_id: alarm_control_panel.alarmo }
            styles: *mode_btn
            state:
              - value: armed_away
                styles:
                  card:
                    - border: 1px solid var(--error-color)
                  img_cell:
                    - background-color: "rgba(224,105,91,0.20)"
                  icon:
                    - color: var(--error-color)
                  name:
                    - color: var(--primary-text-color)
          - type: custom:button-card
            entity: alarm_control_panel.alarmo
            name: Disarm
            icon: mdi:shield-off
            show_state: false
            tap_action: { action: more-info }
            styles: *mode_btn
            state:
              - value: disarmed
                styles:
                  card:
                    - border: 1px solid var(--sage-color)
                  img_cell:
                    - background-color: "rgba(139,166,128,0.20)"
                  icon:
                    - color: var(--sage-color)
                  name:
                    - color: var(--primary-text-color)

      # ------------------------------------------------------------ cameras
      - type: custom:bubble-card
        card_type: separator
        name: Cameras
        icon: mdi:cctv
        rows: 0.75
        styles: &sep_section |
          .bubble-name { font-size: 13px !important; font-weight: 700 !important;
            text-transform: uppercase; letter-spacing: 0.06em;
            color: rgba(255,255,255,0.6) !important; }
          .bubble-line { background: var(--primary-text-color); opacity: 0.1; }
          .card-content { padding-top: 7px !important; }
      - type: grid
        columns: 2
        square: false
        cards:
          - type: picture-entity
            entity: camera.front_high_resolution_channel
            camera_image: camera.front_high_resolution_channel
            camera_view: auto
            fit_mode: cover
            show_state: false
            show_name: true
            name: Front
            tap_action: { action: more-info }
            card_mod: &cam_style
              style: |
                ha-card {
                  border-radius: 16px; overflow: hidden;
                  background: transparent !important;
                  --ha-card-background: transparent;
                  box-shadow: none !important;
                }
                ha-card::before {
                  content: "● LIVE";
                  position: absolute; top: 8px; left: 8px; z-index: 2;
                  font-size: 9px; font-weight: 700; color: #fff;
                  background: rgba(224,105,91,0.85);
                  padding: 2px 7px; border-radius: 999px; letter-spacing: 0.04em;
                }
          - type: picture-entity
            entity: camera.blueberry_high_resolution_channel
            camera_image: camera.blueberry_high_resolution_channel
            camera_view: auto
            fit_mode: cover
            show_state: false
            show_name: true
            name: Front Right
            tap_action: { action: more-info }
            card_mod: *cam_style
          - type: picture-entity
            entity: camera.driveway_high_resolution_channel_2
            camera_image: camera.driveway_high_resolution_channel_2
            camera_view: auto
            fit_mode: cover
            show_state: false
            show_name: true
            name: Driveway
            tap_action: { action: more-info }
            card_mod: *cam_style
          - type: picture-entity
            entity: camera.pool_high_resolution_channel
            camera_image: camera.pool_high_resolution_channel
            camera_view: auto
            fit_mode: cover
            show_state: false
            show_name: true
            name: Pool
            tap_action: { action: more-info }
            card_mod: *cam_style
      - type: picture-entity
        entity: camera.kimberly_high_resolution_channel
        camera_image: camera.kimberly_high_resolution_channel
        camera_view: auto
        fit_mode: cover
        show_state: false
        show_name: true
        name: Kimberly Side
        tap_action: { action: more-info }
        card_mod: *cam_style

      # ------------------------------------------------------- recent events
      - type: custom:bubble-card
        card_type: separator
        name: Recent events
        icon: mdi:motion-sensor
        rows: 0.75
        styles: *sep_section
      - type: custom:llmvision-card
        entity: calendar.llm_vision_timeline_2
        number_of_hours: 168
        number_of_events: 5
        language: en
        card_mod:
          style: |
            ha-card {
              background: var(--card-background-color) !important;
              --ha-card-background: var(--card-background-color);
              border-radius: 18px; padding: 6px 8px; text-align: left;
              box-shadow: none !important;
            }
