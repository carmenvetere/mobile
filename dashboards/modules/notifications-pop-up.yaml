#lovelace_gen
type: vertical-stack
cards:
  - type: custom:bubble-card
    theme: Wall Panel
    card_type: pop-up
    hash: "#weather"
    button_type: name
    sub_button:
      main: []
      bottom: []
    show_header: false
    scrolling_effect: false
    close_on_click: true
    background_update: true
    modules:
      - pop-up-module
      - wall_panel_separator
    styles: |-
      .bubble-background {
        background: transparent !important;
        }

      .bubble-icon-container {
        background: transparent !important;
        }

      .bubble-icon {
        --mdc-icon-size: 36px !important;
        }
  - type: custom:bubble-card
    card_type: separator
    name: Notifications
    icon: mdi:bell-alert
    styles: |
      .bubble-name {
        font-size: 24px !important;
          }
      .bubble-button-card-container {
        margin: 2px 10px 2px 10px !important;
        background-color: var(--ha-card-background-2) !important;
        }
  - type: vertical-stack
    cards: !include [/config/dashboards/modules/notifications.yaml, {module_name: wall_panel_notifications}] 