type: custom:power-flow-card-plus
clickable_entities: true
card_mod:
  style: |
    ha-card {
      /* Override all text in the card to be smaller */
      font-size: 14px !important;
    }
    /* Mobile only: the 5-node flow diagram is wider than a phone. zoom
       (WebKit-supported) genuinely shrinks the whole card - layout box
       included - so it fits with no bleed. width compensates so it still
       fills the row. */
    @media (max-width: 767px) {
      ha-card {
        zoom: 0.78 !important;
        width: 128% !important;
        overflow: hidden !important;
      }
    }
    /* Try multiple selectors to catch all text elements */
    ha-card * {
      font-size: 12px !important;
      font-weight: bold !important;
    }
    /* Main entity values */
    ha-card .value,
    ha-card [class*="value"],
    ha-card .power-value {
      font-size: 12px !important;
      font-weight: bold !important;
    }
    /* Entity labels */
    ha-card .label,
    ha-card [class*="label"],
    ha-card .entity-name {
      font-size: 16px !important;
      font-weight: bold !important;
    }
    /* Individual device text (smaller) */
    ha-card .individual *,
    ha-card [class*="individual"] * {
      font-size: 12px !important;
    }
    /* Secondary info text */
    ha-card .secondary,
    ha-card [class*="secondary"] {
      font-size: 12px !important;
      opacity: 0.8;
    }
entities:
  battery:
    entity: sensor.bayberry_battery_power
    state_of_charge: sensor.bayberry_charge
    color:
      consumption: var(--sage-color)
      production: var(--sage-color)
    color_icon: true
    show_state_of_charge: true
  grid:
    entity: sensor.bayberry_site_power
    color_icon: false
    color:
      consumption: var(--secondary-text-color)
      production: var(--secondary-text-color)
      color_value: true
    power_outage:
      icon_alert: mdi:flash-alert
    use_metadata: false
    invert_state: false
    color_value: false
    secondary_info:
      entity: sensor.net_grid_export
      unit_of_measurement: kWh
  solar:
    entity: sensor.bayberry_solar_power
    color_icon: false
    color: var(--gold-color)
  home:
    entity: sensor.bayberry_load_power
    subtract_individual: true
  individual:
    - entity: sensor.wall_charger_power
      display_zero: false
      name: Car Charging
      icon: mdi:car-electric
      color: var(--sage-color)
    - entity: sensor.well_pump_power
      name: Well Pump
      color: var(--slate-color)
      color_value: false
      display_zero: false
      icon: mdi:sprinkler-variant
    - entity: sensor.omnilogic_pool_filter_pump_power
      name: Pool Filter
      color: var(--slate-color)
      color_value: false
      display_zero: false
      icon: mdi:pool
    - entity: sensor.upper_hvac_estimated_power
      name: Upper HVAC
      color: var(--slate-bright)
      color_value: false
      display_zero: false
      icon: mdi:hvac
    - entity: sensor.lower_hvac_estimated_power
      name: Lower HVAC
      color: var(--slate-bright)
      color_value: false
      display_zero: false
      icon: mdi:hvac
display_zero_lines:
  mode: show
  transparency: 50
  grey_color:
    - 189
    - 189
    - 189