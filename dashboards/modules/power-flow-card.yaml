type: custom:power-flow-card-plus
clickable_entities: true
card_mod:
  style: |
    ha-card {
      /* Override all text in the card to be smaller */
      font-size: 14px !important;
    }
    /* Try multiple selectors to catch all text elements */
    ha-card * {
      font-size: 12px !important;
      font-weight: bold !important;
    }
    /* Main entity values */
    ha-card .value,
    ha-card [class*="value"],
    ha-card .power-value {
      font-size: 12px !important;
      font-weight: bold !important;
    }
    /* Entity labels */
    ha-card .label,
    ha-card [class*="label"],
    ha-card .entity-name {
      font-size: 16px !important;
      font-weight: bold !important;
    }
    /* Individual device text (smaller) */
    ha-card .individual *,
    ha-card [class*="individual"] * {
      font-size: 12px !important;
    }
    /* Secondary info text */
    ha-card .secondary,
    ha-card [class*="secondary"] {
      font-size: 12px !important;
      opacity: 0.8;
    }
entities:
  battery:
    entity: sensor.bayberry_battery_power
    state_of_charge: sensor.bayberry_charge
    color:
      consumption: var(--accent-color-2)
      production: var(--accent-color-2)
    color_icon: true
    show_state_of_charge: true
  grid:
    entity: sensor.bayberry_site_power
    color_icon: false
    color:
      consumption: var(--primary-text-color)
      production: var(--primary-text-color)
      color_value: true
    power_outage:
      icon_alert: mdi:flash-alert
    use_metadata: false
    invert_state: false
    color_value: false
    secondary_info:
      entity: sensor.net_grid_export
      unit_of_measurement: kWh
  solar:
    entity: sensor.bayberry_solar_power
    color_icon: false
    color: var(--accent-color-3)
  home:
    entity: sensor.bayberry_load_power
    subtract_individual: true
  individual:
    - entity: sensor.wall_charger_power
      display_zero: false
      name: Car Charging
      icon: mdi:car-electric
      color: var(--accent-color-2)
    - entity: sensor.well_pump_power
      name: Well Pump
      color: var(--accent-color)
      color_value: false
      display_zero: false
      icon: mdi:sprinkler-variant
    - entity: sensor.omnilogic_pool_filter_pump_power
      name: Pool Filter
      color: var(--accent-color)
      color_value: false
      display_zero: false
      icon: mdi:pool
display_zero_lines:
  mode: show
  transparency: 50
  grey_color:
    - 189
    - 189
    - 189