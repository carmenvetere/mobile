#lovelace_gen
type: vertical-stack
cards:
  # ── Pop-up header ───────────────────────────────────────────────────────────
  - type: custom:bubble-card
    theme: Wall Panel
    card_type: pop-up
    hash: "#sonos-favorites"
    button_type: name
    sub_button:
      main: []
      bottom: []
    show_header: true
    name: Sonos Favorites
    icon: mdi:star
    scrolling_effect: false
    close_on_click: true
    background_update: true
    modules:
      - pop-up-module
      - wall_panel_separator
    styles: |-
      .bubble-name { line-height: 1.1 !important; }
      .bubble-background { background: transparent !important; }
      .bubble-icon-container { background: transparent !important; }
      .bubble-icon { --mdc-icon-size: 36px !important; }

  # ── "Play to {room}" target indicator (markdown card) ──────────────────────
  - type: markdown
    content: >-
      <div style="font-size:13px;color:var(--secondary-text-color);">
        Play to
        <span style="color:var(--primary-text-color);font-weight:600;">
          {%- set sel = states('input_select.sonos_speaker_select') -%}
          {%- set name_map = {
            'Living Room': 'media_player.living_room',
            'Kitchen': 'media_player.kitchen',
            'Office': 'media_player.office',
            'Deck': 'media_player.deck',
            'Pool': 'media_player.pool',
            'Primary Bedroom': 'media_player.primary_bedroom',
            'Primary Bathroom': 'media_player.primary_bathroom',
            'Gym': 'media_player.gym',
            'Mud Room': 'media_player.mud_room',
            'Media Room': 'media_player.media_room'
          } -%}
          {%- set mp = name_map.get(sel) -%}
          {%- set members = state_attr(mp, 'group_members') if mp else [] -%}
          {{ sel or 'No speaker' }}{% if members and members | length > 1 %} +{{ members | length - 1 }}{% endif %}
        </span>
      </div>
    card_mod:
      style: |
        ha-card {
          background: transparent !important;
          box-shadow: none !important;
          margin: 4px 14px 4px !important;
          padding: 0 !important;
        }
        .card-content { padding: 0 !important; }
        ha-markdown { padding: 0 !important; }
        ha-markdown p { margin: 0 !important; }

  # ── Tab row (All / Playlists / Stations / Albums) ───────────────────────────
  - type: grid
    columns: 4
    square: false
    cards:
      - type: custom:button-card
        name: All
        show_name: true
        show_icon: false
        tap_action:
          action: call-service
          service: input_select.select_option
          service_data:
            entity_id: input_select.sonos_favorites_filter
            option: All
        triggers_update:
          - input_select.sonos_favorites_filter
        state:
          - operator: template
            value: "[[[ return states['input_select.sonos_favorites_filter']?.state === 'All' ]]]"
            styles:
              card:
                - background: var(--accent-color) !important
              name:
                - color: white
          - operator: default
            styles:
              card:
                - background: var(--background-color-2)
              name:
                - color: var(--primary-text-color)
        styles:
          card:
            - height: 36px
            - border-radius: 999px
            - margin: 4px 4px
          name:
            - font-size: 13px
            - font-weight: '600'

      - type: custom:button-card
        name: Playlists
        show_name: true
        show_icon: false
        tap_action:
          action: call-service
          service: input_select.select_option
          service_data:
            entity_id: input_select.sonos_favorites_filter
            option: Playlists
        triggers_update:
          - input_select.sonos_favorites_filter
        state:
          - operator: template
            value: "[[[ return states['input_select.sonos_favorites_filter']?.state === 'Playlists' ]]]"
            styles:
              card:
                - background: var(--accent-color) !important
              name:
                - color: white
          - operator: default
            styles:
              card:
                - background: var(--background-color-2)
              name:
                - color: var(--primary-text-color)
        styles:
          card:
            - height: 36px
            - border-radius: 999px
            - margin: 4px 4px
          name:
            - font-size: 13px
            - font-weight: '600'

      - type: custom:button-card
        name: Stations
        show_name: true
        show_icon: false
        tap_action:
          action: call-service
          service: input_select.select_option
          service_data:
            entity_id: input_select.sonos_favorites_filter
            option: Stations
        triggers_update:
          - input_select.sonos_favorites_filter
        state:
          - operator: template
            value: "[[[ return states['input_select.sonos_favorites_filter']?.state === 'Stations' ]]]"
            styles:
              card:
                - background: var(--accent-color) !important
              name:
                - color: white
          - operator: default
            styles:
              card:
                - background: var(--background-color-2)
              name:
                - color: var(--primary-text-color)
        styles:
          card:
            - height: 36px
            - border-radius: 999px
            - margin: 4px 4px
          name:
            - font-size: 13px
            - font-weight: '600'

      - type: custom:button-card
        name: Albums
        show_name: true
