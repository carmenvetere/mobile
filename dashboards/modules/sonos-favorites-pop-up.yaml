              card:
                - background: var(--background-color-2)
              name:
                - color: var(--primary-text-color)
        styles:
          card:
            - height: 36px
            - border-radius: 999px
            - margin: 4px 4px
          name:
            - font-size: 13px
            - font-weight: '600'

      - type: custom:button-card
        name: Stations
        show_name: true
        show_icon: false
        tap_action:
          action: call-service
          service: input_select.select_option
          service_data:
            entity_id: input_select.sonos_favorites_filter
            option: Stations
        triggers_update:
          - input_select.sonos_favorites_filter
        state:
          - operator: template
            value: "[[[ return states['input_select.sonos_favorites_filter']?.state === 'Stations' ]]]"
            styles:
              card:
                - background: var(--accent-color) !important
              name:
                - color: white
          - operator: default
            styles:
              card:
                - background: var(--background-color-2)
              name:
                - color: var(--primary-text-color)
        styles:
          card:
            - height: 36px
            - border-radius: 999px
            - margin: 4px 4px
          name:
            - font-size: 13px
            - font-weight: '600'

