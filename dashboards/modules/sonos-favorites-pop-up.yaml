        state:
          - operator: template
            value: "[[[ return states['input_select.sonos_favorites_filter']?.state === 'Albums' ]]]"
            styles:
              card:
                - background: var(--accent-color) !important
              name:
                - color: white
          - operator: default
            styles:
              card:
                - background: var(--background-color-2)
              name:
                - color: var(--primary-text-color)
        styles:
          card:
            - height: 36px
            - border-radius: 999px
            - margin: 4px 4px
          name:
            - font-size: 13px
            - font-weight: '600'

  # ── Search input (entities card styled as pill) ─────────────────────────────
  - type: entities
    show_header_toggle: false
    state_color: false
    entities:
      - entity: input_text.sonos_favorites_search
        name: Search favorites
        icon: mdi:magnify
    card_mod:
      style: |
        ha-card {
          background: var(--background-color-2) !important;
          border-radius: 999px !important;
          box-shadow: none !important;
          margin: 4px 10px 8px !important;
        }
        .card-content { padding: 4px 14px !important; }

  # ── Favorites grid (each tile filtered by tab + search via state template) ──
