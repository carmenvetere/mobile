#lovelace_gen
type: vertical-stack
cards:
  - type: custom:bubble-card
    theme: Wall Panel
    card_type: pop-up
    hash: "#sonos-favorites"
    button_type: name
    sub_button:
      main: []
      bottom: []
    show_header: true
    name: Sonos Favorites
    icon: mdi:star
    scrolling_effect: false
    close_on_click: true
    background_update: true
    modules:
      - pop-up-module
      - wall_panel_separator
    styles: |-
      .bubble-name {
        line-height: 1.1 !important;
        }
      .bubble-background {
        background: transparent !important;
        }
      .bubble-icon-container {
        background: transparent !important;
        }
      .bubble-icon {
        --mdc-icon-size: 36px !important;
        }

  - type: grid
    columns: 2
    square: false
    cards:

      # ── MS NOW ───────────────────────────────────────────────────────────────
      - type: custom:button-card
        name: MS NOW
        show_name: true
        show_icon: true
        icon: mdi:radio
        tap_action:
          action: call-service
          service: media_player.select_source
          service_data:
            entity_id: >
              [[[
                const sel = states['input_select.sonos_speaker_select']?.state;
                const nm = {'Living Room':'media_player.living_room','Kitchen':'media_player.kitchen','Office':'media_player.office','Deck':'media_player.deck','Pool':'media_player.pool','Primary Bedroom':'media_player.primary_bedroom','Primary Bathroom':'media_player.primary_bathroom','Gym':'media_player.gym','Mud Room':'media_player.mud_room','Media Room':'media_player.media_room'};
                return nm[sel] || 'media_player.living_room';
              ]]]
            source: "MS NOW"
        triggers_update:
          - input_select.sonos_speaker_select
        styles:
          card:
            - background: var(--background-color-2)
            - border-radius: 12px
            - height: 70px
            - margin: 4px
          name:
            - font-size: 13px
            - font-weight: '600'
            - color: var(--primary-text-color)
          icon:
            - width: 22px
            - color: var(--secondary-text-color)

