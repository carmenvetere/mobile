        layout: icon_name
        icon: mdi:radio
        tap_action:
          action: perform-action
          perform_action: media_player.play_media
          data:
            entity_id: >
              [[[
                const sel = states['input_select.sonos_speaker_select']?.state;
                const nm = {'Living Room':'media_player.living_room','Kitchen':'media_player.kitchen','Office':'media_player.office','Deck':'media_player.deck','Pool':'media_player.pool','Primary Bedroom':'media_player.primary_bedroom','Primary Bathroom':'media_player.primary_bathroom','Gym':'media_player.gym','Mud Room':'media_player.mud_room','Media Room':'media_player.media_room'};
                return nm[sel] || 'media_player.living_room';
              ]]]
            media_content_id: >-
              x-rincon-mp3radio://https://tunein.cdnstream1.com/3511_96.mp3?aw_0_1st.playerid=SonosRadio&aw_0_1st.skey=1775503325&aw_0_1st.bundleId=tunein.sonos&lat=41.6463&lon=-70.2751&aw_0_1st.abtest=&partnerId=SonosRadio&aw_0_1st.stationId=s297990&aw_0_1st.premium=false&source=TuneIn&aw_0_1st.platform=tunein&aw_0_1st.genre_id=g247&aw_0_1st.class=talk&aw_0_1st.ads_partner_alias=ce.SonosApp&aw_0_azn.planguage=en&aw_0_1st.is_ondemand=false&aw_0_1st.topicId=na&aw_0_1st.programId=p1421468&aw_0_1st.affiliateIds=a39100%2ca39163%2ca40075%2ca188091&aw_0_1st.bandId=16&delivery=1
            media_content_type: music
        triggers_update:
          - input_select.sonos_speaker_select
          - input_select.sonos_favorites_filter
          - input_text.sonos_favorites_search
        state:
          - operator: template
            value: |
              [[[
                const f = states['input_select.sonos_favorites_filter']?.state || 'All';
                const q = (states['input_text.sonos_favorites_search']?.state || '').trim().toLowerCase();
                const myType = 'station';
                const myName = 'MS NOW';
                const filterMatch = f === 'All' || (f === 'Stations' && myType === 'station');
                const searchMatch = !q || myName.toLowerCase().includes(q);
                return !(filterMatch && searchMatch);
              ]]]
            styles:
