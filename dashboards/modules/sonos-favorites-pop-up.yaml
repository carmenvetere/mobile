              name:
                - color: var(--primary-text-color)
        styles:
          card:
            - height: 36px
            - border-radius: 999px
            - margin: 4px 4px
          name:
            - font-size: 13px
            - font-weight: '600'

  # ── Search input (entities row, styled as pill) ─────────────────────────────
  - type: entities
    show_header_toggle: false
    state_color: false
    entities:
      - entity: input_text.sonos_favorites_search
        name: ""
        icon: mdi:magnify
    card_mod:
      style: |
        ha-card {
          background: var(--background-color-2) !important;
          border-radius: 999px !important;
          box-shadow: none !important;
          margin: 4px 8px 8px !important;
          padding: 2px 10px !important;
        }
        .card-content {
          padding: 0 !important;
        }

  # ── Favorites grid (each tile filtered by tab + search via state template) ──
