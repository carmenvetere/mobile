#lovelace_gen
type: vertical-stack
cards:
  # ── Pop-up header ───────────────────────────────────────────────────────────
  - type: custom:bubble-card
    theme: Wall Panel
    card_type: pop-up
    hash: "#sonos-favorites"
    button_type: name
    sub_button:
      main: []
      bottom: []
    show_header: true
    name: Sonos Favorites
    icon: mdi:star
    scrolling_effect: false
    close_on_click: true
    background_update: true
    modules:
      - pop-up-module
      - wall_panel_separator
    styles: |-
      .bubble-name {
        line-height: 1.1 !important;
        }
      .bubble-background {
        background: transparent !important;
        }
      .bubble-icon-container {
        background: transparent !important;
        }
      .bubble-icon {
        --mdc-icon-size: 36px !important;
        }

  # ── "Play to {room}" target indicator ───────────────────────────────────────
  - type: custom:button-card
    show_name: false
    show_icon: false
    show_label: true
    label: |
      [[[
        const sel = states['input_select.sonos_speaker_select']?.state;
        const nameMap = {
          'Living Room': 'media_player.living_room',
          'Kitchen': 'media_player.kitchen',
          'Office': 'media_player.office',
          'Deck': 'media_player.deck',
          'Pool': 'media_player.pool',
          'Primary Bedroom': 'media_player.primary_bedroom',
          'Primary Bathroom': 'media_player.primary_bathroom',
          'Gym': 'media_player.gym',
          'Mud Room': 'media_player.mud_room',
          'Media Room': 'media_player.media_room'
        };
        const mp = sel ? states[nameMap[sel]] : null;
        const members = mp?.attributes?.group_members || [];
        const extra = members.length > 1 ? ' +' + (members.length - 1) : '';
        return 'Play to <b>' + (sel || 'No speaker') + extra + '</b>';
      ]]]
    triggers_update:
      - input_select.sonos_speaker_select
      - media_player.living_room
      - media_player.kitchen
      - media_player.office
      - media_player.deck
      - media_player.pool
      - media_player.primary_bedroom
      - media_player.primary_bathroom
      - media_player.gym
      - media_player.mud_room
      - media_player.media_room
    tap_action:
      action: navigate
      navigation_path: '#sonos-grouping'
    styles:
      card:
        - background: transparent
        - box-shadow: none
        - height: 28px
        - padding: 0 14px
        - margin-top: 4px
      label:
        - font-size: 13px
        - color: var(--secondary-text-color)
        - text-align: left
        - justify-self: start

  # ── Tab + Search row ────────────────────────────────────────────────────────
  - type: horizontal-stack
    cards:
      # Tabs
      - type: custom:button-card
        name: All
        show_name: true
        show_icon: false
        tap_action:
          action: call-service
          service: input_select.select_option
          service_data:
            entity_id: input_select.sonos_favorites_filter
            option: All
        triggers_update:
          - input_select.sonos_favorites_filter
        state:
          - operator: template
            value: "[[[ return states['input_select.sonos_favorites_filter']?.state === 'All' ]]]"
            styles:
              card:
                - background: var(--accent-color) !important
              name:
                - color: white
          - operator: default
            styles:
              card:
                - background: var(--background-color-2)
              name:
                - color: var(--primary-text-color)
        styles:
          card:
            - height: 36px
            - border-radius: 999px
            - margin: 4px 4px
          name:
            - font-size: 13px
            - font-weight: '600'

      - type: custom:button-card
        name: Playlists
        show_name: true
        show_icon: false
        tap_action:
          action: call-service
          service: input_select.select_option
          service_data:
            entity_id: input_select.sonos_favorites_filter
            option: Playlists
        triggers_update:
          - input_select.sonos_favorites_filter
        state:
          - operator: template
            value: "[[[ return states['input_select.sonos_favorites_filter']?.state === 'Playlists' ]]]"
            styles:
              card:
                - background: var(--accent-color) !important
              name:
                - color: white
          - operator: default
