- type: custom:bubble-card
  card_type: separator
  name: Living Room
  icon: mdi:sofa
  rows: 0.75
  styles: |
    .bubble-name {
      font-size: 16px !important;  /* title */
      font-weight: bold !important;
    }
    .bubble-line {
      background: var(--primary-text-color);
      opacity: 0.1;
    }
    .card-content {
      padding-top: 7px !important;
    }
  modules:
  - Mobile Module Theme  
- type: custom:bubble-card
  card_type: button
  button_type: slider
  entity: cover.living_room_front_left_cover
  name: Front Left
  icon: mdi:roller-shade
  show_state: true
  scrolling_effect: false
  slider_live_update: true
  card_layout: large
  tap_action:
    action: toggle
  sub_button:
    - entity: sensor.living_room_front_left_battery_0
      icon: mdi:battery
      show_background: false
      show_state: true
    - entity: cover.living_room_front_left_cover
      icon: mdi:arrow-up
      show_state: false
      state_background: false
      show_background: false
      tap_action:
        action: perform-action
        perform_action: cover.open_cover
        target:
          entity_id: cover.living_room_front_left_cover
    - entity: cover.living_room_front_left_cover
      icon: mdi:stop
      show_state: false
      state_background: false
      show_background: false
      tap_action:
        action: perform-action
        perform_action: cover.stop_cover
        target:
          entity_id: cover.living_room_front_left_cover
    - entity: cover.living_room_front_left_cover
      icon: mdi:arrow-down
      show_state: false
      state_background: false
      show_background: false
      tap_action:
        action: perform-action
        perform_action: cover.close_cover
        target:
          entity_id: cover.living_room_front_left_cover
  rows: 1
  styles: |
    .bubble-sub-button-1 ha-icon {
      color: ${(() => { const b = Number(hass.states['sensor.living_room_front_left_battery_0']?.state);
        return isNaN(b) ? 'var(--secondary-text-color)'
          : b < 20 ? 'var(--error-color)'
          : b < 40 ? 'var(--gold-color)'
          : 'var(--sage-color)'; })()} !important;
    }
    ha-card {
      --shade-card-bg: var(--background-color-3);
      --shade-card-open-bg: var(--background-color-2);
    }
  modules:
  - mobile_shades_module 
