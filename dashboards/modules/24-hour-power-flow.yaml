type: custom:apexcharts-card
header:
  show: true
  show_states: true
  colorize_states: true
graph_span: 24h
span:
  start: hour
  offset: "-24h"
now:
  show: true
  label: Now
apex_config:
  chart:
    type: area
    stacked: false
    height: 300px
  title:
    align: left
    style:
      fontSize: '18px'
      fontWeight: 'bold'    
  stroke:
    curve: smooth
    width: 2
  xaxis:
    type: datetime
    labels:
      style:
        fontSize: '14px'
  yaxis:
    decimals: 1
    labels:
      style:
        fontSize: '14px'
      formatter: |
        EVAL:function(value) {
          return value.toFixed(1) + ' kW';
        }
series:
  - entity: sensor.site_power_5min
    name: Grid
    type: line
    stroke_width: 2
    color: var(--secondary-text-color)
    show:
      in_header: false
      legend_value: true
  - entity: sensor.solar_power_5min
    name: Solar
    type: line
    stroke_width: 2
    color: var(--gold-color)
    show:
      in_header: false
  # Home line = whole-home load minus the HVAC series below, so HVAC draw
  # isn't double-displayed (sensor.home_other_power, #152).
  - entity: sensor.home_other_power
    name: Home (Other)
    type: line
    stroke_width: 2
    color: var(--sage-color)
    opacity: .8
    show:
      in_header: false
  # HVAC estimated power (W -> kW). These sensors are recorded (un-excluded
  # in #152) so they have 24 h history to plot.
  - entity: sensor.upper_hvac_estimated_power
    name: Upper HVAC
    type: line
    stroke_width: 2
    color: var(--slate-color)
    transform: "return x / 1000;"
    show:
      in_header: false
  - entity: sensor.lower_hvac_estimated_power
    name: Lower HVAC
    type: line
    stroke_width: 2
    color: var(--slate-bright)
    transform: "return x / 1000;"
    show:
      in_header: false
  - entity: sensor.bayberry_solar_generated
    yaxis_id: header_only
    name: Solar
    stroke_width: 2
    color: var(--gold-color)
    show:
      legend_value: false
      in_header: true
      in_chart: false
  - entity: sensor.bayberry_home_usage
    yaxis_id: header_only
    name: Home
    stroke_width: 2
    color: var(--sage-color)
    show:
      legend_value: true
      in_header: true
      in_chart: false
  - entity: sensor.bayberry_grid_imported
    name: Net Grid
    color: var(--secondary-text-color)
    show:
      in_header: true
      in_chart: false
    transform: |
      const imported = parseFloat(entity.state) || 0;
      const exported = parseFloat(hass.states['sensor.bayberry_grid_exported'].state) || 0;
      return imported - exported;
