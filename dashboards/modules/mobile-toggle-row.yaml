# lovelace_gen
#
# Labeled toggle row for the Mobile Dash v2 Climate sub-panels (Room Priority,
# Exhaust Fan). Renders: [optional icon] name (left) · On/Off state ·
# CSS toggle switch (right). Tapping anywhere on the row toggles the entity.
#
# Required vars:
#   toggle_entity - switch.*/fan.* entity id (must support toggle)
#   row_name      - display name
# Optional vars:
#   row_icon        - mdi icon shown at the left (e.g. mdi:fan for exhaust fans)
#   track_on_color  - toggle track colour when on (default slate; pass a red
#                     rgba for destructive switches)
#   confirm_text    - if set, tap shows a confirmation dialog with this text
type: custom:button-card
entity: {{ toggle_entity }}
name: {{ row_name }}
show_state: true
show_label: false
{% if row_icon is defined %}show_icon: true
icon: {{ row_icon }}{% else %}show_icon: false{% endif %}
tap_action:
  action: toggle
{% if confirm_text is defined %}  confirmation:
    text: {{ confirm_text }}
{% endif %}
state_display: |
  [[[ return entity.state === 'on' ? 'On' : 'Off'; ]]]
styles:
  card:
    - background: transparent !important
    - --ha-card-background: transparent
    - box-shadow: none
    - border-radius: 0
    - border-top: 1px solid rgba(255,255,255,0.06)
    - padding: 11px 2px
    - transition: none
    - cursor: pointer
  grid:
    - grid-template-areas: '"{% if row_icon is defined %}ic {% endif %}n st sw"'
    - grid-template-columns: {% if row_icon is defined %}auto {% endif %}1fr auto auto
    - grid-template-rows: 1fr
    - align-items: center
    - column-gap: 10px
{% if row_icon is defined %}
  img_cell:
    - grid-area: ic
    - width: 22px
    - height: 22px
  icon:
    - width: 18px
    - color: |
        [[[ return entity.state === 'on' ? 'var(--slate-bright)' : '#9aa0a8'; ]]]
{% endif %}
  name:
    - grid-area: n
    - justify-self: start
    - font-size: 13px
    - font-weight: 600
    - color: var(--primary-text-color)
  state:
    - grid-area: st
    - justify-self: end
    - font-size: 12px
    - font-weight: 600
    - color: |
        [[[ return entity.state === 'on' ? 'var(--slate-bright)' : '#9aa0a8'; ]]]
  custom_fields:
    sw:
      - grid-area: sw
      - justify-self: end
custom_fields:
  sw: |
    [[[
      var on = entity.state === 'on';
      return '<div style="width:38px;height:22px;border-radius:999px;background:'
        + (on ? '{{ track_on_color | default("rgba(142,177,191,0.55)") }}' : 'rgba(255,255,255,0.28)')
        + ';position:relative;transition:background .2s ease;">'
        + '<div style="position:absolute;top:2px;left:' + (on ? '18px' : '2px')
        + ';width:18px;height:18px;border-radius:50%;background:#fff;'
        + 'box-shadow:0 1px 2px rgba(0,0,0,0.4);transition:left .2s ease;"></div></div>';
    ]]]
