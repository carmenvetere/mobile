# lovelace_gen
# ============================================================================
#  Mobile Dash (v1) · Sticky bottom navigation  ·  Dune Mist
#  Var: active  ->  home | lights | climate | security | more
#  Renders ONLY the fixed 76px bottom bar (Home / Lights / Climate / Security
#  / More). The #more-menu sheet lives in mobile-more-sheet.yaml and must be
#  included as a SEPARATE top-level card - never wrapped together with this
#  bar, or the pop-up's host styling can create a CSS containing block and
#  break the bar's position: fixed.
#  Include once per view:
#    - !include [/config/dashboards/modules/mobile-bottom-nav.yaml, {active: home}]
#    - !include /config/dashboards/modules/mobile-more-sheet.yaml
# ============================================================================
{% macro tab(icon, label, path, key, active) %}
        card:
          type: custom:button-card
          icon: {{ icon }}
          name: {{ label }}
          tap_action:
            action: navigate
            navigation_path: "{{ path }}"
          styles:
            card:
              - background: transparent
              - box-shadow: none
              - transition: none
              - padding: 0
              - overflow: visible
            grid:
              - grid-template-areas: '"i" "n"'
              - grid-template-rows: auto auto
              - row-gap: 4px
              - justify-items: center
            img_cell:
              - padding: 5px 18px
              - border-radius: 999px
              - background: {{ 'rgba(156,194,208,0.20)' if active == key else 'transparent' }}
            icon:
              - width: 23px
              - color: "{{ '#9CC2D0' if active == key else '#8d939a' }}"
            name:
              - font-size: 11px
              - font-weight: {{ '600' if active == key else '500' }}
              - color: "{{ '#9CC2D0' if active == key else '#8d939a' }}"
{% endmacro %}
type: custom:button-card
tap_action: { action: none }
show_icon: false
show_name: false
card_mod:
  style: |
    /* Keep the bar off the HA sidebar on wide screens. HA docks the
       sidebar at >=870px (below that it's a hidden hamburger, so left
       stays 0 and the bar is full-width on mobile). Docked width
       defaults to 256px; --mdc-drawer-width is used when HA exposes it. */
    @media (min-width: 870px) {
      ha-card {
        left: var(--mdc-drawer-width, 256px) !important;
        right: 0 !important;
        /* width: auto so left+right recompute the width - otherwise a
           width:100% bar just slides right and its right edge (More tab)
           runs off the screen. This makes the 5 tabs shrink to fit the
           narrower area instead of being cut off. */
        width: auto !important;
      }
    }
styles:
  card:
    - position: fixed
    - left: 0
    - right: 0
    - bottom: 0
    - z-index: 6
    - height: calc(76px + env(safe-area-inset-bottom))
    - box-sizing: border-box
    - background: "#33363b"
    - border-top: 1px solid rgba(255,255,255,0.06)
    - border-radius: 0
    - box-shadow: 0 -10px 28px rgba(0,0,0,0.4)
    - padding: 0 6px calc(6px + env(safe-area-inset-bottom))
    - transition: none
    - overflow: visible
  grid:
    - grid-template-areas: '"home lights climate security more"'
    - grid-template-columns: repeat(5, 1fr)
    - align-items: center
  custom_fields:
    home:
      - grid-area: home
      - justify-self: center
      - overflow: visible
    lights:
      - grid-area: lights
      - justify-self: center
      - overflow: visible
    climate:
      - grid-area: climate
      - justify-self: center
      - overflow: visible
    security:
      - grid-area: security
      - justify-self: center
      - overflow: visible
    more:
      - grid-area: more
      - justify-self: center
      - overflow: visible
custom_fields:
  home:
{{ tab('mdi:home','Home','/mobile-dash/mobile-home','home', active) }}
  lights:
{{ tab('mdi:lightbulb','Lights','/mobile-dash/lights-main','lights', active) }}
  climate:
{{ tab('mdi:fan','Climate','/mobile-dash/climate-main','climate', active) }}
  security:
{{ tab('mdi:cctv','Security','/mobile-dash/security','security', active) }}
  more:
{{ tab('mdi:dots-horizontal','More','#more-menu','more', active) }}
