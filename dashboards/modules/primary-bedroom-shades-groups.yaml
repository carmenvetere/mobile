- type: custom:bubble-card
  card_type: button
  button_type: slider
  button_type: slider
  entity: cover.bedroom_side_shades
  name: Side Shades
  show_state: true
  scrolling_effect: false
  slider_live_update: true
  card_layout: large
  tap_action:
    action: toggle
  rows: 1
  sub_button:
    - entity: cover.bedroom_side_shades
      icon: mdi:arrow-up
      show_state: false
      state_background: false
      show_background: false
      tap_action:
        action: perform-action
        perform_action: cover.open_cover
        target:
          entity_id: cover.bedroom_side_shades
    - entity: cover.bedroom_side_shades
      icon: mdi:stop
      show_state: false
      state_background: false
      show_background: false
      tap_action:
        action: perform-action
        perform_action: cover.stop_cover
        target:
          entity_id: cover.bedroom_side_shades
    - entity: cover.bedroom_side_shades
      icon: mdi:arrow-down
      show_state: false
      state_background: false
      show_background: false
      tap_action:
        action: perform-action
        perform_action: cover.close_cover
        target:
          entity_id: cover.bedroom_side_shades
  modules:
  - mobile_shades_module    
