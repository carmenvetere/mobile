# lovelace_gen
# ============================================================================
#  Mobile Dash · Shared navigation menu list (issue #146)
#  Single source of truth for the dashboard's destinations. Consumed by:
#    - home-view.yaml (inline "Menu" section)
#    - mobile-nav-sheet.yaml (hamburger pop-up on every other view)
#  Vars:
#    current -> home | lights | climate | shades | security | energy |
#               weather | pool | music | vacuum | settings
#    compact -> true tightens the row margins (used by the pop-up sheet)
#  The row matching `current` is highlighted (slate background, dark text,
#  matching the scene-button "on" state) and shows a check mark instead of
#  the chevron. The Home row only renders on sub-views. Row styling matches
#  the original Home-screen menu rows (mobile_lights_scenes bubble module).
# ============================================================================
type: vertical-stack
{% if compact %}
# The stack's default 4px top/bottom card margins are hardcoded in this HA
# version (it ignores --vertical-stack-card-margin), so card-mod injects the
# override straight into the stack's shadow root.
card_mod:
  style:
    .: |
      #root > * {
        margin: 1px 0 !important;
      }
      #root > *:first-child { margin-top: 0 !important; }
      #root > *:last-child { margin-bottom: 0 !important; }
{% endif %}
cards:
{% if current != "home" %}
  # Home row is only rendered on sub-views (in the nav sheet); the Home
  # screen's inline menu has no use for a link to itself.
  - type: custom:bubble-card
    card_type: button
    button_type: name
    name: Home
    icon: mdi:home
    card_layout: normal
    tap_action:
      action: navigate
      navigation_path: /mobile-dash/mobile-home
    button_action:
      tap_action:
        action: navigate
        navigation_path: /mobile-dash/mobile-home
    sub_button:
      - icon: mdi:chevron-right
        state_background: false
        tap_action:
          action: navigate
          navigation_path: /mobile-dash/mobile-home
    modules:
      - mobile_lights_scenes
    styles: |
      /* nav row */
      {% if compact %}
      ha-card { margin: 1px 5px !important; }
      .bubble-button-card-container.bubble-button-card-container { margin: 1px 5px !important; }
      {% endif %}
{% endif %}
  - type: custom:bubble-card
    card_type: button
    button_type: name
    name: Lights
    icon: mdi:lightbulb
    card_layout: normal
    tap_action:
      action: navigate
      navigation_path: /mobile-dash/lights-main
    button_action:
      tap_action:
        action: navigate
        navigation_path: /mobile-dash/lights-main
    sub_button:
      - entity: sensor.menu_lights_status
        show_state: true
        state_background: false
        tap_action:
          action: navigate
          navigation_path: /mobile-dash/lights-main
      - icon: {{ "mdi:check" if current == "lights" else "mdi:chevron-right" }}
        state_background: false
        tap_action:
          action: navigate
          navigation_path: /mobile-dash/lights-main
    modules:
      - mobile_lights_scenes
    styles: |
      /* nav row */
      {% if compact %}
      ha-card { margin: 1px 5px !important; }
      .bubble-button-card-container.bubble-button-card-container { margin: 1px 5px !important; }
      {% endif %}
      ${(() => {
        const s = hass.states['sensor.lights_on_count']?.state;
        const c = (s && s !== 'All Off') ? 'var(--gold-color)' : 'var(--secondary-text-color)';
        return `
          .bubble-sub-button-1.bubble-sub-button-1,
          .bubble-sub-button-1.bubble-sub-button-1 ha-icon,
          .bubble-sub-button-1.bubble-sub-button-1 ha-state-icon { color: ${c} !important; }
        `;
      })()}
      {% if current == "lights" %}
      .bubble-button-card-container.bubble-button-card-container,
      .bubble-button-background.bubble-button-background {
        background-color: var(--slate-color) !important;
      }
      .bubble-name.bubble-name { color: var(--primary-background-color) !important; }
      .bubble-icon.bubble-icon { color: var(--primary-background-color) !important; }
      .bubble-sub-button.bubble-sub-button,
      .bubble-sub-button.bubble-sub-button ha-icon,
      .bubble-sub-button.bubble-sub-button ha-state-icon { color: var(--primary-background-color) !important; }
      {% endif %}
