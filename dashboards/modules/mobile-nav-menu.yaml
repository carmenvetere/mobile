# lovelace_gen
# ============================================================================
#  Mobile Dash · Shared navigation menu list (issue #146)
#  Single source of truth for the dashboard's destinations. Consumed by:
#    - home-view.yaml (inline "Menu" section)
#    - mobile-nav-sheet.yaml (hamburger pop-up on every other view)
#  Var: current -> home | lights | climate | shades | security | energy |
#                  weather | pool | music | vacuum | settings
#  The row matching `current` is highlighted (slate border/tint) and shows a
#  check mark instead of the chevron. Row styling matches the original
#  Home-screen menu rows (mobile_lights_scenes bubble module).
# ============================================================================
type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: button
    button_type: name
    name: Home
    icon: mdi:home
    card_layout: normal
    tap_action:
      action: navigate
      navigation_path: /mobile-dash/mobile-home
    button_action:
      tap_action:
        action: navigate
        navigation_path: /mobile-dash/mobile-home
    sub_button:
      - icon: {{ "mdi:check" if current == "home" else "mdi:chevron-right" }}
        state_background: false
        tap_action:
          action: navigate
          navigation_path: /mobile-dash/mobile-home
    modules:
      - mobile_lights_scenes
    styles: |
      /* nav row */
      {% if current == "home" %}
      .bubble-button-card-container.bubble-button-card-container {
        background: rgba(142,177,191,0.16) !important;
        border: 1px solid var(--slate-color) !important;
      }
      .bubble-sub-button-1.bubble-sub-button-1 ha-icon { color: var(--slate-bright) !important; }
      {% endif %}
  - type: custom:bubble-card
    card_type: button
    button_type: name
    name: Lights
    icon: mdi:lightbulb
    card_layout: normal
    tap_action:
      action: navigate
      navigation_path: /mobile-dash/lights-main
    button_action:
      tap_action:
        action: navigate
        navigation_path: /mobile-dash/lights-main
    sub_button:
      - entity: sensor.menu_lights_status
        show_state: true
        state_background: false
        tap_action:
          action: navigate
          navigation_path: /mobile-dash/lights-main
      - icon: {{ "mdi:check" if current == "lights" else "mdi:chevron-right" }}
        state_background: false
        tap_action:
          action: navigate
          navigation_path: /mobile-dash/lights-main
    modules:
      - mobile_lights_scenes
    styles: |
      /* nav row */
      {% if current == "lights" %}
      .bubble-button-card-container.bubble-button-card-container {
        background: rgba(142,177,191,0.16) !important;
        border: 1px solid var(--slate-color) !important;
      }
      .bubble-sub-button-2.bubble-sub-button-2 ha-icon { color: var(--slate-bright) !important; }
      {% endif %}
      ${(() => {
        const s = hass.states['sensor.lights_on_count']?.state;
        const c = (s && s !== 'All Off') ? 'var(--gold-color)' : 'var(--secondary-text-color)';
        return `
          .bubble-sub-button-1.bubble-sub-button-1,
          .bubble-sub-button-1.bubble-sub-button-1 ha-icon,
          .bubble-sub-button-1.bubble-sub-button-1 ha-state-icon { color: ${c} !important; }
        `;
      })()}
