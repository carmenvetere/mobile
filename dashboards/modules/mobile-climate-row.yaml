# lovelace_gen
#
# Reusable Bubble Card climate row matching the Climate.html mockup.
# Uses Bubble Card's built-in JS template literals ${...} for state-reactive
# warm/cool tint + glow (heat = amber, cool = cyan, idle = translucent).
#
# Required vars:
#   climate_entity   - climate.* entity id
#   thermostat_name  - display name
#
# Optional vars:
#   rows             - bubble-card rows height (default 2.406)
type: custom:bubble-card
card_type: climate
entity: {{ climate_entity }}
name: {{ thermostat_name }}
show_name: false
show_state: false
show_icon: false
show_attribute: false
attribute: hvac_action
state_color: false
force_icon: true
scrolling_effect: false
card_layout: large-2-rows
rows: 2.5
sub_button:
  - name: HVAC modes menu
    select_attribute: hvac_modes
    show_arrow: true
    show_state: true
    show_attribute: false
    sub_button_type: select
    state_background: false
  - entity: {{ climate_entity }}
    select_attribute: fan_modes
    show_attribute: true
    attribute: fan_mode
    show_state: false
    sub_button_type: select
    state_background: false
styles: |
  ha-card {
    position: relative !important;
    min-height: 110px !important;
    background: var(--background-color) !important;
    border: none !important;
    border-radius: 18px !important;
    box-shadow: ${state === 'heat'
      ? 'inset 0 0 0 1px rgba(255,122,61,0.45), 0 0 26px -8px rgba(255,122,61,0.55)'
      : state === 'cool'
      ? 'inset 0 0 0 1px rgba(94,200,255,0.4), 0 0 26px -8px rgba(94,200,255,0.5)'
      : 'inset 0 0 0 1px rgba(255,255,255,0.05)'} !important;
    padding: 14px 16px !important;
  }

  /* TEMP GROUP — pinned LEFT on the card, single flex row */
  .bubble-temperature-container {
    position: absolute !important;
    left: 16px !important;
    top: 50% !important;
    transform: translateY(-50%) !important;
    right: auto !important;
    display: flex !important;
    align-items: center !important;
    background: transparent !important;
    border-radius: 22px !important;
    padding: 8px 50px 8px 14px !important;  /* extra right padding for +/- */
    z-index: 2 !important;
  }

  /* Big set-temp number */
  .bubble-temperature-display,
  .bubble-climate-temp-display {
    background: transparent !important;
    background-color: transparent !important;
    box-shadow: none !important;
    padding: 0 !important;
    min-width: 0 !important;
    font-size: 40px !important;
    font-weight: 700 !important;
    line-height: 1 !important;
    font-variant-numeric: tabular-nums !important;
    position: relative !important;
    color: ${state === 'off'
      ? 'transparent'
      : state === 'heat'
      ? 'var-primary-text-color'
      : state === 'cool'
      ? 'var-primary-text-color'
      : '#f2f3f5'} !important;
  }

  /* Off-state overlay */
  .bubble-climate-temp-display::after {
    content: 'Off';
    display: ${state === 'off' ? 'flex' : 'none'};
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: flex-start;
    font-size: 40px;
    font-weight: 700;
    line-height: 1;
    color: rgba(242,243,245,0.78);
  }

  /* + button — anchored just ABOVE the container's vertical center */
  .bubble-climate-plus-button {
    position: absolute !important;
    right: 0px !important;
    bottom: 50% !important;
    top: auto !important;
    margin-bottom: 1px !important;
    display: ${state === 'off' ? 'none' : 'flex'} !important;
    align-items: center !important;
    justify-content: center !important;
    width: 40px !important;
    height: 40px !important;
    min-height: 26px !important;
    border-radius: 8px !important;
    background: rgba(255,255,255,0.16) !important;
    color: #f2f3f5 !important;
    cursor: pointer !important;
  }

  /* - button — anchored just BELOW the container's vertical center */
  .bubble-climate-minus-button {
    position: absolute !important;
    right: 0px !important;
    top: 50% !important;
    bottom: auto !important;
    margin-top: 1px !important;
    display: ${state === 'off' ? 'none' : 'flex'} !important;
    align-items: center !important;
    justify-content: center !important;
    width: 40px !important;
    height: 40px !important;
    min-height: 26px !important;
    border-radius: 8px !important;
    background: rgba(255,255,255,0.16) !important;
    color: #f2f3f5 !important;
    cursor: pointer !important;
  }

  .bubble-climate-plus-button:hover,
  .bubble-climate-minus-button:hover {
    background: rgba(255,255,255,0.26) !important;
  }
  .bubble-climate-plus-button ha-icon,
  .bubble-climate-minus-button ha-icon {
    --mdc-icon-size: 26px !important;
    color: #f2f3f5 !important;
  }


  /* SUB-BUTTONS — pinned RIGHT, stacked vertically */
  .bubble-sub-button-container {
    position: absolute !important;
    right: 16px !important;
    top: 50% !important;
    transform: translateY(-50%) !important;
    left: auto !important;
    flex-direction: column !important;
    align-items: flex-end !important;
    gap: 8px !important;
    z-index: 2 !important;
  }

  .bubble-sub-button {
    background: var(--ha-card-background) !important;
    border: 1px solid rgba(255,255,255,0.04) !important;
    border-radius: 999px !important;
    color: #f2f3f5 !important;
    font-size: 16px !important;
    font-weight: 600 !important;
    min-height: 36px !important;
  }
  .bubble-sub-button:hover {
    background: rgba(255,255,255,0.22) !important;
  }