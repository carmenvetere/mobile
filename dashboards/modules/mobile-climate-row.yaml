# lovelace_gen
#
# Reusable Bubble Card climate row matching the Climate.html mockup.
# Uses Bubble Card's built-in JS template literals ${...} for state-reactive
# warm/cool tint + glow (heat = amber, cool = cyan, idle = translucent).
#
# Required vars:
#   climate_entity   - climate.* entity id
#   thermostat_name  - display name
#
# Optional vars:
#   fan_entity       - climate.* entity for the fan-mode sub-button, when fan
#                      control lives on a different integration than setpoint
#                      control (e.g. bedroom: HomeKit setpoints, Lyric fan).
#                      Defaults to climate_entity.
#   rows             - bubble-card rows height (default 2.406)
type: custom:bubble-card
card_type: climate
entity: {{ climate_entity }}
name: {{ thermostat_name }}
show_name: false
show_state: false
show_icon: false
show_attribute: false
attribute: hvac_action
state_color: false
force_icon: true
scrolling_effect: false
card_layout: large-2-rows
rows: 2.5
sub_button:
  - name: HVAC modes menu
    select_attribute: hvac_modes
    show_arrow: true
    show_state: true
    show_attribute: false
    sub_button_type: select
    state_background: false
  - entity: {{ fan_entity | default(climate_entity) }}
    select_attribute: fan_modes
    show_attribute: true
    attribute: fan_mode
    show_state: false
    sub_button_type: select
    state_background: false
styles: 
modules: 
  - {{ module_name }}