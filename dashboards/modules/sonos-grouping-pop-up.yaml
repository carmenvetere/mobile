#lovelace_gen
type: vertical-stack
cards:
  # ── Pop-up header ───────────────────────────────────────────────────────────
  - type: custom:bubble-card
    theme: Wall Panel
    card_type: pop-up
    hash: "#sonos-grouping"
    button_type: name
    sub_button:
      main: []
      bottom: []
    show_header: true
    name: Sonos Grouping
    icon: mdi:speaker-multiple
    scrolling_effect: false
    close_on_click: false
    background_update: true
    modules:
      - pop-up-module
      - wall_panel_separator
    styles: |-
      .bubble-name { line-height: 1.1 !important; }
      .bubble-background { background: transparent !important; }
      .bubble-icon-container { background: transparent !important; }
      .bubble-icon { --mdc-icon-size: 36px !important; }

  # ── SOURCE section label ────────────────────────────────────────────────────
  - type: custom:button-card
    name: SOURCE
    show_name: true
    show_icon: false
    tap_action:
      action: none
    styles:
      card:
        - background: transparent
        - box-shadow: none
        - height: 28px
        - padding: 0 14px
      name:
        - font-size: 11px
        - font-weight: '700'
        - letter-spacing: 1.5px
        - color: var(--secondary-text-color)
        - text-align: left
        - justify-self: start

  # ── Source chip grid ────────────────────────────────────────────────────────
  - type: grid
    columns: 2
    square: false
    cards:

      - type: custom:button-card
        name: Living Room
        show_name: true
        show_icon: false
        tap_action:
          action: call-service
          service: input_select.select_option
          service_data:
            entity_id: input_select.sonos_speaker_select
            option: Living Room
        triggers_update:
          - input_select.sonos_speaker_select
        state:
          - operator: template
            value: "[[[return states['input_select.sonos_speaker_select']?.state === 'Living Room']]]"
            styles:
              card:
                - background: var(--accent-color) !important
              name:
                - color: white
          - operator: default
            styles:
              card:
                - background: var(--background-color-2)
              name:
                - color: var(--primary-text-color)
        styles:
          card:
            - height: 44px
            - border-radius: 22px
            - margin: 4px 6px
          name:
            - font-size: 14px
            - font-weight: '600'

      - type: custom:button-card
