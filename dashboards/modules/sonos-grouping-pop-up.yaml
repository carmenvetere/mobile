      - media_player.kitchen
      - media_player.office
      - media_player.deck
      - media_player.pool
      - media_player.primary_bedroom
      - media_player.primary_bathroom
      - media_player.gym
      - media_player.mud_room
      - media_player.media_room
    card:
      type: custom:sonos-card
      entityId: "${vars[0]}"
      sections:
        - grouping
      startSection: grouping
      grouping:
        skipApplyButton: true
      card_mod:
        style:
          .: |
            ha-card {
              background-color: transparent !important;
              box-shadow: none !important;
              margin: 0 !important;
              max-height: 230px !important;
              overflow-y: auto !important;
            }
          sonos-grouping$: |
            .name {
              font-size: 13px !important;
              font-weight: 600 !important;
              text-align: left !important;
              justify-content: flex-start !important;
              margin-left: 10px !important;
            }
            .item {
              justify-content: flex-start !important;
            }
            .name-and-volume {
              align-items: flex-start !important;
              background-color: var(--background-color-2) !important;
              border-radius: 12px !important;
              margin: 3px 10px !important;
              padding: 0 10px !important;
              height: 50px !important;
            }
            .volume {
              --control-slider-thickness: 8px !important;
              --control-slider-background: var(--background-color) !important;
              margin-left: 10px !important;
              margin-right: 10px !important;
            }
