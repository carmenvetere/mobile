#lovelace_gen
type: vertical-stack
cards:
  - type: custom:bubble-card
    theme: Wall Panel
    card_type: pop-up
    hash: "#sonos-grouping"
    button_type: name
    sub_button:
      main: []
      bottom: []
    show_header: true
    name: Sonos Grouping
    icon: mdi:speaker-multiple
    scrolling_effect: false
    close_on_click: true
    background_update: true
    modules:
      - pop-up-module
      - wall_panel_separator
    styles: |-
      .bubble-name {
        line-height: 1.1 !important;
        }
      .bubble-background {
        background: transparent !important;
        }
      .bubble-icon-container {
        background: transparent !important;
        }
      .bubble-icon {
        --mdc-icon-size: 36px !important;
        }

  - type: custom:button-card
    entity: sensor.sonos_group_name
    show_name: false
    show_icon: false
    show_label: true
    label: "[[[return entity?.state ?? 'No Speakers']]]"
    tap_action:
      action: none
    triggers_update:
      - sensor.sonos_group_name
    styles:
      card:
        - background: transparent
        - box-shadow: none
        - height: 55px
      label:
        - font-size: 26px
        - font-weight: bold
        - color: var(--primary-text-color)
        - text-align: center

  - type: vertical-stack
    cards:

      # ── Living Room ──────────────────────────────────────────────────────────
      - type: custom:button-card
        tap_action:
          action: none
        styles:
          card:
            - background: transparent
            - box-shadow: none
            - padding: 3px 10px
            - height: 76px
          grid:
            - grid-template-areas: '"radio speaker"'
            - grid-template-columns: 56px 1fr
            - grid-template-rows: 1fr
            - align-items: center
        custom_fields:
          radio:
            card:
              type: custom:button-card
              entity: input_boolean.sonos_group_select_living_room
              show_name: false
              show_icon: true
              tap_action:
                action: toggle
              state:
                - value: "on"
                  icon: mdi:radiobox-marked
                  color: var(--primary-text-color)
                - value: "off"
                  icon: mdi:radiobox-blank
                  color: var(--secondary-text-color)
              triggers_update:
                - input_boolean.sonos_group_select_living_room
              styles:
                card:
                  - background: transparent
                  - box-shadow: none
                  - height: 56px
                  - padding: 0
                icon:
                  - width: 30px
          speaker:
            card:
              type: custom:button-card
              entity: media_player.living_room
              name: Living Room
              show_name: true
              show_label: true
              show_icon: false
              label: |
                [[[
                  const mp = states['media_player.living_room'];
                  if (mp?.state === 'playing') {
                    const title = mp.attributes.media_title || '';
                    return title ? 'Playing<br>' + title : 'Playing';
                  }
                  if (mp?.state && mp.state !== 'unavailable') {
                    return mp.state.charAt(0).toUpperCase() + mp.state.slice(1);
                  }
                  return '';
                ]]]
              triggers_update:
                - media_player.living_room
                - input_select.sonos_speaker_select
              tap_action:
                action: call-service
                service: input_select.select_option
                service_data:
                  entity_id: input_select.sonos_speaker_select
                  option: Living Room
              state:
                - operator: template
                  value: "[[[return states['input_select.sonos_speaker_select']?.state === 'Living Room']]]"
                  styles:
                    card:
                      - border: 2px solid var(--primary-color) !important
                - operator: default
                  styles:
                    card:
                      - border: 2px solid transparent
              styles:
                card:
                  - height: 68px
                  - border-radius: 12px
                  - background: var(--background-color-2)
                  - margin: 0
                grid:
                  - grid-template-areas: '"n l"'
                  - grid-template-columns: 1fr auto
                  - align-items: center
                  - padding: 0 15px
                name:
                  - font-size: 18px
                  - font-weight: bold
                  - text-align: left
                label:
                  - font-size: 13px
                  - color: var(--secondary-text-color)
                  - text-align: right

