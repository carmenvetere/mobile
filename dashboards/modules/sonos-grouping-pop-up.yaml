#lovelace_gen
type: vertical-stack
cards:
  - type: custom:bubble-card
    theme: Wall Panel
    card_type: pop-up
    hash: "#sonos-grouping"
    button_type: name
    sub_button:
      main: []
      bottom: []
    show_header: true
    name: Sonos Grouping
    icon: mdi:speaker-multiple
    scrolling_effect: false
    close_on_click: false
    background_update: true
    modules:
      - pop-up-module
      - wall_panel_separator
    styles: |-
      .bubble-name {
        line-height: 1.1 !important;
        }
      .bubble-background {
        background: transparent !important;
        }
      .bubble-icon-container {
        background: transparent !important;
        }
      .bubble-icon {
        --mdc-icon-size: 36px !important;
        }

  - type: custom:button-card
    show_name: false
    show_icon: false
    show_label: true
    label: |
      [[[
        const sel = states['input_select.sonos_speaker_select']?.state;
        const nameMap = {
          'Living Room': 'media_player.living_room',
          'Kitchen': 'media_player.kitchen',
          'Office': 'media_player.office',
          'Deck': 'media_player.deck',
          'Pool': 'media_player.pool',
          'Primary Bedroom': 'media_player.primary_bedroom',
          'Primary Bathroom': 'media_player.primary_bathroom',
          'Gym': 'media_player.gym',
          'Mud Room': 'media_player.mud_room',
          'Media Room': 'media_player.media_room'
        };
        const revMap = {
          'media_player.living_room': 'Living Room',
          'media_player.kitchen': 'Kitchen',
          'media_player.office': 'Office',
          'media_player.deck': 'Deck',
          'media_player.pool': 'Pool',
          'media_player.primary_bedroom': 'Primary Bedroom',
          'media_player.primary_bathroom': 'Primary Bathroom',
          'media_player.gym': 'Gym',
          'media_player.mud_room': 'Mud Room',
          'media_player.media_room': 'Media Room'
        };
        const mp = sel ? states[nameMap[sel]] : null;
        const members = mp?.attributes?.group_members;
        if (!members || members.length <= 1) return sel || 'No Speaker';
        return members.map(m => revMap[m] || m).join(' + ');
      ]]]
    tap_action:
      action: none
    triggers_update:
      - input_select.sonos_speaker_select
      - media_player.living_room
      - media_player.kitchen
      - media_player.office
      - media_player.deck
      - media_player.pool
      - media_player.primary_bedroom
      - media_player.primary_bathroom
      - media_player.gym
      - media_player.mud_room
      - media_player.media_room
    styles:
      card:
        - background: transparent
        - box-shadow: none
        - height: 55px
      label:
        - font-size: 26px
        - font-weight: bold
        - color: var(--primary-text-color)
        - text-align: center

  - type: vertical-stack
    cards:

      # ── Living Room ──────────────────────────────────────────────────────────
      - type: custom:button-card
        tap_action:
          action: none
        styles:
          card:
            - background: transparent
            - box-shadow: none
            - padding: 3px 10px
            - height: 76px
          grid:
            - grid-template-areas: '"radio speaker"'
            - grid-template-columns: 56px 1fr
            - grid-template-rows: 1fr
            - align-items: center
        custom_fields:
          radio:
            card:
              type: custom:button-card
              entity: input_boolean.sonos_group_select_living_room
              show_name: false
              show_icon: true
              tap_action:
                action: toggle
              state:
                - value: "on"
                  icon: mdi:radiobox-marked
                  color: var(--primary-text-color)
                - value: "off"
                  icon: mdi:radiobox-blank
                  color: var(--secondary-text-color)
              triggers_update:
                - input_boolean.sonos_group_select_living_room
              styles:
                card:
                  - background: transparent
                  - box-shadow: none
                  - height: 56px
                  - padding: 0
                icon:
                  - width: 30px
          speaker:
            card:
              type: custom:button-card
              entity: media_player.living_room
              show_name: false
              show_label: true
              show_icon: false
              label: |
                [[[
                  const mp = states['media_player.living_room'];
                  let status = '';
                  if (mp?.state === 'playing') {
                    const title = mp.attributes.media_title || '';
                    status = title ? 'Playing · ' + title : 'Playing';
                  } else if (mp?.state && mp.state !== 'unavailable') {
                    status = mp.state.charAt(0).toUpperCase() + mp.state.slice(1);
                  }
                  return '<div style="display:flex;justify-content:space-between;align-items:center;width:100%;padding:0 15px">'
                    + '<span style="font-size:18px;font-weight:bold;color:var(--primary-text-color)">Living Room</span>'
                    + (status ? '<span style="font-size:13px;color:var(--secondary-text-color)">' + status + '</span>' : '')
                    + '</div>';
                ]]]
              triggers_update:
                - media_player.living_room
                - input_select.sonos_speaker_select
              tap_action:
                action: call-service
                service: input_select.select_option
                service_data:
                  entity_id: input_select.sonos_speaker_select
                  option: Living Room
              state:
                - operator: template
                  value: "[[[return states['input_select.sonos_speaker_select']?.state === 'Living Room']]]"
                  styles:
                    card:
                      - border: 2px solid var(--primary-color) !important
                - operator: default
                  styles:
                    card:
                      - border: 2px solid transparent
              styles:
                card:
                  - height: 68px
                  - border-radius: 12px
                  - background: var(--background-color-2)
                  - margin: 0
                label:
                  - padding: 0
                  - width: 100%

