#lovelace_gen
type: vertical-stack
cards:
  # ── Pop-up header ───────────────────────────────────────────────────────────
  - type: custom:bubble-card
    theme: Wall Panel
    card_type: pop-up
    hash: "#sonos-grouping"
    button_type: name
    sub_button:
      main: []
      bottom: []
    show_header: true
    name: Sonos Grouping
    icon: mdi:speaker-multiple
    scrolling_effect: false
    close_on_click: false
    background_update: true
    modules:
      - pop-up-module
      - wall_panel_separator
    styles: |-
      .bubble-name { line-height: 1.1 !important; }
      .bubble-background { background: transparent !important; }
      .bubble-icon-container { background: transparent !important; }
      .bubble-icon { --mdc-icon-size: 36px !important; }

  # ── "Currently grouped" banner ──────────────────────────────────────────────
  - type: markdown
    content: >-
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:18px;">
        <div style="flex:1;min-width:0;">
          <div style="font-size:11px;letter-spacing:1.5px;color:var(--secondary-text-color);text-transform:uppercase;line-height:1.1;">Currently grouped</div>
          <div style="font-size:15px;font-weight:600;color:var(--primary-text-color);line-height:1.3;margin-top:3px;overflow-wrap:break-word;">
            {%- set sel = states('input_select.sonos_speaker_select') -%}
            {%- set name_map = {
              'Living Room': 'media_player.living_room',
              'Kitchen': 'media_player.kitchen',
              'Office': 'media_player.office',
              'Deck': 'media_player.deck',
              'Pool': 'media_player.pool',
              'Primary Bedroom': 'media_player.primary_bedroom',
              'Primary Bathroom': 'media_player.primary_bathroom',
              'Gym': 'media_player.gym',
              'Mud Room': 'media_player.mud_room',
              'Media Room': 'media_player.media_room'
            } -%}
            {%- set mp = name_map.get(sel) -%}
            {%- set members = state_attr(mp, 'group_members') if mp else [] -%}
            {%- if members and members | length > 1 -%}
              {{ members | map('regex_replace', '^media_player\\.', '') | map('replace', '_', ' ') | map('title') | list | join(' + ') }}
            {%- else -%}
              {{ sel or 'No speaker' }}
            {%- endif -%}
          </div>
        </div>
        <div style="font-size:12px;color:var(--secondary-text-color);text-align:right;max-width:240px;line-height:1.3;flex-shrink:0;">Tap a room to make it primary, then add others below</div>
      </div>
    card_mod:
      style: |
        ha-card {
          background: var(--background-color-2) !important;
          border-radius: 14px !important;
          margin: 4px 10px 8px !important;
          padding: 10px 14px !important;
          box-shadow: none !important;
        }
        .card-content { padding: 0 !important; }
        ha-markdown { padding: 0 !important; }
        ha-markdown p { margin: 0 !important; }

  # ── 2-col speaker grid (primary + in-group + default state) ─────────────────
  - type: grid
    columns: 2
    square: false
    cards:

      # === Living Room ===
      - type: custom:button-card
        name: Living Room
        show_name: true
        show_icon: false
        show_label: true
        label: |
          [[[
            const sel = states['input_select.sonos_speaker_select']?.state;
            if (sel === 'Living Room') return 'PRIMARY';
            const nm = {'Living Room':'media_player.living_room','Kitchen':'media_player.kitchen','Office':'media_player.office','Deck':'media_player.deck','Pool':'media_player.pool','Primary Bedroom':'media_player.primary_bedroom','Primary Bathroom':'media_player.primary_bathroom','Gym':'media_player.gym','Mud Room':'media_player.mud_room','Media Room':'media_player.media_room'};
            const mp = sel ? states[nm[sel]] : null;
            const members = mp?.attributes?.group_members || [];
            return members.includes('media_player.living_room') ? '✓' : '';
          ]]]
        tap_action:
          action: call-service
          service: input_select.select_option
          service_data:
            entity_id: input_select.sonos_speaker_select
            option: Living Room
        triggers_update:
          - input_select.sonos_speaker_select
          - media_player.living_room
          - media_player.kitchen
          - media_player.office
          - media_player.deck
          - media_player.pool
          - media_player.primary_bedroom
          - media_player.primary_bathroom
          - media_player.gym
          - media_player.mud_room
          - media_player.media_room
        state:
          - operator: template
            value: "[[[ return states['input_select.sonos_speaker_select']?.state === 'Living Room' ]]]"
            styles:
              card:
                - background: var(--accent-color) !important
              name:
                - color: white
              label:
                - color: white
                - opacity: '0.9'
          - operator: template
            value: |
              [[[
                const sel = states['input_select.sonos_speaker_select']?.state;
                const nm = {'Living Room':'media_player.living_room','Kitchen':'media_player.kitchen','Office':'media_player.office','Deck':'media_player.deck','Pool':'media_player.pool','Primary Bedroom':'media_player.primary_bedroom','Primary Bathroom':'media_player.primary_bathroom','Gym':'media_player.gym','Mud Room':'media_player.mud_room','Media Room':'media_player.media_room'};
                const mp = sel ? states[nm[sel]] : null;
                const members = mp?.attributes?.group_members || [];
                return members.includes('media_player.living_room') && sel !== 'Living Room';
              ]]]
            styles:
              card:
                - background: rgba(168,197,214,0.35) !important
              name:
                - color: var(--primary-text-color)
              label:
                - color: var(--primary-text-color)
          - operator: default
            styles:
              card:
                - background: var(--background-color-2)
              name:
                - color: var(--primary-text-color)
              label:
                - color: var(--primary-text-color)
        styles:
          card:
            - height: 40px
            - border-radius: 999px
            - margin: 3px 5px
            - padding: 0 16px
          grid:
            - grid-template-areas: '"n l"'
            - grid-template-columns: 1fr auto
            - column-gap: 8px
            - align-items: center
          name:
            - font-size: 13px
            - font-weight: '600'
            - justify-self: start
            - text-align: left
          label:
            - font-size: 10px
            - font-weight: '700'
            - letter-spacing: '0.08em'
            - justify-self: end

