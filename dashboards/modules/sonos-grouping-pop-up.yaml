  # ── ALSO PLAYING IN section label ───────────────────────────────────────────
  - type: custom:button-card
    name: ALSO PLAYING IN
    show_name: true
    show_icon: false
    tap_action:
      action: none
    styles:
      card:
        - background: transparent
        - box-shadow: none
        - height: 28px
        - padding: 0 14px
        - margin-top: 8px
      name:
        - font-size: 11px
        - font-weight: '700'
        - letter-spacing: 1.5px
        - color: var(--secondary-text-color)
        - text-align: left
        - justify-self: start

  # ── sonos-card grouping section, bound to the selected source ───────────────
  - type: custom:config-template-card
    variables:
      - >
        states['input_select.sonos_speaker_select'].state === 'Living Room' ? 'media_player.living_room' :
        states['input_select.sonos_speaker_select'].state === 'Kitchen' ? 'media_player.kitchen' :
        states['input_select.sonos_speaker_select'].state === 'Office' ? 'media_player.office' :
        states['input_select.sonos_speaker_select'].state === 'Deck' ? 'media_player.deck' :
        states['input_select.sonos_speaker_select'].state === 'Pool' ? 'media_player.pool' :
        states['input_select.sonos_speaker_select'].state === 'Primary Bedroom' ? 'media_player.primary_bedroom' :
        states['input_select.sonos_speaker_select'].state === 'Primary Bathroom' ? 'media_player.primary_bathroom' :
        states['input_select.sonos_speaker_select'].state === 'Gym' ? 'media_player.gym' :
        states['input_select.sonos_speaker_select'].state === 'Mud Room' ? 'media_player.mud_room' :
        'media_player.media_room'
    entities:
      - input_select.sonos_speaker_select
      - media_player.living_room
      - media_player.kitchen
      - media_player.office
      - media_player.deck
      - media_player.pool
      - media_player.primary_bedroom
      - media_player.primary_bathroom
      - media_player.gym
      - media_player.mud_room
      - media_player.media_room
    card:
      type: custom:sonos-card
      entityId: "${vars[0]}"
      sections:
        - grouping
      startSection: grouping
      grouping:
        skipApplyButton: true
      card_mod:
        style:
          .: |
            ha-card {
              background-color: transparent !important;
              box-shadow: none !important;
              margin: 0 !important;
            }
          sonos-grouping$: |
            .name {
              font-size: 18px !important;
              font-weight: bold !important;
              text-align: left !important;
              justify-content: flex-start !important;
              margin-left: 10px !important;
            }
            .item {
              justify-content: flex-start !important;
            }
            .name-and-volume {
              align-items: flex-start !important;
              background-color: var(--background-color-2) !important;
              border-radius: 12px !important;
              margin: 4px 10px !important;
              padding: 0 10px !important;
              height: 68px !important;
            }
            .volume {
              --control-slider-thickness: 6px !important;
              --control-slider-background: var(--background-color) !important;
              margin-left: 10px !important;
              margin-right: 10px !important;
            }
