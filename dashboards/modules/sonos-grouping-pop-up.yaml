#lovelace_gen
type: vertical-stack
cards:
  - type: custom:bubble-card
    theme: Wall Panel
    card_type: pop-up
    hash: "#sonos-grouping"
    button_type: name
    sub_button:
      main: []
      bottom: []
    show_header: true
    name: Sonos Grouping
    icon: mdi:speaker-multiple
    scrolling_effect: false
    close_on_click: true
    background_update: true
    modules:
      - pop-up-module
      - wall_panel_separator
    styles: |-
      .bubble-name {
        line-height: 1.1 !important;
        }
      .bubble-background {
        background: transparent !important;
        }

      .bubble-icon-container {
        background: transparent !important;
        }

      .bubble-icon {
        --mdc-icon-size: 36px !important;
        }
  - type: custom:button-card
    entity: sensor.sonos_group_name
    name: Speakers
    show_name: true
    show_label: true
    show_icon: true
    icon: mdi:speaker-multiple
    label: "[[[return entity?.state ?? 'No Speakers']]]"
    tap_action:
      action: none
    triggers_update:
      - sensor.sonos_group_name
    styles:
      card:
        - background: transparent
        - box-shadow: none
        - height: 65px
        - padding: 8px 15px
      name:
        - font-size: 16px
        - color: var(--secondary-text-color)
        - text-transform: uppercase
        - letter-spacing: 2px
      label:
        - font-size: 32px
        - font-weight: bold
        - color: var(--primary-text-color)
      icon:
        - width: 32px
        - color: var(--secondary-text-color)
  - type: custom:button-card
    styles:
      card:
        - background-color: transparent
      grid:
        - grid-template-areas: |
            "column1 column2"
        - grid-template-columns: 1fr 1fr
        - grid-template-rows: auto
        - align-items: start
        - column-gap: 10px
    custom_fields:
      column1:
        card:
          type: vertical-stack
          cards:
            - type: custom:button-card
              entity: input_boolean.sonos_group_select_living_room
              name: Living Room
              icon: mdi:sofa
              show_name: true
              show_icon: true
              show_label: true
              label: |
                [[[
                  const active = states['input_select.sonos_speaker_select']?.state === 'Living Room';
                  const coord = states['input_select.sonos_group_coordinator']?.state === 'living_room';
                  const mp = states['media_player.living_room'];
                  const parts = [];
                  if (active) parts.push('▶ Listening');
                  else if (coord) parts.push('⭐ Main');
                  if (mp?.state === 'playing') {
                    parts.push(mp.attributes.media_artist || mp.attributes.media_title || 'Playing');
                  } else if (mp?.state && mp.state !== 'unavailable') {
                    parts.push(mp.state.charAt(0).toUpperCase() + mp.state.slice(1));
                  }
                  return parts.join('  ·  ') || ' ';
                ]]]
              triggers_update:
                - input_boolean.sonos_group_select_living_room
                - input_select.sonos_group_coordinator
                - input_select.sonos_speaker_select
                - media_player.living_room
              tap_action:
                action: call-service
                service: input_select.select_option
                service_data:
                  entity_id: input_select.sonos_speaker_select
                  option: Living Room
              double_tap_action:
                action: toggle
              hold_action:
                action: call-service
                service: script.sonos_set_main_speaker
                service_data:
                  speaker: living_room
              state:
                - value: "on"
                  color: var(--primary-color)
                  styles:
                    card:
                      - background: rgba(var(--rgb-primary-color), 0.2) !important
                      - border: 2px solid var(--primary-color) !important
                - value: "off"
                  color: var(--secondary-text-color)
              styles:
                card:
                  - height: 115px
                  - border-radius: 14px
                  - margin: 4px
                name:
                  - font-size: 20px
                  - font-weight: bold
                label:
                  - font-size: 14px
                  - color: var(--secondary-text-color)
                icon:
                  - width: 36px
