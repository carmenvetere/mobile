  - type: vertical-stack
    cards:
      - type: custom:button-card
        name: Tap = listen  •  Double-tap = group  •  Hold = set main
        show_name: true
        show_icon: false
        tap_action:
          action: none
        styles:
          card:
            - background: transparent
            - box-shadow: none
            - height: 40px
          name:
            - font-size: 16px
            - color: var(--primary-text-color)
            - font-weight: normal
      - type: custom:button-card
        name: Apply Group
        icon: mdi:check-circle-outline
        show_name: true
        show_icon: true
        tap_action:
          action: call-service
          service: script.turn_on
          service_data:
            entity_id: script.sonos_apply_group
        styles:
          card:
            - height: 60px
            - border-radius: 12px
            - background: var(--primary-color)
            - min-width: 180px
            - max-width: 220px
          name:
            - font-size: 22px
            - font-weight: bold
            - color: white
          icon:
            - color: white
            - width: 28px
