- type: custom:bubble-card
  card_type: button
  button_type: slider
  entity: cover.first_floor_all
  name: All Shades
  scrolling_effect: false
  show_state: true
  tap_action:
    action: toggle
  rows: 1
  sub_button:
    - entity: cover.first_floor_all
      icon: mdi:arrow-up
      show_state: false
      state_background: false
      show_background: false
      tap_action:
        action: perform-action
        perform_action: cover.open_cover
        target:
          entity_id: cover.first_floor_all
    - entity: cover.first_floor_all
      icon: mdi:stop
      show_state: false
      state_background: false
      show_background: false
      tap_action:
        action: perform-action
        perform_action: cover.stop_cover
        target:
          entity_id: cover.first_floor_all
    - entity: cover.first_floor_all
      icon: mdi:arrow-down
      show_state: false
      state_background: false
      show_background: false
      tap_action:
        action: perform-action
        perform_action: cover.close_cover
        target:
          entity_id: cover.first_floor_all
  modules:
  - mobile_shades_module 
