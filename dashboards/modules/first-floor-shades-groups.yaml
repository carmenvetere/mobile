- type: custom:bubble-card
  card_type: cover
  button_type: slider
  entity: cover.first_floor_all
  name: All Shades
  scrolling_effect: false
  show_state: true
  tap_action:
    action: toggle
  button_action: {}
  sub_button:
    - entity: cover.first_floor_all
      icon: mdi:sun-angle
      state_background: false
      show_state: false
      tap_action:
        action: perform-action
        perform_action: cover.set_cover_position
        target:
          entity_id: cover.first_floor_all
        data:
          position: 55
  rows: 1
  styles: |
    .bubble-range-fill { background-color: rgba(142,177,191,0.30) !important; }
    .bubble-button-card-container { background: var(--card-background-color) !important;
      border-radius: 16px !important; box-shadow: none !important; }
    .bubble-icon-container { background: rgba(142,177,191,0.18) !important; }
    .bubble-icon { color: var(--slate-bright) !important; }
    .bubble-name { color: var(--primary-text-color) !important; font-size: 15px !important; font-weight: 600 !important; }
    .bubble-state { color: #c3c7cc !important; }
  modules:
  - mobile_shades_module 
