# lovelace_gen
# Climate sub-panel toggle row (v1 mobile): card surface + CSS toggle switch.
# Reads state via states[...] so it can't throw regardless of nesting, and a
# 5px top margin gives the rows breathing room inside the stack.
# Required vars: toggle_entity, row_name, row_icon
type: custom:button-card
entity: {{ toggle_entity }}
name: {{ row_name }}
show_state: true
show_label: false
show_icon: true
icon: {{ row_icon }}
tap_action:
  action: toggle
state_display: |
  [[[ return (states['{{ toggle_entity }}'] || {}).state === 'on' ? 'On' : 'Off'; ]]]
styles:
  card:
    - background: var(--background-color-2)
    - border-radius: 15px
    - border-top: 1px solid rgba(255,255,255,0.06)
    - padding: 15px
    - margin-top: 5px
    - transition: none
    - cursor: pointer
  grid:
    - grid-template-areas: '"ic n st sw"'
    - grid-template-columns: auto 1fr auto auto
    - align-items: center
    - column-gap: 10px
  img_cell:
    - grid-area: ic
    - width: 22px
    - height: 22px
  icon:
    - width: 18px
    - color: |
        [[[ return (states['{{ toggle_entity }}'] || {}).state === 'on' ? 'var(--slate-bright)' : '#9aa0a8'; ]]]
  name:
    - grid-area: n
    - justify-self: start
    - font-size: 16px
    - font-weight: 600
    - color: var(--primary-text-color)
  state:
    - grid-area: st
    - justify-self: end
    - font-size: 14px
    - font-weight: 600
    - color: |
        [[[ return (states['{{ toggle_entity }}'] || {}).state === 'on' ? 'var(--slate-bright)' : '#9aa0a8'; ]]]
  custom_fields:
    sw:
      - grid-area: sw
      - justify-self: end
custom_fields:
  sw: |
    [[[
      var on = (states['{{ toggle_entity }}'] || {}).state === 'on';
      return '<div style="width:38px;height:22px;border-radius:999px;background:'
        + (on ? 'rgba(142,177,191,0.55)' : 'rgba(255,255,255,0.28)')
        + ';position:relative;transition:background .2s ease;">'
        + '<div style="position:absolute;top:2px;left:' + (on ? '18px' : '2px')
        + ';width:18px;height:18px;border-radius:50%;background:#fff;'
        + 'box-shadow:0 1px 2px rgba(0,0,0,0.4);transition:left .2s ease;"></div></div>';
    ]]]
