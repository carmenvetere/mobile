type: custom:apexcharts-card
header:
  show: true
  show_states: true
graph_span: 12month
span:
  end: month
apex_config:
  chart:
    type: bar
    stacked: true
    height: 300px
    events:
      mounted: |
        EVAL:function(ctx) {
          if (ctx.w.globals._othInProgress) return;
          ctx.w.globals._othInProgress = true;
          try {
            const s = ctx.w.globals.series;
            const xs = ctx.w.globals.seriesX;
            if (!s || s.length < 3 || !xs || !xs[0] || !xs[0].length) return;
            const evMap = {};
            const wpMap = {};
            (xs[1] || []).forEach((x, i) => { evMap[x] = s[1][i] || 0; });
            (xs[2] || []).forEach((x, i) => { wpMap[x] = s[2][i] || 0; });
            const newData = xs[0].map((x, i) => ({
              x: x,
              y: Math.max(0, (s[0][i] || 0) - (evMap[x] || 0) - (wpMap[x] || 0))
            }));
            ctx.updateSeries([
              { data: newData },
              { data: xs[1].map((x, i) => ({ x: x, y: s[1][i] })) },
              { data: xs[2].map((x, i) => ({ x: x, y: s[2][i] })) }
            ], false);
          } finally {
            setTimeout(() => { ctx.w.globals._othInProgress = false; }, 100);
          }
        }
      updated: |
        EVAL:function(ctx) {
          if (ctx.w.globals._othInProgress) return;
          ctx.w.globals._othInProgress = true;
          try {
            const s = ctx.w.globals.series;
            const xs = ctx.w.globals.seriesX;
            if (!s || s.length < 3 || !xs || !xs[0] || !xs[0].length) return;
            const evMap = {};
            const wpMap = {};
            (xs[1] || []).forEach((x, i) => { evMap[x] = s[1][i] || 0; });
            (xs[2] || []).forEach((x, i) => { wpMap[x] = s[2][i] || 0; });
            const newData = xs[0].map((x, i) => ({
              x: x,
              y: Math.max(0, (s[0][i] || 0) - (evMap[x] || 0) - (wpMap[x] || 0))
            }));
            ctx.updateSeries([
              { data: newData },
              { data: xs[1].map((x, i) => ({ x: x, y: s[1][i] })) },
              { data: xs[2].map((x, i) => ({ x: x, y: s[2][i] })) }
            ], false);
          } finally {
            setTimeout(() => { ctx.w.globals._othInProgress = false; }, 100);
          }
        }
  dataLabels:
    enabled: false
  xaxis:
    type: datetime
    labels:
      format: MMM
      style:
        fontSize: 16px
  yaxis:
    show: false
series:
  - entity: sensor.bayberry_load_import
    name: Other
    type: column
    color: var(--accent-color)
    statistics:
      type: change
      period: month
    group_by:
      func: sum
      duration: 1month
    float_precision: 1
    unit: " kWh"
    show:
      legend_value: false
      in_header: false
  - entity: sensor.wall_charger_energy
    name: EV Charger
    type: column
    color: var(--accent-color-2)
    statistics:
      type: change
      period: month
    group_by:
      func: sum
      duration: 1month
    float_precision: 1
    unit: " kWh"
    show:
      legend_value: false
      in_header: false
  - entity: sensor.well_pump_energy2
    name: Well Pump
    type: column
    color: var(--primary-text-color)
    opacity: 0.5
    statistics:
      type: change
      period: month
    group_by:
      func: sum
      duration: 1month
    float_precision: 1
    unit: " kWh"
    show:
      legend_value: false
      in_header: false
