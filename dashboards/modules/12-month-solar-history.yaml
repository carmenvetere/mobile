type: custom:apexcharts-card
header:
  show: true
  show_states: true
  colorize_states: true
graph_span: 12month
span:
  end: month
series:
  - entity: sensor.bayberry_solar_export
    type: column
    color: var(--gold-color)
    statistics:
      type: change
      period: month
    group_by:
      func: sum
      duration: 1month
    show:
      legend_value: false
      in_header: false
      datalabels: true
    float_precision: 1
    unit: " kWh"
  # header-only series: 12-month total in MWh (single 12-month bucket)
  - entity: sensor.bayberry_solar_export
    name: Last 12 Months
    color: var(--gold-color)
    statistics:
      type: change
      period: month
    group_by:
      func: sum
      duration: 12month
    transform: "return x === null ? null : x / 1000;"
    unit: " MWh"
    float_precision: 1
    show:
      in_chart: false
      legend_value: false
apex_config:
  chart:
    height: 300px
  plotOptions:
    bar:
      dataLabels:
        position: top
  dataLabels:
    enabled: true
    offsetY: -11
    background:
      enabled: false
    dropShadow:
      enabled: false
    style:
      fontSize: 14px
      colors:
        - var(--gold-color)
    formatter: |
      EVAL:function(value) {
        return value.toFixed(0) ;
      }
  xaxis:
    type: datetime
    labels:
      format: MMM
      style:
        fontSize: 16px
  yaxis:
    show: true
    labels:
      style:
        fontSize: 14px
      formatter: |
        EVAL:function(value) {
          return Math.round(value).toLocaleString();
        }
