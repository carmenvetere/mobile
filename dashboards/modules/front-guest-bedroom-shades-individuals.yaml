- type: custom:bubble-card
  card_type: button
  button_type: slider
  entity: cover.front_guest_bedroom_side
  name: Side
  icon: mdi:roller-shade
  show_state: true
  scrolling_effect: false
  slider_live_update: true
  card_layout: large
  tap_action:
    action: toggle
  sub_button:
    - entity: sensor.front_guest_bedroom_side_battery
      icon: mdi:battery
      show_background: false
      show_state: true
    - entity: cover.front_guest_bedroom_side
      icon: mdi:arrow-up
      show_state: false
      state_background: false
      show_background: false
      tap_action:
        action: perform-action
        perform_action: cover.open_cover
        target:
          entity_id: cover.front_guest_bedroom_side
    - entity: cover.front_guest_bedroom_side
      icon: mdi:stop
      show_state: false
      state_background: false
      show_background: false
      tap_action:
        action: perform-action
        perform_action: cover.stop_cover
        target:
          entity_id: cover.front_guest_bedroom_side
    - entity: cover.front_guest_bedroom_side
      icon: mdi:arrow-down
      show_state: false
      state_background: false
      show_background: false
      tap_action:
        action: perform-action
        perform_action: cover.close_cover
        target:
          entity_id: cover.front_guest_bedroom_side
  rows: 1
  styles: |
    .bubble-sub-button-1 ha-icon {
      color: ${(() => { const b = Number(hass.states['sensor.front_guest_bedroom_side_battery']?.state);
        return isNaN(b) ? 'var(--secondary-text-color)'
          : b < 20 ? 'var(--error-color)'
          : b < 40 ? 'var(--gold-color)'
          : 'var(--sage-color)'; })()} !important;
    }
    .bubble-sub-button-1 {
      min-width: 56px !important;
      justify-content: flex-end !important;
    }
    ha-card {
      --shade-card-bg: var(--background-color-3);
      --shade-card-open-bg: var(--background-color-2);
    }
  modules:
  - mobile_shades_module 
