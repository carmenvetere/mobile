- type: custom:bubble-card
  card_type: cover
  entity: cover.back_guest_bedroom_side
  name: Side
  icon: mdi:roller-shade
  show_state: true
  scrolling_effect: false
  slider_live_update: true
  card_layout: large
  tap_action:
    action: toggle
  sub_button:
    - entity: sensor.back_guest_bedroom_side_battery
      icon: mdi:battery
      show_background: false
      show_state: true
  rows: 1
  modules:
  - mobile_shades_module 
