# lovelace_gen
# ============================================================================
#  Mobile Dash v2 · Settings body (MOBILE-ONLY, curated)
#  Per the handoff restructure: Quick toggles (4) -> 6 Section nav rows that
#  open bubble-card pop-ups -> Values read-outs. The full per-group lists live
#  inside the pop-ups. The shared settings-module.yaml (wall/NSPanel flat list)
#  is intentionally untouched by this file.
#
#  Bubble-card styling modules are hardcoded (mobile_settings_module /
#  mobile_separator) since this module is mobile-only.
# ============================================================================
{% macro srow(entity, name, icon) %}
    - type: custom:bubble-card
      card_type: button
      entity: {{ entity }}
      name: {{ name }}
      icon: {{ icon }}
      show_state: false
      scrolling_effect: false
      button_action:
        tap_action:
          action: toggle
      tap_action:
        action: toggle
      card_layout: large
      sub_button:
        - entity: {{ entity }}
          show_state: true
          show_icon: false
          state_background: false
          show_background: false
      modules:
        - mobile_settings_module
{% endmacro %}
{% macro sep(name, icon) %}
    - type: custom:bubble-card
      card_type: separator
      name: {{ name }}
      icon: {{ icon }}
      modules:
        - mobile_separator
{% endmacro %}
{% macro slider(entity, icon) %}
    - type: custom:bubble-card
      card_type: button
      button_type: slider
      entity: {{ entity }}
      show_last_changed: false
      show_state: false
      scrolling_effect: false
      icon: {{ icon }}
      card_layout: large
      sub_button:
        - entity: {{ entity }}
          show_state: true
          show_icon: false
          show_background: false
      modules:
        - mobile_settings_module
{% endmacro %}
{% macro staterow(entity) %}
    - type: custom:bubble-card
      card_type: button
      button_type: state
      entity: {{ entity }}
      show_state: false
      scrolling_effect: false
      card_layout: large
      sub_button:
        - entity: {{ entity }}
          state_background: false
          show_last_changed: false
          show_state: true
          show_background: false
      button_action:
        tap_action:
          action: more-info
      modules:
        - mobile_settings_module
{% endmacro %}
{% macro namerow(entity, name) %}
    - type: custom:bubble-card
      card_type: button
      button_type: name
      entity: {{ entity }}
      name: {{ name }}
      card_layout: large
      show_state: false
      scrolling_effect: false
      sub_button:
        - entity: {{ entity }}
          show_state: true
          show_attribute: false
          show_icon: false
          state_background: false
          show_background: false
      button_action:
        tap_action:
          action: more-info
      modules:
        - mobile_settings_module
{% endmacro %}

# ----------------------------------------------------------- QUICK TOGGLES
- type: custom:bubble-card
  card_type: separator
  name: Quick Toggles
  icon: mdi:gesture-tap-button
  rows: 0.75
  styles: &zone_sep |
    .bubble-name { font-size: 13px !important; font-weight: 700 !important;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: rgba(255,255,255,0.6) !important; }
    .bubble-line { background: var(--primary-text-color); opacity: 0.1; }
    .card-content { padding-top: 7px !important; }
- type: vertical-stack
  card_mod:
    style: &flat_card |
      :host { display: block; background: var(--card-background-color);
        border: 1px solid rgba(255,255,255,0.06); border-radius: 16px;
        overflow: hidden; padding: 0 12px; margin: 2px 2px 12px; }
  cards:
    - !include [/config/dashboards/modules/mobile-toggle-row.yaml, {toggle_entity: input_boolean.guest_mode, row_name: Overnight Guests}]
    - !include [/config/dashboards/modules/mobile-toggle-row.yaml, {toggle_entity: input_boolean.cleaners_mode, row_name: Cleaners Mode}]
    - !include [/config/dashboards/modules/mobile-toggle-row.yaml, {toggle_entity: automation.alarm_arm_away_when_everyone_leaves, row_name: Arm Away When Empty}]
    - !include [/config/dashboards/modules/mobile-toggle-row.yaml, {toggle_entity: switch.bayberry_off_grid_operation, row_name: Go Off Grid, track_on_color: 'rgba(224,105,91,0.65)', confirm_text: 'Are you sure you want to go off grid?'}]

# --------------------------------------------------------------- SECTIONS
- type: custom:bubble-card
  card_type: separator
  name: Sections
  icon: mdi:format-list-bulleted
  rows: 0.75
  styles: *zone_sep
- type: vertical-stack
  card_mod:
    style: *flat_card
  cards:
    - !include [/config/dashboards/modules/mobile-nav-row.yaml, {row_name: Home Modes, row_sub: "Party · guests · cleaners · away", row_icon: mdi:home-automation, target_hash: "#set-home-modes"}]
    - !include [/config/dashboards/modules/mobile-nav-row.yaml, {row_name: Climate Schedules, row_sub: "4 thermostats · fresh air · filters", row_icon: mdi:fan-clock, target_hash: "#set-climate"}]
    - !include [/config/dashboards/modules/mobile-nav-row.yaml, {row_name: Alarm Automations, row_sub: "4 rules", row_icon: mdi:shield-lock, target_hash: "#set-alarm"}]
    - !include [/config/dashboards/modules/mobile-nav-row.yaml, {row_name: "Motion & Lights", row_sub: "9 rules", row_icon: mdi:motion-sensor, target_hash: "#set-motion-lights"}]
    - !include [/config/dashboards/modules/mobile-nav-row.yaml, {row_name: "Energy & Grid", row_sub: "Powerwall · consumption", row_icon: mdi:transmission-tower, target_hash: "#set-energy"}]
    - !include [/config/dashboards/modules/mobile-nav-row.yaml, {row_name: Room Schedules, row_sub: "Shades · pool · vacuum", row_icon: mdi:calendar-clock, target_hash: "#set-room-schedules"}]

# ----------------------------------------------------------------- VALUES
- type: custom:bubble-card
  card_type: separator
  name: Values
  icon: mdi:gauge
  rows: 0.75
  styles: *zone_sep
- type: vertical-stack
  card_mod:
    style: *flat_card
  cards:
    - type: custom:button-card
      entity: number.bayberry_backup_reserve
      name: Powerwall Reserve
      icon: mdi:battery-charging-high
      show_state: true
      tap_action: { action: more-info }
      state_display: |
        [[[ return Math.round(Number(entity.state)) + '%'; ]]]
      styles: &value_styles
        card:
          - background: transparent !important
          - box-shadow: none
          - border-radius: 0
          - border-top: 1px solid rgba(255,255,255,0.06)
          - padding: 13px 4px
          - transition: none
        grid:
          - grid-template-areas: '"i n v"'
          - grid-template-columns: 44px 1fr auto
          - align-items: center
          - column-gap: 11px
        img_cell:
          - grid-area: i
          - width: 38px
          - height: 38px
          - border-radius: 11px
          - background-color: "rgba(167,192,152,0.18)"
        icon:
          - width: 20px
          - color: var(--sage-color)
        name:
          - grid-area: n
          - justify-self: start
          - font-size: 14px
          - font-weight: 600
          - color: var(--primary-text-color)
        state:
          - grid-area: v
          - justify-self: end
          - font-size: 15px
          - font-weight: 700
          - color: var(--sage-color)
    - type: custom:button-card
      entity: input_number.lower_floors_hvac_filter_hours
      name: Lower HVAC Filter
      icon: mdi:air-filter
      show_state: true
      tap_action: { action: more-info }
      state_display: |
        [[[ return Math.round(Number(entity.state)) + ' h'; ]]]
      styles:
        <<: *value_styles
        img_cell:
          - grid-area: i
          - width: 38px
          - height: 38px
          - border-radius: 11px
          - background-color: "rgba(224,167,94,0.18)"
        icon:
          - width: 20px
          - color: "#E0A75E"
        state:
          - grid-area: v
          - justify-self: end
          - font-size: 15px
          - font-weight: 700
          - color: "#E0A75E"

