- type: custom:bubble-card
  card_type: button
  button_type: slider
  entity: cover.hallway_1
  name: Hallway 1
  icon: mdi:roller-shade
  show_state: true
  scrolling_effect: false
  slider_live_update: true
  card_layout: large
  tap_action:
    action: toggle
  sub_button:
    - entity: sensor.hallway_1_battery
      icon: mdi:battery
      show_background: false
      show_state: true
    - entity: cover.hallway_1
      icon: mdi:arrow-up
      show_state: false
      state_background: false
      show_background: false
      tap_action:
        action: perform-action
        perform_action: cover.open_cover
        target:
          entity_id: cover.hallway_1
    - entity: cover.hallway_1
      icon: mdi:stop
      show_state: false
      state_background: false
      show_background: false
      tap_action:
        action: perform-action
        perform_action: cover.stop_cover
        target:
          entity_id: cover.hallway_1
    - entity: cover.hallway_1
      icon: mdi:arrow-down
      show_state: false
      state_background: false
      show_background: false
      tap_action:
        action: perform-action
        perform_action: cover.close_cover
        target:
          entity_id: cover.hallway_1
  rows: 1
  styles: |
    .bubble-sub-button-1 ha-icon {
      color: ${(() => { const b = Number(hass.states['sensor.hallway_1_battery']?.state);
        return isNaN(b) ? 'var(--secondary-text-color)'
          : b < 20 ? 'var(--error-color)'
          : b < 40 ? 'var(--gold-color)'
          : 'var(--sage-color)'; })()} !important;
    }
    .bubble-sub-button-1 {
      min-width: 56px !important;
      justify-content: flex-end !important;
    }
    ha-card {
      --shade-card-bg: var(--background-color-3);
      --shade-card-open-bg: var(--background-color-2);
    }
  modules:
  - mobile_shades_module 
