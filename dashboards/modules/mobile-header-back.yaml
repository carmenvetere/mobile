# ============================================================================
#  Mobile Dash · Header back button · 40x40, no background, no border
#  Sits at the LEFT of every sub-view header (all views except Home) and
#  returns to the Home view. Consumed as a header custom_fields card:
#    custom_fields:
#      back:
#        card: !include /config/dashboards/modules/mobile-header-back.yaml
# ============================================================================
type: custom:button-card
icon: mdi:chevron-left
show_name: false
tap_action:
  action: navigate
  navigation_path: /mobile-dash/mobile-home
styles:
  card:
    - width: 40px
    - height: 40px
    - background: transparent !important
    - --ha-card-background: transparent
    - border: none
    - border-radius: 999px
    - box-shadow: none
    - transition: none
    - padding: 0
  icon:
    - width: 28px
    - color: var(--primary-text-color)
