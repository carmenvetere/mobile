
# Loads default set of integrations. Do not remove.
default_config:

my:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

# Harden the HTTP frontend: enable brute-force protection (auto-bans an IP
# after repeated failed logins). If HA sits behind a reverse proxy, also set
# use_x_forwarded_for: true and list the proxy under trusted_proxies.
http:
  ip_ban_enabled: true
  login_attempts_threshold: 5

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
homekit: !include homekit.yaml
template: !include sensors2.yaml

group:
  smartphones:
    name: "Smartphones"
    entities:
      - device_tracker.brians_iphone_15_pro
      - device_tracker.carmens_iphone

input_datetime:
  last_pool_vacuum:
    name: Last Pool Vacuum
    has_date: true
    has_time: true
  dryer_vent_last_cleaned:
    name: Dryer Vent Last Cleaned
    has_date: true
    has_time: true
    initial: "2024-10-31 00:00:00"

input_number:
  sonos_favorites_index:
    name: Sonos Favorites Index
    initial: 1
    min: 1
    max: 11
    step: 1
    mode: box
  # --- Climate overhaul Phase 2: zone schedule setpoints -------------------
  # Single source of truth for the four zone schedules. No `initial:` lines
  # on purpose: values restore from the last state on restart, so dashboard
  # setpoint changes persist. (The temporary bootstrap `initial:` values were
  # removed once the helpers existed, per the original migration plan.)
  lr_cool_day:
    name: LR Cool Day
    min: 55
    max: 85
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:snowflake
  lr_cool_night:
    name: LR Cool Night
    min: 55
    max: 85
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:snowflake
  lr_cool_night_fa:
    name: LR Cool Night (Fresh Air)
    min: 55
    max: 85
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:snowflake
  lr_heat_day:
    name: LR Heat Day
    min: 55
    max: 85
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:fire
  lr_heat_night:
    name: LR Heat Night
    min: 55
    max: 85
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:fire
  bsmt_cool_day:
    name: Basement Cool Day
    min: 55
    max: 85
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:snowflake
  bsmt_cool_night:
    name: Basement Cool Night
    min: 55
    max: 85
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:snowflake
  bsmt_cool_night_fa:
    name: Basement Cool Night (Fresh Air)
    min: 55
    max: 85
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:snowflake
  bsmt_heat_workday:
    name: Basement Heat Workday
    min: 55
    max: 85
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:fire
  bsmt_heat_evening:
    name: Basement Heat Evening
    min: 55
    max: 85
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:fire
  bsmt_heat_night:
    name: Basement Heat Night
    min: 55
    max: 85
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:fire
  br_heat_morning:
    name: Bedroom Heat Morning
    min: 55
    max: 85
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:fire
  br_heat_day_weekday:
    name: Bedroom Heat Day (Weekday)
    min: 55
    max: 85
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:fire
  br_heat_day_weekend:
    name: Bedroom Heat Day (Weekend)
    min: 55
    max: 85
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:fire
  br_heat_night:
    name: Bedroom Heat Night
    min: 55
    max: 85
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:fire
  br_cool_morning:
    name: Bedroom Cool Morning
    min: 55
    max: 85
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:snowflake
  br_cool_day:
    name: Bedroom Cool Day
    min: 55
    max: 85
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:snowflake
  br_cool_night:
    name: Bedroom Cool Night
    min: 55
    max: 85
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:snowflake
  office_heat_occupied:
    name: Office Heat Occupied
    min: 55
    max: 85
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:fire
  office_heat_unoccupied:
    name: Office Heat Unoccupied
    min: 55
    max: 85
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:fire
  office_cool_occupied:
    name: Office Cool Occupied
    min: 55
    max: 85
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:snowflake
  office_cool_unoccupied:
    name: Office Cool Unoccupied
    min: 55
    max: 85
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:snowflake
  office_cool_guest_night:
    name: Office Cool Guest Night
    min: 55
    max: 85
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:snowflake
  # --- Climate overhaul Phase 3: ventilation thresholds --------------------
  co2_vent_ceiling:
    name: CO2 Vent Ceiling
    min: 500
    max: 1500
    step: 10
    unit_of_measurement: ppm
    mode: box
    icon: mdi:molecule-co2
  co2_vent_recover:
    name: CO2 Vent Recover
    min: 400
    max: 1200
    step: 10
    unit_of_measurement: ppm
    mode: box
    icon: mdi:molecule-co2
  vent_min_outdoor:
    name: Ventilation Min Outdoor Temp
    min: 0
    max: 60
    step: 1
    unit_of_measurement: °F
    mode: box
    icon: mdi:thermometer-low
  vent_max_outdoor:
    name: Ventilation Max Outdoor Temp
    min: 60
    max: 100
    step: 1
    unit_of_measurement: °F
    mode: box
    icon: mdi:thermometer-high
  freecool_differential:
    name: Free Cooling Differential
    min: 1
    max: 15
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:thermometer-chevron-down
  minvent_floor_minutes:
    name: Minimum Ventilation Floor (per 24 h)
    min: 0
    max: 240
    step: 5
    unit_of_measurement: min
    mode: box
    icon: mdi:fan-clock
  # --- Climate overhaul v2.1.1: Path C wider band + CO2-flush dew ceiling ---
  # `initial:` values are for first boot only; strip them later like the other
  # helpers if you want dashboard edits to persist across restarts.
  minvent_min_outdoor:
    name: Min-Vent Min Outdoor Temp
    initial: 25
    min: 0
    max: 40
    step: 1
    unit_of_measurement: °F
    mode: box
    icon: mdi:thermometer-low
  minvent_max_outdoor:
    name: Min-Vent Max Outdoor Temp
    initial: 80
    min: 60
    max: 95
    step: 1
    unit_of_measurement: °F
    mode: box
    icon: mdi:thermometer-high
  # CO2 air-quality flush is allowed to run at a HIGHER dew point than normal
  # ventilation (which locks out at 65F) — diluting CO2 takes priority over the
  # humidity it imports, up to this ceiling. Rain still always closes.
  co2_dew_max:
    name: CO2 Flush Dew Point Ceiling
    initial: 72
    min: 60
    max: 78
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:water-percent-alert
  # --- Climate overhaul Phase 4: away-mode setpoints -----------------------
  away_heat_setpoint:
    name: Away Heat Setpoint
    min: 55
    max: 85
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:home-export-outline
  away_cool_setpoint:
    name: Away Cool Setpoint
    min: 55
    max: 85
    step: 0.5
    unit_of_measurement: °F
    mode: box
    icon: mdi:home-export-outline

input_boolean:
  sonos_group_select_living_room:
    name: Group Living Room
    icon: mdi:sofa
  sonos_group_select_kitchen:
    name: Group Kitchen
    icon: mdi:countertop
  sonos_group_select_office:
    name: Group Office
    icon: mdi:desk
  sonos_group_select_deck:
    name: Group Deck
    icon: mdi:table-chair
  sonos_group_select_pool:
    name: Group Pool
    icon: mdi:pool
  sonos_group_select_primary_bedroom:
    name: Group Primary Bedroom
    icon: mdi:bed
  sonos_group_select_primary_bathroom:
    name: Group Primary Bathroom
    icon: mdi:shower
  sonos_group_select_gym:
    name: Group Gym
    icon: mdi:dumbbell
  sonos_group_select_mud_room:
    name: Group Mud Room
    icon: mdi:door
  sonos_group_select_media_room:
    name: Group Media Room
    icon: mdi:television
  # --- Basement Working scene: motion auto-off guard (#188) -----------------
  # On while the basement Working scene is active. When on, the basement motion
  # automation must NOT turn the lights off on no-motion (so sitting still at
  # the desk doesn't kill the lights). Set on when scene.basement_work
  # activates; cleared when another basement scene is chosen, the work lights
  # are turned off, or a safety timeout elapses. No `initial:` so it survives
  # HA restarts.
  basement_work_mode:
    name: Basement Work Mode
    icon: mdi:desk-lamp
  # --- Climate overhaul Phase 1: zone holds --------------------------------
  # Hold on = the zone schedule must not write that zone. Set by the door-open
  # automations, Away Mode Turns On, and Power Outage V2; cleared only by the
  # matching restore automation or the Climate Hold Watchdog when every cause
  # is gone (precedence: power_outage > away > door_open). Deliberately no
  # `initial:` so holds survive HA restarts.
  climate_hold_living_room:
    name: Climate Hold - Living Room
    icon: mdi:pause-octagon
  climate_hold_basement:
    name: Climate Hold - Basement
    icon: mdi:pause-octagon
  climate_hold_office:
    name: Climate Hold - Office
    icon: mdi:pause-octagon
  climate_hold_bedroom:
    name: Climate Hold - Bedroom
    icon: mdi:pause-octagon
  # --- Climate overhaul v2.1.1: powder room exhaust fan ownership ----------
  # First-floor analog of the UI-created economizer_owns_basement_fan. Set when
  # the Fresh Air Ventilation economizer starts the powder room exhaust fan for
  # overnight free cooling, so a manual/external start is never fought and the
  # economizer only turns off a fan it started. Defined here (its siblings are
  # UI helpers); if you prefer consistency, recreate it as a UI helper and drop
  # this block. No `initial:` so ownership survives restarts.
  economizer_owns_powder_fan:
    name: Economizer Owns Powder Room Fan
    icon: mdi:fan-alert
  # --- Climate overhaul v2.1.1: Path C (min-vent) active flag --------------
  # Set by the Fresh Air Ventilation economizer while a minimum-ventilation
  # (Path C) cycle wants the damper open. The Safety Shutoff reads it to defer
  # its >73F temp close up to 80F for min-vent (climate control compensates),
  # the same exemption CO2 flushes get. No `initial:` so it defaults off and
  # restores state.
  minvent_active:
    name: Min-Vent Active
    icon: mdi:fan-clock

input_select:
  sonos_speaker_select:
    name: Sonos Speaker
    options:
      - Living Room
      - Kitchen
      - Office
      - Deck
      - Pool
      - Primary Bedroom
      - Primary Bathroom
      - Gym
      - Mud Room
      - Media Room
    initial: Living Room
    icon: mdi:speaker
  sonos_group_coordinator:
    name: Sonos Group Coordinator
    options:
      - living_room
      - kitchen
      - office
      - deck
      - pool
      - primary_bedroom
      - primary_bathroom
      - gym
      - mud_room
      - media_room
    initial: living_room
    icon: mdi:speaker-multiple
  sonos_favorites_filter:
    name: Sonos Favorites Filter
    options:
      - All
      - Playlists
      - Stations
      - Albums
    initial: All
    icon: mdi:filter-variant
  # --- Climate overhaul Phase 4: HVAC fan-mode ownership -------------------
  # Which automation currently owns each zone's fan_mode. Priority high->low:
  # economizer > air_filter > air_quality > schedule (none loses to all).
  # A writer may set fan `on` only if its priority >= the current owner's,
  # and may restore `auto` only if it IS the current owner. Exception: the
  # Bedroom Air Quality 22:00 quiet-hours force-to-auto is absolute.
  # No `initial:` — first option (none) is the default and state restores.
  living_room_fan_owner:
    name: Living Room Fan Owner
    options:
      - none
      - schedule
      - economizer
      - air_filter
      - air_quality
    icon: mdi:fan-alert
  basement_fan_owner:
    name: Basement Fan Owner
    options:
      - none
      - schedule
      - economizer
      - air_filter
      - air_quality
    icon: mdi:fan-alert
  office_fan_owner:
    name: Office Fan Owner
    options:
      - none
      - schedule
      - economizer
      - air_filter
      - air_quality
    icon: mdi:fan-alert
  bedroom_fan_owner:
    name: Bedroom Fan Owner
    options:
      - none
      - schedule
      - economizer
      - air_filter
      - air_quality
    icon: mdi:fan-alert

input_text:
  sonos_favorites_search:
    name: Sonos Favorites Search
    initial: ""
    max: 60
    icon: mdi:magnify
  # Alarm disarm code for Alarmo, referenced by the Alarm automations via
  # {{ states('input_text.alarm_code') }}. Kept as a helper (not !secret)
  # because the UI automation editor cannot read !secret from automations.yaml
  # and 500s on open. No `initial:` so the value you set persists across
  # restarts and never lands in git. Set it once via the UI or
  # input_text.set_value, then it restores automatically.
  alarm_code:
    name: Alarm Code
    max: 12
    mode: password
    icon: mdi:shield-key

utility_meter:
  daily_well_pump:
    source: sensor.well_pump_energy2
    cycle: daily
  daily_ev_charger:
    source: sensor.wall_charger_energy
    cycle: daily
  # Rain today: meters the Tempest precipitation accumulation (state_class
  # total, inches) into a local-midnight daily bucket for the rain gauge (#155).
  daily_rain:
    source: sensor.bayberry_tempest_precipitation
    cycle: daily

recorder:
  db_url: !secret recorder_db_url
  purge_keep_days: 30
  commit_interval: 30          # batch DB writes every 30s instead of every 1s
  auto_purge: true
  auto_repack: true
  exclude:
    domains:
      - media_player
    entity_globs:
      - sensor.time*
      - binary_sensor.*_person_detected*
      - binary_sensor.*_vehicle_detected*
      - binary_sensor.*_animal_detected*
      - binary_sensor.*_object_detected*
      - binary_sensor.*_audio_object_detected*
      - binary_sensor.*_speaking_detected*
      - binary_sensor.*_barking_detected*
      - binary_sensor.*_siren_detected*
      - binary_sensor.*_smoke_alarm_detected*
      - binary_sensor.*_car_horn_detected*
      - binary_sensor.*_car_alarm_detected*
      - sensor.*_last_motion_detected*
      - switch.*_detections_person
      - switch.*_detections_vehicle
      - switch.*_detections_animal
      - switch.*_detections_speaking
      - sensor.bedroom_air_quality*
      - sensor.first_floor_air_quality_monitor*
    
    entities:
      # Alarm disarm code helper — keep the code out of the recorder history/DB.
      - input_text.alarm_code
      # NOTE: the HVAC estimated-power sensors are intentionally NOT excluded:
      # the 24 h power-flow chart plots them, which needs recorder history.
      # They are low-cardinality template sensors, so the DB cost is trivial.
      - sensor.date
      - sensor.time
      - sensor.last_boot
      - sun.sun 
      - sensor.powerwall_discharge_time
      - sensor.bayberry_tempest_wind_speed
      - sensor.bayberry_tempest_wind_direction
      - sensor.bayberry_battery_power
      - sensor.bayberry_grid_power
      - sensor.bayberry_load_power
      - sensor.bayberry_site_power
      - sensor.bayberry_solar_power
      - sensor.bayberry_tempest_humidity
      - sensor.bayberry_tempest_illuminance
      - sensor.bayberry_tempest_irradiance
      - sensor.bayberry_tempest_temperature
      - sensor.bayberry_tempest_wind_gust
      - sensor.bayberry_tempest_wind_speed_average
      - sensor.bayberry_tempest_precipitation
      - sensor.bayberry_tempest_precipitation_type
      - binary_sensor.myggspray_wrlss_mtn_sensor_occupancy
      - sensor.myggspray_wrlss_mtn_sensor_battery
      - sensor.myggspray_wrlss_mtn_sensor_battery_voltage
      - sensor.myggspray_wrlss_mtn_sensor_battery_type
      - sensor.myggspray_wrlss_mtn_sensor_illuminance
      - update.myggspray_wrlss_mtn_sensor_firmware
      - button.myggspray_wrlss_mtn_sensor_identify_1
      - button.myggspray_wrlss_mtn_sensor_identify_2  
      - binary_sensor.myggspray_wrlss_mtn_sensor_occupancy_2
      - sensor.myggspray_wrlss_mtn_sensor_battery_2
      - sensor.myggspray_wrlss_mtn_sensor_battery_voltage_2
      - sensor.myggspray_wrlss_mtn_sensor_battery_type_2
      - sensor.myggspray_wrlss_mtn_sensor_illuminance_2
      - update.myggspray_wrlss_mtn_sensor_firmware_2
      - button.myggspray_wrlss_mtn_sensor_identify_1_2
      - button.myggspray_wrlss_mtn_sensor_identify_2_2



