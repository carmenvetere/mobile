# Climate overhaul Phase 1: first-floor exterior door group. Default
# all_entities behavior: `on` (open) if ANY member is open, `off` only when
# ALL doors are closed — the door-closed restore automation keys off the
# group returning to `off`.
binary_sensor:
  - platform: group
    name: First Floor Exterior Doors
    unique_id: first_floor_exterior_doors
    device_class: door
    entities:
      - binary_sensor.living_room_french_doors
      - binary_sensor.kitchen_french_doors

