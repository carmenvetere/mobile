wall_panel_notifications:
  name: Wall Panel Notifications
  version: '1.0'
  creator: ''
  supported:
    - button
    - climate
    - cover
    - horizontal-buttons-stack
    - media-player
    - pop-up
    - select
    - separator
    - sub-buttons
  description: ''
  code: |-
    ha-card {
      --bubble-main-background-color: var(--background-color-2) !important;
      border-radius: 30px !important;
      margin: 2px 20px 2px 10px !important;
      max-width: 97% !important;  
    }

    .bubble-button-card-container {
      border-radius: 30px !important;
      margin: 2px 30px 2px 10px !important;
      background-color: var(--background-color-2) !important;
      max-width: 97% !important;
      min-height: 80px !important;
      max-width: 680px !important;
      }

    .bubble-button-background {
      background-color: var(--background-color-2) !important;
      }

    .bubble-icon-container {
      background-color: transparent !important;
      }
      
    .bubble-icon {
      --mdc-icon-size: 42px !important;
      }

    .bubble-name {
      font-size: 26px !important;
      line-height: 1.1 !important;
      text-align: left !important;
        }
  editor: ''
