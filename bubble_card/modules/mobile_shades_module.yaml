mobile_shades_module:
  name: Mobile Shades Module
  version: '1.3'
  creator: ''
  supported:
    - button
    - climate
    - cover
    - horizontal-buttons-stack
    - media-player
    - pop-up
    - select
    - separator
    - sub-buttons
  description: ''
  code: |2-
        /* Base card color is a variable so the same module serves both the
           group cards (default -> background-color-2) and the cards inside an
           expander, which set --shade-card-bg to background-color-3 (one shade
           lighter) so they stand out from the background-color-2 expander. */
        /* cover cards render the visible surface + icon on cover-specific
           layers ON TOP of the button-card elements; the container clips
           them, so radius + color go on the container (with overflow hidden)
           and the cover overlays are made transparent so the container color
           shows through. */
        ha-card {
          border-radius: 15px !important;
          }
        .bubble-button-card-container {
          border-radius: 15px !important;
          overflow: hidden !important;
          background-color: var(--shade-card-bg, var(--background-color-2)) !important;
          background: var(--shade-card-bg, var(--background-color-2)) !important;
          box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06) !important;
          }

        .bubble-button-background,
        .bubble-cover-background,
        .bubble-cover-background-crossfade {
          background: transparent !important;
          background-color: transparent !important;
          border-radius: 15px !important;
          }

      .bubble-name {
          font-size: 16px !important; text-align: left !important;
        }
      .bubble-icon-container {
        background: transparent !important;
        }
      /* Static primary icon in every state. Covers paint the icon on
         crossfade layers, so pin the color on those too. */
      .bubble-icon,
      .bubble-cover-icon-crossfade,
      .bubble-cover-crossfade-layer--icon {
        --mdc-icon-size: 36px !important;
        --bubble-icon-color: var(--primary-text-color) !important;
        color: var(--primary-text-color) !important;
        }
      .bubble-icon ha-icon,
      .bubble-icon ha-state-icon,
      .bubble-cover-crossfade-layer--icon ha-icon,
      .bubble-cover-crossfade-layer--icon ha-state-icon {
        color: var(--primary-text-color) !important;
        }
      .bubble-sub-button {
        background: transparent !important;
        font-size: 14px !important;
        color: var(--secondary-text-color) !important;
        min-width: 92px !important;
        justify-content: flex-end !important;
        }
      .bubble-sub-button-icon {
        --mdc-icon-size: 30px !important;
        }
      .bubble-cover-button-icon {
        --mdc-icon-size: 30px !important;
      }
      .bubble-state {
        visibility: hidden;
        position: relative;
        text-align: left !important;
        font-size: 14px !important;
        color: var(--secondary-text-color) !important;
      }
      .bubble-state::before {
        visibility: visible;
        position: absolute;
        left: 0;
        top: 0;
        content: "${(() => {
          const e = hass.states[this.config.entity];
          if (!e) return '';
          const pos = e.attributes.current_position;
          if (e.state === 'closed' || pos === 0) return 'Closed';
          if (pos === 100 || e.state === 'open' && pos === undefined) return 'Open';
          if (pos === undefined || pos === null) return '';
          return pos + '% open';
        })()}";
      }
  editor: ''
