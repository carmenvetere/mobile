mobile_shades_module:
  name: Mobile Shades Module
  version: '1.4'
  creator: ''
  supported:
    - button
    - climate
    - cover
    - horizontal-buttons-stack
    - media-player
    - pop-up
    - select
    - separator
    - sub-buttons
  description: ''
  code: |2-
        .bubble-button-card-container {
          border-radius: 15px !important;
          background-color: var(--background-color-2) !important;
          box-shadow:
          }

        .bubble-button-background {
          background-color: ${state === 'open' ? 'var(--background-color-2)' : 'var(--background-color-2)'} !important;
          opacity: 0 !important;
          } 

        .bubble-name {
          font-size: 16px !important;
          text-align: left !important;
          color: ${state === 'open' ? 'var(--primary-background-color)' : 'var(--primary-text-color)'} !important;
            }
       
        .bubble-sub-button { 
          font-size: 14px !important;
          font-weight: bold; 
          color: ${state === 'open' ? 'var(--primary-text-color)' : 'var(--primary--text-color)'} !important;
          }
        
        .bubble-state {
          font-size: 14px !important;
          font-weight: bold !important;
          text-align: left !important;
            }
        .bubble-sub-button-slider {
          margin-left: 20px;
          margin-right: 20px;
          margin-bottom: 10px;      
          }

        .bubble-range-fill {
          background: ${state === 'open' ? 'var(--slate-color)' : 'var(--background-color-2)'} !important;
          border-radius: 15px !important;
          opacity: 1 !important;
          }

        .bubble-range-value {
          font-size: 0px !important;
          }

        .bubble-range-slider {
          background: var(--background-color-2) !important;
          border-radius: 15px !important;
          opacity: 1 !important;
          }
          
        .bubble-icon {
          opacity: 1 !important;
          color: ${state === 'open' ? 'var(--primary-background-color)' : 'var(--primary-text-color)'} !important;
          --mdc-icon-size: 36px !important;
          }

        .bubble-icon-container {
          background-color: transparent !important;
          margin-left: 20px !important;
          }
  editor: ''
