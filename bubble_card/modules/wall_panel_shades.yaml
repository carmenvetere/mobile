wall_panel_shades:
  name: Wall Panel Shades
  version: '1.0'
  creator: ''
  description: ''
  code: |2-
        .bubble-button-card-container {
          border-radius: 30px !important;
          margin: 2px 20px 2px 10px !important;
          background-color: var(--background-color) !important;
          box-shadow: ${ state === 'on'
            ? '0 8px 18px rgba(0, 0, 0, 0.65), inset 0 1px 0 rgba(255, 255, 255, 0.08)'
            : '0 6px 14px rgba(0, 0, 0, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.06)'
            } !important;
          min-height: 80px !important;
          max-width: 600px !important;
          }

        .bubble-button-background {
          background-color: ${state === 'open' ? 'var(--background-color)' : 'var(--background-color)'} !important;
          } 

        .bubble-name {
          font-size: 22px !important;
          text-align: left !important;
          color: ${state === 'open' ? 'var(--primary-text-color)' : 'var(--primary-text-color)'} !important;
          line-height: 1.1;
          padding-left: 10px;
            }
       
        .bubble-sub-button { 
          font-size: 18px !important;
          font-weight: bold; 
          color: ${state === 'open' ? 'var(--primary-text-color)' : 'var(--primary--text-color)'} !important;
          }
        
        .bubble-state {
          font-size: 20px !important;
          font-weight: bold !important;
          text-align: left !important;
            }
        .bubble-sub-button-slider {
          margin-left: 20px;
          margin-right: 20px;
          margin-bottom: 10px;      
          }

        .bubble-range-fill {
          background: ${state === 'open' ? 'var(--accent-color)' : 'var(--background-color)'} !important;
          opacity: 1 !important;
          }

        .bubble-range-value {
          font-size: 0px !important;
          }

        .bubble-range-slider {
          background: var(--background-color) !important;
          opacity: 1 !important;
          }
          
        .bubble-icon {
          opacity: 1 !important;
          color: ${state === 'open' ? 'var(--primary-text-color)' : 'var(--primary-text-color)'} !important;
          --mdc-icon-size: 36px !important;
          }

        .bubble-icon-container {
          background-color: transparent !important;
          margin-left: 20px !important;
          }
  editor: ''
