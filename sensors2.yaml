- trigger:
    - platform: time_pattern
      minutes: "/15"
  sensor:

    # ---- EAST  (dining shade + east-facing rooms above) ----
    - name: "Sun Hitting East"
      unique_id: sun_hitting_east
      unit_of_measurement: "W/m²"
      device_class: irradiance
      state_class: measurement
      icon: mdi:weather-sunset-up
      state: >
        {% set facing, lo, hi = 60, 330, 150 %}
        {% set az = state_attr('sun.sun', 'azimuth') | float(0) %}
        {% set el = state_attr('sun.sun', 'elevation') | float(0) %}
        {% set irr = states('sensor.bayberry_tempest_irradiance') | float(0) %}
        {% set in_range = (lo <= hi and lo <= az <= hi) or (lo > hi and (az >= lo or az <= hi)) %}
        {% if not (el > 5 and in_range and irr > 0) %}0
        {% else %}
          {% set delta = ((az - facing + 540) % 360) - 180 %}
          {% set hit = [cos(delta * pi / 180) / tan(el * pi / 180), 0] | max %}
          {% set effective_W = irr * hit %}
          {% if effective_W < 150 %}0
          {% else %}{{ effective_W | round(0) | int }}
          {% endif %}
        {% endif %}
      attributes:
        in_range: >
          {% set lo, hi = 330, 150 %}
          {% set az = state_attr('sun.sun', 'azimuth') | float(0) %}
          {{ (lo <= hi and lo <= az <= hi) or (lo > hi and (az >= lo or az <= hi)) }}
        hit_factor: >
          {% set facing = 60 %}
          {% set az = state_attr('sun.sun', 'azimuth') | float(0) %}
          {% set el = state_attr('sun.sun', 'elevation') | float(0) %}
          {% set delta = ((az - facing + 540) % 360) - 180 %}
          {{ ([cos(delta * pi / 180) / tan(el * pi / 180), 0] | max) | round(3) }}

