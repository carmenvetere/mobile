# ═══════════════════════════════════════════════════════════════════
# HVAC estimated power sensors
# Model: P(t) = P_max - (P_max - P_start) * e^(-t/tau), t = minutes since compressor start.
#
# REFIT 2026-06-14 from warm-weather AC runs (Powerwall load step vs thermostat history):
#   Upper (Bedroom/Master Bedroom/Office): 600 W -> 1100 W, tau 5 min   (was 480->1030, tau 26)
#   Lower (Living Room/Basement):          600 W -> 1100 W, tau 5 min   (was 300->550, tau 22)
#   Fan-only: 120 W. Gas backup (below input_number.hvac_gas_switchover_temperature): 250 W blower.
#
# Upper and lower are the same equipment, so both use the identical curve (per Carmen).
#
# WHY: original tau=26 min ramp was far too slow. Real compressors reach plateau in ~5 min,
# but cooling cycles here only last ~13-16 min, so the old model ended every cycle still at
# ~700 W when the unit was actually drawing 850-1100 W -- under-counting cooling energy by
# ~30-40%. Fit is from 9 clean warm upper-unit cycles (all <=79F); the lower unit's own runs
# all overlapped the pool pump and couldn't be isolated, so it inherits the upper-unit fit.
# P_max is a warm-weather asymptote (runs a bit higher on truly hot days, ~+12 W/F above ~68F).
# Requires: input_number.hvac_gas_switchover_temperature (already created via UI).
# ═══════════════════════════════════════════════════════════════════
- binary_sensor:
    - name: "Upper HVAC Compressor Running"
      unique_id: upper_hvac_compressor_running
      device_class: running
      state: >-
        {% set acts = [state_attr('climate.bedroom_thermostat','hvac_action'),
                       state_attr('climate.master_bedroom_thermostat','hvac_action'),
                       state_attr('climate.office_thermostat','hvac_action')] %}
        {{ 'cooling' in acts or 'heating' in acts }}
    - name: "Lower HVAC Compressor Running"
      unique_id: lower_hvac_compressor_running
      device_class: running
      state: >-
        {% set acts = [state_attr('climate.living_room_thermostat','hvac_action'),
                       state_attr('climate.basement_thermostat','hvac_action')] %}
        {{ 'cooling' in acts or 'heating' in acts }}

- sensor:
    - name: "Upper HVAC Estimated Power"
      unique_id: upper_hvac_estimated_power
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >-
        {%- set comp = 'binary_sensor.upper_hvac_compressor_running' -%}
        {%- set acts = [state_attr('climate.bedroom_thermostat','hvac_action'),
                        state_attr('climate.master_bedroom_thermostat','hvac_action'),
                        state_attr('climate.office_thermostat','hvac_action')] -%}
        {%- set fans = [state_attr('climate.bedroom_thermostat','fan_mode'),
                        state_attr('climate.master_bedroom_thermostat','fan_mode'),
                        state_attr('climate.office_thermostat','fan_mode')] -%}
        {%- set t = ((now() - states[comp].last_changed).total_seconds() / 60)
                    if (states[comp] is not none and is_state(comp,'on')) else 0 -%}
        {%- if 'cooling' in acts -%}
          {{ (1100 - 500 * e**(-t/5)) | round(0) }}
        {%- elif 'heating' in acts -%}
          {%- if states('sensor.bayberry_tempest_temperature') | float(50)
                < states('input_number.hvac_gas_switchover_temperature') | float(35) -%}
            250
          {%- else -%}
            {{ (1100 - 500 * e**(-t/5)) | round(0) }}
          {%- endif -%}
        {%- elif 'fan' in acts or 'on' in fans -%}
          120
        {%- else -%}
          0
        {%- endif -%}
    - name: "Lower HVAC Estimated Power"
      unique_id: lower_hvac_estimated_power
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >-
        {%- set comp = 'binary_sensor.lower_hvac_compressor_running' -%}
        {%- set acts = [state_attr('climate.living_room_thermostat','hvac_action'),
                        state_attr('climate.basement_thermostat','hvac_action')] -%}
        {%- set fans = [state_attr('climate.living_room_thermostat','fan_mode'),
                        state_attr('climate.basement_thermostat','fan_mode')] -%}
        {%- set t = ((now() - states[comp].last_changed).total_seconds() / 60)
                    if (states[comp] is not none and is_state(comp,'on')) else 0 -%}
        {%- if 'cooling' in acts -%}
          {{ (1100 - 500 * e**(-t/5)) | round(0) }}
        {%- elif 'heating' in acts -%}
          {%- if states('sensor.bayberry_tempest_temperature') | float(50)
                < states('input_number.hvac_gas_switchover_temperature') | float(35) -%}
            250
          {%- else -%}
            {{ (1100 - 500 * e**(-t/5)) | round(0) }}
          {%- endif -%}
        {%- elif 'fan' in acts or 'on' in fans -%}
          120
        {%- else -%}
          0
        {%- endif -%}

# ---------------------------------------------------------------------------
# Per-floor "lights on" counts for the Mobile Dash v2 Lights view section
# headers (e.g. "3 of 9 on"). Counts lights/switches that are on per floor.
# ---------------------------------------------------------------------------
- sensor:
    - name: First Floor Lights On Count
      unique_id: first_floor_lights_on_count
      icon: mdi:lightbulb-group
      state: >
        {% set ents = [
          'light.living_room_main_lights','light.living_room_floor_lamps',
          'light.kitchen_main_lights','light.kitchen_outer_wall',
          'light.kitchen_island_pendants','light.kitchen_window_seat_sconce',
          'light.dining_room_main_lights','light.dining_room_table_lamps',
          'light.dining_room_accent_lights'] %}
        {{ ents | select('is_state','on') | list | count }} of {{ ents | count }} on
    - name: Basement Lights On Count
      unique_id: basement_lights_on_count
      icon: mdi:lightbulb-group
      state: >
        {% set ents = [
          'light.gym_main_lights','light.media_room_table_lamp',
          'light.laundry_room_main_lights','light.basement_hallway_main_lights',
          'light.media_room_main_lights','light.stairs_main_lights',
          'light.stairs_spot_lights'] %}
        {{ ents | select('is_state','on') | list | count }} of {{ ents | count }} on
    - name: Second Floor Lights On Count
      unique_id: second_floor_lights_on_count
      icon: mdi:lightbulb-group
      state: >
        {% set ents = [
          'light.upstairs_hallway_main_lights','light.office_main_lights',
          'light.office_floor_lamp','light.eve_light_strip_a5a4',
          'light.master_bedroom_main_lights','light.master_bedroom_closet_light',
          'light.master_bedroom_sconces','switch.bedroom_floor_lamp_switch',
          'light.master_bathroom_main_lights','light.master_bathroom_vanity_lights'] %}
        {{ ents | select('is_state','on') | list | count }} of {{ ents | count }} on
    - name: Outdoor Lights On Count
      unique_id: outdoor_lights_on_count
      icon: mdi:lightbulb-group
      state: >
        {% set ents = [
          'light.front_porch_overhead_light','switch.transformer_zone_1',
          'switch.transformer_zone_2','light.patio_back_porch_lights',
          'switch.transformer_zone_3','light.omnilogic_pool_color_lights',
          'light.driveway_sconces','switch.driveway_zone_2_2',
          'switch.driveway_zone_1_2','switch.driveway_zone_3_2'] %}
        {{ ents | select('is_state','on') | list | count }} of {{ ents | count }} on

# ---------------------------------------------------------------------------
# Open-shades count for the Mobile Dash v2 Shades header ("N shades · M open").
# state = covers with current_position > 0 (or state 'open' when no position);
# total attribute = number of individual shade covers.
# ---------------------------------------------------------------------------
- sensor:
    - name: Shades Open Count
      unique_id: shades_open_count
      icon: mdi:roller-shade-open
      state: >
        {% set covers = [
          'cover.living_room_front_left_cover','cover.living_room_front_right',
          'cover.living_room_side_left_1_cover','cover.living_room_side_left_2_cover_2',
          'cover.living_room_side_right_1_cover','cover.living_room_side_right_2_cover',
          'cover.front_right_cover','cover.front_left_cover',
          'cover.side_right_cover','cover.side_left_cover',
          'cover.bedroom_left','cover.bedroom_right',
          'cover.bedroom_back_1_cover','cover.bedroom_back_4_cover','cover.bedroom_back_5_cover',
          'cover.front_guest_bedroom_front_left','cover.front_guest_bedroom_front_right',
          'cover.front_guest_bedroom_side','cover.back_guest_bedroom_back_left',
          'cover.back_guest_bedroom_back_right','cover.back_guest_bedroom_side',
          'cover.back_2','cover.back_3','cover.hallway_1','cover.hallway_2'] %}
        {% set ns = namespace(open=0) %}
        {% for c in covers %}
          {% set p = state_attr(c,'current_position') %}
          {% if (p is not none and p | int(0) > 0) or (p is none and is_state(c,'open')) %}
            {% set ns.open = ns.open + 1 %}
          {% endif %}
        {% endfor %}
        {{ ns.open }}
      attributes:
        total: >
          {% set covers = [
            'cover.living_room_front_left_cover','cover.living_room_front_right',
            'cover.living_room_side_left_1_cover','cover.living_room_side_left_2_cover_2',
            'cover.living_room_side_right_1_cover','cover.living_room_side_right_2_cover',
            'cover.front_right_cover','cover.front_left_cover',
            'cover.side_right_cover','cover.side_left_cover',
            'cover.bedroom_left','cover.bedroom_right',
            'cover.bedroom_back_1_cover','cover.bedroom_back_4_cover','cover.bedroom_back_5_cover',
            'cover.front_guest_bedroom_front_left','cover.front_guest_bedroom_front_right',
            'cover.front_guest_bedroom_side','cover.back_guest_bedroom_back_left',
            'cover.back_guest_bedroom_back_right','cover.back_guest_bedroom_side',
            'cover.back_2','cover.back_3','cover.hallway_1','cover.hallway_2'] %}
          {{ covers | count }}
