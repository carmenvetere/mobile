- trigger:
      - platform: state
        entity_id: sensor.front_load_washer_remaining_time
  sensor:
      - name: "Washer Cycle Progress"
        unique_id: washer_cycle_progress
        unit_of_measurement: "%"
        state: >
          {% set s = trigger.to_state.state %}
          {% if s in ['unknown','unavailable','-','0:00:00'] %}
            {{ 0 if states('sensor.front_load_washer') == 'off' else 100 }}
          {% else %}
            {% set p = s.split(':') %}
            {% set rem = p[0]|int*3600 + p[1]|int*60 + p[2]|int %}
            {% set prev = this.attributes.total_seconds | default(0) | int %}
            {% set total = [rem, prev] | max %}
            {{ ((total - rem) / total * 100) | round(0) if total > 0 else 0 }}
          {% endif %}
        attributes:
          total_seconds: >
            {% set s = trigger.to_state.state %}
            {% if s in ['unknown','unavailable','-','0:00:00'] %}
              0
            {% else %}
              {% set p = s.split(':') %}
              {% set rem = p[0]|int*3600 + p[1]|int*60 + p[2]|int %}
              {% set prev = this.attributes.total_seconds | default(0) | int %}
              {{ [rem, prev] | max }}
            {% endif %}

