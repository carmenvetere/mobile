- id: '1750804925752'
  alias: Basement HVAC Schedule
  description: 'Basement zone schedule. Cooling season (heating_season off), day
    = 08:00-20:00 / night = 20:00-08:00: when fresh air is available and the zone
    is inside the comfort band, coasts with HVAC off + blower on to circulate
    economizer air; above the band it returns to mechanical cooling. Heating
    season: weekday 08:00-17:00 runs emergency heat (switch on, 1 min settle,
    setpoint) at the workday setpoint; weekday evening/night and weekends run
    normal heat with emergency heat off (sequencing and 1-min delays preserved
    deliberately - do not "optimize"). All setpoints come from the
    input_number.bsmt_* helpers (day cool 72 / night cool 74 / fresh-air night
    cool 73.5 / workday heat 69 / evening+weekend-day heat 68 / night heat 66
    defaults). Writes mode+setpoint to the HomeKit mirror and fan_mode to the
    native Lyric entity. Fan writes are owner-aware at the lowest priority
    (input_select.basement_fan_owner: only touch when none/schedule, claim
    schedule for fan-on, release to none for auto). Skips entirely while
    input_boolean.climate_hold_basement is on (mudroom door / away / outage).
    Re-syncs on HA start (60 s settle), at 20:02 post-demand-response, and when
    the zone runs above either cool band edge for 5 min.'
  triggers:
  - trigger: state
    entity_id:
    - input_boolean.basement_hvac_fresh_air_available
  - trigger: time
    at: '08:00:00'
  - trigger: time
    at: '17:00:00'
  - trigger: time
    at: '21:00:00'
  - trigger: time
    at: '20:02:00'
  - trigger: homeassistant
    event: start
  - trigger: numeric_state
    entity_id:
    - sensor.basement_thermostat_homekit_current_humidity
    for:
      hours: 0
      minutes: 2
      seconds: 0
    above: 70
  - trigger: numeric_state
    entity_id:
    - sensor.basement_thermostat_homekit_current_temperature
    for:
      hours: 0
      minutes: 5
      seconds: 0
    above: input_number.bsmt_cool_day
  - trigger: numeric_state
    entity_id:
    - sensor.basement_thermostat_homekit_current_temperature
    for:
      hours: 0
      minutes: 5
      seconds: 0
    above: input_number.bsmt_cool_night
  conditions:
  - condition: state
    entity_id: input_boolean.climate_hold_basement
    state: 'off'
  actions:
  - if:
    - condition: template
      value_template: '{{ trigger.platform == ''homeassistant'' }}'
    then:
    - delay:
        hours: 0
        minutes: 1
        seconds: 0
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.heating_season
        state: 'off'
      sequence:
      - choose:
        - conditions:
          - condition: state
            entity_id: input_boolean.basement_hvac_fresh_air_available
            state: 'on'
          sequence:
          - choose:
            - conditions:
              - condition: time
                after: '20:00:00'
                before: '08:00:00'
              - condition: numeric_state
                entity_id: sensor.basement_thermostat_homekit_current_temperature
                above: input_number.basement_fresh_air_minimum_temp
                below: input_number.bsmt_cool_night
              sequence:
              - action: climate.set_hvac_mode
                data:
                  hvac_mode: 'off'
                target:
                  entity_id: climate.basement_thermostat_homekit
              - if:
                - condition: template
                  value_template: '{{ states(''input_select.basement_fan_owner'')
                    in [''none'', ''schedule''] }}'
                then:
                - action: climate.set_fan_mode
                  data:
                    fan_mode: 'on'
                  target:
                    entity_id: climate.basement_thermostat
                - action: input_select.select_option
                  target:
                    entity_id: input_select.basement_fan_owner
                  data:
                    option: schedule
            - conditions:
              - condition: time
                after: '20:00:00'
                before: '08:00:00'
              - condition: numeric_state
                entity_id: sensor.basement_thermostat_homekit_current_temperature
                above: input_number.bsmt_cool_night
              sequence:
              - action: climate.set_hvac_mode
                data:
                  hvac_mode: cool
                target:
                  entity_id: climate.basement_thermostat_homekit
              - action: climate.set_temperature
                data:
                  temperature: '{{ states(''input_number.bsmt_cool_night_fa'') |
                    float(73.5) }}'
                target:
                  entity_id: climate.basement_thermostat_homekit
              - if:
                - condition: template
                  value_template: '{{ states(''input_select.basement_fan_owner'')
                    in [''none'', ''schedule''] }}'
                then:
                - action: climate.set_fan_mode
                  data:
                    fan_mode: auto
                  target:
                    entity_id: climate.basement_thermostat
                - action: input_select.select_option
                  target:
                    entity_id: input_select.basement_fan_owner
                  data:
                    option: none
            - conditions:
              - condition: time
                after: '08:00:00'
                before: '20:00:00'
              - condition: numeric_state
                entity_id: sensor.basement_thermostat_homekit_current_temperature
                above: input_number.basement_fresh_air_minimum_temp
                below: input_number.bsmt_cool_day
              sequence:
              - action: climate.set_hvac_mode
                data:
                  hvac_mode: 'off'
                target:
                  entity_id: climate.basement_thermostat_homekit
              - if:
                - condition: template
                  value_template: '{{ states(''input_select.basement_fan_owner'')
                    in [''none'', ''schedule''] }}'
                then:
                - action: climate.set_fan_mode
                  data:
                    fan_mode: 'on'
                  target:
                    entity_id: climate.basement_thermostat
                - action: input_select.select_option
                  target:
                    entity_id: input_select.basement_fan_owner
                  data:
                    option: schedule
            - conditions:
              - condition: time
                after: '08:00:00'
                before: '20:00:00'
              - condition: numeric_state
                entity_id: sensor.basement_thermostat_homekit_current_temperature
                above: input_number.bsmt_cool_day
              sequence:
              - action: climate.set_hvac_mode
                data:
                  hvac_mode: cool
                target:
                  entity_id: climate.basement_thermostat_homekit
              - action: climate.set_temperature
                data:
                  temperature: '{{ states(''input_number.bsmt_cool_day'') | float(72)
                    }}'
                target:
                  entity_id: climate.basement_thermostat_homekit
              - if:
                - condition: template
                  value_template: '{{ states(''input_select.basement_fan_owner'')
                    in [''none'', ''schedule''] }}'
                then:
                - action: climate.set_fan_mode
                  data:
                    fan_mode: auto
                  target:
                    entity_id: climate.basement_thermostat
                - action: input_select.select_option
                  target:
                    entity_id: input_select.basement_fan_owner
                  data:
                    option: none
        - conditions:
          - condition: state
            entity_id: input_boolean.basement_hvac_fresh_air_available
            state: 'off'
          sequence:
          - choose:
            - conditions:
              - condition: time
                after: '08:00:00'
                before: '20:00:00'
              sequence:
              - action: climate.set_hvac_mode
                data:
                  hvac_mode: cool
                target:
                  entity_id: climate.basement_thermostat_homekit
              - action: climate.set_temperature
                data:
                  temperature: '{{ states(''input_number.bsmt_cool_day'') | float(72)
                    }}'
                target:
                  entity_id: climate.basement_thermostat_homekit
              - if:
                - condition: template
                  value_template: '{{ states(''input_select.basement_fan_owner'')
                    in [''none'', ''schedule''] }}'
                then:
                - action: climate.set_fan_mode
                  data:
                    fan_mode: auto
                  target:
                    entity_id: climate.basement_thermostat
                - action: input_select.select_option
                  target:
                    entity_id: input_select.basement_fan_owner
                  data:
                    option: none
            - conditions:
              - condition: time
                after: '20:00:00'
                before: '08:00:00'
              sequence:
              - action: climate.set_hvac_mode
                data:
                  hvac_mode: cool
                target:
                  entity_id: climate.basement_thermostat_homekit
              - action: climate.set_temperature
                data:
                  temperature: '{{ states(''input_number.bsmt_cool_night'') | float(74)
                    }}'
                target:
                  entity_id: climate.basement_thermostat_homekit
              - if:
                - condition: template
                  value_template: '{{ states(''input_select.basement_fan_owner'')
                    in [''none'', ''schedule''] }}'
                then:
                - action: climate.set_fan_mode
                  data:
                    fan_mode: auto
                  target:
                    entity_id: climate.basement_thermostat
                - action: input_select.select_option
                  target:
                    entity_id: input_select.basement_fan_owner
                  data:
                    option: none
    - conditions:
      - condition: state
        entity_id: input_boolean.heating_season
        state: 'on'
      sequence:
      - choose:
        - conditions:
          - condition: time
            weekday:
            - mon
            - tue
            - wed
            - thu
            - fri
          sequence:
          - choose:
            - conditions:
              - condition: time
                after: '08:00:00'
                before: '17:00:00'
              sequence:
              - action: switch.turn_on
                target:
                  entity_id: switch.basement_thermostat_basement_emergency_heat
                data: {}
              - delay:
                  hours: 0
                  minutes: 1
                  seconds: 0
                  milliseconds: 0
              - action: climate.set_temperature
                data:
                  temperature: '{{ states(''input_number.bsmt_heat_workday'') | float(69)
                    }}'
                target:
                  entity_id: climate.basement_thermostat_homekit
              - if:
                - condition: template
                  value_template: '{{ states(''input_select.basement_fan_owner'')
                    in [''none'', ''schedule''] }}'
                then:
                - action: climate.set_fan_mode
                  data:
                    fan_mode: auto
                  target:
                    entity_id: climate.basement_thermostat
                - action: input_select.select_option
                  target:
                    entity_id: input_select.basement_fan_owner
                  data:
                    option: none
            - conditions:
              - condition: time
                after: '17:00:00'
                before: '21:00:00'
              sequence:
              - action: switch.turn_off
                target:
                  entity_id: switch.basement_thermostat_basement_emergency_heat
                data: {}
              - delay:
                  hours: 0
                  minutes: 1
                  seconds: 0
                  milliseconds: 0
              - action: climate.set_hvac_mode
                data:
                  hvac_mode: heat
                target:
                  entity_id: climate.basement_thermostat_homekit
              - action: climate.set_temperature
                data:
                  temperature: '{{ states(''input_number.bsmt_heat_evening'') | float(68)
                    }}'
                target:
                  entity_id: climate.basement_thermostat_homekit
              - if:
                - condition: template
                  value_template: '{{ states(''input_select.basement_fan_owner'')
                    in [''none'', ''schedule''] }}'
                then:
                - action: climate.set_fan_mode
                  data:
                    fan_mode: auto
                  target:
                    entity_id: climate.basement_thermostat
                - action: input_select.select_option
                  target:
                    entity_id: input_select.basement_fan_owner
                  data:
                    option: none
            - conditions:
              - condition: time
                after: '21:00:00'
                before: '08:00:00'
              sequence:
              - action: switch.turn_off
                target:
                  entity_id: switch.basement_thermostat_basement_emergency_heat
                data: {}
              - delay:
                  hours: 0
                  minutes: 1
                  seconds: 0
                  milliseconds: 0
              - action: climate.set_hvac_mode
                data:
                  hvac_mode: heat
                target:
                  entity_id: climate.basement_thermostat_homekit
              - action: climate.set_temperature
                data:
                  temperature: '{{ states(''input_number.bsmt_heat_night'') | float(66)
                    }}'
                target:
                  entity_id: climate.basement_thermostat_homekit
              - if:
                - condition: template
                  value_template: '{{ states(''input_select.basement_fan_owner'')
                    in [''none'', ''schedule''] }}'
                then:
                - action: climate.set_fan_mode
                  data:
                    fan_mode: auto
                  target:
                    entity_id: climate.basement_thermostat
                - action: input_select.select_option
                  target:
                    entity_id: input_select.basement_fan_owner
                  data:
                    option: none
        - conditions:
          - condition: time
            weekday:
            - sun
            - sat
          sequence:
          - choose:
            - conditions:
              - condition: time
                after: '08:00:00'
                before: '20:00:00'
              sequence:
              - action: climate.set_hvac_mode
                data:
                  hvac_mode: heat
                target:
                  entity_id: climate.basement_thermostat_homekit
              - action: climate.set_temperature
                data:
                  temperature: '{{ states(''input_number.bsmt_heat_evening'') | float(68)
                    }}'
                target:
                  entity_id: climate.basement_thermostat_homekit
              - if:
                - condition: template
                  value_template: '{{ states(''input_select.basement_fan_owner'')
                    in [''none'', ''schedule''] }}'
                then:
                - action: climate.set_fan_mode
                  data:
                    fan_mode: auto
                  target:
                    entity_id: climate.basement_thermostat
                - action: input_select.select_option
                  target:
                    entity_id: input_select.basement_fan_owner
                  data:
                    option: none
              - action: switch.turn_off
                target:
                  entity_id: switch.basement_thermostat_basement_emergency_heat
                data: {}
            - conditions:
              - condition: time
                after: '20:00:00'
                before: '08:00:00'
              sequence:
              - action: climate.set_hvac_mode
                data:
                  hvac_mode: heat
                target:
                  entity_id: climate.basement_thermostat_homekit
              - action: climate.set_temperature
                data:
                  temperature: '{{ states(''input_number.bsmt_heat_night'') | float(66)
                    }}'
                target:
                  entity_id: climate.basement_thermostat_homekit
              - if:
                - condition: template
                  value_template: '{{ states(''input_select.basement_fan_owner'')
                    in [''none'', ''schedule''] }}'
                then:
                - action: climate.set_fan_mode
                  data:
                    fan_mode: auto
                  target:
                    entity_id: climate.basement_thermostat
                - action: input_select.select_option
                  target:
                    entity_id: input_select.basement_fan_owner
                  data:
                    option: none
              - action: switch.turn_off
                target:
                  entity_id: switch.basement_thermostat_basement_emergency_heat
                data: {}
  mode: restart